{
  id: "source", title: "agent-server 源码深挖",
  desc: "基于你的真实仓库整理。回答不仅要说明代码怎么写，还要讲清演进原因、生产故障、架构取舍以及当前仍存在的限制。",
  items: [
    ["为什么将 Agent 执行路径收敛为唯一的 build_chat_graph？", "我把所有 Agent 执行收敛成唯一一条路径，核心判断是:能力漂移比代码重复更致命——实现了不等于跑在用户路径上。\n\n- **漂移是怎么发生的**:早期我有多条执行路径(live graph + Plan-Execute-Verify 影子栈),上下文压缩、循环护栏、Memory 这些能力分散实现,结果就是「测试走 A 路径、用户实际走 B 路径」,B 路径根本没接上压缩或护栏。这就是 Harness 漂移,最隐蔽的那种 bug。\n- **收敛动作**:把 Aegra 的 chat_graph 定为唯一聊天执行路径,`runtime/graph.py` 的 `build_chat_graph` 是唯一 builder;所有复杂能力(Context Engineering、composition、统一 Tool Pipeline)都下沉到 `call_model` 前的组合层,而不是另起一条图。\n- **最值钱的一招**是让 eval 也调同一个 `build_chat_graph`,只把 checkpointer 换成 `MemorySaver`——这样「评测路径即生产路径」,能力只实现一次,生产/测试/评测三处行为天然一致。\n\n**取舍:** 收敛的代价是任何新能力都必须挤进 `build_chat_graph` 才算落地,灵活度下降;但我宁可要这个约束,因为它换来的是「不可能再长出一条没接护栏的隐形路径」。我用 trajectory 测试(脚本模型跑真实 live graph)断言工具选择和顺序来守这条线。\n\n**边界:** 已删的 PEV 影子栈就是反面教材——它设计完整却没承载真实流量,留着只会再造漂移。这道题真正想答的是一个判断:宁可删掉漂亮但没流量的代码。", "源码证据：runtime/graph.py、docs/architecture.md。可补充曾经删除 PEV 影子栈的原因。", ["源码","唯一执行路径","架构演进"]],
    ["为什么最终 Graph 只有 call_model、human_approval、tools、finalize 几个核心节点？", "我刻意让主循环只有四个节点,核心判断是:复杂度要沉到稳定的组合层,而不是靠堆节点数来表达——业务节点越多,越没法保证每条边都过了安全和压缩。\n\n- **四节点是最小闭环**:\n\n```text\ncall_model（模型决策）\n  → human_approval（静态权限审批 interrupt）\n  → tools（工具执行）\n  → finalize（回合收尾、写终态）\n  → 循环回 call_model，直到模型不再发 tool_call\n```\n\n- **复杂能力不上图、全压到 `call_model` 之前**:上下文压缩(`compress_live_context`)、知识注入(`build_turn_reminder`)、prompt 组装(composition helper)、Stuck Detector 都在进 `call_model` 前跑完;工具的校验/权限/视觉转述/Artifact 化全在 `tools` 节点内的统一 `execute_tool` Pipeline 里。\n- **这样每条路径**(含 subagent、LangChain bridge)都共享同一套压缩、安全、观测,不会因为「某个业务节点忘了接护栏」而漏。\n\n**取舍:** 节点拓扑确实就是 ReAct 形态——但区别在复杂性放在哪。我选择把它做成 `call_model` 前的固定组合层 + `tools` 内的单一 choke point,牺牲的是「一眼看图就懂全部流程」的直观性,换来的是节点数恒定而能力可无限叠加。\n\n**边界:** 如果面试官追问「这不就是普通 ReAct」,我会承认拓扑一样,但强调难点从来不是画出循环,而是保证每条边都过安全/压缩/OTEL——这正是组合层要解决的。", "面试官可能挑战“这是否只是普通 ReAct”。回答重点是复杂性放在稳定的组合层，而不是节点数量。", ["LangGraph","Graph 设计"]],
    ["为什么删除原先设计的 Plan-Execute-Verify 影子栈？", "我删掉一套设计完整的 PEV 影子栈,判断很直接:架构图漂亮但用户不经过,就不算生产能力——宁可删,也不养两套会漂移的系统。\n\n- **PEV 在设计上是完整的**(规划→执行→验证三段),但接入后发现它根本没承载真实前端流量——用户的实际请求全走 live graph,PEV 是一套并行的影子实现。\n- **维护两套的真实代价**是行为不一致的双系统:压缩/护栏/Memory 的修复要做两遍,而且极容易只改了 live 那套,PEV 那套悄悄腐化——这就是能力漂移的温床。\n- **我的处理不是简单删除**,而是把 PEV 里真正验证有效的能力(比如分步骤验证的思路)逐步下沉到 live graph 的 `call_model` 组合层,价值留下、平行图删掉。\n\n**取舍:** 删掉的代价是丢了一套「看起来更结构化」的执行范式,有人会觉得可惜;但我按「是否承载真实流量」来定生死,没流量的代码留着只是债。\n\n**边界:** 诚实说,现在文档里若还提 PEV 能力,那是历史设计,不能说成「目前仍在运行」——这道题的真正价值就是体现这个删代码的判断。", "这是很好的失败复盘题。不要把文档中的旧 PEV 能力说成目前仍在运行。", ["PEV","技术债","复盘"]],
    ["为什么选择 Aegra 承载 LangGraph，而 FastAPI 不直接执行聊天图？", "我用 Aegra 跑图、FastAPI 管辅助 API,核心判断是:白拿平台的 checkpoint/streaming,但绝不让平台把业务 runtime 吞进去——平台层必须薄到随时能换。\n\n- **职责切分清楚**:Aegra 承载 chat graph 的执行 + Checkpoint 持久化 + AG-UI 流式(SSE 事件);FastAPI 负责 auth/admin、沙箱文件侧栏、后台任务这些辅助 API。两个进程,各司其职。\n- **关键约束**是业务 graph、tool、wiring 都在我自己仓库里(`build_chat_graph` + `RuntimeWiring` + 各 tool provider),Aegra 只是「跑图的平台壳」,不持有任何业务逻辑。\n- **这样我白拿了** LangGraph 平台的 checkpoint/streaming/中断恢复,又没被它封装吞没——graph 怎么组装、工具怎么注册全在我手里。\n\n**取舍:** 多一个进程意味着多一份运维和进程间协调(后台任务投递那套就是为这个边界服务的);但我换来的是可迁移性——业务 graph 自有、平台层薄,Aegra 真不可用时,换一个能跑 compiled LangGraph + 提供 checkpointer 的承载即可。\n\n**边界:** 迁移不是零成本——主要工作量在重接 SSE 流式协议和 checkpoint 后端,但不用重写 agent 逻辑。这正是「薄平台层」买到的东西。", "准备回答 Aegra 不可用时的迁移成本：业务 Graph 自有，平台层相对薄。", ["Aegra","FastAPI","边界"]],
    ["Context Compression 为什么只修改本轮 LLM 输入，而不修改持久化对话？", "压缩我设计成临时视图,绝不回写持久层,核心判断是:模型摘要有误差,一旦覆盖了真相源就是永久损坏,没有恢复路径。\n\n- **ephemeral compaction**:压缩只发生在调用模型前,`compress_live_context` 的返回值只赋给本轮 `llm_messages`,绝不回写 Checkpoint 里的完整 transcript。\n- **为什么不能回写**:模型摘要会误差、carving 可能丢关键信息,一旦覆盖持久化 transcript,审计回看、后续恢复、re-run eval 就全废了——这是不可逆的。\n- **恢复路径留着**:需要精确回看时,从 Checkpoint 的原始消息或被 offload 到 Artifact 的工具结果里取回(Tier1 carve 时消息里留了 artifact 引用 + 预览,可 `read_artifact` 还原)。\n\n**取舍:** 每轮都重新算一遍压缩、不复用,是有重复计算成本的;但我用持久层的完整性换这点成本——因为「省一次压缩」远不如「永远能还原真相」值钱。\n\n**边界:** 排查窗口问题时我第一步永远是查 Aegra checkpoint 链是否连续,再查运行时变换——可以用 contract golden 测试断言「压缩后 Checkpoint 链仍连续、消息条数不减」,直接证伪「压缩破坏持久层」这类怀疑。", "源码证据：compress_live_context 的返回值只用于 llm_messages。", ["Context","Ephemeral"]],
    ["两级上下文压缩具体是怎样工作的？", "两级压缩的核心判断是:先便宜后昂贵,每级都能降级——压缩失败可以接受,但绝不能让它中断对话。\n\n1. **Tier1（零成本，不调 LLM）**:把较旧且体积大的「可再生」工具结果 offload 到 Artifact,消息里只留文件引用 + 一段预览。可再生的判定靠 carve allowlist(`DEFAULT_CARVE_TOOLS`),搜索/Shell 输出这类能重读重跑的进名单。\n2. **判定是否升级**:Tier1 后若 token 估算仍接近有效窗口(按 `context_window` 而非 `max_output` 算,且预留摘要输出 + 安全 buffer),才升到 Tier2。\n3. **Tier2（昂贵，调模型）**:用模型摘要中间历史,但保留最近的 human 消息边界,且从 `HumanMessage` 边界切,绝不把 `tool_call` 与对应 `ToolResult` 拆散——拆散会让模型看到悬空的工具调用而报错。\n4. **降级链**:Tier2 摘要调用失败就退回 tail window(只留尾部最近若干条),保证主对话不因压缩失败而断;连续失败按 thread 计数,3 次触发 circuit breaker 停 Tier2。\n\n**取舍:** Tier1 用「offload + 预览」换了「模型不再看到完整中间结果」的代价,但因为只对可再生的结果做,丢的能拿回来;Tier2 才付出 LLM 摘要的成本和误差风险,所以我把它放在最后、还加了熔断。\n\n**边界:** 源码在 `context/compression.py`;验证靠真实 eval 数每轮 LLM 输入的消息条数看压缩点是否合理,重放 `context-retention-heavy-turn` 这类回归任务确认压缩没把用户需求压丢。", "源码证据：context/compression.py。强调先便宜后昂贵、失败可降级。", ["Context Compression","Artifact"]],
    ["为什么工具结果 carving 使用允许名单，而不是所有大结果都压缩？", "我用白名单而不是按大小一刀切,核心判断是:大不代表可丢,小也可能承重——必须按工具语义区分「可再生中间产物」和「承重结果」。\n\n- **进 allowlist（可 carve）的**是 `search`、Shell/`exec` 输出这类中间结果——它们能重新搜索或重新执行拿回,offload 到 Artifact 不丢能力。\n- **绝不 carve 的**是交付物、知识检索结果(`kb_retrieve`)、Memory、subagent 结论、`read_artifact` 本身——这些要么是关键证据,要么是恢复路径,再 carve 等于砍掉模型回答的依据。\n- **allowlist 是 `DEFAULT_CARVE_TOOLS`**,把判断从「按结果大小」换成「按工具语义白名单」。\n\n**取舍:** 白名单要手工维护,新增工具得有人决定它进不进;我接受这点维护成本,换来的是不会误删承重结果。\n\n**边界:** 必问的追问是新增工具默认该安全还是可压——我的答案是默认不进 allowlist,也就是默认承重、不被 carve。这是 fail-safe 方向:宁可多占点上下文也别误删模型需要的证据,只有确认某工具结果可重新获取,才显式加进 `DEFAULT_CARVE_TOOLS`。", "源码证据：DEFAULT_CARVE_TOOLS。追问可能是新增工具默认应该安全还是可压缩。", ["Carving","数据保真"]],
    ["上下文摘要如何避免丢失用户需求？", "摘要里我硬性保护用户消息并审计 lost count,但我会诚实说:这是观测型护栏,不是语义证明——它发现得了「整条没了」,发现不了「被悄悄改写」。\n\n- **摘要 Prompt 明确要求逐字保留**全部 `HumanMessage`——用户的需求和约束不允许被概括掉。\n- **代码对被摘要的 `HumanMessage`** 做规范化前缀保存审计,记录 lost count(被压缩掉的用户消息计数)写进观测。\n- **切分从 human 消息边界开始**保留尾部,避免把 `tool_call` 和 `ToolResult` 拆散。\n\n**取舍:** 我选了「规范化前缀比对」这种轻量审计,而不是上完整语义比对,因为后者本身又要调模型、又贵又可能误判;代价就是它只能抓到整条丢失,抓不到语义漂移。\n\n**边界（必须主动说）:** 正因为这个限制,我不把保存审计当终点,而是靠多轮 eval 持续兜底——把真实事故沉淀成回归任务(如 `context-retention-heavy-turn`),断言压缩后模型仍能复述早期约束;Langfuse 里逐 generation 看模型实际收到的上下文,确认用户原话还在。", "主动说明限制：保存审计只检查规范化前缀，不是完整语义证明。", ["摘要","保真审计"]],
    ["为什么摘要失败三次后需要 Circuit Breaker？", "加熔断的核心判断是:别对一个稳定拒绝摘要的上游反复付费——每轮重试就是花钱买重复失败,还叠加延迟。\n\n- **触发场景很具体**:上下文已经很大、上游模型连续拒绝/失败摘要时,若每轮都继续发同样的付费 Tier2 调用,就是成本和延迟双重风暴。\n- **机制**:按 thread tracking key 记录连续摘要失败次数,达阈值(`3` 次)后熔断——停 Tier2,直接退回窗口裁剪(tail window);某轮摘要成功则计数清零。\n- **效果**是把「无限重试」收敛成「试 3 次就降级」,对话仍能继续,裁剪后照样进 `call_model`。\n\n**取舍:** 熔断会牺牲一部分本可成功的摘要机会(万一第 4 次会成功呢),但我宁可早点降级到裁剪也不愿赌——因为大上下文下的反复失败,损失是实打实的钱和延迟。\n\n**边界（主动承认）:** 这个连续失败计数保存在进程内,进程重启就清零——所以它是个「不完整的 circuit breaker」,跨进程/重启场景下熔断状态会丢。要做强一致得把状态外置到 Redis/DB,这是我列在未来优化里的运行态外置项之一。", "当前状态保存在进程内，重启后会丢失，这是可主动承认的局限。", ["Circuit Breaker","降级"]],
    ["为什么 Stuck Detector 必须按当前用户回合计算？", "Stuck Detector 必须只看当前回合,这是个真实事故逼出来的判断:检测范围若用整个 thread,上一轮的重复会污染新回合,把线程永久锁死。\n\n- **早期 bug 很典型**:Stuck Detector 扫整个 thread 的轨迹,于是上一轮出现过的重复工具调用会污染后续回合——用户发新消息后,检测器一看到历史里的重复就立刻判 stuck,线程相当于被永久锁死,再也走不动。\n- **修复**是改用 `current_turn_slice`,只取「最后一条 `HumanMessage` 之后」的轨迹做检测。新回合从一段干净的轨迹起算,自然能恢复。\n- **检测逻辑**:在 `current_turn_slice` 内对每步算指纹(工具名 + 规范化参数 + 结果摘要),最近若干步指纹重复且 state 关键变量无推进,才判 stuck。\n\n**取舍:** 为什么判 stuck 要结合 state 而不只看参数重复?因为重试场景参数可能相同但结果在变——只看参数会误杀正常重试。所以我用「指纹重复 + state 无推进」双条件,宁可放过也不误杀。\n\n**边界:** 这个事故我沉淀成了回归测试 `test_new_user_message_recovers_after_stuck`,断言新 `HumanMessage` 后线程能恢复——把生产事故变成永久护栏的典型。", "源码和测试中有真实事故回归：test_new_user_message_recovers_after_stuck。", ["Loop Guard","事故复盘"]],
    ["Agent 触发循环护栏后为什么不是直接返回固定错误？", "触发护栏后我做 soft landing 而不是抛硬错,核心判断是:一句生硬报错既丢掉已完成进度,又让用户不知道「做到哪、卡在哪、下一步是什么」。\n\n- **不抛固定英文错误的原因**就是它生硬且丢进度——用户看到的应该是总结,不是 traceback。\n- **soft landing 流程**:护栏触发后仍走一次正常上下文组装(保留已完成轨迹),但把模型换成 `unbound_model`(没 bind 任何工具的模型),并在尾部追加 `soft_landing_section` 收尾提醒。\n- **这是双重保险**:`unbound_model` 从机制上保证它不可能再发 `tool_call` 进环;收尾提醒引导它用用户语言总结完成部分、失败原因、建议的下一步。\n\n**取舍:** soft landing 比直接抛错多花一次 LLM 调用,但这次调用买的是用户体验和已完成进度的交付——我认为这点成本值得,护栏触发本就是边缘情况。\n\n**边界:** 验证靠 loop-trap eval(构造诱导重复调用的输入),断言触发护栏后返回的是用户可读总结、步数不超阈值、且这条消息里没有 `tool_call`。", "源码证据：unbound_model + soft_landing_section。", ["Soft Landing","UX"]],
    ["为什么 LLM 全部失败时要返回 AIMessage，而不是抛出异常？", "LLM 全失败时我返回一条失败 `AIMessage` 而不是抛异常,这是个生产故障逼出来的判断:异常冒泡会让 SSE 流没有 closing event,前端永远停在 thinking。\n\n- **症状很明确**:在 Aegra/AG-UI 流式路径里,`call_model` 抛异常会直接冒泡中断 async stream,但 stream 没有正常结束事件,前端收不到 `finalize`/`end`,UI 永远转圈。\n- **解决**:retry + fallback 链全部耗尽后,不抛异常,而是构造一条用户可见的失败 `AIMessage` 返回。graph 拿到正常 `AIMessage` 就照常进 `finalize` → `END`,SSE 流正常闭合,Checkpoint 也把这次失败如实保存。\n- **本质判断**是:可靠性不只是「后端别报错」,还包括「协议要完整结束」——一个没有 `end` 事件的流,对前端等于死锁。\n\n**取舍:** 把失败包装成正常消息,代价是「失败」在协议层看起来像「成功收尾」,得靠消息内容和 Checkpoint 状态区分;但比起让前端死锁,我宁可让流永远能正常闭合。\n\n**边界:** 验证靠 mock LLM 全失败,断言返回的是 `AIMessage`(非 raise)、SSE 序列里有结束事件、Checkpoint 里这一轮状态完整——这是一道很有价值的「流式协议完整性」故障题。", "这是非常有价值的生产故障题：可靠性不仅是后端不报错，也包括协议完整结束。", ["LLM Failure","SSE"]],
    ["多模型网关和 fallback 链是怎么设计的？", "网关设计的核心判断是:按 provider 分组声明、fallback 显式配置——绝不在用户不知情时悄悄换模型或换价位。\n\n- **声明层**:`ModelCatalog`(`llm/catalog.py`)按 provider 分组,每个模型声明 provider、endpoint、协议、`context_window`、`max_output`、输入 modality、cost、fallback 链。\n- **路由层**:`get_model`(`llm/client.py`)按 `provider_of(model)` 把请求路由到该 provider 独立的端点和协议——不同 provider 端点/鉴权/协议都不同,靠 provider 分组而非一个全局 `base_url`。\n- **调用顺序**:先走用户选择的模型 → 失败则按该模型显式配置的 fallback 链逐个试 → 最后默认模型兜底。没显式配 fallback 的模型不会被悄悄换成别的。\n- **prompt cache 配合**:系统提示词/历史前缀保持字节稳定做缓存,每轮变化的内容放尾部。\n\n**取舍:** fallback 显式化的代价是要手工维护每条链,加新模型多一份配置;但我换来的是确定性——绝不在用户选了 A 的情况下偷偷跑 B、按 B 的价位计费。可控性优先于「自动找个能用的」。\n\n**边界:** 源码在 `llm/catalog.py`、`llm/client.py`、`runtime/graph.py`。可追问的是 fallback 链本身怎么排序、跨 provider 的 fallback 怎么处理鉴权差异。", "源码证据：llm/catalog.py、llm/client.py、runtime/graph.py。", ["ModelCatalog","Fallback"]],
    ["为什么 Context Window 和 Max Output 必须分开建模？", "这两个字段必须分开,是个真实故障教训:曾经把 `max_output` 误当 `context_window`,一个字段含义搞错,整个 Agent 行为跟着错。\n\n- **事故经过**:曾把某模型的 `max_output`(如 `128K` 最大输出)误当成 `context_window`(上下文窗口)。结果压缩阈值按 `128K` 算,而真实可用窗口只有约其十分之一——系统在远未到容量时就疯狂触发压缩,白白增加成本、还无谓丢上下文。\n- **根因**:`context_window`(一次能读多少)和 `max_output`(一次能写多少)是两个完全不同的物理量,混用就让压缩判断错位。\n- **修复**:`ModelSpec` 里分别保存 `context_window` 和 `max_output` 两个字段;压缩阈值用 `context_window` 计算,并额外预留摘要输出空间 + 安全 buffer,留出模型本轮要写的 token 余量。\n\n**取舍:** 这题没什么「要不要分」的取舍——分开是对的;真正的教训是 catalog 里每个数字都是行为参数,配错一个比代码 bug 更隐蔽,因为它不报错、只是行为悄悄变坏。\n\n**边界:** 源码在 `llm/catalog.py` 的 `ModelSpec`、`context/compression.py` 的阈值计算。这是「一个错误字段如何放大成整体行为故障」的标准案例。", "这是很好的“一个错误字段如何影响整个 Agent 行为”案例。", ["Model Catalog","故障复盘"]],
    ["为什么动态的 env/reminder 放在 Prompt 尾部？", "动态内容放尾部,核心判断是:prompt cache 的前提是前缀字节完全一致——一个字节不同就 miss,把时间戳放前缀等于直接关掉 cache。\n\n- **缓存机制**:模型服务按 token 前缀命中缓存,前缀字节必须完全一样才命中。\n- **所以我把**系统提示词、工具说明、历史前缀这些每轮不变的放最前面保持字节稳定;把每轮都变的时间戳、环境信息、知识注入、turn reminder 放到输入尾部。\n- **反例的代价很直观**:当前时间戳若放前缀,每轮时间一变整个前缀缓存全失效,成本和延迟都上去。\n- **自定义 Agent prompt** 也通过规范化 key 做组装缓存,避免每次重拼。\n\n**取舍:** 把易变内容堆尾部,意味着模型读到这些信息的位置靠后,理论上注意力权重不如靠前——但相比 cache 全 miss 的成本,这点位置代价我认为完全划算。\n\n**边界:** 源码在 composition helper 的 prompt 组装顺序、`build_turn_reminder` 把 reminder 放尾部。可关联成本优化——同样的信息放对位置,能让 cache 命中率从近 0 拉到接近全命中,prompt 排序本身就是系统设计。", "回答时可关联成本优化：Prompt 内容排序同样属于系统设计。", ["Prompt Cache","Context"]],
    ["为什么所有工具都必须经过 execute_tool Pipeline？", "所有工具强制走单一 Pipeline,核心判断是:安全逻辑只能实现一次、收口到一个 choke point——靠每个工具作者自觉做校验,迟早有一处漏。\n\n`execute_tool`(`tools/pipeline.py`)是工具层唯一入口,固定七步:\n\n1. Pydantic 参数 schema 校验\n2. 业务校验\n3. 权限检查\n4. 执行异常收敛(把异常统一成结构化 `ToolResult`,不让原始 traceback 进上下文)\n5. 图片视觉转述(`ImageBlock` 转文本)\n6. 空结果显式标记(区分「查到 0 条」和「失败」)\n7. 大结果 Artifact 化 + OTEL span\n\n- **为什么强制单入口**:live graph、subagent、LangChain bridge 三处都调工具,各自实现校验/权限的话迟早有一处漏接;choke point 保证三处共享同一套。\n- **设计哲学**就是统一入口比「要求工具作者自觉」可靠——人会忘,pipeline 不会。\n\n**取舍:** 所有工具都过同一管道,意味着 Pipeline 本身成了关键路径,它的开销和 bug 会影响每个工具;我接受这个集中风险,因为换来的是「新增工具只要走 `execute_tool` 就自动获得全套安全/观测」,比分散实现安全得多。\n\n**边界:** 源码在 `tools/pipeline.py`。验证靠 contract golden 固定 `ToolResult` 的 key/type 形状(忽略 id/时间/文案),保证任何工具输出都符合统一契约。", "源码证据：tools/pipeline.py。强调统一入口比要求每个工具作者自觉更可靠。", ["Tool Pipeline","Choke Point"]],
    ["图级 HITL 与工具自己的 check_permissions 如何分工？", "权限我做成双层防线,核心判断是:图级是「能不能动用这类能力」的静态门控,Pipeline 是「这次参数风险多大」的动态检查,错过审批点必须 fail closed。\n\n- **图级 HITL（graph 的 human_approval 节点）**:按工具的静态权限声明,在真实执行前 interrupt 暂停,让用户 accept/edit/deny。这管的是静态能力门控。\n- **Pipeline 动态权限（`execute_tool` 内）**:仍对每次调用做动态参数 + 权限检查——同一工具不同参数风险不同,静态声明管不了。\n- **关键边界**:到了 Pipeline 阶段已经过了图的 interrupt 点,没法再弹审批。所以工具此时若返回 `ask`(需要人确认),Pipeline 会 fail closed 降级为 `deny`,绝不擅自执行——「错过审批窗口 = 拒绝」而非「错过 = 放行」。\n\n**取舍:** fail-closed 的代价是偶尔过严,本可放行的被拒了;但安全方向上我宁严勿松——一个静默放行的高风险操作,比一次误拒的代价大得多。\n\n**边界:** 源码在 `graph.py` 的 `human_approval`、`tools/pipeline.py` 的权限分支。这是静态能力门控 + 动态参数策略的双层结构。", "这体现静态能力门控与动态参数策略的双层防线。", ["HITL","权限"]],
    ["人工编辑工具参数时如何避免多个同名调用相互覆盖？", "这题的核心判断是:一轮里可能有多个同名调用,人工编辑参数时如果按工具名匹配就会串改——必须按 tool call id 精确匹配,少了这一层就是个静默的数据串改 bug。\n\n- **问题场景**:一轮里模型可能发多个同名工具调用(比如两次 `search`),用户在审批界面编辑参数时按工具名匹配就会把两个调用搞混、相互覆盖。\n- **解决**:审批 payload 为每个 tool call 带唯一 id,`human_approval` 节点编辑结果优先按 call id 精确匹配;只有为兼容旧客户端时才回退到按工具名匹配。\n- **类型防御**:替换进去的参数值必须是 `dict`——用户若传了列表或字符串直接拒绝,防止把 tool args 结构搞成类型混淆(args 必须是命名参数对象)。\n\n**取舍:** 保留「按工具名匹配」的回退分支是为兼容旧客户端,代价是这条路径仍有串改风险;但我把它限定成纯兼容兜底,新客户端一律走 call id。\n\n**边界:** 源码在 `graph.py` 的 `human_approval` 编辑分支。这是协议细节决定正确性的例子——多调用并行 + 人工编辑,少了 call id 这一层就是静默 bug。", "源码证据：graph.py human_approval。很适合体现你对协议细节的关注。", ["HITL","Tool Call ID"]],
    ["工具并发执行如何保证安全？", "并发的核心判断是:只对真正无依赖、副作用可控的工具并行——write/delete 类绝不为了快而并发,正确性优先于延迟。\n\n- **分类**:工具编排(`tools/orchestration.py`)把工具分成 `safe`(无依赖、副作用可控,可并行)和非 `safe`(写操作/破坏性,需独占串行)两类。\n- **调度**:`safe` 工具在最大并发上限内并行(用并发原语限流,避免无界并发打爆下游);非 `safe` 独占执行,不为降延迟牺牲正确性。\n- **统一收口**:不管并行还是串行,每个调用最终都进同一个 `execute_tool` Pipeline,享受同一套校验/权限/视觉转述/Artifact 化/OTEL——并发只改「怎么调度」,不改「每次调用经过什么」。\n\n**取舍:** 保守的并发分类会牺牲一部分本可并行的吞吐(有些写操作其实彼此无关也被串行了),但我选 read 类并行、write/delete 类一律串行这条粗线,因为误判一个有副作用的并行,代价远大于慢一点。\n\n**边界:** 源码入口在 `tools/orchestration.py`、`graph.py` 的 `tools` 节点。验证靠 trajectory 测试断言写类工具不被并行、并发数不超上限。", "源码入口：tools/orchestration.py、graph.py tools_node。", ["并发","工具编排"]],
    ["为什么 Tool Registry 要保证确定性排序并支持 alias？", "Registry 确定性排序看着像小事,核心判断是:排序随机会同时砸掉 prompt cache 命中率和测试可重复性——确定性是这两者的隐形前提。\n\n- **确定性排序**:Tool Registry(`tools/registry.py`)按固定顺序产出工具列表,让 `bind_tools` 和系统提示词在不同进程启动之间字节稳定——直接服务 prompt cache(前缀不变才命中)和可重复测试(每次跑出来的 prompt 一样,golden 才稳定)。\n- **alias**:旧 transcript 里可能保存了已改名工具的旧名(如 `kb_search` → `kb_retrieve`),alias 让旧会话的 `tool_call` 仍能路由到现工具,不报「未知工具」。`kb_retrieve.aliases=(kb_search,)` 就是这么兼容退役的 `kb_search`。\n- **冲突保护**:注册时若 alias 撞上某个正式工具名,直接启动失败——宁可起不来,也不能静默把调用路由到错的工具。\n\n**取舍:** alias 让旧调用一直能用,代价是工具名的历史包袱越积越多、得维护映射;但兼容旧 transcript 比强制用户重开会话友好得多。\n\n**边界:** 源码在 `tools/registry.py`。「排序随机」看着无害,实则是 cache 和测试可重复性的隐形杀手。", "源码证据：tools/registry.py。", ["Tool Registry","兼容性"]],
    ["动态 tool_search 目前真正解决了什么，和 deferred schema 有什么差距？", "这题我会做诚实校准:`tool_search` 当前解决的是「模型知道有哪些能力可用」,但「运行中动态 bind 新 schema」要以代码实际路径为准——不能因为旧设计文档写了就宣称完整动态绑定已上线。\n\n- **当前确实做到的**:`tool_search`(`tools/tool_search/`)基于工具名 + 描述做语义发现,让模型不用盲猜有哪些工具;搜索结果走 Redis 缓存减少重复检索;Skill 同理按需加载全文(`SKILL.md` 全文延迟加载)。这解决的是发现层。\n- **与 deferred schema 的差距**:是否实现「运行中把搜到的新工具 schema 动态 bind 进当前 LLM 调用」,要看 live graph 实际的 `collect_tools`/`bind_tools` 路径——很可能仍是「启动期 bind 全集」而非「搜到才 bind」。我会据实说:发现层已落地,运行时动态 bind 这一步看代码当前怎么 collect/bind。\n\n**取舍:** 发现层先落地、动态 bind 留后,是因为前者用一次语义检索就能显著降低模型盲猜成本,性价比最高;真 deferred binding 要在命中后重组 `bind_tools` 并触发一次 re-bind 的模型调用,复杂度和延迟都更高。\n\n**边界:** 这正是面试官最爱抓的「文档 vs 实现」校准题——把「设计意图」当「已实现」是 agent 圈最常见的吹牛形态,我会主动区分。源码在 `tools/tool_search/`、`registry.py` 的 `collect_tools`/`bind_tools`。", "这是面试官很可能抓住的文档与实现校准题。回答要诚实区分发现能力和真正动态绑定。", ["Tool Search","实况校准"]],
    ["为什么 Knowledge Base 被抽象成 Source，而不是每个库一个 Tool？", "我把知识库抽象成 Source 而不是每库一个 Tool,核心判断是:Source 是数据源声明层、Tool 是模型调用面,分层后加新库的成本恒定——消掉散落的 if/else。\n\n- **分层**:Knowledge Source(`knowledge/sources.py`)对照 Claude Code 的 MCP/Skill 那一层——每库声明一个 `KnowledgeSource`:id、provider、short/card(给系统提示词的描述)、filters(过滤能力域)、retrieve(检索函数)、injectable(是否主动注入)。Tool 层只有一个统一 `kb_retrieve` 消费所有 Source。\n- **加新库 = 注册一个 source,零工具代码改动**:不用再复制工具 schema、prompt 片段、注入逻辑——全由注册表统一驱动(KB cards 由 `build_kb_fragment` 从注册表生成,注入由 `build_turn_reminder` 遍历 injectable)。\n- **扩展点**:contrib provider 实现可选钩子 `knowledge_sources(settings)` 就能贡献库,core 团队的库在 `build_chat_graph` 注册。\n\n**取舍:** 声明式注册表比「每库一个工具」多了一层抽象,初学者要先理解 Source 概念;但换来的是新增成本恒定——抽象的价值就是把「每加一个库改一处 if/else」的反模式变成「声明一次、统一消费」。\n\n**边界:** 源码在 `knowledge/sources.py`、`tools/kb_retrieve/`。", "源码证据：knowledge/sources.py。体现消除散落 if/else 的抽象能力。", ["KnowledgeSource","扩展性"]],
    ["为什么不同 Knowledge Provider 的分数不能直接混排？", "不同 provider 的分数绝不直接混排,核心判断是:它们的标定空间不同——本地的 `0.8` 和 Dify 的 `0.8` 不代表同等相关性,比大小就是拿苹果比橘子。\n\n- **问题**:本地 pgvector 的 cosine 分数、Dify rerank 分数、其它 provider 的分数,标定空间完全不同,直接比大小排序毫无意义。\n- **解决**:`kb_retrieve` 联邦检索时按 provider 分组,只在同一 provider 的分数组内排序,分组结果一起交给模型判断,让模型基于内容而非跨源原始 score 取舍。\n\n**取舍:** 分组不混排意味着我没给模型一个「全局 top-K 排好的列表」,模型要自己跨组判断——这把一部分排序责任推给了模型;但比起拿不可比的分数硬排出一个错误顺序,我宁可让模型看内容决定。\n\n**边界:** 要真正跨源统一排序,必须再加一个统一 Reranker(把所有候选过同一个打分模型重新打到同一标定空间)——这是设计方案,不是已落地。补充两个源码细节:pgvector 用 cosine 距离 `<=>` 转相关性是 `1 - distance`;Dify 联邦下 `tickets` + `qa` 两个 source 的 metadata schema 还不同(`tickets` 6 字段含 `business_line`,`qa` 无 `business_line`)。", "源码证据：kb_retrieve/tool.py。", ["RAG","Score Calibration"]],
    ["为什么知识源需要显式声明支持的 Filter？", "Filter 显式声明 + 求交集下发,是个真实空召回事故机制化出来的:把 `business_line` 无差别下发给一个没有该字段的库,它会稳定返回空——一个静默的空召回 bug。\n\n- **真实问题**:不同知识库 metadata 字段不一致。如果把 `business_line` 这种过滤条件无差别下发给一个没有该字段的库(如 `qa` 库无 `business_line`),该库会稳定返回空结果。\n- **机制**:每个 `KnowledgeSource` 声明自己支持的 filters;请求带来的 requested filter 与每个 source 的声明求交集——只把这个库认得的过滤字段下发给它,认不得的字段自动忽略(对该库变成无过滤检索)。\n- **防漂移**:过滤的枚举值也从注册表生成,减少大小写/字段名漂移导致的对不上。\n\n**取舍:** 自动忽略不认识的字段,意味着用户以为加了 `business_line` 过滤、但对 `qa` 库其实没生效——这是「宁可多召回也不空召回」的方向选择;我认为空结果比多召回危险得多,所以选自动放宽而非报错。\n\n**边界:** 源码在 `knowledge/sources.py` 的 filters 字段 + `kb_retrieve` 的交集下发逻辑。这是由真实空召回沉淀出的机制——把「每库手工记得下发哪些字段」换成「声明 + 自动求交集」,从根上消除了「字段下错给空结果」这一类。", "这是由真实空召回问题沉淀出的机制。", ["RAG Filter","Schema"]],
    ["主动知识注入和 kb_retrieve 工具为什么要同时存在？", "注入和工具我都要,核心判断是:它们打的是两个不同问题——注入是「不用想就给的默认提示」,工具是「想清楚再深挖的按需检索」,缺一个都不行。\n\n- **主动注入（`build_turn_reminder`）**解决「高相关团队知识,模型不一定主动想起去搜」:每轮在 reminder 里遍历 injectable 的 source 并行检索,只取少量高分结果注入尾部。带预算和门槛防滥用——`3s` 延迟预算(超时就放弃注入不阻塞)、per-source 命中门槛(`team 0.45` / `tickets 0.5`,分数不够不注入)。\n- **`kb_retrieve` 工具**解决「需要更多证据或跨数据源深检索」:由模型在复杂问题时显式调用,topK 更大、可带 filter。带 Redis 10min 缓存(以 query/topK/filter/source 为键)避免工具循环里重复检索。\n\n**取舍:** 为什么不二选一?注入若做大就每轮都重检索浪费预算,工具若没有则简单问题模型也得手动搜——所以注入故意做小做快(少量高分 + `3s` 预算),把深检索的成本留给工具按需付。\n\n**边界（诚实）:** `kb_retrieve` 的缓存 key 还不含 source version,知识库更新后缓存命中可能拿到旧结果,需要把 version 纳入 key 才能精确失效。源码在 runtime 的 `build_turn_reminder`、`tools/kb_retrieve/`。", "可解释为“默认提示”与“按需深搜”的两级机制。", ["Proactive RAG","RAG"]],
    ["为什么使用 mem0，而不是自己维护一张 Memory 表？", "我用 mem0 而不是自研表,核心判断是:自研表很容易只停在「写入 + 向量搜」,而真正难的是事实管理(去重、更新、冲突解决)——这正是 mem0 的 ADUN 循环做的。\n\n- **自研表的天花板**:很容易只做到「append 一行 + 向量召回」,缺事实提取、去重、更新、冲突解决——同一个事实说三遍存三条,新事实和旧事实矛盾时不知道删谁。\n- **mem0 的 ADUN 循环（`tools/memory/mem0_store.py`）**:对每条记忆决策 Add / Update / Delete / No-op——新信息该新增、还是更新已有、还是与旧记忆矛盾要删、还是重复直接忽略。这是「记忆管理」而非「记忆堆积」。\n- **复用基建**:mem0 复用现有 PostgreSQL + pgvector + 本地 FastEmbed(`384` 维 embedding),不引第二套向量库。\n\n**取舍:** 引入 mem0 意味着多一个外部依赖、且每次写要跑 1-2 次 LLM(事实提取 + 合并决策)成本更高;但我认为「记忆管理」是自研短期补不齐的,与其做个会越堆越脏的表,不如用现成的 ADUN。迁移上我保留旧 Memory 表用于回滚,不一次性删——切后端要留退路。\n\n**边界:** 源码在 `tools/memory/mem0_store.py`。注意 `mem0_memories` 表是 mem0 库私有 schema,不能手改(曾踩过坑)。", "源码证据：tools/memory/mem0_store.py。", ["mem0","Memory"]],
    ["Memory Add 为什么采用 fire-and-forget？有什么风险？", "Memory 写入我做成异步立即返回,核心判断是:mem0 写一条要跑 1-2 次 LLM,同步等会明显阻塞用户响应——但我会诚实把它定位成 best-effort,不是事务性数据。\n\n- **为什么异步**:mem0 写一条记忆要跑 1-2 次 LLM 调用(事实提取 + ADUN 合并决策),同步等会明显阻塞。所以 `memory_add` 立即返回 `queued`,把实际写入丢到后台 asyncio task。\n- **防 GC**:后台 task 必须被持有强引用,否则 asyncio 可能把没人引用的 task 回收——写入还没跑完就被 GC 是个隐蔽坑。\n\n**取舍:** 异步换来了响应不阻塞,代价是两个风险(必须主动说):\n\n1. 进程退出时未跑完的写入会丢;\n2. 用户无法立刻保证下一轮就能检索到刚说的事实(还在队列里)。\n\n所以我把它明确定位成 best-effort Memory——真正的业务事实/权限数据绝不能只靠它。\n\n**边界（改进方向，设计方案非已落地）:** 换持久化队列(如 Redis Stream / DB outbox)+ 可观测的写入状态(`queued`/`written`/`failed`),让重启不丢、状态可查。源码在 `tools/memory/mem0_store.py` 的异步写入路径。", "进一步改进可使用持久化队列和可观测写入状态。", ["Memory","异步写入","技术债"]],
    ["Memory 如何保证用户隔离？", "用户隔离的核心判断是:身份来源必须收口到一处——`user_id` 只从受信上下文取、调用方无法覆盖,而不是「记得每次加 filter」。\n\n- **来源唯一**:所有 memory add/search 的 `user_id` 都从真实 `ToolExecutionContext` 取(`context.wiring` 注入),不接受工具调用方传入——防止模型或上游伪造 `user_id` 串库。\n- **查询隔离**:mem0 search 带 `user_id` filter,只召回该用户的记忆;匿名用户映射到一个固定 bucket(统一归到一个匿名 `user_id`),不和登录用户混。\n- **测试覆盖**:验证不同 wiring / 不同用户之间不串数据。\n\n**取舍:** 匿名用户全归到一个 bucket,意味着匿名会话之间彼此可见——这是隐私和「匿名也想要点记忆能力」之间的折中;但因为这是 best-effort Memory,真正的业务事实和权限数据本就不该存进来,所以这个折中可接受。\n\n**边界:** 隔离做得再好,best-effort 的可靠性也不配承载权限决策。源码/验证在 `ToolExecutionContext` 取 `user_id` 的路径、`scripts/verify_user_isolation.sh` 和相关隔离测试。隔离的关键不是「记得加 filter」,而是「身份来源不可被调用方覆盖」。", "可结合 scripts/verify_user_isolation.sh 和相关测试说明。", ["Memory Isolation","安全"]],
    ["后台任务为什么既使用进程内 asyncio Task，又将状态持久化到数据库？", "后台任务我做成「asyncio 管生命周期、DB 管事实、Redis 只做推送」三分,核心判断是:正确性绝不能依赖 Redis——任何「推送即真相」的设计在生产里都会被丢消息打脸。\n\n职责三分(`runtime/background_runner.py`):\n\n1. **进程内 asyncio Task** 负责实际执行的生命周期 + 取消(`task.cancel`);\n2. **DB** 负责 `queued` / `running` / `progress` / terminal 等事实状态的持久记录;\n3. **Redis Pub/Sub** 只做实时事件推送。\n\n- **关键设计**:正确性不依赖 Redis——它是 best-effort 实时通道,订阅丢了/没收到事件,前端仍可轮询 DB 拿到权威状态。把「实时性」和「正确性」解耦。\n\n**取舍:** 为什么不只用 DB?纯轮询延迟高、压 DB。为什么不只用 Redis?Pub/Sub 不持久,订阅者错过就丢,没法当事实源。所以我用 DB 当 durable 真相、Redis 补实时体验——多维护一套通道,换来「实时通道挂了也不影响数据正确」。\n\n**边界:** 源码在 `runtime/background_runner.py`。这是典型的「durable 状态层 + best-effort 通知层」分离。", "源码证据：runtime/background_runner.py。", ["Background Task","Durability"]],
    ["服务重启时后台任务会发生什么？", "我会诚实说:进程内协程重启即丢,当前没有跨进程续跑——重启后任务不会从断点接着跑,只会被诚实标记为中断。\n\n- **现状**:后台任务的执行协程是进程内 asyncio Task,进程重启后协程没了,无法继续——这是实事,不包装。\n- **重启协调**:启动时扫 DB,把那些「状态是 `queued`/`running` 但已经没有对应 Runner」的记录标成 `interrupted`,避免它们永远显示 `running` 这种幽灵态。优先保证状态诚实:宁可标「中断了」,也不能让用户盯着一个永远转的 `running`。\n\n**取舍:** 我选择「诚实标记中断」而不是「假装能续跑」——后者短期看体验好,但跨进程续跑没真正实现时假装有,是在埋更大的雷。把能力缺口讲清楚、再给补法,比硬撑成熟。\n\n**边界（必须主动承认 + 给补法）:** 当前不具备跨进程续跑。要做强恢复的设计方案是:外部持久队列(如 Redis Stream/SQS)+ 租约 Worker(lease/heartbeat 防重复执行)+ 任务级 Checkpoint(记录已完成步数,重启从断点续)。源码在 `background_runner.py` 的启动协调逻辑——这是我列在未来优化首位的项。", "这是必须主动承认的限制，反而能体现成熟度。", ["Orphan Task","技术债"]],
    ["后台任务结果为什么在下一轮注入，而不是直接写 Aegra Checkpoint？", "后台结果我走「下一轮注入」而不是直接写 Checkpoint,核心判断是:对话状态必须只有唯一写入者——两个进程抢同一份对话状态是并发地狱。\n\n- **边界问题**:FastAPI 后台任务和 Aegra graph 是两个不同的运行进程/边界。后台任务直接跨进程改 Aegra 的 Checkpoint,容易破坏消息顺序和并发一致性。\n- **交付协议（`runtime/background_delivery.py`）**:后台任务完成后把终态结果标记为 `undelivered`(存 DB);用户下一轮进入 `call_model` 时,由主 graph 把 `undelivered` 结果注入一次上下文,注入后标 `delivered`。\n- **核心原则**:主 graph 始终是对话状态的唯一写入者——后台任务只「投递信箱」,由对话流自己在合适时机取信并写进状态。\n\n**取舍:** 单写入者的代价是延迟——结果不是一完成就出现在对话里,得等用户下一轮才注入;但比起两个写入者抢状态导致的消息错乱,我宁可接受这点延迟。\n\n**边界:** 源码在 `runtime/background_delivery.py`。这是跨进程边界下的「状态所有权」问题——谁拥有写权限要唯一,跨边界只能投递不能直写。", "这是跨进程边界下的状态所有权问题。", ["Background Delivery","一致性"]],
    ["Sandbox 预热为什么只针对使用过沙箱的 Thread？", "预热我只对用过沙箱的 thread 做,核心判断是:预热的艺术不是「越多越好」,而是「只对会用的预热 + 把冷启藏进已有的等待窗口」。\n\n- **不无差别预热的原因**:每次纯聊天都启容器是纯浪费——大多数回合根本不用沙箱。\n- **标记机制（`sandbox/warmup.py`）**:工具实际用过 sandbox 后,用 Redis 给该 thread 打标。后续回合只有带标的 thread 才触发预热。\n- **时机**:在模型思考期(`call_model` 正等 LLM 出 token 时)异步 warm 沙箱,把容器冷启动藏在本来就要等的 LLM 延迟里——用户感知不到额外等待。\n\n**取舍:** 基于历史标记预热,意味着一个 thread 第一次用沙箱时仍要吃冷启(还没被标过);我没为这第一次去做无差别预热,因为对所有纯聊天 thread 都预热的浪费远大于救第一次的收益。对纯聊天的成本只是一次轻量 Redis 查询,可忽略。\n\n**边界:** 源码在 `sandbox/warmup.py`、`graph.py` 的预热触发点。可追问的是首次冷启如何进一步优化(比如按用户/会话类型预测)。", "源码证据：sandbox/warmup.py、graph.py。", ["Sandbox","预热"]],
    ["Cloudflare Sandbox 与 E2B 的抽象如何体现架构价值？", "这道题的真正价值是个技术判断修正:我最初差点把网络问题错归成 provider 问题——抽象买到的是「选项」,不是「换了就快」。\n\n- **抽象**:Cloudflare Sandbox 和 E2B 实现同一个 `SandboxProvider` 接口,调用方不感知后端——切换 provider 不动业务代码。\n- **故障归因修正**:最初怀疑 Cloudflare warm exec 慢,差点据此切 E2B。但做了同机同网基准测试,发现两者 warm exec 都约 `0.3s`——provider 不是瓶颈,真正慢的是部署机的网络路径(隧道/回源)。\n- **抽象的真实价值**不是「Cloudflare 慢所以换 E2B」,而是 E2B 作为可快速落地的切换选项存在;但选型必须基于同环境基准,不能基于错误归因。\n\n**取舍:** 维护两个 provider 抽象有成本(接口要兼容两套语义),而且这次发现「换了也没用」——但我不后悔做这个抽象,因为它逼我先做控制变量基准、再决策,反而避免了一次无效迁移。抽象的回报是「有得选 + 有得比」,不是「换了就快」。\n\n**边界:** 源码在 `sandbox/` 下的 `SandboxProvider` 实现。这是很有说服力的「先证伪再决策」案例——性能问题不做控制变量基准就换技术栈,很可能换完发现没用、真因还在网络层。", "这是源码项目里非常有说服力的技术判断修正案例。", ["SandboxProvider","Benchmark","复盘"]],
    ["为什么工具图片结果要先做视觉模型转述？", "工具图片要先转述,核心判断是协议层硬限制:OpenAI 兼容协议里 tool role 消息不能带 image block——「主模型支持视觉」不等于「图片能从任何角色传进去」。\n\n- **协议约束**:tool role 消息不能直接携带 image block,即使主模型支持视觉,也无法通过 tool 结果原样接收图片。这是协议层限制,不是模型能力问题。\n- **Pipeline 处理（`tools/pipeline.py` 的 `_resolve_image_blocks`）**:把工具结果里的 `ImageBlock` 并发交给视觉代理(vision 模型)转述成文本,文本进 tool 结果供主模型推理;同时把原始 image 的 data URL 保存在 `ToolResult` 的 metadata。\n- **双表示一致**:模型看到的是文本转述(能推理),前端看到的是 metadata 里的原图 data URL(能展示)——两个不同但关联一致的表示,各取所需。\n\n**取舍:** 转述要多调一次 vision 模型、且文本必然损失部分视觉细节;但因为协议根本不让图片进 tool role,这不是「要不要省这步」的选择题——转述是唯一能让主模型「看到」工具图片的路径,我能做的只是并发转述把延迟摊薄。\n\n**边界:** 源码在 `tools/pipeline.py` 的 `_resolve_image_blocks`。可追问的是转述的 vision 模型怎么选、对高细节图(如图表)的转述保真度。", "源码证据：tools/pipeline.py _resolve_image_blocks。", ["Multimodal","ToolResult"]],
    ["为什么测试要分成单元、Trajectory、Contract 和真实 Eval 四层？", "四层测试的核心判断是:确定性问题和概率性问题必须分层——拿 eval 测协议形状又贵又 flaky,拿单元测 agent 行为又测不到,每层只该打它该打的那类问题。\n\n1. **单元**:保证纯函数正确(压缩阈值计算、filter 求交集、call id 匹配等),快、确定。\n2. **Trajectory（`tests/trajectory`）**:用脚本化的 fake 模型(按预设脚本出 `tool_call`)跑真实 live graph,零 LLM 成本地检测工具选择、调用顺序、循环膨胀——这是「不花钱测 agent 行为骨架」的关键层。\n3. **Contract Golden（`tests/contract`）**:固定前端依赖的事件类型、工具名、`ToolResult` artifact 的 key/type 结构形状,忽略 id/时间/具体文案——后端文字没变不代表协议没破,这层专防静默破协议。\n4. **真实 Eval（`evals`）**:用生产模型 + 任务集,比 passed / steps / latency / token / cost,用 `MemorySaver` 替 checkpointer、HITL 用 resume payload 自动批准——测概率性的真实行为。\n\n**取舍:** 分四层意味着维护四套测试基建、且要清楚每类问题归哪层;但合成一层的代价更大——要么贵到没法常跑、要么测不到该测的。我按「确定性 vs 概率性」「函数 vs 行为 vs 协议」这两条轴切,每层职责互不重叠。\n\n**边界:** 源码在 `tests/trajectory`、`tests/contract`、`evals`。", "源码证据：tests/trajectory、tests/contract、evals。", ["Testing","Eval"]],
    ["为什么行为 Eval 必须跑生产同一条 Graph？", "行为 eval 必须跑生产同一条 graph,核心判断是:评测路径即生产路径——任何「为了好测而简化的评测图」都是在测一个不存在的系统。\n\n- **反例的危害**:如果 eval 用一条简化 chain、生产用另一套 graph,eval 绿了也不代表生产对——真实的工具调用、上下文压缩、HITL 审批、安全行为全没被测到,纯属自欺。\n- **做法**:eval 直接调用生产同一个 `build_chat_graph`,只把生产 checkpointer 换成 `MemorySaver`(评测不需要持久化);HITL 用与真实客户端相同的 resume payload 自动批准(模拟用户点 accept),让审批流也真实跑过。\n- **收益**:eval 覆盖的就是用户实际执行路径——压缩/护栏/审批/工具选择全是生产那一套。这也是当初收敛到唯一 `build_chat_graph` 的回报之一。\n\n**取舍:** 跑全生产 graph 比跑简化 chain 慢、也更难 mock;但我宁可慢一点、也不要一个「绿了但没意义」的 eval。唯一允许换掉的是 checkpointer(持久化)和审批的人工输入,因为这两者不影响被测的 agent 行为本身。\n\n**边界:** 源码在 `evals/` 调 `build_chat_graph`、用 `MemorySaver`、resume payload 自动批准。核心原则就是评测路径即生产路径。", "可用“评测路径即生产路径”作为核心原则。", ["Eval","Production Parity"]],
    ["71 步 Fibonacci 事件说明了什么？", "71 步 Fibonacci 这件事说明一个判断:最终答案对 ≠ agent 健康——所以我把 step count 升成了一等指标。\n\n- **事故**:一个本应约 3 步完成的 Fibonacci 任务,曾膨胀到 71 步才结束——最终答案是对的,但延迟和成本爆炸。如果只看「最终文本对不对」,这个 agent 看起来完全健康,实则病得很重。\n- **教训**:agent 质量不能只评最终输出,过程效率(步数、重复调用、循环膨胀)是独立的健康维度。\n- **沉淀的护栏**:把 step count 列为一等指标——加 `max_steps` 告警、写 loop-trap eval 任务(构造诱导重复的输入断言步数不超阈值)、加 trajectory guard(脚本模型跑真实 graph 测循环膨胀)、Stuck Detector 按 `current_turn_slice` 检测重复。\n\n**取舍:** 把过程指标和结果指标分开评,意味着一个 `passed=true` 的 run 也可能因为 steps 超标被我判为退化——这看似严苛,但 71 步那次正是 `passed=true`、steps 暴露了真相。我宁可让「步数膨胀」这类隐性退化也算回归,而不是只盯最终答案。\n\n**边界:** 这也是为什么真实 eval 要比 steps 而不只比 passed。「答案正确」是必要不充分条件——把过程指标(steps/latency/cost)和结果指标分开,才抓得住这类隐性退化。", "这是回答 Agent 评测与 Loop Control 的最佳真实案例之一。", ["Step Inflation","事故复盘"]],
    ["事件契约 Golden Test 解决了什么问题？", "契约 Golden Test 解决的核心问题是:后端「文字没变」不代表「协议没破」——前后端之间那条 AG-UI 事件契约是没人守的真空地带。\n\n- **问题**:前端按 `ToolResult` artifact 的 key 和 type 渲染对应组件(图片/任务/知识结果各一套 UI)。改个 artifact 的 type 字段,前端组件就渲染不出,但后端文本类测试全绿。\n- **解法（`tests/contract/test_event_contract.py`）**:Golden Test 只固定消息类型、工具名、artifact 的 key/type 结构形状,主动忽略 id、时间戳、具体文案这些本就该变的。盯住「契约」,放过「内容」。\n- **变更纪律**:有意改协议时必须显式重录 golden(regenerate),改动以 git diff 形式进 PR 审查——让「破坏前端契约」从一个静默事故变成一次必须有人 review 的显式动作。\n\n**取舍:** golden 测试会带来「有意改协议时得手动重录」的维护负担,有人嫌烦;但我要的就是这个摩擦——让破坏契约变成一次显式、可审查的动作,而不是悄悄合进去前端才炸。\n\n**边界:** 源码在 `tests/contract/test_event_contract.py`。靠后端单测和前端单测各管一头,中间那条 AG-UI 事件契约就是没人守的真空地带,这层专门补它。", "源码证据：tests/contract/test_event_contract.py。", ["AG-UI","Contract Test"]],
    ["插件化架构有哪些扩展点？为什么使用 entry point？", "插件化的核心判断是一条硬约束:core 绝不依赖任何具体业务 provider——一旦 core 里出现某个厂商的名字,扩展点就名存实亡。\n\n- **四类扩展点**:LLM Provider、Skill Pack、Tool Provider、Sandbox Provisioner。业务私有能力(如公司的 Dify 知识库、企业 CLI)打成独立包,通过 Python entry point 注册,安装即生效、卸载即消失。\n- **为什么用 entry point 而非核心仓库 if/else**:在 core 里维护「if 装了 Dify 就 import…」这类条件导入会让核心逐渐被业务污染,且开源/私有边界糊掉。entry point 是 Python 标准的包级扩展机制——core 不 `import` 任何具体 provider,靠 entry point 在启动时被发现注册。\n- **实例**:`contrib/agent_server_qlj` 就是一个外挂包,声明 `knowledge_sources(settings)` 钩子贡献 `tickets`/`qa` 两个 Dify 库,core 完全不知道 Dify 的存在。\n\n**取舍:** entry point 比直接 `import` 多一层间接(启动期发现、debug 时不那么直观);但我用这点间接换来「core 干净、开源/私有边界清晰、装即注册卸即消失」——对一个要分开源 core 和私有 contrib 的项目,这条边界比直观性重要。\n\n**边界:** 源码在 README 的 entry point 约定、`contrib/agent_server_qlj`、`tools/providers.py` 的钩子协议。", "源码证据：README 和 contrib/agent_server_qlj。", ["Plugin","Entry Point"]],
    ["Custom Agent 的 Prompt 为什么只能叠加，不能替换系统 Prompt？", "Custom Agent prompt 只能叠加不能替换,核心判断是个安全边界:用户可配置层和系统治理层的关系必须是「叠加 + 收窄」,绝不能是「替换 + 扩张」——否则就是提权口子。\n\n- **风险**:用户定义的 persona prompt 如果能替换系统 prompt,就能移除工具说明、安全规则、Operator 指令、权限边界——等于用户配置可绕过整个系统治理。\n- **组装顺序**:先组装基础 Harness(系统 prompt + 工具说明 + 安全规则 + 权限边界),再把 Custom Agent 的 prompt 作为「更具体的最后一层」追加在后面。persona 只能专门化/细化行为,删不掉前面的治理层。\n- **Skill 同理只能缩小**:Custom Agent 的 Skill allowlist 只能从系统可见的 Skill 集合里做子集筛选,不能新增系统没授予的 Skill——能力只能收窄不能扩张。\n\n**取舍:** 只能叠加意味着用户的自定义能力是受限的——想完全自定义行为、彻底改写系统 prompt 是做不到的;但我宁可牺牲这点灵活度,因为「让用户配置能覆盖安全规则」的设计本质上就是提权漏洞。\n\n**边界:** 源码在 composition 的 prompt 分层组装、Custom Agent 的 allowlist 求交逻辑。任何让用户配置能覆盖安全规则的设计都得当提权漏洞看。", "这是防止用户配置绕过系统治理的重要边界。", ["Custom Agent","Prompt Hierarchy"]],
    ["如果让你现在继续优化 agent-server，优先做什么？", "我排优先级的原则很明确:按线上失败频率 × 业务损失定,不是「哪个技术更酷」,而是「哪个最常坏、坏了最贵」——按这个排,先补三类已知风险。\n\n1. **持久化恢复（最大缺口）**:把 Memory 写入(当前 fire-and-forget,进程退出可能丢)和长后台任务(当前进程内 asyncio,重启只能标 `interrupted` 不能续跑)迁到可恢复的持久化队列 + 租约 Worker + 任务级 Checkpoint,解决跨进程续跑。\n2. **运行态外置**:把进程内的运行状态外置或明确生命周期——compaction failure 的 circuit breaker 计数、Stuck Detector 的回合状态、Sandbox 标记等目前重启即丢,至少把熔断这类该跨重启稳定的状态搬到 Redis/DB。\n3. **eval 闭环深化**:继续从 Langfuse 坏 trace 沉淀回归任务,重点覆盖跨进程恢复、知识冲突解决(ADUN 的 Delete 决策对不对)、高风险审批(HITL fail-closed 路径),把每个生产事故变成永久门禁。\n\n**取舍:** 我把「持久化恢复」放第一而不是先做更亮眼的新功能,是因为跨进程续跑是当前最实打实的可靠性缺口、坏了用户最痛;新能力再酷,建在一个重启就丢状态的地基上都是债。\n\n**边界（按岗位微调）:** 偏可靠性的岗位我先讲 1/2,偏业务知识库的先讲知识冲突与 filter 治理,偏成本的先讲 prompt cache 命中率和压缩阈值调优——优先级跟着目标场景的「最常坏、坏了最贵」走。", "这是未来情景题。回答时可以根据目标岗位偏可靠性、成本或业务知识库调整优先级。", ["Roadmap","技术债"]]
  ]
}

    const productionDeepDiveA = [
{
  id: "streaming-deep", title: "生产场景深挖：流式输出",
  desc: "从传输协议一直问到断点续传、内容安全与跨服务观测。重点不是打字机效果，而是事件一致性、任务生命周期和资源回收。",
  items: [
    ["前端实现大模型流式输出，SSE与WebSocket选型逻辑是什么？各自优缺点、适用场景（结合高并发、跨端兼容）？",
      deepAnswer(
        "普通单向文本生成默认选 `SSE`，只有高频双向、语音/音视频、多人实时协作才上 `WebSocket`——选错的代价是:用 `WebSocket` 做单向流,白白扛下心跳、重连、背压一整套自己造的运维成本。选型由通信方向、网关兼容、客户端能力三件事决定,不是笼统比谁快。",
        "最关键的一步是认清 `SSE` 的传输约束再决定怎么接:浏览器原生 `EventSource` 自动重连、自动回传 `Last-Event-ID`,但它只能 `GET`、不能带自定义 Header,所以鉴权/POST body 场景必须改用 `fetch` + `response.body.getReader()` 自己读 `ReadableStream`,重连和 `Last-Event-ID` 得手写——这一点决定了你前端是用现成轮子还是自己搭。\n\n- **帧格式定死流式能不能用**:`text/event-stream` 每帧三行 `id: <seq>`、`event: <type>`、`data: <json>`,空行结束。\n- **WebSocket 是另一套心智模型**:一次 HTTP `Upgrade` 后全双工,但帧类型、ping/pong 心跳(如 `30s`)、重连退避、ack 和背压全要应用层自己定,负载均衡还得 sticky 或把会话状态外置。\n- **高并发是两者共同的底线**:都要异步非阻塞(`asyncio`/`uvicorn`)、设每用户连接上限、空闲超时回收、跨实例用 Redis/Kafka 分发事件。\n\n服务端响应头:\n\n```text\nContent-Type: text/event-stream\nCache-Control: no-cache\nX-Accel-Buffering: no\n```\n\nNginx 侧必须关掉缓冲,否则反代会把流缓冲成一坨整包下发,前端看到的就是「转半天突然全出来」:\n\n```nginx\nproxy_buffering off;\nproxy_cache off;\nchunked_transfer_encoding on;\nproxy_read_timeout 3600s;\n```",
        "**取舍:** 是「双向能力」换「运维复杂度」:`WebSocket` 强在双向,但很多企业代理/CDN 对长连 `Upgrade` 支持差、断线恢复全得自己做;`SSE` 代理兼容最好、自带重连,代价是只能单向、且老式 LB 的 response buffering 会直接让流失效。我按通信方向定——单向文本就吃 `SSE` 的兼容红利,不为用不到的双向能力付运维税。\n\n**边界:** 小程序和部分 WebView 不支持 fetch streaming,这是 `SSE` 在跨端上的硬伤——必须备 `WebSocket` 或 chunked request 甚至短轮询降级,否则这些端只能等整段返回。",
        "我的项目用 Aegra + AG-UI 承载 Agent 事件流,能讲清分层:AG-UI 定义事件语义(`text_delta` / `tool_started` / …),`SSE` 只负责传输,二者解耦,这是已落地的。Klook 企业级 IM SDK 那段经历(1000+ 客服、消息顺序/重连/跨端)让我对 `WebSocket` 心跳、重连退避、跨端帧解析有真实落地经验;agent-server 当前主路径是 `SSE` 流,`WebSocket` 是另一类业务才需要的方案,我不会把它说成现有架构的一部分。"
      ), "追问：为什么不是所有场景都用 WebSocket？如何做代理层配置？", ["SSE","WebSocket","AG-UI"]],
    ["流式返回过程中网络中断、前端重连，后端如何恢复上下文继续输出？如何避免重复输出、丢包？",
      deepAnswer(
        "恢复的关键不是重新请求模型,而是把生成任务和连接解耦、给每个事件一个可持久化的单调顺序号——否则一断线就重跑,用户既看重复内容又多付一次推理费。事件级补发和模型推理续跑是两层问题,要分开答。",
        "最核心的是事件落一份带顺序号的短期日志:每个 run 分配 `runId`,事件统一为结构体,`sequence` 在 run 内单调递增,用 Redis Stream 保存、设 `TTL 600s` 或 `MAXLEN ~5000` 截断防无界增长——有了它,重连才有东西可补。\n\n```json\n{\n  \"runId\": \"...\",\n  \"sequence\": 0,\n  \"eventId\": \"...\",\n  \"type\": \"text_delta\",\n  \"payload\": {}\n}\n```\n\n落日志命令:\n\n```bash\nXADD run:{runId} * field value\n```\n\n- **补发要先填缺口再续订**:前端在内存记 `lastSeq`,断线重连时放进 `SSE` 的 `Last-Event-ID` Header(`fetch` 重连则拼到 query/header);服务端先 `XRANGE run:{runId} (lastEventId` 把 `lastSeq` 之后的缺口一次性补发,再 `XREAD BLOCK` 订阅实时增量,做到补发→无缝续订。\n- **幂等是不重复的保险**:前端 reducer 按 `eventId` 去重,`sequence` 比当前小的丢弃;`text_delta` 按 `messageId` 追加而非覆盖,保证至少一次投递下不重复渲染。\n- **上游真断了就别硬撑**:若模型连接已断且不可续传,从最近 Checkpoint 恢复 Graph 状态、把已生成部分作为部分结果返回并发 `end` 事件,绝不伪装成原流继续吐字。",
        "**取舍:** 是「严格不丢」换「写放大和延迟」:要不丢就得事件持久化 + ack,写放大和延迟都比裸聊天高,所以 `TTL`/`MAXLEN` 是「成本 vs 可恢复窗口」的平衡——窗口太短,离线久了的用户重连补不全只能回退 Checkpoint。我接受这个回退,因为给离线半小时的用户兜满全量事件不值。\n\n**边界:** 第三方 API 流断了通常无法服务端续算,只能重跑或交付部分结果;而 Checkpoint 存的是 Graph 状态、不等于完整 `SSE` 事件日志,所以两者都得有,缺一就续不上字。",
        "我的 Aegra Checkpoint 已经能恢复 thread/Graph 状态(`checkpoint_*` 链),这是已落地的;但事件级 replay(Redis Stream + `Last-Event-ID` 补发缺口)在 agent-server 当前版本是设计方案、不是已上线能力——我会诚实说:能恢复对话状态是事实,事件级断点重放是下一层要补的工程。"
      ), "区分状态恢复、事件补发和模型推理续跑。", ["断线恢复","幂等","Checkpoint"]],
    ["用户点击“停止生成”，后端如何立即终止LLM推理、释放GPU/CPU资源？如何避免资源泄露？",
      deepAnswer(
        "关闭浏览器连接 `≠` 取消任务。真正的取消是一条从 API 显式传播到「模型流 → 工具 → 子任务」的控制信号,并且终态必须落库——否则你以为停了,GPU 还在算、句柄还在漏。",
        "1. **触发与传播**:前端 `POST /runs/{id}/cancel`,置位 `cancellation_token`(`asyncio.Event`)并 `task.cancel()`,同一 token 向所有子任务下传。\n2. **真正止血在模型流**:HTTP provider 直接 `close` 掉 `httpx` stream——停止 read 就停止了 token 计费累加,这是「立即」的关键;自建 vLLM 走 `abort(request_id)` 把序列从调度队列和 KV Cache 移除(这部分我只能讲方法,没实操私有部署)。\n3. **资源回收靠 finally**:长工具循环周期性查 `token.is_set()`,`CancelledError` 必须在 `finally` 里关文件/HTTP 连接/沙箱,这是高并发下不泄漏 FD 的底线;最后 DB 标 `status=cancelled`、Checkpoint 存到取消点、发 `cancelled`+`end` 事件让前端从 `stopping` 落地。",
        "**取舍:** 是「能取消什么」有硬边界:第三方 API 通常停不了服务端计算,只能停读取与停计费;已发生的副作用(DB 写、文件落盘)取消不了,只能阻止后续步骤。所以我不把状态二值化,而是区分 `cancelled` / `failed` / `partially_completed`,半完成的用幂等键对账。不在 `finally` 兜底,慢工具被 cancel 时会漏 FD/连接,高并发下累积成句柄耗尽。",
        "我的 BackgroundTaskRunner(`runtime/background_runner.py`)已落地 cancel event、`Task.cancel` 和 terminal 状态落库(`queued`/`running`/`cancelled`/`interrupted`)——这是真实证据;而主 Agent 流的 abort 是否一路下传到上游 LLM provider,按当前实现我会诚实说:后台取消已落地,provider 级 abort(关 stream / vLLM abort)是下一层要补的。"
      ), "追问：CancelledError 在 finally 中怎么处理？不可撤销工具怎么办？", ["取消","资源回收"]],
    ["流式返回时，如何插入非文本事件（工具调用标记、思考过程、错误提示、分段标识），且不影响前端渲染？",
      deepAnswer(
        "别在文本里嵌控制字符或特殊分隔符,那是定时炸弹——模型某天吐出你的分隔符,渲染就错乱。正解是用有类型的事件 Envelope,让文本和状态事件走同一条有序流、不同渲染分支。这是事件建模问题,不是字符串解析技巧。",
        "最关键的是先把信封建对:统一字段结构,`type` 枚举至少含 `text_delta`、`tool_started`、`tool_finished`、`stage`、`artifact`、`error`、`end`——类型分清了,前端才能按分支渲染而不是猜。\n\n```json\n{\n  \"schemaVersion\": 1,\n  \"runId\": \"...\",\n  \"messageId\": \"...\",\n  \"sequence\": 0,\n  \"type\": \"text_delta\",\n  \"timestamp\": 0,\n  \"payload\": {}\n}\n```\n\n- **前端按实体 reducer 更新**:`text_delta` 只 append 到对应 `message.content`;`tool_started`/`tool_finished` 按 `tool_call_id` 匹配更新一张独立工具卡片;`artifact` 渲染成文件/图片/知识组件。\n- **思考过程只发可验证的阶段摘要**:`stage: planning` / `retrieving` 这种,不把模型私有 CoT 原样透传给用户。\n- **terminal 事件不能漏**:错误必须 `error` 后紧跟 `end`,否则 UI 永远卡在 `generating`。\n- **schema 向后兼容**:前端遇未知 `type` 默认忽略而非崩溃,字段只增不改,老客户端读不到新字段也能跑。",
        "**取舍:** 是「信息量」换「带宽和解析成本」:信封字段越多越稳,但 payload 要克制、只放必要增量。最大的坑是协议漂移——后端偷偷改了 `artifact` 形状,前端静默渲染错却不报错。所以我宁可多花一道测试把契约钉死,也不接受「改字段不报错」这种隐性故障。",
        "我的 agent-server 已有 AG-UI 事件契约 + Contract Golden Test(固定 ToolResult artifact 的 key/type 形状,忽略 id/时间/文案),这是已落地证据。可以重点讲 Tool Pipeline 如何统一产出 artifact(任务/图片/知识组件),以及 Contract Test 怎么防协议漂移。"
      ), "核心是事件建模，不是字符串解析技巧。", ["事件协议","Contract Test"]],
    ["多轮对话+流式输出，如何保证消息不乱序、上下文不丢失？跨服务流式透传（Java/Go后端+Python模型服务）如何实现？",
      deepAnswer(
        "顺序绝不能靠到达时间推断,必须靠显式 `sequence` 和 correlation id——跨服务一旦用「先到先排」,网关一抖动顺序就乱。而且顺序要在 run、message、event 三个层级分别定义,不是一个全局序号能搞定。",
        "最容易被忽略也最致命的一步是网关做纯字节流透传:HTTP chunk 边界 `≠` 业务 event 边界,一个 `SSE` 事件可能被拆进两个 TCP 分片,所以网关必须有增量解析器、按空行重组帧再转发,绝不能按 chunk 当事件——这一步错了,下游收到的就是半截事件。\n\n- **顺序号在入口就打**:网关生成 `threadId` / `runId` / `messageId` 并透传,Python 模型服务给每个事件打 run 内递增 `sequence`。\n- **透传要关掉一切聚合**:Spring 用 `ResponseBodyEmitter` / `Flux` 直透并禁 gzip 聚合,Go 端每帧 `flusher.Flush()`,原样转发 `id`/`event` 行不重新分帧。\n- **并发写同一 thread 要有策略**:每轮完成原子写消息 + Checkpoint 避免半写,同一 thread 默认串行 run,并发到来用版本号/乐观锁拒绝旧 run 覆盖新状态,或 fork 成新分支。\n- **correlation id**(`traceId`/`threadId`/`runId`)贯穿全链路,跨服务日志靠它对齐顺序。",
        "**取舍:** 集中在代理层的经典坑:buffer 把流憋成整包、idle timeout 提前断、连接池复用串台、错误被网关吞成 `200` 空响应——这些都是为了「网关省事」而牺牲流式正确性。多个并发 run 还会让上下文分叉,必须显式定义 fork / 排队 / 取消旧 run 的策略,否则两条流交织写同一 thread 状态必乱,我倾向默认串行、并发才 fork。",
        "我的 Aegra 负责 thread/run/checkpoint 生命周期,Graph 通过 `MessagesState` 更新,这是已落地的顺序保证。Klook IM SDK 处理过消息顺序/乱序重排/重连补偿(1000+ 客服规模),可作为跨层 correlation id + 消息状态机的真实经验;Java/Go 网关透传是我会用的标准做法,但 agent-server 当前是 Python 单栈,跨语言透传是设计方案而非现状。"
      ), "准备解释 Nginx proxy_buffering、HTTP chunk 和业务 event 的区别。", ["跨服务","顺序一致性"]],
    ["高并发下（QPS≥1000），大量SSE长连接如何做连接复用、心跳检测、超时释放？避免OOM的核心优化点？",
      deepAnswer(
        "先纠正一个常见误区:`SSE` 长连接没法在应用层「复用成一个客户端连接」,能复用的是下游 HTTP/DB 连接,并靠事件 Broker 把生成和持连进程解耦。而且要先把「QPS(新建速率)」和「并发在线连接数」两个指标分开——OOM 几乎都死在后者上。",
        "最核心的是每连接只持轻量对象:用异步服务器(`uvicorn` + `asyncio`),每连接只挂订阅句柄 + 有界发送队列,绝不在内存里挂整段上下文——这一条直接决定你能扛多少并发连接。\n\n- **心跳和回收要主动**:每 `15–30s` 发一行注释帧探活,记每连接 `last_write`,read 失败或写超时即判客户端断开,立即取消订阅、释放队列、关 FD。\n- **跨实例靠 Broker 解耦**:生成进程把事件写 Redis Streams / Kafka / NATS,持连进程订阅 run 转发,LB 配 sticky 或按 `runId` 订阅,避免事件投错实例。\n- **限额是 OOM 的真正闸门**:每用户最大并发连接数、每连接发送队列 `maxlen`(bounded queue)、事件缓存窗口上限,慢消费者直接踢出或降采样,绝不无界堆积;大结果不进事件流,Artifact 外置到 R2,事件只带引用。\n- **压测看并发连接数、RSS、event loop lag、队列深度、FD 数**,不是只盯 QPS。\n\n心跳注释帧:\n\n```text\n: ping\\n\\n\n```",
        "**取舍:** 是「保护内存」换「弱网体验」:OOM 几乎都来自四个源——每连接存完整上下文、无界队列、慢消费者拖垮内存、单个大事件,bounded queue + 慢消费者踢出是底线,但代价是弱网用户可能丢中间帧、得靠 `sequence` 补发兜回。我选择宁可踢慢消费者也不让单个连接拖垮整个进程。",
        "我的系统现阶段更适合讲单实例 Aegra + Redis(可选 Broker)的演进路径,以及多云部署 + CI/CD + CSR 降级的容量规划方法论。`1000 QPS` 实测我没做过——这是诚实边界:我只能讲压测指标设计和扩容路径,不会声称已验证过 `1000 QPS`。"
      ), "高并发指标必须给并发连接、事件速率和平均持续时间。", ["高并发","背压","OOM"]],
    ["流式输出场景中，如何实现内容安全实时截断（检测到敏感词立即停流、清理上下文）？",
      deepAnswer(
        "安全检测必须卡在「向用户发送之前」,一旦内容下发就无法真正撤回——所以这本质是个先缓后发、用一点延迟换安全的问题,不是发完再补救。",
        "最关键的是在发送侧加审核 gate 并带滑动窗口缓冲:token delta 先进缓冲(保留最近 `64–128` 字符尾巴),用来识别跨 chunk 被切断的敏感词(敏感词刚好横跨两个 delta 的情况),不缓冲就漏检。\n\n- **检测要分层降本**:先跑低延迟规则/词典(AC 自动机 `O(n)` 扫窗口),命中嫌疑再异步调分类模型确认,避免每个 delta 都打模型。\n- **命中就果断止血**:立刻停 flush、cancel 上游生成、丢弃未提交缓冲,发一个 `blocked` 的 terminal `end` 事件;已 flush 出去的部分前端撤回不可靠,所以缓冲窗口才是真正的防线。\n- **别只守输出**:输入侧、检索文档、工具结果在进模型前也要分层检测。\n- **日志只存风险标签或脱敏片段、不存原文**,免得审核系统自己成了敏感数据泄漏点。",
        "**取舍:** 是 `TTFT` 换安全:缓冲窗口越大越安全,但首字延迟(`TTFT`)越高,这是直接的体验代价;纯关键词误杀率高、模型审核延迟高,两者分层折中。我的决策依据是「已 flush 内容客户端撤回不可靠」,所以宁可牺牲一点 `TTFT` 也要先缓冲再发——撤回这条路根本不能赌。",
        "我的 Tool Pipeline 已经是统一后处理 choke point(空结果标记、大结果 Artifact 化、OTEL span 都在这一层),证明我会用单一切口做横切处理。但文本流的实时审核在 agent-server 当前源码没有落地——这是设计方案:我会把它实现为 Aegra 事件转换前的一个 `SSE` 审核中间层,而不是声称已上线。"
      ), "追问：跨 chunk 敏感词怎么识别？已经发出的内容怎么办？", ["内容安全","实时截断"]],
    ["流式返回时，如何精准统计Token消耗（逐段统计、总消耗汇总），适配计费场景？",
      deepAnswer(
        "计费以供应商最终 `usage` 为准,本地逐段 tokenizer 只能做实时估算——两者必须分开记,把估算当财务事实迟早对账对不平、被用户投诉算多了。",
        "最关键的是结束时拿权威值覆盖估算:OpenAI-compatible 流要在请求里带 `stream_options.include_usage=true`(或 SDK 的 `stream_usage=True`),最后一帧回 `usage`,用它覆盖本地估算——这是账单准不准的分水岭。\n\n- **开始就记上下文**:请求开始记 `model`、`price_version`、`input_tokens`(用对应模型 tokenizer,如 `tiktoken` 计 prompt)。\n- **流式阶段只做估算给前端实时显示**:累加可见 `text_delta` 本地估 `output_tokens`,明确标成估算值。\n- **子调用一条都不能漏**:工具、上下文摘要、视觉转述代理、fallback 模型各记一条,按 `runId` 聚合 `input` / `output` / `cache_read` / `cache_write` 和费用——fallback 只记最终那个模型就会少算。\n- **断线拿不到最终 usage 时标 `estimated`**,事后用供应商账单对账修正。",
        "**取舍:** 是「实时显示」换「账单准确」:本地估算能给前端即时反馈但不可作账,权威 `usage` 准但要等流结束。坑在于不同模型 tokenizer 与计费单位不同、失败/被限流的请求也可能照样收费,所以不能只在成功路径记账。我的决策依据是把 `price_version` 钉进每条记录——价格随时间变,不钉版本改一次配置就污染所有历史账单。",
        "我的 agent-server 已有 `TokenUsage` 结构、ModelCatalog 里的 cost 声明、Langfuse 链路记录和 Eval 的 cost 指标,这些是已落地的基础。`stream_options.include_usage` 校准是标准做法;账单级绝对准确仍需供应商对账,这点我会如实说明。"
      ), "计费系统要保存价格版本，避免历史账单随配置变化。", ["Token","计费","Langfuse"]],
    ["小程序、APP、PC端对流式输出的兼容性差异如何处理？如何解决部分端流式渲染卡顿问题？",
      deepAnswer(
        "跨端统一一套业务事件协议、但允许不同传输适配器,别假设所有端都支持浏览器 `ReadableStream`。渲染卡顿的根因就一句话:每个 token 都 `setState`,逼着 Markdown 反复重解析。",
        "最先要做的是渲染节流,因为它收益最大:每 `30–80ms` 批量 flush 一次累积 token(`requestAnimationFrame` 或定时器 batch),而不是每 token 一次 `setState`,能把 Markdown 重解析和长列表 diff 次数降一两个数量级。\n\n- **传输按端能力适配**:Web 用 `fetch` ReadableStream / `SSE`,React Native 用支持流式的网络层(rn-fetch 流式或 `WebSocket`),小程序按平台用 chunked request / `WebSocket`,最差降级短轮询。\n- **适配逻辑收口到一个跨端 SDK**:解帧、重连退避、`sequence` 去重、错误语义都收进 SDK,上层 UI 只消费标准事件。\n- **富文本增量渲染**:代码块/表格在闭合标记出现前按纯文本或增量 AST 渲染,闭合后再升级成高亮组件,避免半截语法反复重排。\n- **弱网/后台端降频**,并在真实低端 Android 和小程序容器实测,不能只在 PC Chrome 验证。",
        "**取舍:** 是延迟换帧率:批处理引入 `30–80ms` 的轻微延迟,但换来明显更稳的帧率,这个权衡通常值。真正的坑是把 PC 浏览器实现直接搬到小程序——小程序/老 WebView 不支持 fetch streaming,硬上会整段卡住,所以降级链路不是可选项而是必需。",
        "我有 React、React Native、Branded App(MoeGo 热更新灰度 + Feature Flag)和 Klook IM SDK 经历,跨端传输适配、消息状态机、渲染节流这块是我的真实强项,可作为个人已落地证据来答。"
      ), "不要把 PC 浏览器的实现直接复制到小程序。", ["跨端","渲染性能"]],
    ["流式推理时，LLM模型报错（如中途断连），如何设计兜底策略，保证用户体验？",
      deepAnswer(
        "兜底的核心判断是「首 token 前还是后失败」——前者切 fallback 零感知,后者切模型就语气突变加重复。所以中途错误先诚实终止当前流,再按是否已产出可用内容、是否有副作用决定重试 / fallback / 保留部分结果,绝不把两个模型的流拼成一个确定答案。",
        "最关键的分支是首 token 前后区别对待:首 token 前失败可无感切 fallback 模型重发、用户感知不到;首 token 后失败则保留已生成文本、提供「继续生成」或从稳定 Checkpoint 重跑,而不是硬接另一个模型造成断裂。\n\n- **错误先分类再决定重不重试**:超时、限流(`429`)、网络断连、客户端参数(`4xx`)、内容策略五类,只对瞬时类(超时/限流/网络)做指数退避(`base 0.5s`,`factor 2`,`max 3 次`,加 jitter)。\n- **fallback 链显式配置、不静默换模型**,让人能审计走了哪条链。\n- **幂等保命**:重试携带 run attempt id,工具副作用不可重放,已执行的写操作不能再跑一遍。\n- **所有失败路径都必须发 `error` + `end`**,释放连接和 asyncio Task,让 `SSE` 闭合。",
        "**取舍:** 是「换模型的代价」随进度变化:首 token 前用户没看到内容、切换零感知,首 token 后已吐字、重来会重复换模型会断裂,所以同一个错误在不同时刻该用不同策略。我的决策依据是只对瞬时错误重试——参数/内容策略类重试纯属浪费且可能放大副作用。",
        "我的 Graph 在 retry/fallback 全耗尽后返回 `AIMessage` 而不是抛异常,专门解决「前端永远卡在 thinking」这个真实线上问题——让 `SSE` 正常闭合、前端能落地展示失败说明。这是已落地的核心案例,也是我回答这题的主证据。"
      ), "追问：首 Token 前和首 Token 后的 fallback 策略为何不同？", ["Fallback","错误处理"]],
    ["如何实现流式输出的“断点续打”？用户刷新页面后，如何恢复之前未完成的流式内容？",
      deepAnswer(
        "断点续打要拆成两件事:重放已生成的事件(可可靠实现)和继续未完成的推理(取决于任务是否还在服务端跑)。面试官就是在看你会不会混淆 Checkpoint 与 Event Log——混了就答不对。",
        "刷新后第一步永远是恢复已落库的内容:`GET /threads/{id}/state` 把已持久化消息直接渲染出来,这部分始终可靠、与 run 死活无关。\n\n- **再按 run 状态分流**:run 仍 `active`,前端带 `lastEventId` 重新订阅,服务端从 Redis Stream 用 `XRANGE` 补发缺口再 `XREAD` 续订,做到无缝续打;run 已 `interrupted`(如重启被标记),展示部分结果 + 重试入口,不假装还在生成。\n- **持久化分层是性能关键**:不逐 token 写 DB(写放大严重),改按事件批次或消息快照落库,细粒度事件放 Redis Stream(`TTL 600s`),DB 只存里程碑。\n- **私有推理可保存 scheduler 状态续算**,第三方 API 一般只能重新发起。",
        "**取舍:** 是「续打字能力」有过期窗口:Checkpoint 存的是 Graph 状态、不天然等于完整 `SSE` 事件日志,所以单靠 Checkpoint 只能恢复对话状态、恢复不了「刚打到一半的那段字」。要真正续打字必须额外有事件 Broker / run event buffer,而它有 `TTL`——离线久了过期,用户就只能看到 Checkpoint 级的部分结果。我接受这个降级,不为极少数超长离线用户兜满全量事件。",
        "我的 Aegra 管理 run/checkpoint,前端已有重启检测与 `interrupted` 状态的演进记录(BackgroundTaskRunner 重启把无 Runner 的 `queued`/`running` 标 `interrupted`),这是已落地的。事件级续打(Redis Stream + `lastEventId` 补发)在 agent-server 当前版本是设计方案——我会明确:能恢复 thread 状态是事实,事件级断点续打能力以实际版本为准、目前是规划。"
      ), "面试官会检查你是否混淆 Checkpoint 与 Event Log。", ["断点续打","Run State"]],
    ["跨服务流式透传时，如何做日志埋点（每段输出、耗时、异常），支撑全链路追踪？",
      deepAnswer(
        "别每个 chunk 都打完整日志——那会产生巨量 IO 把存储和观测系统自己拖垮。该做的是追踪关键时间点 + 聚合指标,对高频流事件采样而非全量落盘。",
        "最关键的是埋对关键时间点字段,而不是堆日志条数:`queue_wait_ms`(排队)、`ttft_ms`(首 token 时延,记 stream 开始到第一帧)、`tpot_ms`(每 token 间隔)、`tool_duration_ms`、`e2e_ms`、`total_usage`、`terminal_status`——这几个字段能定位绝大多数性能问题。\n\n其中 TPOT 公式:\n\n```text\ntpot_ms = (last_token_ts - first_token_ts) / output_tokens\n```\n\n- **correlation id 贯穿全链路**:`traceId`、`threadId`、`runId`、`messageId`、`modelRequestId` 全透传,所有日志靠它对齐。\n- **OTel 的 span 粒度要克制**:span 以 run 为根,model / retrieval / tool 各为子 span,流事件本身不一条一 span,只记 `sequence` 范围、字节数和间隔直方图(histogram)。\n- **脱敏是硬线**:日志绝不落完整 Prompt、手机号、token,只存哈希或脱敏片段。\n- **exporter 配有界队列**(观测挂掉不能反压拖垮生成主链路)、审计与调试 Trace 设不同保留周期(审计 `90` 天、Trace `7` 天);`TTFT`/`TPOT` 用客户端打点 + 服务端 span 双向对账,`e2e` 用合成探针定期测。",
        "**取舍:** 是细节换可承受的 IO:全量逐 chunk 日志会让存储爆炸,所以高频事件必须采样或只记聚合直方图,代价是丢失个别 chunk 的细节、排障时靠 `sequence` 范围回溯而非逐帧。决策依据很实际——观测系统的开销绝不能反噬生成主链路,所以 exporter 队列必须有界。",
        "我的 Tool Pipeline 已统一打 OTEL span(每个 `execute_tool` 一个 span),Langfuse 记录模型链路和 cost,这是已落地证据。跨服务部分要在 Java/Go 网关透传 W3C `traceparent` header,才能把 Python 模型服务的 span 和上游网关 span 串成一条真正的跨服务链路——这是跨语言场景的标准做法,但 agent-server 当前是 Python 单栈,跨服务 `traceparent` 透传是设计方案。"
      ), "追问：如何测 TTFT、TPOT、端到端延迟？", ["Tracing","OpenTelemetry"]]
  ]
},
{
  id: "agent-deep", title: "生产场景深挖：Agent 核心原理",
  desc: "围绕 Plan、Tool、Memory、HITL 和现有后端集成展开。答案强调状态机与失败语义，不把模型当作可靠事务协调器。",
  items: [
    ["Agent执行环路（Plan→Act→Observe→Reflect）在生产中如何落地？各环节的异常处理（如Act失败、Observe无结果）如何设计？",
      deepAnswer(
        "我把它当一个有预算、有状态、有明确失败语义的状态机，不是无限 while 调模型;每一步只允许把 state 推进到下一个合法态——一旦让模型自己决定要不要再转一圈,生产里它就会空转烧钱。",
        "核心是用显式状态机建模、不让模型自己决定循环,每个节点是纯函数 `(state)->state`,转移由条件边决定:\n\n```python\nstate = {\n    \"phase\": \"plan|act|observe|reflect|done|escalated\",\n    \"step\": 0,\n    \"budget\": {\"max_steps\": 25, \"deadline_s\": 120, \"cost_usd\": 0.5},\n    \"tasks\": [],\n    \"last_observation\": None,\n}\n```\n\n关键在 Observe 怎么落 status——这是失败语义的源头。结果分三类,写回 `last_observation` 供下一轮决策;把空结果当系统失败会让 Agent 误判已坏:\n\n- `ok_with_data`:成功且有数据。\n- `ok_empty`:成功但空(如查无订单),是有效信息不是错误。\n- `failed`:再分 `system_error` vs `business_reject`。\n\nReflect 只在 `failed` 或验证不通过时触发、最多 N 次,且注入上下文让模型输出枚举决策而非自由文本——反思自己会幻觉,必须收敛成有限枚举 + validator:\n\n```json\n{\n  \"failure_class\": \"...\",\n  \"tried_actions\": [],\n  \"remaining_budget\": {},\n  \"decision\": \"fix_args|change_tool|replan|escalate\"\n}\n```\n\n剩下两个工程点:\n\n1. **Plan 阶段**只产结构化目标 `[{id, goal, dependsOn, doneCriteria}]`,不调工具。\n2. **Act 阶段**走统一执行器 `execute_tool`:Pydantic 校验 → 业务前置校验 → 权限 → timeout(连接 `5s`/总 `30s`) → 异常收敛成 `ToolResult`。\n\n每轮末尾原子更新 `step+1`、`cost`、Checkpoint,任一预算超限即转 `escalated`/`done` 并 soft landing 收尾。",
        "**取舍:** 集中在「失败怎么处理」。写操作失败不能原样无限重试(会重复副作用),所以重试要分类且带上限;Reflect 能提升纠错率但每加一层都加延迟和成本,我按成功率/步数 A/B 证明净收益,证不出来就砍掉,宁可少一层反思也不要更贵的空转。",
        "我的 live graph 是精简 ReAct(`call_model`/`human_approval`/`tools`/`finalize` 四节点),Plan/Reflect 没有独立节点而是下沉进 `call_model` 前的 Context Engineering;失败分级提醒、Stuck Detector(按 `current_turn_slice` 检测无进展)、soft landing(换 `unbound_model` 收尾)是已落地的失败语义。独立 Plan/Reflect 状态机节点是设计方案——我曾删除 PEV 影子栈因为它没承载真实流量,不会把它说成现状。"
      ), "重点讲每种失败如何改变状态。", ["Agent Loop","失败语义"]],
    ["ReAct框架在实际开发中，如何避免“思考与行动脱节”？如何优化Reason步骤的准确性？",
      deepAnswer(
        "脱节的根因不是模型笨,是 Reason 和 Observe 之间没有可验证回路——所以我不靠自由文本推理驱动执行,而让每个 action 绑定目标和证据,执行后用 state 是否真推进来校验。光让模型多想没用,不验证就只是更自洽的幻觉。",
        "最有效的一招是让 action 带契约、执行后比对:\n\n1. 模型输出 action 时携带 `{taskId, expectedOutcome}`,执行器返回 `{status, evidence, actual}`,validator 每轮比对 `expectedOutcome` 与 `actual`,不一致就注入 `step_back_section` 提醒「上一步未达预期,先核对再继续」。\n2. 下一轮在 Prompt 顶部回填上一条 Observation 摘要,强制基于最新观测决策。\n\n其次是从源头减少盲目调用:Prompt 里给每个工具写适用场景 + 禁用场景(如「仅当已拿到 `orderId` 才可调 `query_logistics`」)。\n\n优化 Reason 准确性要排对优先级:\n\n- 先改**上下文质量**(把关键事实 pin 到尾部)和**工具描述歧义**。\n- 再考虑换 reasoning model,reasoning model 只在确实需要长链推导时才开。\n\n优先级反了就会陷入「换更贵模型」而不修上下文的低 ROI 循环。\n\n还有一个工程点:把 `step_count`、`redundant_call_rate` 当一等回归指标监控,「步数膨胀」要能被捕获,而不是只看最终答对。",
        "**取舍:** 「更长思考 ≠ 更准」。长链推理可能放大自洽幻觉并翻倍成本,所以我宁可先花力气修上下文和工具描述,把换贵模型放最后;另外隐藏思维链不能当审计依据(不可验证、会编造),所以验证只认 state 和 evidence,不认 CoT。",
        "我用失败 `ToolResult`、`step_back_section` 分级提醒、Tasks/Todo 外化和统一 Artifact 给模型可操作反馈;`71` 步 Fibonacci 事故(答对但走了 `71` 步)正是促使我把 step count 列为一等评测指标的真实案例。展示行动轨迹(stage/action summary)而非私有 CoT。"
      ), "可展示行动轨迹，不展示私有思维链。", ["ReAct","Reasoning"]],
    ["Agent工具调用的Schema设计核心是什么？如何保证LLM正确选择工具、传递正确参数（避免参数缺失、类型错误）？",
      deepAnswer(
        "Schema 设计的目标是减少歧义和无效自由度,不是把后端所有参数都暴露给模型——尤其身份/租户这类可信字段绝不进 Schema,否则模型一旦能填,就等于把越权能力交给了不可信输入。",
        "最关键的边界是身份字段服务端注入、不进 Schema:`principal`/`userId`/`tenantId`/`role` 由执行器从 `ToolExecutionContext` 注入,模型看不到也填不了。\n\n减少参数歧义靠收窄类型:\n\n- `enum`(如 `status:[paid,shipped,refunded]`)、范围(`limit:int 1..50`)、format(`date:ISO8601`)、`required` 明确,自由字符串能枚举就枚举。\n- 工具名用动词+对象(`query_order_by_id` 而非 `order`),description 写清「何时用/何时不要用/与哪个工具的区别」。\n\n保证参数正确靠两级校验:\n\n1. Pydantic 失败返回字段级 `validation_hint`(如「`limit` 必须 `1-50`,你传了 `200`」)让模型可修复重试。\n2. 通过后再做业务校验(资源存在性、组合约束如 refund 必须先有 paid 记录),重试有上限避免打转。\n\n还有一个减少误选的工程点:相似工具按任务阶段动态裁剪可见集(`tool_search` 按名称/描述检索 + Redis 缓存),不要同时把一堆近似工具摆给模型。",
        "**取舍:** Schema 宽窄两难。太宽模型容易编造参数,太窄又得频繁改版加字段,我倾向先窄后按需放开。更重要的边界——模型选对工具 ≠ 获准执行,权限和副作用必须执行器二次把关,Schema 只管「形状对不对」不管「能不能做」,这两层不能合并。",
        "我的 BaseTool + Pydantic + `validation_hint` + 确定性排序的 Tool Registry 是直接证据;`execute_tool` Pipeline 把所有校验失败统一转成可修复的 `ToolResult` 而不是抛异常。`tool_search` 动态 bind 新 schema 的具体路径以实际 `collect_tools`/`bind_tools` 实现为准,我会诚实区分。"
      ), "追问：身份参数为何不能让模型填写？", ["Tool Schema","Pydantic"]],
    ["多步工具依赖（如“查用户→查订单→查物流”），如何设计依赖管理、避免重复调用、死循环？",
      deepAnswer(
        "依赖必须外化为结构化状态或 DAG,关键输出以变量存进 State——绝不能让它只躺在自然语言历史里,否则模型每轮都在重新「猜」上一步查到的 ID,迟早用错旧值。",
        "核心是把每步建成节点、用依赖关系放行,调度器只在 `dependsOn` 全部 `status=done` 时才放行该步:\n\n```json\n{\n  \"id\": \"step_2\",\n  \"tool\": \"query_order_by_user\",\n  \"inputs\": {\"userId\": \"$step_1.userId\"},\n  \"dependsOn\": [\"step_1\"],\n  \"status\": \"pending\",\n  \"resultRef\": null,\n  \"idempotencyKey\": \"...\"\n}\n```\n\n关键产物入 State 而非靠模型复述:查到的 `userId`/`orderId` 写进 `state.entities`,后续工具从 `resultRef` 读可信值,杜绝「用错旧 ID」。\n\n防死循环靠指纹 + state 双条件:记录每步 `hash(tool_name + 规范化参数 + 结果摘要)`,最近 `3` 步指纹重复且 state 关键变量无变化才判 stuck——这里有个坑,重试时参数相同但结果在变,只看参数会误杀正常重试,必须看 state 是否推进。\n\n还有两个工程点:\n\n- 只读查询按 `(tool, canonical_args)` 做缓存(Redis TTL `10min`)省掉同 run 内重复调用。\n- 并行只放给无数据依赖的分支(safe 工具走 asyncio 并发 + `Semaphore`,非 safe 独占串行),写操作必须带 `idempotencyKey` 防重试重复执行。",
        "**取舍:** 在并行的边界。并行只对无依赖分支安全,强行并行有依赖链会拿到脏数据,所以我默认串行、只对显式无依赖的分支放并发。另外缓存只读结果不能跨租户、写操作不可缓存;模型还可能跳步或用过期 ID,所以执行器要做业务级前置条件校验(如查物流前断言 `orderId` 存在且已发货),这层不能省。",
        "我用 Tasks/Todo 外化任务、MessagesState 存执行状态、Stuck Detector 按 `current_turn_slice` 检测无进展——这些是已落地的。通用 DAG 调度器(`dependsOn` 拓扑排序自动放行)当前 graph 还是线性 ReAct + 模型自驱,没有独立 DAG 引擎,这点我会明确标为设计方案。"
      ), "用订单链路画出状态字段会很有说服力。", ["依赖管理","DAG"]],
    ["Agent的反思机制（Reflection）如何实现？如何让Agent从执行失败中学习，优化下一轮决策？",
      deepAnswer(
        "Reflection 是有限、可触发、可评测的纠错步骤,不是每轮都来一段;真正的跨任务学习靠把失败沉淀成 Eval/知识/Skill,而不是指望单次模型「记住」——把 in-run reflection 和 cross-run learning 混为一谈是最常见的错。",
        "**in-run reflection** 要可触发、可收敛:连续失败 `≥2` 次或 validator 不通过、且未超 reflection 预算(每 run 最多 `2-3` 次)才触发,注入上下文要求模型输出枚举决策 `change_strategy|fix_args|replan|escalate` 而非自由发挥:\n\n```json\n{\n  \"failure_class\": \"timeout|perm|bad_args|empty\",\n  \"tried_actions\": [],\n  \"remaining_budget\": {}\n}\n```\n\n**cross-run learning** 才是真学习,走 Eval 闭环:\n\n1. 从 Langfuse 坏 Trace 定位事故,剥离客户数据提炼成 `evals/tasks/<id>.yaml`(写 `source_trace_id` 挂回现场)。\n2. 修复后验证:\n\n```bash\nuv run python -m evals.run --task <id>\n```\n\n3. 再加入 `baseline.json` 做回归门禁。\n\n经验沉淀要分级写入、不能自动污染长期记忆:\n\n- 高频可复用范式写 Skill/Knowledge(需人工审核)。\n- 用户级偏好/事实经 mem0 ADUN 去重后写 Memory。\n\n收益靠 A/B 量化:对开/关 reflection 比 `success_rate` 与 `step_count`,净收益为负就关。",
        "**取舍:** reflection 的价值不能假设。每轮都反思会加延迟、还容易自洽重复(模型给自己背书),所以我宁可设 `2-3` 次预算上限、用成功率和步数证明它值这个钱;同理自动写长期记忆会污染后续所有会话,高风险经验我一律走人工审核入库,牺牲一点自动化换可控。",
        "我的 `step_back` 分级提醒(即时纠错)+ mem0 Memory(长期事实)+「从 Langfuse 坏 Trace 沉淀 Eval」SOP(cross-run 学习)正好构成两层。已沉淀案例如 `context-retention-heavy-turn`、`tool-failure-honesty`、`deliverable-must-reach-user` 都是真实事故转回归用例。"
      ), "区分 in-run reflection 与 cross-run learning。", ["Reflection","Eval 闭环"]],
    ["Agent的短期记忆、长期记忆如何设计存储结构？如何平衡记忆容量与查询速度？",
      deepAnswer(
        "短期记忆是 thread/checkpoint 状态,长期记忆是用户级可检索事实,两者别混在一张表里;容量要靠写入门槛控制,不是靠读取时 Top-K 截断——截断只治标,门槛+去重才治本。",
        "分三层存、各自回收策略不同:\n\n- **短期层** Checkpoint 保存 messages + 执行 state,大的「可再生」工具结果(目录列表、长检索结果)offload 到 Artifact、消息里只留引用 + 预览,但交付物/知识/Memory/subagent 结论不 offload。\n- **长期层**用结构化 schema,写入前过门槛(`confidence`/去重),用 ADUN(Add/Update/Delete/No-op)解决冲突而非无脑追加——这是控量的关键:\n\n```json\n{\n  \"fact\": \"...\",\n  \"user_id\": \"...\",\n  \"source\": \"...\",\n  \"version\": 1,\n  \"confidence\": 0.9,\n  \"created_at\": \"...\",\n  \"updated_at\": \"...\",\n  \"embedding\": \"384维\"\n}\n```\n\n检索先 metadata filter(`user_id` + scope)再 ANN(pgvector HNSW,cosine 用 `<=>` 距离、转 `1-distance` 为相似度),热记忆走缓存、冷旧记忆按 `updated_at` 衰减 `confidence` 或归档。\n\n隐私上不全量向量化聊天,只写「值得长期记的事实」,按 `user_id` 严格作用域,匿名用户映射固定 bucket。",
        "**取舍一**是容量 vs 速度:我用写入门槛 + 去重 + ADUN + TTL + scope 控量,而不是简单截断 Top-K,因为截断会丢掉本该长期保留的事实。**取舍二**是向量维度:`384`(FastEmbed 本地)是精度和索引体积的平衡点,维度越高越准但索引越大越慢,按召回拐点定而不是越高越好;另外全量向量化既制造检索噪声又有隐私风险,纯摘要又丢精确数字,所以只向量化筛过的事实。",
        "我的 Aegra PostgreSQL Checkpoint(短期)+ ephemeral compaction(只改本轮 `llm_messages` 不动持久 transcript)+ mem0 + pgvector(长期,复用 FastEmbed `384` 维 + ADUN)是完整落地案例。要诚实说明:mem0 写入是 fire-and-forget(返回 `queued` 后台执行,进程退出可能丢,是 best-effort 可恢复性有限)。"
      ), "面试中画出 Thread、Artifact、Memory 三层。", ["Memory","Checkpoint"]],
    ["高并发场景下，Agent任务排队、限流、优先级调度如何实现？（结合实际业务场景，如付费用户优先）",
      deepAnswer(
        "Agent 不能只按 HTTP QPS 限流——它的资源消耗是模型 Token、工具并发和任务时长共同决定的,一个长任务能占住槽位几分钟,按 QPS 算根本拦不住资源耗尽。",
        "优先级调度的核心是加权公平队列 + 保底:任务入队带 `{priority, deadline, cost_estimate, submitter_principal}`,用 WFQ 付费 `weight=3`、免费 `weight=1`,但给免费保底 `minShare=20%` 防饿死——绝对优先会把低等级用户彻底饿死。\n\n资源池按维度独立 semaphore 隔离:每个 model endpoint、sandbox、工具各自 `asyncio.Semaphore`(如 sandbox 并发 `4`、重工具 `8`),互不挤占,某池过载只降级/拒绝该类任务,不拖垮全局。\n\n入口限流按 `(user_id|tenant_id)` 令牌桶(付费 `60 req/min`、免费 `10 req/min`),超限快速 `429` 而非排队堆积。\n\n长任务防霸占靠单任务总 deadline(如 `300s`)+ 协作式取消(任务循环查 cancel token,`finally` 释放沙箱/连接);`priority` 一律服务端按计费等级算,绝不接受请求里自报的 `priority`。",
        "**取舍:** 「绝对优先 vs 不饿死」。纯按权重会让免费用户永远排不到,所以我用 `minShare` 保底牺牲一点付费的极端优先级;另一层取舍是长任务必须能超时 + 协作取消,否则它占着槽位、高优先用户照样排不进,宁可中断一个超时长任务也不让它霸占资源。",
        "我的 BackgroundTaskRunner 已有 DB 状态机(`queued`/`running`/`progress`/`terminal`)、单任务总超时、`max_concurrent` semaphore,可作为单机 MVP。它不是分布式优先级队列——加权公平队列 + Redis Streams/Kafka + Worker lease + 跨进程续跑是生产扩展的设计方案(当前重启会把无 Runner 的 `queued`/`running` 标 `interrupted`,不跨进程续跑)。"
      ), "追问：如何防止低优先级永远排不到？", ["调度","限流"]],
    ["Agent调用工具超时，如何设计重试策略、熔断机制、降级方案？兜底回复如何设计才不生硬？",
      deepAnswer(
        "重试不是越多越好——先按错误类型判断可不可以重试,再把局部重试纳入整个 run 的 deadline 和 cost 预算;局部退避不设全局上限,迟早把整个 run 拖爆。",
        "第一步分类重试:连接超时/`429`/`5xx` 走指数退避 + 抖动(`base 0.5s`,`factor 2`,`cap 8s`,`max 3 次`);参数错/权限/业务 `4xx` 不重试,直接回 `validation_hint`——可重试和不可重试混在一起是雪崩的开端:\n\n```python\nsleep = min(cap, base * 2 ** n) + random(0, 0.3)\n```\n\n熔断按 `(provider, endpoint)` 维护滑窗失败率,`failure_rate>50%` 且样本 `≥20` 则 open `30s`,半开放 `1` 个探测请求成功才 close,粒度可细到 tenant 防单租户拖垮共享。\n\n降级分读写:读类失败回退缓存或备用工具(主检索挂了走关键词检索),写类失败返回「待确认」+ `idempotencyKey`、绝不静默重放。\n\n兜底回复最忌「系统繁忙」:用 soft landing 换无工具模型,用用户语言说「已完成 X、Y 失败原因是 Z、你可以 A 或 B」,并保留已完成的部分结果——每次重试都扣 run 的 deadline/cost,耗尽即转兜底,不让退避无限累加。",
        "**取舍:** 在重试和熔断粒度。无脑重试制造雪崩 + 重复副作用(尤其写操作),所以写操作宁可不重试也要幂等兜底;熔断粒度太粗会误伤健康租户、太细又状态爆炸,我按 `(provider, endpoint)` 起步、必要时下沉到 tenant。兜底的取舍是绝不丢已完成进度——「请重试」会让用户从头再来,宁可诚实交代部分成功。",
        "我的 LLM retry/fallback(全耗尽返回 `AIMessage` 让 SSE 闭合,前端不卡 thinking 而非抛异常)+ Tool Pipeline 异常收敛 + `step_back` + soft landing 可组合回答。完整 circuit breaker:上下文压缩有进程内连续失败 `3` 次的 circuit breaker(重启丢),但工具级 per-endpoint 熔断器是设计方案,未全量落地,我会明确指出。"
      ), "强调失败诚实和部分结果。", ["重试","熔断"]],
    ["Agent生成的SQL/代码需要执行，如何设计沙箱环境、权限隔离，避免越权操作、注入攻击？",
      deepAnswer(
        "前提是模型生成内容始终不可信,所以真正的安全边界放在权限/网络层,不是关键词黑名单——黑名单防不住混淆和编码绕过,是个伪安全感。",
        "代码沙箱默认最小权限 + 无网络 + 短时,运行后整盘销毁:\n\n```text\nCPU      1 core\nMemory   512MB\nPIDs     256\n磁盘     tmpfs\nwall time 30s\nseccomp  限 syscalls\n网络     --network=none 或白名单出站\nrootfs   只读 + 临时 overlay\n```\n\nSQL 安全是组合拳:\n\n- 只读账户 + `SET TRANSACTION READ ONLY`。\n- SQL 先 AST 解析校验:只含 `SELECT`、表/列在 allowlist、无子查询逃逸。\n- 强制参数化绑定(禁字符串拼接),加 `LIMIT` 上限 + `statement_timeout(5s)`。\n- 写操作走 HITL 审批不自动执行。\n\n凭证只给沙箱内短期 token(按 principal 签发 on-behalf-of),不注入长期密钥、不写进 Prompt。\n\n二阶注入防护和审计:安全边界放权限/网络层、多租户高风险用 Firecracker 级隔离,每次执行记 span:\n\n```json\n{\"principal\": \"...\", \"sql_or_code_hash\": \"...\", \"tables_touched\": [], \"rows\": 0, \"duration\": 0}\n```",
        "**取舍:** 「隔离强度 vs 成本」。容器 ≠ 绝对隔离(共享内核有逃逸面),普通场景容器够用、但高风险多租户必须上 microVM/Firecracker,我按租户风险分级而不是一刀切上最贵方案。另一条死规矩——写操作再小也要审批,不能因为「看起来安全」放行,这点不省。",
        "我的 Cloudflare/E2B SandboxProvider(同一接口两实现,warm exec 约 `0.3s`)+ 图级 HITL(静态权限 interrupt 可 accept/edit/deny)+ Tool Pipeline 权限校验是强证据。Text2SQL 的 AST 解析 + 只读账户 + 数据库代理我没上线过,必须作为设计方案表达,不包装成实战。"
      ), "准备区分 Shell 注入、Prompt Injection 和 SQL 注入。", ["沙箱","SQL 安全"]],
    ["LangChain、LangGraph在生产中如何选型？LangGraph的状态机设计，如何适配复杂业务流程（如审批、工单）？",
      deepAnswer(
        "LangChain 是组件库、LangGraph 是状态与生命周期编排,别拿一个替另一个;复杂循环/审批/恢复用 LangGraph,简单线性 RAG 不必上图——节点数应匹配事务边界,不是匹配函数数。",
        "State 要定义业务主键 + 阶段 + 证据,用 TypedDict + reducer(注意 `add_messages` 只追加不删):\n\n```python\nclass State(TypedDict):\n    ticket_id: str\n    phase: str  # triage|investigate|await_approval|resolve\n    tool_results: list\n    approval_version: int\n    error: str | None\n```\n\n节点按职责拆、不是每函数一节点:`call_model`(决策)、`tools`(执行)、`human_approval`(审批 interrupt)、`finalize`(收尾),确定性业务规则(如金额 `>1万` 必须审批)用 Python 条件边写死、不交模型路由——把确定性规则交给模型会引入不可控分支。\n\n条件边表达全部转移:\n\n- 成功 → `next`\n- 失败 → `retry`/`escalate`\n- 需审批 → `interrupt`\n- 终止 → `finalize`\n\n审批和恢复是 LangGraph 强项:Checkpoint 支持任意点恢复,interrupt 承载审批,恢复时校验 `approval_version` 防审批期间资源变更;工单/审批就是把生命周期边界(提交/审批/恢复)映射成节点,每个工具调用留在 `tools` 节点内部循环。",
        "**取舍:** 节点粒度。节点过多会变成低代码迷宫难观测,过少又把复杂逻辑塞进单节点难维护,所以我让节点边界对齐事务/审批/生命周期边界、而不是对齐代码函数。另一条原则——确定性规则留在 Python、不交模型路由,宁可多写几行条件边也不要不可控分支。",
        "我的 graph 只有 `call_model`/`human_approval`/`tools`/`finalize` 四节点,复杂能力下沉到 `call_model` 前的 composition/Context Engineering,这是真实使用 LangGraph 的取舍。我删除了 PEV 影子栈、收敛到唯一 live path(`build_chat_graph`),因为双执行路径既增维护成本又分流量、难以做可信回归。"
      ), "这个回答应体现你真正使用 LangGraph，而非背概念。", ["LangGraph","状态机"]],
    ["Agent执行过程如何做可观测？每一步的思考、工具调用、耗时、Token消耗、异常，如何全链路追踪？",
      deepAnswer(
        "观测对象是可验证的运行轨迹(动作 + 证据 + 资源),不是模型私有思维链——CoT 不可审计、会编造,把它当观测主体等于把虚构当真相。",
        "结构上以 Span 树承载:`runId` 为根 Trace,子 span = 每个 graph 节点 / LLM 调用 / Retriever / Tool / Sandbox,形成可下钻层级:\n\n```text\nrunId (root Trace)\n├── graph node: call_model\n│   └── LLM call\n├── graph node: tools\n│   ├── Retriever\n│   ├── Tool\n│   └── Sandbox\n└── graph node: finalize\n```\n\n每个 span 记:\n\n```json\n{\n  \"model_prompt_tool_version\": \"...\",\n  \"input_摘要\": \"...\",\n  \"调用参数键\": \"不记敏感值\",\n  \"result_status\": \"...\",\n  \"tokens\": {\"prompt\": 0, \"completion\": 0},\n  \"cost_usd\": 0.0,\n  \"latency_ms\": 0,\n  \"retry_count\": 0\n}\n```\n\n要能从坏指标跳事故现场:trace 挂上 `session_id`/`user_id`,关联 `task_success`、`human_takeover`、`user_feedback`。\n\nexporter 必须异步有界:后台批量上报、队列满则丢样本而非阻塞,观测故障绝不阻塞主对话流。\n\n隐私上完整 Prompt/工具结果可能含 PII,做脱敏 + 采样 + 分级保留(错误 trace 全留、正常按比例采样)。",
        "**取舍:** 「全量记录 vs 隐私和成本」。全量记 Prompt 和工具结果有隐私和存储代价,所以我脱敏 + 采样、错误 trace 全留正常采样,牺牲一点正常流量的细节换可控成本。另一条——exporter 同步写会拖慢主流程,必须异步有界,宁可丢观测样本也不反压主链路;私有思维链一律用 stage/action summary 替代,不当审计依据。",
        "我的 Langfuse + OpenTelemetry、Tool Pipeline 每个工具单点 span、Eval dataset(`agent-server-evals`) + baseline 已形成观测→评测→门禁闭环。可强调真实教训:曾经 Langfuse trace 接错端点导致「看似接入但实际无数据」,证明观测本身也要被验证。"
      ), "思考过程以 stage/action summary 替代。", ["Observability","Langfuse"]],
    ["多个用户同时触发同一个Agent任务，如何做幂等设计，避免重复执行（如重复查询数据库、调用接口）？",
      deepAnswer(
        "幂等单位是业务动作、不是整段自然语言请求;只读查询可以共享缓存,写操作必须服务端幂等键去重——靠请求文本去重根本不可靠。",
        "幂等键怎么算是核心,参数先规范化排序、去掉时间戳等易变项:\n\n```python\nidempotencyKey = hash(tenant_id + user_id + operation + canonical_args)\n```\n\n写操作落库去重:用唯一约束表,先 `INSERT pending`,冲突就说明已有同请求、读其状态而非重做:\n\n```sql\nCREATE TABLE idempotency_records (\n  key TEXT UNIQUE,\n  status TEXT, -- pending|succeeded|failed\n  result JSONB,\n  created_at TIMESTAMPTZ\n);\n```\n\n并发合并用 singleflight:同 key 的并发请求只执行一次,其余等待返回同一个 `taskId`/`result`。\n\n外部 API 透传 `Idempotency-Key` header(如支付类),结果与 version 绑定、重试拿同一结果;缓存严格按 `(tenant, user, operation, args)` 作用域、绝不跨租户共享。",
        "**取舍:** 最关键的是缓存作用域。不同用户即使问题文本相同、权限和可见数据可能不同,所以缓存绝不能跨租户共享,宁可降低命中率也不能越权泄露。另一处——`failed` 能否重试要区分「确定失败」(可重试)和「未知是否提交」(网络超时,不能盲重试,先查询确认),否则会重复写。",
        "我的 Tool Call 带 run/thread/user 上下文,BackgroundTaskRunner 任务有 `taskId` 和 DB 终态。可诚实说明:当前哪些只读工具已做缓存幂等、写操作的业务级幂等键需要下游 Java/Go API 配合(透传 `Idempotency-Key`),通用幂等记录表是设计方案。"

    ["Agent如何安全传递用户身份（登录态、权限），调用工具时避免身份泄露、越权？",
      deepAnswer(
        "身份只能来自经过验证的网关上下文,绝不接受模型生成的 `userId`/`tenantId`/`role`——Prompt 里声明身份不是安全机制,是给注入攻击开的口子。",
        "入口验证是源头:网关校验 JWT/SSO 解出 principal,注入 `RunnableConfig` → `ToolExecutionContext`,下游全程从这里取、不暴露给模型:\n\n```json\n{\"user_id\": \"...\", \"tenant_id\": \"...\", \"roles\": [], \"scopes\": []}\n```\n\n最易漏的是数据层作用域——必须贯穿:\n\n- Memory filter、RAG metadata filter、缓存 key、R2 对象 key 都拼 `user_id`/`tenant_id`,否则检索/存储层照样越权。\n\n工具执行器做 ABAC/RBAC:按 `(principal, resource, action)` 判权,跨服务调用换 on-behalf-of 短期令牌(`aud` 限定目标服务、TTL 分钟级),不带长期密钥、不进 Prompt/日志,跨服务用 mTLS + token audience 校验。\n\n后台任务保存提交人身份快照,执行时按快照重新校验权限(防提交后权限被回收仍执行)。",
        "**取舍:** 「信任来源」上没有妥协空间。Prompt 中的身份声明可被注入篡改,所以一律只信网关解出的 principal。真正容易被忽略的权衡是数据层——缓存/Memory/RAG/对象存储如果不带同一作用域,前面权限做得再好也白搭,所以我宁可每处都拼 scope 牺牲一点复用,也不留越权口子;后台任务用身份快照 + 执行时复校,不用「当时是谁」糊弄。",
        "我的 Aegra auth、`resolve_user_id`、Memory user filter、R2 user/thread key 是已落地证据,且经历过「共享 key → per-user auth」的演进(早期匿名映射固定 bucket 的债)。on-behalf-of 短期令牌 + mTLS 是跨服务标准做法的设计补充。"
      ), "身份链要覆盖入口、Graph、Tool、数据和日志。", ["Identity","越权"]],
    ["如何实现Agent执行过程的可回放、可打断、可人工干预？（落地场景：客服Agent出错时人工接管）",
      deepAnswer(
        "可回放、可打断、人工接管三件事机制完全不同,别混为一谈:可回放靠不可变事件 + 版本,可打断靠安全点 + 持久化状态,人工接管靠明确的所有权转移。",
        "可回放最大的雷是别在生产重放写操作:Checkpoint 存 graph state、Trace 存动作 + 证据,replay 默认只重算模型节点或走影子环境,生产重放写操作会重复副作用。\n\n可打断靠安全点 + 取消信号:\n\n1. 高风险节点 interrupt 暂停、state 已落 Checkpoint。\n2. 前端 `POST /runs/{id}/cancel` → 置 cancel token + `task.cancel()`,工具循环 `finally` 释放资源。\n\n人工接管是所有权转移:run 置 `status=paused/human_owned` 冻结自动工具,客服界面展示 `{对话摘要, 原始证据, 已执行副作用清单}`,处理后 `resume`(带 edit payload) 或 `terminate`。\n\ninterrupt 审批支持 accept/edit/deny,edit 按 `tool_call_id` 精确匹配要改的那一个调用;resume 前校验 `state_version`,审批期间外部资源可能已变、版本不符要重新核对而非盲恢复。",

        "我的 LangGraph interrupt、Aegra Checkpoint、Tool Call 按 id 编辑都是已落地能力;BackgroundTaskRunner 有 cancel event + `task.cancel` + 终态落库。叠加我在 Klook 做企业级客服 IM SDK(消息顺序/重连/跨端)的经验,人工接管所有权转移这块非常贴题。"
      ), "区分 replay for debug 与 resume for production。", ["HITL","回放"]],
    ["Agent的任务分解能力如何优化？如何让Agent正确拆分复杂任务（如“写方案→查资料→改初稿”）？",

    ["开源Agent框架（LangChain、AutoGen、MetaGPT）在生产中落地的坑有哪些？如何规避？",

        "选型别看 star 数,要看耦合面:主要风险是抽象快速变化、隐藏运行循环、状态不可控、协议耦合、Demo 默认配置不达安全要求——框架渗透进业务领域层那天,就是你被锁死那天。",
        "最有效的规避是隔离层:把 model、tool、state、storage、transport 都放自有接口(Provider 抽象)后面,框架对象不渗透业务领域层,换框架只改适配层。\n\n只用成熟原语、避开高层便利封装:用 LangGraph 的 state/checkpoint/interrupt 这类底层 primitive,绕开会隐藏重试/序列化的高层封装(出问题难定位就是因为它们藏行为)。\n\n锁版本 + Contract/Trajectory Test:\n\n- pin 依赖版本,用 fake 脚本模型跑真实 graph 测工具选择/顺序/循环(零成本)。\n- 契约测固定 `ToolResult` 的 key/type 形状。\n- 升级先在 baseline 上跑 Eval + 小流量影子验证再放量。\n\n多 Agent 慎用:AutoGen/MetaGPT 的多角色会指数级放大 token 成本和协调失败面,只在确有并行子任务收益时上。",

    ["Agent与现有后端系统（Java/Go）对接，如何保证接口调用的稳定性、一致性？",

        "契约先行是地基:用 OpenAPI/Protobuf 定义接口,Tool Adapter 把模型参数映射成稳定 DTO(模型给的字段经校验/补默认后才进 DTO),契约变更走版本而非破坏式改。\n\n写一致性是重点:写操作带 `idempotencyKey` + 乐观锁(`version` 字段)或 Saga(多步写要可补偿),查询带 version 和权限上下文。\n\n超时预算逐层递减,避免上游已超时、下游还在跑产生孤儿写:\n\n```text\nAgent 总 deadline 120s → 单后端调用 30s → 下游 DB 5s\n```\n\n还有两个工程点:\n\n- 网关统一鉴权 + 限流 + `correlation_id`(贯穿 Agent→网关→后端便于全链路追踪)。\n- 后端返回结构化错误码 `{code, retryable, message}`,让 Agent 据 `retryable` 决定重试还是停。",

      deepAnswer(
        "任务完成率必须由业务可验证终态定义——模型最后说「完成了」不算完成;成功、正确、安全、效率是四个独立维度,只盯成功率会被「不计代价答对」带偏。",
        "业务层先分级记录终态,而非只看有没有回话:\n\n- `task_success`(终态可验证,如订单状态真改了)\n- `partial_success`\n- `human_takeover`\n- `failed`\n\n轨迹层捕获效率问题:统计 `tool_choice` 是否正确、参数对错、`tool_failure_rate`、`step_count`、`loop_count`、`side_effects` 数——`71` 步 Fibonacci 这类「答对但低效」必须被 `step_count` 抓出来判回归。\n\n工程层记 `latency`、`cost_usd`、prompt/completion tokens。\n\n离线 + 在线双轨:离线在 Golden Set 上跑真实模型 Eval(比 `passed/steps/latency/cost`),在线靠系统状态 + 用户反馈 + 人工抽检补盲区;成功率指标旁必须并列 step/cost 上限护栏。",

      ), "成功、正确、安全、有效率是四个维度。", ["Agent Eval","成功率"]]

    const productionDeepDiveB = [
{
  id: "rag-deep", title: "生产场景深挖：RAG 落地痛点",
  desc: "从百万文档、实时更新到多模态解析与自动评测。回答时把数据链路、检索链路和生成链路拆开定位。",
  items: [
    ["百万级文档RAG，检索延迟要求<200ms，如何设计索引、分片、缓存架构？（结合Milvus/Chroma实际部署）",
      deepAnswer(
        "`200ms` 不是一个数，得先拆成 embedding + 过滤 + ANN + rerank + 网络五段分别守预算；而且百万文档（索引单机内存放得下）根本不该上分布式——逼你分片的是 QPS 和过滤复杂度，不是文档数，搞反了就会为了不存在的问题加一堆运维成本。",
        "先把五段预算列死，再谈优化:\n\n```text\nquery embedding   8-15ms   本地 ONNX 或常驻服务，别走远程 API\nmetadata 前置过滤  5ms\nANN 检索          20-40ms\nrerank top50->top8 40-80ms  cross-encoder + GPU batching\n序列化 + 跨服务网络 20-30ms\n余量              30ms\n```\n\n超 `200ms` 第一件事是看哪段爆了，而不是一刀切「优化向量库」——这是最值钱的习惯。\n\n落到 Milvus:\n\n- 建 collection 时 `partition_key` 用 `tenant_id`/`business_line`，让过滤先把搜索空间砍掉一个数量级。\n- 索引选 HNSW，建库 `M=16`、`efConstruction=128`，查询期 `ef` 从 `64` 起按 Recall@10 拐点往上调（`ef` 越大越准越慢，典型 `64-128`）。\n- 百万级 `768` 维约 `3-6GB` 常驻内存，单机够。\n\n再往上是吞吐和缓存两件工程事:\n\n- **副本承读**:replica 数按 `QPS÷单副本 QPS` 上取整、前面挂 LB、写入走单独 channel 不抢读。\n- **缓存做两层**:query embedding 按 normalize 后文本 hash 缓存（同问反复来直接命中）；检索结果按 `hash(canonical_query + topK + filter + indexVersion)` 缓存候选 `docId+score` 进 Redis、TTL 短（如 `600s`）+ SWR。\n\nChroma 只配原型和单机小负载（`<10万`），百万级别用它。",
        "核心权衡是 HNSW 还是 IVF:HNSW Recall 高但吃内存、动态删除别扭；IVF 省内存但要调 `nlist`（约 `sqrt(N)`）/`nprobe`，且 Recall 对 `nprobe` 很敏感——我按「索引能否单机放下 + 是否频繁删」来选，放得下且改动不频繁就 HNSW 换确定性。\n\n另一个要克制的是分片:过度分片会放大 fan-out 把延迟又拉回去，所以宁可先压不分片的单机极限。\n\n**边界:** 还有两条红线——`200ms` 报数必须含 rerank 和跨区网络，只报「向量库 30ms」是自欺；缓存键漏掉 `indexVersion` 或权限维度会回放脏结果或越权命中。",
        "我现在用的是 pgvector + 联邦 `KnowledgeSource`，没有 Milvus 百万级实战，这点我会直说。可迁移的真实经验:`kb_retrieve` 已按 query/topK/filter/source 做 Redis 10min 缓存、按 provider 分数分组不混排、pgvector 用 cosine 距离运算符 `<=>`；上述 Milvus 分区+HNSW 参数与五段预算拆分是我会落地的设计方案而非已上线数字。"
      ), "追问：百万是文档数还是 Chunk 数？QPS 与向量维度是多少？", ["Milvus","性能"]],
    ["文档频繁更新/删除，向量库如何保证实时一致性？如何避免召回旧知识、脏数据？",
      deepAnswer(
        "我不追跨系统强事务，而是认定一个分工:关系库/对象存储是事实源，向量索引只是可重建的派生视图——一致性靠版本 + tombstone + 回表校验做最终一致。想给索引和业务库上强事务，代价高又脆，是把简单问题做复杂了。",
        "第一原则是变更不直接改索引:业务写事实库时在同库事务里写一张 `outbox` 表（或开 CDC/Debezium 订阅 binlog），消费者异步重算 embedding，从根上避免双写不一致。\n\nCDC outbox 流程:\n\n```text\n业务写事实库（同事务）─┬─ 写业务表\n                      └─ 写 outbox 表 {docId, version, op}\n          │\n          ▼\n   消费者订阅 outbox / binlog（异步）\n          │\n          ▼\n   重算 embedding ── upsert 新 version ── 原子切 active 指针\n          │（失败）\n          ▼\n        DLQ（带 docId+version 可重放）\n```\n\n每条向量带齐 metadata——`docId`、`version`（单调递增）、`status`（`active`/`tombstoned`）、`validFrom`：\n\n1. **更新**走 upsert 新 `version` 再原子切 `active` 指针，关键是「先建新后切，绝不先删旧」，先删会留检索空窗。\n2. **删除**同理分两步:先在事实库打 tombstone 并在在线检索 filter `status=active` 把它排除（立刻生效），物理删向量丢给后台批处理。\n\n真正兜住「索引刷新有秒级延迟」的是回表校验:检索拿到 candidate `docId` 后回事实库批量查当前 active `version`，丢掉版本不匹配或已 tombstone 的，再喂给 rerank/LLM——这一步不能省，否则切版本那一瞬就会召回旧 chunk。\n\n最后工程上消费失败进 DLQ、带 `docId+version` 可重放，幂等键 = `(docId, version)` 防重复消费。",
        "回表校验 vs 不校验，是「多一次事实库批量查」换「绝不召回旧 chunk」——我选校验，因为索引刷新延迟是物理存在的，省这步等于赌运气。\n\noutbox vs CDC:outbox 多一次写放大但简单可控，CDC 运维成本更高但解耦更彻底，我按团队是否已有 CDC 基建来选。\n\n还有那条铁律——先删后建必产生召回空窗，先写新后切 `active` 才稳，这个顺序错了再多校验也救不回来。",
        "我的 `KnowledgeStore` 是 DB-backed，team KB 改完下一轮读取即生效，是小规模实时更新真实案例；Dify 等外部 source 的新鲜度由各自适配层负责。Source Registry 正适合让每个 provider 暴露自己的版本/更新策略。上面的 outbox/CDC + tombstone + 回表是通用设计，我没在百万级跑过 CDC 流水线。"
      ), "核心是版本、tombstone、回表校验和可重放事件。", ["实时更新","一致性"]],
    ["同一用户同一问题多次查询，如何做检索结果缓存？如何处理“缓存过期”与“新知识更新”的矛盾？",
      deepAnswer(
        "「缓存过期 vs 新知识更新」这个矛盾本身是个伪命题——只要你用版本失效代替猜 TTL，它就消解了；前提是缓存键得把身份、规范化 query、filter、数据源、`indexVersion` 全编进去，键设计错了再多策略都白搭。",
        "最关键的一步是缓存键设计:\n\n```text\nkey = hash(userId_or_tenant + canonical_query + topK + filter + sourceId + sourceVersion)\nvalue = [候选 docId + score]   // 绝不缓存最终权限判定和拼好的 answer\n```\n\n缓存内容只放候选 `docId+score`，绝不缓存最终权限判定和拼好的 answer（这俩随时会变）。\n\n而 canonical 又是前提——先 lowercase、去多余空白、做 standalone rewrite 消解指代再 hash，让「最近的订单」和「查下最近订单」命中同一键。\n\n版本切换消解矛盾:知识更新时该 source 的 `sourceVersion+1`，旧键自然再也命不中，根本不靠 TTL 赌时间，这就是矛盾消解的地方。\n\n剩下是两个工程加速:\n\n- **高频精确问题**（错误码、政策条款）叠 SWR，返回旧结果同时后台异步刷新，下次拿新值，既快又最终新鲜。\n- **防击穿**用 Redis 单飞锁（`SETNX`），热点 key miss 时只放一个请求回源、其余等结果，避免缓存失效瞬间打爆向量库。",
        "诱人但危险的是「语义相似 query 共享缓存」——拿 embedding 近邻当同一 query 能大幅提命中，但容易错误命中，必须加相似度阈值 + 业务校验才敢上，我默认不开。\n\n还有两条不能复用的边界:权限随时变、时间敏感问题（今天/本周）不能跨用户或跨时间复用。\n\n本质取舍是「只靠 TTL」省事但会在「刚更新没到期」窗口持续返回旧知识，所以我宁可上版本化也不拍 TTL。",
        "我的 `kb_retrieve` 已经在用 query/topK/filter/source 为键的 Redis 10min 缓存，但目前键里还没含 `sourceVersion`——这正是我会主动提的改进点:加 `sourceVersion` 后就能从「赌 TTL」升级成「版本化失效」。SWR/单飞锁是设计方案，当前实现还没接。"
      ), "不要只回答“Redis 设置 10 分钟”。", ["RAG Cache","版本"]],
    ["用户问题模糊（如“查一下最近的订单”），如何做意图识别+查询改写+多路召回，提升召回率？",
      deepAnswer(
        "模糊问题上来就 embedding 检索是错的——正确顺序是先做数据源路由（结构化系统 vs 知识库），再补槽位和时间语义，最后才轮到向量召回。把订单查询塞进 RAG，召回率再高也是答错地方。",
        "1. **定方向**:用轻量分类（小模型或规则+few-shot）打 intent，如 `order_query` / `policy_qa` / `smalltalk`，同时抽槽位 `{time_range, order_id, customer_id}`；「最近」要解析成业务默认窗口（如近 `30` 天）写进 slot，而不是把这个词塞给向量库。\n2. **路由**决定走哪条链:`intent=order_query` 走受控订单 API（参数化查询，绝不让模型拼 SQL），`intent=policy_qa` 才进 RAG；槽位缺关键项或用户有多个账户就先澄清，不猜。\n3. **多路召回**:只有确认是知识类，才谈多路召回提 Recall——并行生成三路 query:原始 query、standalone rewrite（补指代和槽位）、关键词 query（抽实体走 BM25），各取 topN 后用 RRF（`k=60`）融合:\n\n```text\nscore = Σ 1/(60 + rank)\n```\n\n避免不同路分数尺度打架；RRF 后去重，再 cross-encoder rerank 取最终 top8。\n\n这里有个硬约束:改写模型必须输出「改写依据」并 pin 住用户给的原始约束（订单号/时间不许被改）。",
        "最该防的是改写模型擅自补全订单号/客户名——它一补全就可能把用户带到别人的数据上，比慢危险得多，所以我宁可让它解释改了什么、宁可多问一轮澄清，也不让它猜。\n\n多路召回也不是越多越好:它提 Recall 但成本和延迟 `×N`，我按 intent 决定要不要全开——精确意图单路够了就别三路。\n\n本质是用「澄清的一轮交互」换「绝不返回别人订单」，这笔我认。",
        "智能工单里大量模糊描述就是这类 bad case:我靠结构化表单 + 标签 + query rewrite 把歧义前置降下来，平均处理时长降约 50%。RRF `k=60`、三路召回是我会落地的检索方案；意图分类+路由在工单场景我做过，纯 RAG 多路召回是设计延伸。"
      ), "先做数据源路由，再谈向量召回。", ["意图识别","Query Rewrite"]],
    ["表格、带格式PDF、图片文本的RAG，如何处理才能不丢失结构信息（如表格行列关系、PDF排版）？",
      deepAnswer(
        "这题的胜负在解析阶段就定了:把表格降维成一串纯文本，召回上限当场被锁死，后面再强的检索和模型都救不回来。所以钱要花在保住版面和逻辑结构上，不是花在下游。",
        "1. **解析**用 layout-aware parser（unstructured / PyMuPDF / PaddleOCR-Structure）拿到页号、标题层级、段落、坐标 `bbox`，正文与页眉页脚、目录靠位置和重复度区分剔除。\n2. **表格是重点**，关键洞见是「一份数据存两种表示」:\n\n```text\n结构化 JSON  保 table_name / columns / rows / 合并单元格 rowspan-colspan\n            → 服务精确查询 / Text2SQL\n行级线性化   「列A=值1, 列B=值2」每行一句\n            → 服务向量召回\n```\n\n跨页表格按表头连续性先合并再切。\n3. **扫描件和图片**各有处理:OCR 后保留每块 `bbox` 和置信度，低置信（`<0.6`）标脏不入库或降权——OCR 错字会污染 embedding，这步是必须的；图片走多模态模型生成结构化描述（图里是什么表/图/截图），存描述做检索、原图引用做取证。\n4. **挂 metadata**:每个 chunk 都挂 `page`、`table_id`、`parent_heading` 路径（如「第3章>3.2 退款表」），回答时带原始证据定位。",
        "中心权衡是「双表示 vs 单一纯文本」:双表示增加存储和维护成本，但单一纯文本对关系密集的表注定召回不准——我的判断是关系密集的表干脆走结构化查询/Text2SQL，复杂合并表硬转 Markdown 会丢行列关系，不值得。\n\nOCR 这边则是「置信度过滤 vs 全量入库」:宁可丢掉低置信块也不让错字进 embedding 污染全局。",
        "我的项目支持图片消息 + 视觉代理（tool role 不能带 image block，并发转文本 + 原始 data URL 存 metadata）+ Artifact，多模态输入这条链是真实落地的；但成体系的文档 RAG 解析（layout parser、表格双表示、Text2SQL）我没上线过，这部分我会明确讲成扩展设计。"
      ), "追问：跨页表格、页眉页脚和重复目录怎么处理？", ["PDF","表格","多模态"]],
    ["长文档（10w字+）RAG出现“中间内容丢失”，如何用父子分块、分层检索、重排序解决？",
      deepAnswer(
        "「中间内容丢失」其实是两个完全不同的病灶被混在一起:一个是检索阶段压根没召回到，一个是召回太多塞爆 LLM 后注意力衰减（lost-in-the-middle）。不分开诊断就会拿错药——把检索问题当上下文问题治，越治越糟。",
        "1. **治召回不全靠父子分块**，核心是「检索粒度和生成粒度分离」:父 chunk 按章节切（约 `1500-2000 token`），子 chunk 按段落切（`300-400 token`，`overlap 50`）；子块小而精负责检索命中（Recall 高），命中后回表取它的父块或左右相邻窗口补全上下文再回答。\n2. **规模再大叠分层检索**:给每个章节做摘要建第二级索引，复杂问题先在章节摘要层召回相关章节，再在选中章节内做子块检索，避免在全库子块里捞针。\n3. **治注意力衰减靠重排序加组装**:父块扩展后候选变多变杂，cross-encoder rerank 后只留 `5-8` 条互补证据（去掉内容重复的），按相关性而非原文顺序组装——最相关的放头尾，别埋中间。\n4. 真要跨章节，用 query decomposition 拆子问题分别检索再合并，而不是无脑把 topK 调大。",
        "几处都是「补全 vs 噪声」的拉扯:父块太大会把噪声一起带进来，邻居扩展必须受 token 预算硬约束（证据区不超过窗口的 `40%`）；topK 越大不一定越好，超过注意力承受反而触发中间丢失；decomposition 提质量但增调用次数和延迟。\n\n我的取舍是先靠分层和 rerank 收敛证据数，把「塞更多」放到最后再考虑。",
        "我现有的 Context Compression（Tier1 把可再生工具结果 offload 到 Artifact、Tier2 模型摘要中间历史保留最近 human 边界）解决的是对话长度，不等于长文档 RAG 的父子分块——这两个「长上下文」我面试时会主动区分。父子分块+分层检索是我会落地的 RAG 方案，目前项目里没有这块。"
      ), "父子索引是检索粒度与生成粒度分离。", ["父子分块","Long Context"]],
    ["混合检索（稀疏+稠密）在生产中如何调参？如何平衡召回率与检索速度？",
      deepAnswer(
        "调混合检索最忌讳一上来手填 `0.5/0.5`——那是拍脑袋。正确做法是先各自建 BM25 和向量召回的独立基线，再用标注数据驱动融合权重，参数得是测出来的不是猜出来的。",
        "1. **两路并行起**:BM25（Elasticsearch / Milvus sparse）取候选 topN_sparse，向量取 topN_dense，N 各 `50-100`。\n2. **融合优先 RRF**，这是我的默认选择:\n\n```text\nscore = Σ 1/(k + rank_i)   k=60（业界稳健默认值）\n```\n\n它天然回避 BM25 的 TF-IDF 分数和 cosine 分数尺度不一致的问题；只有在确实校准过分数分布时才考虑加权 linear fusion。\n3. **按 query 类型动态调权**:含错误码/型号/精确字符串的提高稀疏权重（BM25 强项），口语化语义问法提高稠密权重——可以用前面的 intent 分类来驱动。\n4. **控候选数 + rerank 收口**:融合去重后取 `top30-50` 交给 cross-encoder，最终留 top8。\n\n调参全在标注的 query-doc golden set 上扫网格:`k∈{40,60,80}`、`N∈{50,100}`，看 Recall@10 / NDCG@10 / P95 延迟的拐点定。",
        "RRF vs 加权 linear 是核心权衡:RRF 稳健、不用调尺度，代价是丢失原始分数强度——它分不清「强相关」和「勉强相关」；我默认吃这个亏换稳健，只有校准过分布才换 linear。\n\n另一笔是「扩候选提 Recall vs 延迟」:每路和 rerank 延迟都随候选数涨，所以候选数也要进网格一起扫拐点。\n\n还有条纪律——任何权重/阈值都得在标注集上验，线上 query 分布漂移时要重调，没标注集就别声称调好了。",
        "我的联邦 KB 已经明确不同 provider 的分数分组不混排（就是因为尺度不可比），这恰好自然引出「需要 RRF 或统一 cross-encoder reranker 来跨 provider 排序」——目前是分组展示，统一 reranker 是下一步演进方案，不是已落地。"
      ), "调参必须在标注 query-doc 数据集上进行。", ["Hybrid Search","RRF"]],
    ["RAG与多轮对话结合，如何实现“基于历史上下文的自动检索”？避免重复检索、无效检索？",
      deepAnswer(
        "多轮 RAG 的检索 query 应该是「当前问题 + 必要的对话实体」，绝不是把整段历史直接 embedding——那是噪声灾难，历史越长检索越偏。",
        "1. **核心是 standalone rewrite**:每轮把当前问题加最近几轮关键实体改写成自包含 query，消解「它」「上面那个」这类指代和已确认槽位，只拿这条改写后的 query 去检索。\n2. **去重分两层**:同一回合的工具循环对相同 `(canonical_query, filter, sourceVersion)` 做 memo，命中直接复用上次结果，杜绝同回合重复检索；跨轮则用 `hash(canonical_query + filter + sourceVersion)` 命中前面说的 Redis 缓存。\n3. **决定要不要检索**:让模型先判断本问是否需要外部知识，闲聊/澄清/纯推理就跳过；检索结果最高分低于门槛（如 cosine `0.5`）就触发澄清而不是硬答。\n4. **两级注入策略**:高置信场景每轮 proactive 主动注入相关知识，低频精确需求才走显式 `kb_retrieve` 工具，省得每轮都烧检索。",
        "中心权衡是「检索的积极度」:太积极每轮烧成本还把噪声注进上下文，太保守又会忽略本轮新增约束。\n\n我的解法是判重不能只比原始字符串——要比 `canonical_query` + 实体 + filter 是否变化，用户换了时间范围但措辞没变也得重查；用这个判据来卡积极度，既不滥检索也不漏新约束。",
        "我的 `build_turn_reminder` 有主动注入 memo（遍历 injectable source，并行 + 3s 预算 + 门槛 `team 0.45`/`tickets 0.5`），`kb_retrieve` 工具有 Redis 10min 缓存——proactive injection + 显式检索这两级机制是真实在跑的。standalone rewrite 的回合内 memo 是设计延伸。"
      ), "追问：什么时候不应该检索？", ["多轮 RAG","去重"]],
    ["如何避免RAG检索到大量无关片段，导致LLM回答跑偏？（落地优化手段）",
      deepAnswer(
        "想靠换更强的模型去硬扛烂召回是缘木求鱼——真正该做的是先把 Context Precision 拉上去，再逼模型严格基于证据答。喂进去一堆无关片段，再聪明的模型也会被带偏。",
        "这是一条从入库到 prompt 的精度链，分五段守:\n\n1. **数据侧**:入库前去重（精确 hash + SimHash 近重复）、清洗模板页/页眉、语义分块保证每块自包含。\n2. **查询侧**:standalone rewrite + metadata filter（按 `source.filters` 声明字段交集下发，先把搜索空间砍小）。\n3. **检索侧**（精度主战场）:hybrid + cross-encoder rerank + 相关性 threshold（按 source 分别校准、不用全局一个数）+ diversity（MMR 去近似重复证据，`λ≈0.5`）。\n4. **组装侧**:去掉重复片段，给每条标来源和权威等级（官方文档 > 工单沉淀 > 草稿），冲突时让模型说明分歧。\n5. **prompt 硬约束兜底**:要求逐句引用 chunk id、证据不足必须拒答（输出「现有资料无法回答」），别让它脑补。",
        "关键取舍是阈值——固定阈值会因 query 长短和 provider 不同而失效，所以我坚持按数据源校准而不是设一个全局数。\n\n还有个反直觉点:topK 调大不一定更准，加进来的常是噪声。\n\n最容易误读的是拒答率:它上升要分层看，是召回退化（坏）还是过滤掉了噪声（好），不能只看总分就回退策略。",
        "我的 `KnowledgeSource` 按 provider 分组、filter 声明求交集下发、注入阈值（`team 0.45`/`tickets 0.5`）都是真实在跑的精度控制机制。MMR diversity、统一 reranker、逐句引用 prompt 约束是设计方案。我会用「没找到 / 找错 / 用错」三类 bad case 来归因到底是哪一段出问题。"
      ), "用“没找到、找错、用错”三类 bad case 归因。", ["Context Precision","Rerank"]],
    ["生产环境如何自动化评估RAG效果？（召回率、MRR、Answer Relevancy的实操方案）",
      deepAnswer(
        "RAG 评测一定要拆成检索层、生成层、端到端三层分开打分。混在一起打一个总分，掉下来你根本不知道是召回烂还是生成跑偏，等于没法定位。",
        "1. **前提是建对数据集**:\n\n```text\n每条 = { query, relevant_doc_ids（人工标）, reference_answer, is_unanswerable }\n```\n\n且必须覆盖正常 + 不可回答样本（专测拒答），缺了不可回答样本就测不出幻觉。\n2. **检索层**优先用确定性指标:Recall@K、MRR、NDCG@10，加 RAGAS 的 Context Precision（召回片段里有用的占比）和 Context Recall（该召回的召回了多少）。\n3. **生成层**看 RAGAS 的 Faithfulness（答案是否都有证据支撑，反幻觉）、Answer Relevancy、引用正确率、拒答准确率；开放答案用 LLM Judge，但要人工校准一批锚点防偏。\n4. **流程化**才有意义:每次改 chunk 策略/embedding/prompt/rerank 都打 version tag，跑 paired comparison（同一数据集对比前后），指标和版本一起记，回归门禁卡 baseline；并持续从线上 bad case 抽样补进离线集，防数据集和真实流量漂移。",
        "最大的取舍是「确定性指标 vs LLM Judge」:确定性指标可靠但只覆盖检索层，生成质量绕不开 Judge，而 Judge 有位置偏差（偏好靠前）和长度偏差（偏好长答案），所以我固定 prompt + 人工校准锚点，不裸用。\n\n还有个单指标陷阱——Faithfulness 高但 Answer Relevancy 低 = 答得对但答非所问，只看一个指标会误判，必须成组看。",
        "我的 Eval Harness（四层:unit / trajectory / contract golden / 真实 eval）+ Langfuse `dataset(agent-server-evals)` + `baseline.json` 门禁 + 从坏 trace 沉淀回归任务的 SOP，可以直接迁移到 RAG 评测——把 task 的断言从「工具选择/step 数」换成「Recall@K / Faithfulness」即可。这套闭环是真实在用的。"
      ), "Answer Relevancy 高不代表事实忠实。", ["RAG Eval","MRR"]],
    ["Embedding模型如何选型？中英文文档混合场景，如何选择合适的Embedding模型，平衡效果与速度？",
      deepAnswer(
        "选 embedding 别只盯 MTEB 榜——榜单数据集和你的领域分布不一样，名次会骗人。要用自己真实的中英 query-doc 对评测，同时把维度、最大输入长度、吞吐、部署内存四笔账一起算清。",
        "1. **先圈候选**（如 `bge-m3`、`multilingual-e5`、`gte-multilingual`）各跑你的领域数据，关键是分三场测:中文检索、英文检索、跨语言检索（中文 query 查英文文档），看 Recall@10 / MRR 和 P95 编码延迟。\n2. **架构选择由「中英是否互相检索」决定**:要跨语言命中就用统一多语模型让向量空间对齐，中英库相对独立就按语言路由不同模型 + 独立索引各自最优。\n3. **性能侧**:批量离线编码（`batch 32-64`）建库、在线 query 走常驻服务并缓存 query embedding；维度直接乘到存储和 ANN 成本（`768` vs `1024` 差约 `30%` 内存）。\n4. **升级迁移**（单独强调）:换 embedding 模型 = 全库重建，必须双索引并行（新旧各建一份）、灰度按 query 比例切流、对比 Recall 达标再下线旧索引，绝不能原地替换。\n\n版本切换流程:\n\n```text\n旧索引（线上）  ──┐\n                  ├─ 双索引并行期：新旧各建一份\n新索引（重建）  ──┘\n        │\n        ▼\n灰度切流：按 query 比例 5% → 50% → 100%\n        │\n        ▼\n对比 Recall 达标 ── 下线旧索引\n```",
        "维度是「精度 vs 成本」的直接旋钮:越高存储和 ANN 越贵，太低又丢细粒度语义，我按评测里 Recall 的拐点取最低够用维度。\n\n量化（`fp32→int8`）省内存但可能掉细粒度 Recall，必须用任务数据验过、不能想当然。\n\n换模型的代价也要说清——它是全量重建的大动作，双读期间存储翻倍，所以不到 Recall 明显瓶颈不轻易换。",
        "我的项目用本地 FastEmbed `384` 维并复用给 mem0 和 Knowledge，真实取舍是避免起多个 ONNX 实例重复占内存（一份模型两处用）。但我不会夸大多语效果——`384` 维小模型的跨语言能力有限，要补真实中英评测才好下结论。双索引迁移流程是我会落地的方法。"
      ), "准备说明模型升级的双索引迁移。", ["Embedding","多语言"]],
    ["向量检索中，余弦相似度、点积、欧氏距离的实际应用差异？如何选择？",

        "1. **主流程**:粗召回 `30-100` 条（hybrid 融合后去重）→ cross-encoder reranker（如 `bge-reranker-v2-m3`）逐对打分 → 取最终 `top5-8`；候选数是延迟主因，务必控制在 `50` 以内。\n2. **提速靠三招**:GPU batching（一次把 query 和所有候选拼成 batch 推理，别循环单条）、长度截断（doc 截到 `512 token`，过长部分对排序贡献低）、候选预过滤（cosine 分数太低的根本不送 rerank）。\n3. **叠分层省钱**:高频 query 的排序结果缓存，简单/精确 query（错误码直查）直接跳过 rerank。\n4. **量化 reranker**（`int8`）在可接受精度损失下进一步提吞吐，但要用 NDCG 验过才上。",
