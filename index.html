  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

    :root {
      color-scheme: light;
      --bg: oklch(98.6% 0.008 85);
      --bg-tint: oklch(96.4% 0.013 85);
      --ink: oklch(24% 0.024 266);
      --ink-soft: oklch(43% 0.022 266);
      --ink-faint: oklch(60% 0.018 266);
      --line: oklch(90% 0.011 85);
      --line-strong: oklch(82% 0.016 85);
      --accent: oklch(56% 0.182 32);
      --accent-deep: oklch(47% 0.17 32);
      --accent-soft: oklch(93.5% 0.04 42);
      --link: oklch(47% 0.13 264);
      --ok: oklch(52% 0.12 156);
      --ok-soft: oklch(94% 0.045 156);
      --sans: "PingFang SC", "Microsoft YaHei", -apple-system, "Segoe UI", sans-serif;
      --display: "Space Grotesk", "PingFang SC", sans-serif;
      --ease: cubic-bezier(.22, 1, .36, 1);
      --topbar-h: 56px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; min-width: 320px; overflow-x: hidden;
      background: var(--bg); color: var(--ink);
      font-family: var(--sans); font-size: 16px; line-height: 1.7;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    button, input { font: inherit; color: inherit; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: .22em; }
    ::selection { background: var(--accent-soft); }
    mark { background: oklch(90% 0.09 92); color: inherit; padding: 0 .12em; border-radius: 2px; }

    .skip-link {
      position: fixed; top: 10px; left: 10px; z-index: 99; transform: translateY(-180%);
      background: var(--ink); color: var(--bg); padding: 10px 16px; border-radius: 8px; font-weight: 600;
      transition: transform .25s var(--ease);
    }
    .skip-link:focus { transform: translateY(0); }

    /* ---------- Topbar ---------- */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      display: flex; align-items: center; gap: clamp(12px, 3vw, 26px);
      height: var(--topbar-h); padding: 0 clamp(14px, 4vw, 40px);
      background: color-mix(in oklch, var(--bg) 80%, transparent);
      backdrop-filter: saturate(1.5) blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; gap: 9px; flex: 0 0 auto; color: var(--ink); }
    .brand:hover { text-decoration: none; }
    .brand .mark { width: 28px; height: 28px; display: block; }
    .brand b { font: 600 16px/1 var(--sans); letter-spacing: -.01em; white-space: nowrap; }
    .chapter-nav {
      display: flex; align-items: center; gap: 3px; flex: 1 1 auto; min-width: 0;
      overflow-x: auto; scrollbar-width: none;
      -webkit-mask-image: linear-gradient(90deg, transparent, #000 14px, #000 calc(100% - 22px), transparent);
      mask-image: linear-gradient(90deg, transparent, #000 14px, #000 calc(100% - 22px), transparent);
    }
    .chapter-nav::-webkit-scrollbar { display: none; }
    .chapter-link {
      display: inline-flex; align-items: center; gap: 7px; flex: 0 0 auto;
      height: 34px; padding: 0 12px; border: 0; border-radius: 9px; background: transparent;
      color: var(--ink-soft); cursor: pointer; white-space: nowrap; font: 500 13.5px/1 var(--sans);
      transition: background .16s var(--ease), color .16s var(--ease);
    }
    .chapter-link:hover { background: var(--bg-tint); color: var(--ink); }
    .chapter-link.active { background: var(--ink); color: var(--bg); }
    .chapter-link .num { color: var(--accent); font: 600 12px/1 var(--display); font-variant-numeric: tabular-nums; }
    .chapter-link.active .num { color: oklch(76% 0.16 46); }
    .chapter-link .count { display: none; }

    /* ---------- Main / Hero ---------- */
    .main { min-width: 0; }
    .hero {
      text-align: center; padding: clamp(54px, 8vw, 100px) 24px clamp(40px, 5vw, 56px);
      border-bottom: 1px solid var(--line);
      background: radial-gradient(120% 72% at 50% 0%, var(--bg-tint), transparent 62%), var(--bg);
    }
    .hero-logo .mark { width: 62px; height: 62px; margin: 0 auto 26px; display: block; box-shadow: 0 10px 28px oklch(56% 0.182 32 / .3); border-radius: 16px; }
    .eyebrow { display: inline-flex; align-items: center; gap: 11px; margin: 0 0 20px; color: var(--accent-deep); font: 600 12px/1 var(--display); letter-spacing: .2em; }
    .eyebrow::before, .eyebrow::after { content: ""; width: 28px; height: 2px; background: var(--accent); }
    h1 { margin: 0 auto; max-width: 15ch; font: 700 clamp(40px, 6.4vw, 80px)/0.98 var(--display); letter-spacing: -.035em; color: var(--ink); }
    h1 .h1-accent { color: var(--accent); }
    .hero-lead { max-width: 58ch; margin: 24px auto 0; color: var(--ink-soft); font-size: clamp(16px, 1.5vw, 18.5px); line-height: 1.72; }
    .hero-meta { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 13px; margin: 30px 0 0; color: var(--ink-soft); font-size: 14px; }
    .hero-meta b { color: var(--ink); font: 700 16px/1 var(--display); font-variant-numeric: tabular-nums; margin-right: 3px; }
    .hero-meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--line-strong); }

    /* ---------- Toolbar ---------- */
    .toolbar-wrap {
      position: sticky; top: var(--topbar-h); z-index: 30;
      padding: 12px clamp(16px, 4vw, 40px);
      background: color-mix(in oklch, var(--bg) 85%, transparent);
      backdrop-filter: saturate(1.4) blur(12px); border-bottom: 1px solid var(--line);
    }
    .toolbar { display: grid; grid-template-columns: minmax(200px, 1fr) auto auto; gap: 10px; max-width: 940px; margin: 0 auto; }
    .search-box { position: relative; }
    .search-box::before {
      content: ""; position: absolute; left: 16px; top: 50%; width: 15px; height: 15px;
      transform: translateY(-50%); pointer-events: none;
      border: 2px solid var(--ink-faint); border-radius: 50%; box-shadow: 7px 7px 0 -5px var(--ink-faint);
    }
    #search {
      width: 100%; min-height: 46px; padding: 10px 44px; border: 1px solid var(--line-strong);
      border-radius: 11px; background: var(--bg); color: var(--ink); outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    #search::placeholder { color: var(--ink-faint); }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    #clearSearch { position: absolute; right: 7px; top: 7px; width: 32px; height: 32px; border: 0; border-radius: 8px; background: transparent; cursor: pointer; color: var(--ink-faint); font-size: 18px; }
    #clearSearch:hover { background: var(--bg-tint); color: var(--ink); }
    .filter-btn, .action-btn {
      min-height: 46px; padding: 8px 16px; border: 1px solid var(--line-strong); border-radius: 11px;
      background: var(--bg); cursor: pointer; font-weight: 600; font-size: 14px; color: var(--ink-soft);
      transition: border-color .18s, background .18s, color .18s;
    }
    .filter-btn:hover, .action-btn:hover { border-color: var(--ink); color: var(--ink); }
    .filter-btn[aria-pressed="true"] { border-color: transparent; background: var(--ok-soft); color: var(--ok); }

    /* ---------- Content ---------- */
    .content { max-width: 940px; margin: 0 auto; padding: clamp(40px, 5vw, 60px) clamp(16px, 4vw, 40px) 96px; }
    .progress-panel { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 18px; margin-bottom: clamp(44px, 6vw, 70px); padding: 0 0 20px; border-bottom: 1px solid var(--line); }
    .progress-title { font: 600 13px/1 var(--display); letter-spacing: .04em; color: var(--ink-soft); text-transform: uppercase; }
    .progress-track { height: 6px; border-radius: 6px; overflow: hidden; background: var(--bg-tint); }
    .progress-fill { height: 100%; width: 0; border-radius: 6px; background: var(--ok); transition: width .45s var(--ease); }
    .progress-text { font: 600 13px/1 var(--display); font-variant-numeric: tabular-nums; color: var(--ok); }

    .chapter { scroll-margin-top: calc(var(--topbar-h) + 64px); margin-bottom: clamp(54px, 7vw, 84px); }
    .chapter-head { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: clamp(16px, 3vw, 30px); align-items: baseline; margin-bottom: 24px; }
    .chapter-index { font: 700 clamp(38px, 5vw, 60px)/0.9 var(--display); color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -.04em; }
    .chapter h2 { margin: 0; font: 600 clamp(24px, 3.2vw, 36px)/1.12 var(--sans); letter-spacing: -.025em; color: var(--ink); }
    .chapter-desc { max-width: 68ch; margin: 11px 0 0; color: var(--ink-soft); font-size: 15.5px; line-height: 1.65; }

    .question-list { border-top: 1px solid var(--line-strong); }
    .qa { position: relative; border-bottom: 1px solid var(--line); transition: background .2s var(--ease); }
    .qa:hover { background: var(--bg-tint); }
    .qa.is-mastered { background: linear-gradient(90deg, var(--ok-soft), transparent 62%); }
    .qa.is-mastered::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--ok); }
    .qa.is-hidden { display: none; }
    .question { display: grid; grid-template-columns: 42px minmax(0, 1fr) 30px; gap: 14px; align-items: start; width: 100%; padding: 21px 6px; border: 0; background: transparent; text-align: left; cursor: pointer; }
    .q-number { padding-top: 3px; color: var(--accent); font: 600 13px/1.6 var(--display); font-variant-numeric: tabular-nums; }
    .q-title { font: 600 clamp(16.5px, 1.9vw, 20px)/1.5 var(--sans); color: var(--ink); letter-spacing: -.01em; overflow-wrap: anywhere; transition: color .15s; }
    .question:hover .q-title { color: var(--accent-deep); }
    .q-toggle { justify-self: end; width: 26px; height: 26px; display: grid; place-items: center; color: var(--ink-faint); font: 300 24px/1 var(--sans); transition: transform .3s var(--ease), color .2s; }
    .qa.open .q-toggle { transform: rotate(45deg); color: var(--accent); }
    .qa.open .q-title { color: var(--accent-deep); }

    .answer-grid { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .4s var(--ease); }
    .qa.open .answer-grid { grid-template-rows: 1fr; }
    .answer-clip { overflow: hidden; }
    .answer { display: grid; grid-template-columns: minmax(0, 1fr) 232px; gap: clamp(22px, 4vw, 42px); padding: 0 6px 30px 56px; }
    .answer-body { max-width: 72ch; min-width: 0; overflow-wrap: anywhere; }
    .answer-label, .answer-side strong { display: block; margin: 0 0 12px; color: var(--ink-faint); font: 600 10.5px/1 var(--display); letter-spacing: .2em; }
    .answer-body p { margin: 0 0 13px; color: var(--ink-soft); font-size: 15px; line-height: 1.78; }
    .answer-body p:first-of-type { color: var(--ink); font-weight: 500; }
    .answer-body p:last-child { margin-bottom: 0; }
    .answer-side { align-self: start; padding: 18px; background: var(--bg-tint); border-radius: 14px; font-size: 13px; color: var(--ink-soft); }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .tag { padding: 4px 9px; background: color-mix(in oklch, var(--link) 12%, var(--bg)); color: var(--link); border-radius: 7px; font: 500 11.5px/1.3 var(--sans); }
    .answer-side > p { margin: 0 0 16px; line-height: 1.6; }
    .master-btn { width: 100%; min-height: 40px; border: 1px solid var(--line-strong); border-radius: 10px; background: var(--bg); cursor: pointer; font-weight: 600; font-size: 13px; color: var(--ink-soft); transition: border-color .18s, color .18s, background .18s; }
    .master-btn:hover { border-color: var(--ok); color: var(--ok); }
    .is-mastered .master-btn { color: var(--ok); border-color: transparent; background: var(--ok-soft); }

    .empty { display: none; padding: 80px 20px; text-align: center; border: 1px dashed var(--line-strong); border-radius: 16px; color: var(--ink-faint); }
    .empty.show { display: block; }
    .empty strong { color: var(--ink); font-size: 17px; }
    .footer { max-width: 940px; margin: 0 auto; padding: 28px clamp(16px, 4vw, 40px) 48px; border-top: 1px solid var(--line); color: var(--ink-faint); font-size: 12.5px; line-height: 1.7; }
    button:focus-visible, input:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    .hero-logo { animation: rise .6s var(--ease) both; }
    .hero .eyebrow { animation: rise .6s .06s var(--ease) both; }
    .hero h1 { animation: rise .7s .13s var(--ease) both; }
    .hero .hero-lead { animation: rise .7s .2s var(--ease) both; }
    .hero .hero-meta { animation: rise .7s .27s var(--ease) both; }

    @media (max-width: 680px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .search-box { grid-column: 1 / -1; }
      .progress-panel { grid-template-columns: 1fr auto; }
      .progress-track { grid-column: 1 / -1; grid-row: 2; }
      .chapter-head { grid-template-columns: auto 1fr; gap: 14px; }
      .question { grid-template-columns: 32px minmax(0, 1fr) 26px; gap: 10px; }
      .answer { grid-template-columns: 1fr; padding-left: 44px; gap: 20px; }
      .answer-side { padding: 16px; }
    }
    @media (max-width: 480px) {
      .brand b { display: none; }
      .hero { padding: 44px 20px 34px; }
      .hero-logo .mark { width: 54px; height: 54px; margin-bottom: 20px; }
      .hero-lead { font-size: 15.5px; }
      .hero-meta { gap: 9px 12px; margin-top: 24px; }
      .content { padding: 32px 16px 64px; }
      .progress-panel { margin-bottom: 38px; }
      .question { grid-template-columns: 26px minmax(0, 1fr) 24px; gap: 8px; padding: 18px 2px; }
      .answer { padding-left: 28px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; }
      .hero-logo, .hero .eyebrow, .hero h1, .hero .hero-lead, .hero .hero-meta { animation: none; }
    }
    @media print {
      body { background: #fff; }
      .topbar, .toolbar-wrap, .progress-panel, .master-btn { display: none !important; }
      .hero { padding: 24px 0; border: 0; }
      .hero-logo { display: none; }
      .content { max-width: none; padding: 16px 0; }
      .answer-grid { grid-template-rows: 1fr !important; }
      .answer { grid-template-columns: 1fr; padding-left: 0; }
      .answer-side { background: none; padding: 0; }
      .qa { break-inside: avoid; }
    }
  
  </style>
</head>

      <nav class="chapter-nav" id="chapterNav"></nav>

  <script>
    const deepAnswer = (judgement, implementation, tradeoff, project) =>
      `核心判断：${judgement}\n落地方案：${implementation}\n风险与取舍：${tradeoff}\n结合你的项目：${project}`;

    const chapters = [
{
  id: "project", title: "项目深挖与技术选型",
  desc: "社招面试的第一战场。面试官会沿着你的简历不断验证：是不是你做的、为什么这么做、结果是否可信。",
  items: [
    ["如何用 2 分钟介绍自己的 Agent 全栈经历？",
      "做法（结构化时间分配，每句话都挂一个可下钻的产物，不堆形容词）：\n开场 15s——身份与跨度：资深研发，前端架构与复杂系统工程出身（Klook 企业级 IM SDK，1000+ 客服，消息顺序/重连/跨端），近一年延伸到 AI Agent 全栈。\n主体 60s——按「一条执行路径 + 四个能力面」讲我从 0 搭的 LangGraph Agent 平台：唯一聊天路径是 build_chat_graph（节点只有 call_model / human_approval / tools / finalize），复杂度全下沉到 call_model 前的 Context Engineering 与统一 Tool Pipeline（tools/pipeline.py：Pydantic 参数校验 + 权限 + 异常收敛 + 大结果 Artifact 化 + OTEL span）。四个面各报一个事实：两级上下文压缩（Tier1 把可再生工具结果 offload 到 Artifact 不调 LLM，Tier2 才用模型摘要）、mem0 长期记忆（ADUN 去重，pgvector + FastEmbed 384 维）、Sandbox warmup（把冷启藏在 LLM 思考延迟里）、ModelCatalog 按 provider 分组路由 + 显式 fallback 链。\n业务落地 25s——智能工单：把历史工单沉淀成 QA 知识库（Dify 双 dataset 联邦检索），平均处理时长有约 50% 的业务观察改善（口径可展开）。\n收尾 20s——差异点：我不是只会调模型，而是能把后端编排、AG-UI 前端流式协议、工程稳定性、业务指标连成闭环。\n时间分配怎么定：练到 1 分 50 秒内讲完留 buffer；每个能力面只抛一个钩子（如「两级压缩」），把展开权交给面试官，避免一口气讲满反而没追问空间。",
      "追问准备：你负责哪一层？团队规模？最难的故障？量化结果口径是什么？", ["自我介绍","项目证据"]],
    ["为什么自建 Agent 平台，而不直接使用 Dify、Coze 等平台？",
      "做法（用「成熟平台撑不住的具体能力」逐条对照，不空谈可控性）：\n1. 列出我们要而低代码平台给不了的运行时控制：自定义 Loop 终止（max_steps + 无进展 Stuck Detector，按 current_turn_slice 算指纹）、长任务恢复（BackgroundTaskRunner + DB 管 queued/running/terminal 事实状态）、两级上下文压缩（ephemeral compaction 只改本轮 llm_messages 不动持久化 transcript）、图级 HITL（静态 interrupt 可 accept/edit/deny）、沙箱执行与细粒度工具权限。这些都要改运行时，不是配 Prompt 能解决。\n2. 给成本边界：自建要养 Aegra(checkpoint+AG-UI 流式) + FastAPI(auth/admin/sandbox 侧栏) + pg/redis/R2/Langfuse + CI；所以原则是确定性、短链路场景（标准工作流、纯问答）优先用成熟平台，只有控制力和差异化能覆盖维护成本才自建。\n3. 即使自建也保留可替换：插件 entry point 分 LLM Provider / Skill Pack / Tool Provider / Sandbox Provisioner，模型/工具/存储接口都抽象，不把业务绑死单一实现。\n怎么验证选型对不对：拿一个真实需求（如长任务中途停止恢复）让候选平台各做一遍 PoC，能做的就别自建——自建的理由必须是「平台做不到」而非「我想自己写」。",

    ["如何证明工单平均处理时长降低 50%？",
      "做法（先把口径钉死，再做有对照的统计，最后诚实标注这是业务观察值而非随机实验）：\n1. 定义时长口径：从工单进入「待处理」状态的时间戳，到首次有效解决或关闭的时间戳；剔除「等待用户响应」「跨班次挂起」等不可控等待段（按状态机日志切片，不是简单 end-start）。\n2. 选对照而非裸比：取上线前后相同 business_line、相近 category 的工单，比中位数和 P90（不要用均值，长尾会被极端单拉偏）；样本量至少要够（如每组 ≥ 数百单）并说明观察周期。\n3. 配护栏指标，防止只快不准：同时看转人工率、一次解决率(FCR)、复开率——如果处理变快但复开率涨了，50% 是假的。\n4. 拆来源：把改善归因到 QA 知识沉淀（Dify 联邦检索命中率）还是流程提速，避免把无关变量记到 Agent 头上。\n怎么说才可信：明确这是「分阶段灰度上线的业务观察值」，不是 A/B 随机实验；给出基线区间、样本量、时间窗，并主动说哪些混杂因素没控制住。面试官信的是口径严谨，不是那个 50% 数字本身。",

    ["Agent 项目中你个人做了什么，而不是团队做了什么？",

    ["项目中最失败的一次尝试是什么？",
      "做法（选真实可控的失败，按「假设→暴露的数据→根因→机制性修复」讲，不包装成成功）：\n1. 事件：早期把原始工单整条直接向量化做检索，召回里全是过程对话噪声（寒暄、催办、内部转派），真正的解决结论被淹没，Recall 看着高但回答质量差。\n2. 暴露的数据：抽查 top-k 命中，发现命中的多是过程片段而非结论片段；这逼我意识到「入库的是什么」比「检索算法」更决定上限。\n3. 根因：把「历史记录」当成了「知识」，没做抽取与质量门槛。\n4. 机制性修复：改成只抽取「确认的解决结论」入库；给每条挂 version 与审核状态字段，检索期过滤未审核内容；建 bad case 回归集，新数据进库前先在它上面跑一遍。\n怎么讲出反思而不是甩锅：重点放在「我用什么证据纠正了判断、建了什么机制让同类错误不再发生」，而不是错误本身有多小。绝不答「我太追求完美」——失败必须包含真实损失、根因和可复用的修复机制。",

    ["如何判断一个业务是否值得使用 Agent？",
      "做法（用三个可判定的条件做决策树，先排除掉能用更简单方案的场景）：\n1. 任务路径是否有不确定决策：每步动作固定可写成 if-else 或 DAG 的，用 Workflow（确定性、可测、便宜），不要上 Agent。\n2. 是否纯知识回答：答案就在文档里、不需要执行动作的，用 RAG，省掉多步规划开销。\n3. 是否需要动态规划 + 多步可验证行动：只有当任务要 Agent 自己决定调哪个工具、按结果再决定下一步、且每步结果能被工具验证形成闭环时，才值得用 Agent。\n4. 错误成本是否可控：用静态权限 interrupt（HITL accept/edit/deny）、审批、回滚、幂等键把高危动作圈起来；如果一个误操作不可逆且没法兜底，宁可不自动化。\n怎么验证判断：拿这个业务真跑一版 Workflow 基线，统计「需要人工跳出固定流程」的比例——如果很低说明 Agent 是过度设计；高且分支无法枚举，才证明 Agent 的动态规划是必要的。高分答案会主动说出「这些情况我不用 Agent」的边界。",

    ["模型和框架如何选型？",
      "做法（用任务集做横向实测 + 任务级路由，不看排行榜，不绑单一模型）：\n1. 模型先建评测口径：在同一任务集上量质量、延迟、成本(/1k token)、上下文窗口、工具调用准确率、合规要求；用 ModelCatalog 按 provider 分组声明 endpoint/协议/window/max_output/modality/cost/fallback，get_model 按 provider_of 路由。\n2. 任务级路由而非全局一个模型：简单任务（标题生成、安全分类）用小快模型，复杂规划/兜底用强模型；fallback 链显式配置，重试耗尽后返回 AIMessage 而不是静默换模型或抛异常。\n3. 框架看五点：状态管理与 Checkpoint 恢复、可观测（能否对接 Langfuse 逐 generation 看上下文）、HITL/中断能力、生态插件、团队熟悉度——我选 LangGraph 是因为它的图状态 + checkpoint + interrupt 直接覆盖了恢复和 HITL。\n4. 加适配层隔离：模型走网关、工具走统一 Pipeline，业务不直接耦合某家 SDK，换模型只改 catalog 配置。\n怎么定到对的值：每次候选模型上线前在 eval 任务集上比 passed/steps/latency/cost 五个维度，看综合拐点，而不是只挑某个 benchmark 第一名。",

    ["如何把 Agent Demo 推到生产？",
      "做法（把每个不可控点逐一变成可观测、可限制、可恢复的状态，不是堆 Prompt）：\n1. 边界与权限：工具定 Pydantic Schema + 业务校验 + 图级静态权限 interrupt（accept/edit/deny），Pipeline 动态权限错过 interrupt 点则 fail closed deny。\n2. 状态与恢复：用 Checkpoint 持久化图状态；长任务交 BackgroundTaskRunner（DB 管 queued/running/terminal 事实状态，Redis Pub/Sub 只做实时事件，失败可轮询 DB）；重启把无 Runner 的 queued/running 标 interrupted。\n3. 循环与韧性：max_steps + deadline 硬护栏 + 按 current_turn_slice 的 Stuck Detector，触发后 soft landing（unbound_model 总结而非抛错）；LLM retry/fallback 耗尽返回 AIMessage 让 SSE 闭合，前端不卡 thinking。\n4. 评测与可观测：建离线 eval 任务集（比 passed/steps/latency/token/cost）+ 全链路 OTEL/Langfuse trace + 成本延迟预算；step count 列一等指标。\n5. 上线策略：灰度 + 人工兜底，把生产抓到的坏 trace 沉淀成回归用例闭环。\n怎么确认 Demo 真生产就绪：跑一遍 trajectory eval（fake 脚本模型跑真实 live graph）断言工具选择/顺序/步数不退化，再灰度放量看护栏指标，全绿才扩。",

    ["为什么你适合 Agent 全栈而不是纯前端岗位？",
      "做法（用已落地的后端模块 + 前端独有视角双证，不说「正在学」）：\n1. 后端已落地的端到端实践（不是在学）：Python 3.12 + FastAPI + LangGraph 从 0 搭，写过图状态模型、统一 Tool Pipeline、两级上下文压缩、mem0 记忆、BackgroundTaskRunner，落地 PostgreSQL+pgvector / Redis / R2 / Langfuse / Docker compose / GitHub Actions。\n2. 前端背景是差异化而非短板：长任务的产品体验恰恰是前端难点——我做过 AG-UI 流式协议把后端运行状态（工具调用中/审批/取消/恢复）映射成前端可理解的事件，处理过停止生成时 SSE 必须闭合否则前端卡 thinking 这种端到端问题；多年 IM SDK 经验让我对消息顺序、重连、跨端状态一致很敏感。\n3. 架构能力跨层：协议设计、状态持久化、部署降级（Cloudflare/AWS 多云 + CSR 降级）我都实操过。\n怎么证明不是空谈：直接给后端文件级证据（build_chat_graph、tools/pipeline.py）和线上责任（智能工单上线、故障复盘），用「我已经交付的模块」证明能把模型能力变成完整产品，而不是停在聊天 UI。",
      "用已完成的后端模块和线上责任证明，不要只说正在学习。", ["职业定位"]],
    ["如果入职后第一周要接手一个准确率很差的 Agent，你会怎么做？",
      "做法（按固定诊断顺序排障，先冻结再分层定位，一次只改一个变量）：\n1. Day1 冻结 + 建基线：停掉变更，收集近期失败 trace，按链路分层归类——意图识别 / 检索召回 / 工具选择 / 工具参数 / 执行结果 / 最终生成，统计每层失败占比，先看是哪一层在漏（多数情况坏在检索或工具选择，不是模型本身）。\n2. Day2-3 建小 Golden Set：挑业务损失最大且最高频的失败，整理成 20-50 条可复现用例（query→期望结果），让问题能被一键重跑，而不是凭感觉调。\n3. Day3-5 单变量回归：按「先数据和确定性逻辑，再 Prompt，最后才换模型」的顺序改——比如先修知识库入库质量、工具 Schema、检索 filter，每改一处只动一个变量并在 Golden Set 上回归对比指标，避免一次改五处分不清谁起作用。\n4. 第一周末：把失败分类和指标接入持续评测（eval 任务集 + step count + latency/cost），让准确率变化可监控。\n为什么是这个顺序：换模型/调 Prompt 最诱人但最不可控，应放最后；先用可证伪的小回归集锁定真实瓶颈层，再动手——这是未来情景题，考的是诊断顺序和风险控制，不是某个具体修复。",

  items: [
    ["什么是 AI Agent？与 Chatbot、RAG 有什么区别？",
      "做法（用「有没有状态机 + 工具执行环」来区分，不靠框架名词）：\n1. Chatbot = 单次 messages 进、文本出，无外部副作用；RAG = 在 prompt 前插 retrieve 出来的 top-k chunk，本质还是一次性生成，模型不决定要不要检索、检索什么。\n2. Agent = 一个带持久 state 的执行循环：state 至少含 messages + 结构化 todo + 步数/预算计数 + 工具调用记录，每轮模型输出 tool_calls，系统执行后把 ToolMessage 回灌 state 再进下一轮，直到命中终止条件。\n3. 落地结构：在 LangGraph 里就是 call_model → tools → 条件边回 call_model 的循环（我的 build_chat_graph 节点只有 call_model / human_approval / tools / finalize），RAG 退化成其中一个 kb_retrieve 工具或一次 turn 注入，不是独立架构。\n判断标准：能回答「这一步动作是模型在运行时选的、还是开发者写死的」就是 Agent vs Workflow 的分界；LLM 是推理组件，Agent 是把推理、状态、工具、终止接成的完整运行系统。",

    ["Workflow 和 Agent 的边界是什么？",
      "做法（按「路径能否提前穷举」切，混合架构是常态）：\n1. 路径可枚举、要稳定/便宜/可单测的 → Workflow：用 if/else 或 LangGraph 静态边写死节点流转，如审批、数据同步、定时 ETL，期望零方差。\n2. 路径在运行时由输入决定、提前穷举不现实的 → Agent：开放式调研、跨工具排障，让模型每轮选 tool_call。\n3. 生产典型形态是外层确定性 Workflow 夹一个 Agent 节点：比如固定的 鉴权 → 限流 → [agent 自由调研] → 结构化落库 → 通知，外层可测可回滚，内层灵活。\n4. 即使在 Agent 内部也要给硬护栏（max_steps、deadline、预算）把不确定性关进笼子，而不是让它无限自由。\n判断标准：列出该任务的全部分支，如果能写成有限状态图且不需要模型临场决策就用 Workflow；测下来方差/失败率不可接受再退回 Workflow 或缩小 Agent 的自由度。",
      "最佳答案通常不是二选一，而是混合架构。", ["Workflow"]],
    ["LangChain 和 LangGraph 有什么区别？",
      "做法（按「无状态组件链」vs「有状态图」分工，二者叠用）：\n1. LangChain = 组件抽象层：ChatModel、PromptTemplate、Retriever、Tool、OutputParser，加 LCEL 的 prompt | model | parser 做线性管道，适合一次性 RAG/抽取。\n2. LangGraph = 有状态执行图：StateGraph(State) + add_node + add_conditional_edges，自带 Checkpointer（持久化/恢复）、interrupt（HITL）、并行扇出、循环；State 用 TypedDict + reducer（如 messages 用 add_messages）。\n3. 组合方式：节点函数内部用 LangChain 的 model.bind_tools(tools) / Retriever，外层用 LangGraph 管 state 流转和回环——我的 call_model 节点就是这么干的。\n4. 选择依据：只要有循环、需要从中断点恢复、要 HITL，就上 LangGraph；纯线性、无状态的小链 LangChain/LCEL 就够，没必要为单次调用引图。\n判断标准：问「这条逻辑会不会回到自己、需不需要崩溃后从半路续跑」，是 → LangGraph；否 → LangChain。别说前者取代后者，实际是前者编排后者。",
      "避免说 LangGraph 完全取代 LangChain。", ["LangChain","LangGraph"]],
    ["为什么不自己写状态机？",
      "做法（Build vs Buy：自研拿控制，买框架省基础设施，关键是把业务和编排解耦）：\n1. 自研要自己扛的隐性成本：Checkpoint 持久化与版本迁移、崩溃恢复、并行扇出/合并、中断点 resume、流式事件、可视化调试、SDK 升级跟随——这些和业务无关却最容易出 bug。\n2. 我的取舍：用 LangGraph 当编排层，但把业务节点、Tool（统一 execute_tool Pipeline）、存储接口都做成独立模块，Graph 只负责连边和管 state，不渗进业务逻辑。\n3. 这样替换成本可控：哪天 LangGraph 的某能力不满足（比如要更细的事件级 SSE replay），只换那一层，节点和工具不动。\n4. 反例自检：我删过一套自研的 Plan-Execute-Verify 影子栈——它没承载真实流量却要单独维护一套状态流转，纯负债，最终收敛到唯一 live graph。\n判断标准：评估「自研能省的延迟/控制收益」是否大于「持续维护这些基础设施的人力」，没有量化收益就不要重写框架，复杂度要由失败数据驱动。",
      "讲清 Build vs Buy 的权衡。", ["架构"]],
    ["一个生产级 Graph State 应该保存什么？",
      "做法（State 是控制平面，存「指针 + 计数 + 业务关键变量」，大对象外置）：\n1. 身份与目标：runId、thread_id、user_id/tenant_id、原始目标/任务摘要、版本号 schema_version（迁移用）。\n2. 执行控制：current_node、step_count、token/cost 累计与预算上限、deadline、连续失败计数、stuck 标记、cancellation 状态。\n3. 计划与轨迹：结构化 todo（见外化题）、tool 调用记录摘要、关键业务变量（如已锁定的实体 id、已确认的参数），错误状态（last_error type/可重试与否）。\n4. 大对象只存引用：完整工具输出、长文档、图片走外部存储——我的 Tier1 压缩把大且可再生的工具结果 offload 到 Artifact，state 里只留 {artifact_id, type, preview}，messages 留引用不留全文。\n参数怎么定：用 add_messages 这类 reducer 管累积字段，普通字段后写覆盖；判断某字段该不该进 state 的标准是「下一步决策或恢复是否需要它」，纯展示日志进事件流不进 state。消息列表只是 state 的一部分，不是完整状态模型。",
      "消息列表不是完整状态模型。", ["状态设计"]],
    ["Agent Loop 在什么情况下终止？",
      "做法（四类终止：语义 / 资源 / 异常 / 人工，终态必须带可恢复信息）：\n1. 语义完成：模型这轮不再出 tool_calls（自认达成目标）或全部 todo status=done → 走 finalize 输出最终答案。\n2. 资源耗尽：step_count >= max_steps（如 25）、now > deadline（如 120s）、token/cost 超预算，任一命中即停，这是兜底底线。\n3. 异常：同一工具连续失败超失败预算、stuck detector 判定无进展循环、LLM retry/fallback 全耗尽（此时返回一条 AIMessage 让 SSE 正常闭合，而不是抛异常卡前端 thinking）。\n4. 人工：高风险工具触发 HITL interrupt，挂起等审批不算失败。\n5. 终态封装：返回 {status, completed_parts, failure_reason, next_step_suggestion}，而不是裸 Exception——让前端能展示「做了什么、卡在哪、建议怎么办」。\n参数怎么定：把 step count 列为一等指标（我吃过 71 步 Fibonacci 事故），在 eval 里断言每个任务步数上限；终止条件要四类都覆盖，缺人工/异常那两类最容易出锁死或假成功。",
      "终止条件要同时覆盖语义、资源、异常和人工。", ["Loop Control"]],
    ["如何防止 Agent 无限循环？",
      "做法（硬预算兜底 + 按当前回合做无进展检测，两层）：\n1. 硬护栏：每 run 设 max_steps（如 25）、deadline（如 120s）、token/cost 预算，任一超限就停，底线但不够。\n2. 无进展检测：只取「最后一条 HumanMessage 之后」的轨迹（current_turn_slice，关键——不能扫整个 thread，否则上一轮的重复会污染新回合让线程永久锁死），对每步算指纹 hash(tool_name + 规范化后的参数 + 结果摘要)。\n3. 判定：最近 N 步（如 3）指纹重复且 state 关键变量无变化 → 判 stuck；重试场景参数可能相同但结果在变，所以要结合 state 是否推进，不能只看参数重复。\n4. 触发后不抛固定错误，而是 soft landing：换一个没绑工具的 unbound_model + soft_landing_section 再走一次正常上下文组装，让它用用户语言总结已完成部分/失败原因/下一步，保证不再调工具进环。\n验证：写 loop-trap eval 任务（构造诱导重复调用的输入）断言步数不超阈值；把真实事故沉淀成回归用例，如 test_new_user_message_recovers_after_stuck。",
      "重复并不总是循环，重试场景需结合状态变化判断。", ["循环检测"]],
    ["如何设计 Todo 外化？",
      "做法（把计划从模型脑子里搬到结构化 state，可版本、可恢复、可被人改）：\n1. 数据结构：todo = [{id, desc, deps: [id...], status: pending|in_progress|done|blocked|failed, retries, result_ref(artifact_id), updated_at}]，外加 plan_version 和每次调整的 reason。\n2. 角色分工：planner 节点创建/修订 todo（写明改动理由），executor 只挑 deps 全部 done 的项执行，每步结束原子更新对应项 status 和 result_ref，避免目标漂移。\n3. 调整而非重生成：计划不是一次定死，遇到新信息就 bump plan_version 并记 reason，旧版本留痕便于审计「为什么改路线」。\n4. 外化收益：前端能渲染进度条、人工能直接编辑某条 todo 再 resume、崩溃恢复时读未完成项续跑。\n参数怎么定：deps 用拓扑序保证可并行的项并行、有依赖的串行；retries 设每项上限（如 2），超了标 failed 并把失败原因写进 result_ref 而不是无限重试。计划要带版本和调整理由，不能是黑盒重写。",
      "注意计划不是一次生成后永不变化，需要版本和调整理由。", ["Todo","长任务"]],
    ["Planning 与执行应该由同一个模型完成吗？",
      "做法（默认同模型省延迟，复杂任务再分离，用评测而非直觉决定）：\n1. 简单/中等任务：同一模型在一个 loop 里边想边做（ReAct），少一次上下文传递、少一跳延迟，调试也简单——作为默认。\n2. 复杂任务分离：planner 用强推理模型 + 规划 prompt 产出结构化 todo，executor 用更便宜/更快的模型按 todo 执行，各自 prompt 职责清晰；可给 planner 大 context_window、executor 小窗口控成本。\n3. 分离的代价：plan→exec 之间要序列化/反序列化上下文、要协调状态一致性、消息量上涨，这些成本要算进账。\n4. 决策方法：在任务集上同时跑「同模型」与「planner/executor 分离」两套，比 passed / steps / latency / cost，只有分离在某复杂度档位明显更优才采用。\n参数怎么定：先单模型，当观测到「目标漂移率高」或「上下文超窗」才上分离，用评测数字说话，不为架构而架构。",
      "先简单后复杂，避免为架构而架构。", ["Planner"]],
    ["单 Agent 与 Multi-Agent 怎么选？",
      "做法（单 Agent 为默认，只有角色边界 + 可测收益齐全才拆）：\n1. 默认单 Agent：一套 state、一份工具表、一条轨迹，成本低、易调试、易评测。\n2. 拆 Multi-Agent 的硬条件（要同时满足）：角色有明确不同的工具集/权限/上下文（如「检索 agent」只读 KB、「执行 agent」能写沙箱）；且并行或上下文隔离带来可测收益（延迟降或质量升）。\n3. 实现形态：用 LangGraph 子图或 subagent 工具，每个 sub 有独立 state，主 Agent 只拿它的结论（subagent 结论不被压缩 carve 掉），避免把整段子轨迹塞回主上下文。\n4. 代价清单：跨 agent 协调、输出冲突、消息膨胀、评测要覆盖组合路径——这些都要进决策成本。\n判断标准：用任务集比单 Agent vs Multi-Agent 的 passed/cost/latency，没有显著收益就别拆；「写了多个 prompt」不等于「需要多个 Agent」，多 prompt 可以是同一 Agent 的不同阶段。",
      "‘多个 Prompt’不等于需要多个 Agent。", ["Multi-Agent"]],
    ["多 Agent 如何解决冲突？",
      "做法（先定边界，冲突走确定性裁决，不让模型互相辩论到天荒地老）：\n1. 前置：每个角色声明决策边界（谁对哪类结论有最终发言权）和共享目标，减少冲突源头。\n2. 冲突表达结构化：每个 agent 的输出带 {claim, evidence_refs, confidence}，不是自然语言对喷，便于程序比对。\n3. 裁决三选一：能用规则就用确定性规则（如 confidence 阈值 + 证据数量）；规则不够用专门 arbiter 节点（独立 prompt，只读双方证据出裁决并记依据）；高风险走人工审批。\n4. 上限：辩论/协商设最大轮次（如 2）和 cost 上限，超了强制走 arbiter 或人工，避免无限互踢。\n判断标准：高风险场景（涉钱/权限/不可逆）最终责任不能交给「模型投票」，必须落到确定性规则或人审；裁决依据要持久化进审计日志，事后可复盘为什么这么判。",
      "高风险场景最终责任不能交给模型投票。", ["Multi-Agent","冲突"]],
    ["如何实现并行工具调用？",
      "做法（只并行「无依赖 + 副作用可控」的工具，目标是降延迟不是齐发）：\n1. 分类：编排层把本轮 tool_calls 分成 safe（只读/幂等，可并行）和非 safe（有写副作用/互斥，独占串行）——我的 tools/orchestration.py 就这么分。\n2. 并发执行：safe 组用 asyncio.gather + asyncio.Semaphore(N) 限并发（如 8），每个调用单独 timeout（如 30s），用 tool_call_id 做 correlation id 汇总结果。\n3. 部分失败处理：按任务语义决定——可重试的退避重试、可降级的填占位、致命的取消其余（cancel 其他 task 并清理）；最终把每个结果对齐回各自 ToolMessage（缺一不可，否则协议报错）。\n4. 合并前校验：对汇总结果做 schema + 完整性校验，再回灌模型。\n参数怎么定：Semaphore 上限按下游配额/连接池定（默认 8 起调），timeout 按工具 P95 定；并行收益要实测（end-to-end 延迟降多少），不是为并行而并行。",
      "并行的目标是降延迟，不是把所有调用同时发出。", ["并行"]],
    ["工具连续失败怎么办？",
      "做法（先分类错误，区分可重试/不可重试，再设失败预算与降级）：\n1. 错误分类（在统一 execute_tool Pipeline 里收敛）：参数错误（Pydantic 校验失败）→ 不原样重试，把校验错误回灌让模型修参数；网络/限流瞬时错误（5xx/429）→ 指数退避重试（如 base 0.5s，×2，上限 3 次，带 jitter）；权限/业务拒绝（403/业务 deny）→ 直接停，重试无意义；未知错误 → 熔断 + 进人工队列。\n2. 失败预算：同一工具在一个 run 内设失败上限（如 3），超了停用该工具并标记，避免反复撞墙。\n3. 降级路径：有替代工具就切（如主检索挂了走缓存/备库），没有就给「基于已有信息的降级答案」并诚实标注数据不全。\n4. 不把失败当无数据：工具失败要明确告诉模型「失败了，原因 X」，否则模型会当成「查无结果」误导用户（我专门沉淀过 tool-failure-honesty 回归用例）。\n参数怎么定：退避次数/间隔按下游 SLA 调，失败预算按工具关键度调；用 trajectory 测试断言参数错不触发盲目重试。",
      "重试策略必须区分可重试与不可重试错误。", ["错误处理"]],
    ["任务执行到一半服务重启，如何恢复？",
      "做法（Checkpoint 存控制平面，副作用靠幂等键对账，事件日志可回放）：\n1. 写点：每个关键节点后由 Checkpointer 持久化 {schema_version, current_node, step_count, todo, 已完成副作用记录, pending_todo}——LangGraph 的 checkpointer（生产用 Postgres，测试用 MemorySaver）按 thread_id 存检查点链。\n2. 恢复：从最后一致的 checkpoint 读 state 续跑，先验 schema_version 兼容再继续。\n3. 副作用对账（最难的一环）：对每个外部写操作用幂等键（如 idempotency_key = hash(runId + todo_id + 关键参数)），恢复时先查「这个键是否已写成功」再决定跳过还是重做，绝不靠内存里的 messages 判断。\n4. 进程级兜底：重启时把「没有内存 Runner 在跑」的 queued/running 任务标 interrupted（我的 BackgroundTaskRunner 用 DB 存 queued/running/terminal 事实状态，Redis 只做实时事件，失败可轮询 DB 兜底），跨进程续跑是设计上要补的下一层。\n参数怎么定：checkpoint 频率按「副作用密度」定——每个有外部写的步骤后必写；难点永远是副作用边界而非恢复一段文本。",
      "最难的是副作用边界，而不是恢复一段文本。", ["Checkpoint","恢复"]],
    ["如何实现 Human-in-the-loop？",
      "做法（HITL 是持久化的状态迁移，不是前端弹窗——靠 interrupt + checkpoint + resume）：\n1. 触发点：高风险工具（写/删/转账类）、低置信度、策略要求的节点，命中即 LangGraph interrupt，把当前 state 和「待审批动作（tool name + 参数）」持久化进 checkpoint，run 挂起。\n2. 前端拿到 interrupt 事件渲染审批卡，人工可 accept / edit（改参数，按 tool_call_id 匹配回写）/ deny。\n3. 恢复：用 Command(resume=payload) 续跑，先校验 state 的 schema_version/关键变量没在审批期间变化（防止审批期数据漂移导致拿旧参数执行）。\n4. 双层防护：我用图级静态权限 interrupt（已知高危工具进 graph 前拦）+ Pipeline 动态权限（运行时才判定的危险操作若错过 interrupt 点则 fail closed 直接 deny，绝不放过）。\n5. 审计：每次审批落 {approver_id, decision, before/after 参数, timestamp}。\n参数怎么定：哪些工具进 HITL 用白名单显式声明（宁可多拦），审批超时策略按业务定（超时默认 deny 更安全）。",
      "审批不是一个前端弹窗，而是持久化状态迁移。", ["HITL"]],
    ["如何让任务可暂停、恢复和取消？",
      "做法（区分 pause/resume/cancel/rollback 四件事，取消信号必须一路下传）：\n1. 每个 run 独立 state + 一个 cancellation_token（asyncio.Event）。\n2. 暂停：只在安全点（节点边界）生效，写 checkpoint 后挂起，不在工具执行半路硬停。\n3. 恢复：验 schema_version 后从 checkpoint 续跑。\n4. 取消：POST /runs/{runId}/cancel → 置位 token + task.cancel()；信号要传到模型流（close 掉 provider 的 stream 停计费）、传到工具（长循环里查 token.is_set()，在 finally 关沙箱/连接/临时文件）、传到子任务（共享同一 token）；写终态 status=cancelled 并发 cancelled+end 事件让前端从 stopping 落地。\n5. 不假装回滚：已发生的外部写（DB/转账）取消不了，只能阻止后续步骤，用 cancelled / partially_completed 区分，配幂等键处理半完成。\n参数怎么定：CancelledError 必须在 finally 兜资源释放（否则取消反而泄漏）；我的 BackgroundTaskRunner 已有 cancel event + Task.cancel + terminal 落库，主流 abort 是否下传到上游 provider 要按实现诚实说，provider 级 abort 是要补的下一层。",
      "区分 cancel、pause 与 rollback。", ["任务控制"]],
    ["Agent 如何进行自我反思？",
      "做法（反思是受约束的校验节点 + 最多一次修正，能用确定性验证就别用模型）：\n1. 别做「再想想」式无限追加——那只放大错误还烧延迟。\n2. 受约束 critic 节点：给模型「目标 + 输出 schema + 证据」，让它只检查「是否遗漏字段/是否答非所问」，输出结构化 {pass: bool, issues: [...]}，最多触发一次修正（重生成一遍），再不过就带 issues 落地交人工。\n3. 优先用可验证手段替代模型反思：代码题跑测试/编译、JSON 输出走 schema 校验、数值答案跑规则核对、检索答案核对引用是否真在 chunk 里——这些比让模型自评可靠得多。\n4. 用另一个评测器（LLM-judge 或规则）打分门控，而不是让生成者自己给自己背书。\n参数怎么定：修正轮次硬上限 1（防放大），并在任务集上比「加反思 vs 不加」的 passed/latency——反思必须用评测证明净收益为正才保留，否则就是负优化。",
      "反思会增加延迟且可能放大错误，必须通过评测证明收益。", ["Reflection"]],
    ["什么任务不适合使用 Agent？",
      "做法（强确定性 + 不可错 + 缺回滚的任务交给规则服务，模型只做辅助）：\n1. 不适合的特征：要求确定性结果（同输入同输出）、低延迟高吞吐（毫秒级 / 高 QPS）、错误不可接受且没有审批回滚——典型如支付记账、权限核心判断、计费扣减、简单 CRUD。\n2. 这类用传统服务实现：固定 SQL/规则引擎/状态机，结果可单测、可压测、可回滚，方差为零。\n3. 模型在这里只做边角：把自然语言转成结构化参数（再交规则校验执行）、给操作生成人类可读解释、产出建议供人确认——绝不让模型直接拍板不可逆操作。\n4. 即使用 Agent 包了一层，核心判定也要落在确定性代码上（如 HITL fail closed、幂等键），把模型挡在副作用之外。\n判断标准：问「这步错一次能不能接受、能不能回滚、要不要严格 SLA」，三者有一个是硬约束就别交给 Agent 自主决策——这是工程克制，不是能力不足。",

      "做法（从最简单能用的开始，每加一层复杂度都要失败数据背书）：\n1. 起点：单次模型调用（prompt → 结果），先看裸模型能解决多少。\n2. 加知识与确定性工具：上 RAG（kb_retrieve）和写死的确定性工具，解决「事实不准 / 要查外部」，此时还没有循环。\n3. 确有动态路径才加 Loop：当任务路径无法提前穷举、需要模型按结果决定下一步，才引入 call_model↔tools 的执行环 + 硬护栏（max_steps/deadline/预算）。\n4. 补可靠性：state 持久化 + checkpoint 恢复、统一工具 Pipeline（校验/权限/异常收敛）、HITL、评测门禁。\n5. 最后才拆 Multi-Agent：只有单 Agent 的上下文超窗或职责严重混杂成为瓶颈，且评测证明拆了更优，才拆。\n判断标准：每次升级前先拿生产坏 trace / eval 失败用例当证据（我把事故沉淀成 Langfuse 数据集 + baseline 门禁），「复杂度由失败数据驱动」——没有数据支撑的复杂化就是过度工程。我自己就删过没承载流量的 Plan-Execute-Verify 影子栈作为反向演进。",

            "工具结果同样可能包含注入攻击。", ["安全"]],
          ["如何设计工具超时、重试和熔断？",
            "做法（每工具独立超时 + 按错误分类决定重不重试 + 连续失败熔断，且局部策略服从全局 run 预算）：\n1. 独立超时：每个工具配自己的 timeout（快查 3-5s，外部慢接口 15-30s），到点取消而不是无限等。\n2. 错误分类决定重试：只有读取类瞬时错误（网络抖动/5xx/超时）才重试，用指数退避 + jitter（base 0.5s，factor 2，max 3 次，sleep = min(base*2^n, cap) + random(0, base)）；参数错/权限错/业务错（4xx 类）立即不重试。\n3. 熔断：按工具维度统计，连续系统失败达阈值（如 5 次）打开熔断器，cooldown（如 30s）内快速失败，降级到缓存/备用工具/人工；half-open 放一个探针成功再合闸。\n4. 服从全局预算：整个 run 有 deadline（如 120s）与 max_steps（如 25），局部退避要看剩余预算，不能因为一个工具反复退避把整轮时间耗光——预算不够就提前 soft landing。\n参数怎么定 / 怎么验证：退避 max_retries、cap、熔断阈值/cooldown 先取上面工程默认，再按各工具真实失败率与 P99 延迟调；用注入 5xx/超时的 trajectory 测试断言重试次数、退避时序、熔断触发与全局不超时。",
            "局部策略必须服从全局预算。", ["重试","熔断"]],
          ["MCP Server 有哪些主要安全风险？",
            "做法（把接一个 MCP server 当成「在系统里装一组新能力」，按供应链思路治理）：\n1. 主要风险面：被篡改/恶意的工具描述（投毒诱导模型）、过宽权限、凭证泄露、工具内 RCE、依赖供应链投毒、工具返回注入、跨租户数据泄露。\n2. 准入治理：server 白名单 + 版本锁定 + 签名/哈希校验（按内容哈希比对，变了不自动加载），来源不明不接；新 server 先隔离环境审 list_tools 的 description 与 inputSchema。\n3. 运行隔离：每个 server 最小权限 scoped credential、网络隔离（只允许它该访问的目标）、按租户隔离数据，避免一个 server 越界读别人的。\n4. 高风险能力人工确认 + 全量审计：危险工具走 HITL，所有 call 记 runId/工具版本/参数摘要/权限决策（敏感字段脱敏）。\n参数怎么定 / 怎么验证：维护 server allowlist + 版本/哈希清单；接入前过依赖扫描与描述审查清单；定期重算 server 内容哈希比对是否被悄改，跨租户用例断言拿不到他租户数据。",
            "连接 MCP Server 相当于安装一组新能力，应有供应链意识。", ["MCP","供应链安全"]],
          ["A2A 与 MCP 有什么区别？",
            "做法（按职责边界分：MCP 管「Agent 怎么连工具/资源」，A2A 管「Agent 之间怎么协作」，可同时存在）：\n1. MCP 的对象是工具与资源：一个 Agent 通过 MCP client 去 list_tools / call_tool 使用外部能力，关系是「调用者—被调用能力」。\n2. A2A 的对象是其它 Agent：关注 Agent 之间怎么发现彼此能力（agent card）、委派任务、交换状态与结果，关系是「对等协作/委派」。\n3. 组合形态：一个系统可以同时——用 MCP 接数据库/搜索等工具，用 A2A 把子任务委派给外部专门 Agent；本仓库的 subagent 结论被当作不可 carve 的高价值上下文回填，就是这种委派结果的内部体现。\n4. 答题聚焦边界：协议都在快速演进，不纠结具体字段，讲清「连工具 vs 连 Agent」这条职责线即可。\n参数怎么定 / 怎么验证：判断该用哪个——被集成方是无意图的能力端就 MCP，是有自主决策的对等体就 A2A；设计时画清边界，别把 Agent 间委派硬塞进工具调用语义里。",
            "协议仍在快速演进，回答聚焦职责边界。", ["A2A","MCP"]],
          ["如何对工具调用做审计？",
            "做法（每次 call 落一条结构化审计，既保安全又喂运营指标，秘密绝不入库）：\n1. 记录字段：{runId, user_id, tenant, tool_name, tool_version, args_digest(参数摘要/哈希非原文), permission_decision, started_at, ended_at, status, retry_count, approver}，跟 execute_tool 的 OTEL span 一一对应。\n2. 脱敏：密码/Token/密钥/PII 一律不记原文，参数只存摘要或脱敏后值；高敏字段哈希后存以便比对而不泄露。\n3. 防篡改 + 保留策略：审计日志写只追加存储（append-only / WORM），设保留期与访问控制，敏感操作日志单独留存更久。\n4. 双用途：安全侧用于追责与回溯越权；质量侧按 tool_name 聚合算成功率、P99 延迟、重试率，定位坏案例反哺评测集（如把高失败工具的失败形态沉淀成 trajectory 回归用例）。\n参数怎么定 / 怎么验证：先定「绝不入库」的秘密字段清单与脱敏规则，再定保留期（按合规）；用一条含密码的调用测试断言日志里查不到明文；按周看工具成功率榜，垫底的工具优先排查 Schema 或下游稳定性。",
            "不要完整记录密码、Token 等秘密。", ["审计"]]
        ]

{
  id: "rag", title: "RAG 数据、检索与生成",
  desc: "RAG 的难点不是连接向量库，而是数据质量、召回排序、权限时效以及可重复评测。",
  items: [
    ["描述一个完整的生产级 RAG 流程。",
      "做法（按离线建库 / 在线检索 / 评测闭环三条流水线说，每条都有可观测点）：\n离线侧：1. 解析（unstructured/PyMuPDF 拿标题层级+坐标+表格）→ 2. 清洗去重（按 SimHash/MinHash 去近重复，正文与导航页眉分离）→ 3. 结构化切片（350-500 token，挂 doc_id/标题路径/page/version/effective_date/acl 等 metadata）→ 4. Embedding（批量 batch_size=64，记录 model+dim+normalize 方式）→ 5. 建索引（pgvector/Milvus，HNSW m=16 ef_construction=128）→ 6. 版本管理（index 带 version tag，灰度切换不就地覆盖）。\n在线侧：1. 意图识别（是否要检索、走哪个 source）→ 2. Query Rewrite（消指代+拆子查询，保留原 query）→ 3. 权限/租户/时效 metadata 过滤（后端强制，WHERE acl @> ARRAY[user_role] AND effective_date<=now()）→ 4. 多路召回（BM25 关键词 + 向量各取 50 条）→ 5. RRF 融合（k=60）→ 6. Rerank（cross-encoder 取 Top-5）→ 7. 上下文构建（带来源标注）→ 8. 模型基于证据回答并输出引用。\n评测闭环：记录 query→召回 chunk→引用→用户反馈，回流 golden set。\n参数怎么定：每个阶段挂指标——离线看解析抽检合格率，在线检索看 Recall@5/MRR，生成看 Faithfulness/引用正确率；在 200-300 条标注集上做端到端回归，任一阶段拐点就是调参点。",
      "按数据、检索、生成、评测四层回答。", ["RAG"]],
    ["Chunk 应该怎么切？",
      "做法（先按文档结构切，再用 golden set 调长度，绝不拍一个 512 了事）：\n1. 先解析出结构树：Markdown 按 #/##/### 递归切，PDF 用 layout parser（如 unstructured / PyMuPDF）拿到标题层级、段落和坐标；代码块、表格、列表识别为整体，不在中间切断。\n2. 目标长度 350-500 token（中文约 500-800 字），用模型自己的 tokenizer 计数而不是字符数；相邻块 overlap 约 50 token（1-2 句），防止答案跨边界被切散。\n3. 按内容类型分策略：FAQ/事实型用 256-320 小块提精度；合同/流程等强上下文用父子块——子块 300 token 负责检索命中，父块（整节）负责回答时补全上下文。\n4. 每个 chunk 挂 metadata：doc_id、标题路径（如「第3章>3.2 退款规则」）、page、version、effective_date，供检索期过滤和回答期标注来源。\n参数怎么定：固定其它变量，在 200 条标注好的 query→相关 chunk 的 golden set 上扫 chunk_size∈{256,384,512} × overlap∈{0,50,100}，看 Recall@5 与上下文相关性的拐点取值；切完再人工抽查 30 个 chunk 是否「自身可读、含完整答案单元」，这是 RAG 召回上限的第一道关。",
      "切片策略由问题和文档结构决定。", ["Chunk"]],
    ["Chunk size 和 overlap 如何确定？",
      "做法（不存在通用值，用 golden set 扫出本数据集的拐点）：\n1. 建立可比基线：固定 embedding 模型、Top-K、rerank 不变，只动 chunk_size 与 overlap 两个变量，避免多变量混淆归因。\n2. 网格扫描：chunk_size∈{256,384,512,768} token × overlap∈{0,50,100} token，每组重建索引，在同一批 200 条 query 上跑。\n3. 看四条曲线一起取折中：Recall@5（召回率）、上下文相关性/Context Precision（精度，块越大越掺噪声）、p95 延迟、平均送入 token 数（直接影响成本）。一般 chunk 增大 Recall 先升后平、Precision 持续降，取 Recall 接近饱和而 Precision 还没塌的点。\n4. overlap 经验起点 = chunk 的 10%-15%（如 384 配 50），太大（>100）会让同一句话在多个块重复命中，浪费 Top-K 名额还放大重复证据。\n参数怎么定：把每组结果落一张表（chunk×overlap → Recall@5/Precision/latency_p95/avg_tokens），按「Recall 达标前提下 token 最省」选；FAQ 型偏 256-320，长流程/合同型偏 512+父子块。",
      "不要给一个适用于所有场景的固定数字。", ["Chunk"]],
    ["Embedding 模型如何选择？",
      "做法（用自己业务的正负样本评，不信公开榜单）：\n1. 候选清单按硬约束筛：语言/领域适配（中文选 bge-large-zh-v1.5 / m3e；多语言选 bge-m3；代码选 jina-code/voyage-code）、向量维度（384/768/1024，维度越高存储与检索越贵）、max input token、单价与延迟、是否需私有部署。\n2. 自建评测集：从真实日志抽 150-300 条 query，每条标 1 个以上相关 chunk（正样本）+ 若干强干扰负样本，计算 Recall@5/MRR/NDCG@10。\n3. A/B 对比：同一批 query 同一索引参数，只换 embedding，看指标差；中文、代码、多语言要分桶单独看，别用一个总分掩盖某语种崩盘。\n4. 落地三件套要对齐：确认模型推荐的距离度量（cosine/dot）与是否要 L2 归一化，pgvector 里相应建 vector_cosine_ops 或 vector_ip_ops 索引。\n参数怎么定：换模型几乎一定要重建索引（维度/分布都变），所以上线前用灰度 index version 双跑比指标；自建库我用本地 FastEmbed 384 维（mem0 那条线），是「够用且零外部依赖」的取舍，不是精度最优。",
      "中文、代码、多语言场景要分别测试。", ["Embedding"]],
    ["余弦相似度、内积和欧氏距离有什么区别？",
      "做法（先讲数学关系，再讲 pgvector 里具体怎么写）：\n1. 余弦 cos(a,b)=a·b/(|a||b|) 只看方向、不受模长影响，适合语义方向比较；内积 a·b 同时受方向和模长影响；欧氏 |a-b| 看空间绝对距离。\n2. 关键等价：向量做 L2 归一化（|a|=|b|=1）后，内积=余弦，且欧氏距离² = 2-2cos，三者排序完全一致——所以归一化后选哪个度量在排序上无差别，但内积计算最快（少一次开方/除法）。\n3. pgvector 写法：cosine 用 <=> 算子（返回 1-cos，越小越近，我这边统一转成 1-distance 当相似度）、内积用 <#> （返回负内积）、欧氏用 <-> ；建 HNSW 索引时算子类要匹配（vector_cosine_ops / vector_ip_ops / vector_l2_ops），度量和索引不一致会走不到索引。\n4. 务必跟随 embedding 模型的官方推荐：很多模型输出未归一化，直接用内积排序会被高频长文本（模长大）带偏。\n参数怎么定：拿不准就统一做归一化 + cosine，工程上最稳；想压延迟再切归一化+内积。面试若追问公式，写出 cos=dot/(norm·norm) 与归一化后 L2²=2-2cos 即可。",
      "面试可能继续追问归一化公式。", ["向量检索"]],
    ["pgvector、Milvus、Elasticsearch 怎么选？",
      "做法（按规模/已有基建/检索形态三条判据，不追新）：\n1. pgvector：数据量百万级以内、已经在用 PostgreSQL、要事务一致性 + 向量与业务字段在同一条 SQL 里 JOIN/WHERE 过滤（租户、acl、effective_date）。我这边知识库就走 pgvector，HNSW + cosine <=>，省一套独立向量库的运维。\n2. Milvus/专用向量库：千万-亿级、高 QPS、要 IVF_PQ/DiskANN 这类量化与分片、向量是绝对主体；代价是多一套集群 + 数据双写一致性问题。（注：我没有 Milvus 百万级实操，这是按场景的选型判断。）\n3. Elasticsearch：本来就要成熟全文检索/BM25、复杂聚合过滤、且想在一处做 Hybrid（dense_vector + BM25 + RRF 内建）；强项是关键词与运维生态，纯向量召回质量与吞吐不如专用库。\n4. 交叉判据：团队运维能力（多一个有状态集群=多一份 oncall）、一致性要求（要事务选 pg）、是否要 metadata 联查（强需求选 pg/ES）。\n参数怎么定：先估「向量条数 × 维度 × 4 byte」算内存盘，pg HNSW 默认 m=16 ef_construction=64 起、查询调 ef_search 平衡召回与延迟；规模翻 10 倍且 pg 召回 p95 撑不住再迁专用库，别一上来上 Milvus。",
      "没有绝对赢家，结合规模和现有基础设施。", ["向量库","选型"]],
    ["Top-K 如何确定？",
      "做法（召回 K 和送模型 K 分两个数，不是一个）：\n1. 召回阶段放大 K：向量 + 关键词各取 recall_k=30~50，宁可多召回让 rerank 去筛，召回阶段漏了后面救不回来。\n2. 重排压缩：cross-encoder rerank 后取 final_k=3~6 送进 prompt，事实型问答 3-4 足够，需要综合多来源的复杂问题给 6-8。\n3. 在验证集上找两个拐点：recall_k 看 Recall@K 曲线饱和点（再加候选 Recall 不涨就别加，纯浪费 rerank 算力）；final_k 看最终答案正确率/Faithfulness 拐点（加到一定数再加只会引入噪声拉低 Faithfulness）。\n4. 按查询类型动态调：单点事实 final_k 小、对比/汇总类 final_k 大；可用 query 长度或意图分类切档。\n参数怎么定：默认起点 recall_k=40、rerank→final_k=5；扫 final_k∈{3,5,8} 看答案指标拐点，同时盯送入 token（final_k×avg_chunk_tokens）控成本与上下文淹没风险。",
      "召回 K 与最终送入模型的数量可以不同。", ["Top-K"]],
    ["为什么需要 Rerank？",
      "做法（向量召回是粗筛，rerank 是精排，两阶段分工）：\n1. 为什么要：向量 ANN 为了快用近似最近邻 + 双塔独立编码，捕捉粗粒度语义，但对「query 与候选的细粒度交互、关键词硬约束、否定/条件」判断弱，前排顺序常常不对。\n2. 怎么做：cross-encoder（如 bge-reranker-large / Cohere rerank / jina-reranker）把 query 和每个候选拼成一对一起过模型打分，能建模交互，比双塔精；粗召回 30-50 条 → rerank 取 Top-5。\n3. 控成本：rerank 是 O(候选数) 次模型前向，延迟随候选线性增长，所以才要先用便宜的向量/BM25 把候选从全库压到几十条；候选>50 收益递减、延迟陡增。\n4. 明确边界：rerank 只重排已召回的候选，召回阶段就漏掉的文档它救不回来——召回低要先修召回（切片/embedding/hybrid），不是堆 rerank。\n参数怎么定：在 golden set 上比「向量 Top-5」vs「向量召回40→rerank Top-5」的 Recall@5/NDCG，rerank 一般能把相关文档往前排显著提 NDCG；延迟敏感场景可只对前 20 候选 rerank。",
      "Rerank 优化排序，不会找回完全没有召回的文档。", ["Rerank"]],
    ["什么是 Hybrid Search？",
      "做法（关键词召回 + 向量召回，用 RRF 融合两种不可比的分数）：\n1. 两路并行召回：BM25/全文索引擅长精确匹配（产品型号 IPX-200、错误码 E0501、人名、专有名词），向量擅长语义泛化（口语化、同义改写）；各取 Top-30~50。\n2. 分数不可直接比较（BM25 是无界正分、cosine 在 0-1），所以不要加权相加原始分，用 RRF：score(d)=Σ over 各路 1/(k + rank_i(d))，k=60 是论文与工程常用默认，rank 从 1 起；只看名次不看绝对分，天然消歧两套量纲。\n3. 实现：两路各自出有序列表 → 按 doc_id 合并算 RRF 分 → 再统一 rerank 取 final_k。\n4. 何时偏哪路：含强标识符/代码/精确术语的 query 关键词路权重更关键；纯自然语言问答向量路为主；hybrid 在两类混合的真实流量里几乎总比单路稳。\n参数怎么定：默认 RRF k=60、两路各 Top-50；想偏某一路就给该路 rank 乘权重（如 1/(k+rank)*w）。在 golden set 上对比单向量 vs 单 BM25 vs hybrid 的 Recall@10，hybrid 不优于最好单路就说明某路召回有 bug，先修再融合。",
      "需处理两种分数不可直接比较的问题。", ["Hybrid Search"]],
    ["Query Rewrite 解决什么问题？",
      "做法（把口语/省略/指代的脏 query 改成自包含检索 query，但保留原 query 兜底）：\n1. 解决三类问题：指代消解（「它的退款规则」→「商品X的退款规则」，要带入上文实体）、口语补全（「咋退」→「如何申请退款」）、复杂问题拆子查询（「A和B哪个便宜且支持退」→拆成 A 价格 / B 价格 / 退款政策三条分别召回）。\n2. 约束改写：prompt 里明确「只改写为检索友好表达，不得新增原文没有的业务约束/数字/产品名」，否则模型幻觉会让检索整体偏航。\n3. 多路保险：原 query 始终参与召回，与改写 query 的结果合并去重——防止改写错误直接打死召回。\n4. 时机控制：不是每轮都改，先做轻量判断（有指代词/过短/带上下文依赖才改），避免给简单 query 增加一次 LLM 延迟。\n参数怎么定：改写也要进 golden set 评——对比「原 query 召回」vs「改写+原 query 召回」的 Recall@5，涨了才保留；子查询数量限 2-4 条避免发散；改写错误（偏离原意）要作为 case 回流，约束 prompt。",
      "改写也要评测，不是越长越好。", ["Query Rewrite"]],
    ["HyDE 是什么？",
      "做法（HyDE=Hypothetical Document Embeddings，用假设答案的向量去检索）：\n1. 原理：让 LLM 先针对 query 生成一段假设性答案/文档（不求事实正确，求与真实文档同分布），用这段假设文本的 embedding 去检索真实库——解决 query（短、问句形态）与 doc（长、陈述形态）表达鸿沟导致的向量不对齐。\n2. 适用：query 与文档表达差异大、领域术语 query 写不全、零样本无标注数据微调 embedding 时；不适用：query 本身已含强精确标识符（型号/错误码），HyDE 反而稀释关键词。\n3. 控风险：假设答案可能带模型幻觉把检索带偏，所以与原 query 多路召回（原 query 向量 + HyDE 向量都召回再合并），并用 rerank 以真实 query 重新判定相关性，过滤被假设答案带歪的候选。\n4. 成本：每次检索多一次生成调用 + 多一次 embedding，延迟和 token 上去了，高频简单 query 不值得。\n参数怎么定：在 golden set 上对比「原 query 召回」vs「HyDE+原 query 召回」的 Recall@10，只在表达鸿沟明显的 query 类型上启用；可缓存 HyDE 文本与其 embedding 降重复成本。",
      "HyDE 改善表示，不代表假设答案可信。", ["HyDE"]],
    ["召回率很低如何排查？",
      "做法（固定顺序逐层证伪：数据存在性→索引→过滤→查询→度量配置→召回方式，别跳层）：\n1. 数据存在性：先确认正确知识确实进了库——直接按 doc_id/原文关键词在 DB 里 SELECT 看 chunk 在不在、内容完不完整；不在就是离线侧解析/入库漏了，后面都白查。\n2. 索引/切片：看命中的 chunk 是否包含完整答案单元（可能被切碎，答案跨了两个块都没召回）；确认 embedding 真的写进去了、维度对、HNSW 索引建了（EXPLAIN ANALYZE 看是否走索引还是全表扫）。\n3. 过滤误杀：临时去掉 metadata 过滤（acl/effective_date/tenant）重跑——如果去掉就召回了，是过滤条件写错或数据 metadata 不对，误杀了相关 chunk。\n4. 查询侧：原始 query 太口语/有指代时手动改写成自包含 query 重试；对比改写前后 Recall。\n5. 度量配置：确认 embedding 模型推荐的归一化/距离与库里建的算子一致（错配会让相似度排序整体失真）。\n6. 召回方式：分别跑纯关键词 BM25 / 纯向量 / hybrid，看哪路能召回——若只有 BM25 能召回说明向量/embedding 有问题，反之亦然。\n参数怎么定：用一批「已知相关 doc」的 golden query 逐层定位，每层只改一个变量并记录 Recall@5 变化；定位到层后再深入，避免一上来乱调 Top-K。",
      "顺序：数据存在性→索引→过滤→查询→模型。", ["排障"]],
    ["召回正确但最终回答错误，问题在哪里？",
      "做法（先把检索和生成解耦评测，确认锅在生成侧，再分五类归因）：\n1. 先解耦：单独算 Context Precision（召回的块是否真相关）和 Faithfulness（答案是否只依据给定证据）——Context Precision 高但答案错，说明检索 OK，问题在生成，别再调 Top-K。\n2. 证据被淹没：final_k 太大或 chunk 太长，关键证据被埋在长上下文中间（lost-in-the-middle），缩小 final_k 或把最相关证据排到首尾位置。\n3. 证据冲突：多个 chunk 互相矛盾，模型随机挑——按权威/版本/时间确定性排序，或在 prompt 里要求遇冲突显式提示。\n4. Prompt 缺约束：没要求「只依据证据回答 + 标引用 + 无依据则拒答」，模型用参数化知识自由发挥——加引用要求和拒答指令。\n5. 结构化字段被截断：表格/金额/日期被切碎或 token 截断，模型读到半截数据——检查 chunk 是否破坏了表格行列结构。\n参数怎么定：用 RAGAS 之类拆 Context Precision/Recall/Faithfulness/Answer Correctness 四个分，定位是检索问题还是生成问题；生成问题再 A/B 不同 prompt（带/不带引用约束）看 Faithfulness 提升。",
      "不要继续盲目调 Top-K。", ["生成质量"]],
    ["相似度很高但内容不相关，为什么？",
      "做法（相似度=向量空间接近，不等于业务相关，逐项排查表示层）：\n1. 通用高频词主导：query 和 chunk 都含大量停用词/通用词，向量被这些主导拉近——加 BM25 关键词路约束 + rerank 以交互判定真相关。\n2. Chunk 太大：一个大块掺了多主题，整体向量是平均语义，对任何 query 都「不太远」——切小到单一答案单元（256-384）。\n3. 领域语义不匹配：通用 embedding 不懂行业术语（把两个专业术语当近义）——换领域 embedding 或在领域正负样本上微调。\n4. 未按要求归一化：模型要求归一化却用了内积，长文本模长大被无脑排前——按模型推荐归一化 + cosine。\n5. query 信息不足：太短没有判别信息——Query Rewrite 补全或要求澄清。\n6. 近重复污染：库里有大量近似重复块挤占前排——离线 SimHash 去重。\n参数怎么定：抽 20 个「高相似低相关」case 看共性落在上面哪类；优先加 rerank（最快见效，用交互打分覆盖向量误判）+ metadata/关键词约束，再决定要不要换/微调 embedding。",
      "相似度是模型空间中的接近，不等于业务相关。", ["向量检索"]],
    ["如何处理时间、租户和权限过滤？",
      "做法（安全过滤必须前置到检索 SQL，由后端强制，绝不交给模型判断）：\n1. 入库即打标：每个 chunk 的 metadata 带 tenant_id、acl（可见角色/部门数组）、effective_date、expire_date、version。\n2. 检索层硬过滤：向量查询同一条 SQL 里 WHERE tenant_id=:tid AND acl @> ARRAY[:role] AND effective_date<=now() AND (expire_date IS NULL OR expire_date>now())——pgvector 支持 vector <=> 与普通 WHERE 同查，专用向量库则用其 filter 表达式；权限是 SQL 条件不是 prompt 提示。\n2.1 注意 HNSW 过滤召回：强过滤会让 ANN 候选不足，要么调大 ef_search/候选数，要么用 pre-filter 分区索引，避免过滤后召回塌陷。\n3. 时间作为 metadata：既能做范围过滤（只看生效中的），也能做排序特征（同等相关下更新优先），知识记录 version 支持回滚。\n4. 缓存键必含边界：kb_retrieve 的缓存 key 要包含 tenant/role/filter（我这边以 query+topK+filter+source 为键，10min TTL），否则 A 租户的缓存命中给到 B 租户=跨租户泄漏。\n参数怎么定：写一组「越权 query」回归用例断言不返回他租户/无权限 chunk；过滤后召回不足时把 recall_k 调大或建分租户子索引；权限模型变更要让相关缓存失效。",
      "安全过滤要尽量前置，不能检索后再遮盖。", ["权限","多租户"]],
    ["历史知识过期怎么办？",
      "做法（知识当带生命周期的资产管理，不是写入即永久）：\n1. 每条知识带治理字段：source、version、effective_date、expire_date、updated_at、owner（负责人）、review_status；这些既是过滤条件也是审计依据。\n2. 增量更新策略：新版本入库时同一 doc_id 的旧版本不就地删，而是置 superseded（降权或 expire_date=now()），保留可回滚与审计；彻底失效的硬删 + 从缓存/索引清掉。\n3. 检索期优先级：effective 且 updated_at 更新的证据排前（时间作为 tie-break 排序特征）；同一 doc 多版本只取最新有效版，避免新旧同时进上下文打架。\n4. 冲突显式化：发现新旧版本结论冲突时在回答里提示「以最新生效版本为准」而非静默选一个。\n5. 定期复核：高风险/高频知识挂 review 周期，用使用反馈（被引用后用户是否纠正）触发复核。\n参数怎么定：用「同一知识有 v1/v2」的回归用例断言只召回 v2；缓存 TTL 要小于知识更新频率（我这边 kb 缓存 10min），知识更新后主动失效相关缓存键，否则用户拿到旧答案。",
      "向量库不是写入后永不更新的档案馆。", ["知识治理"]],
    ["多个文档内容冲突怎么办？",
      "做法（冲突是知识治理问题，先确定性排序，不能让模型凭语言流畅度挑）：\n1. 确定性排序规则（优先级固定，可解释）：authority_level（官方文档>内部 wiki>工单结论）> version（新>旧）> effective_date/updated_at（新>旧）；排序在检索层完成，给模型的证据已带优先级标注。\n2. 同级无法判定时不替模型决策：把冲突证据都给模型，prompt 要求「检测到 N 条来源结论不一致时，并列呈现各来源并请用户确认或转人工」，不许自行挑一个流畅的。\n3. 单一答案场景去重：若业务要求唯一答案，按上面规则只取最高优先级版本进上下文，避免新旧同进自相矛盾。\n4. 可观测：Trace 里记录候选来源、采用了哪条/舍弃了哪条及原因（authority/version），事故可回溯。\n参数怎么定：给每个 source 配 authority_level 权重表（注册表里声明），在 golden set 里放「故意冲突」用例断言输出走的是高优先级来源或正确触发并列提示；高风险领域（金额/合规）强制并列+转人工而非自动选。",
      "冲突处理是知识治理问题，不只是 Prompt 问题。", ["冲突"]],
    ["如何防止错误工单污染知识库？",
      "做法（过程对话与最终知识分层，只让经审核的结论进高置信索引）：\n1. 不索引全量过程对话：从工单抽结构化字段——problem（问题现象）、environment（环境/版本）、root_cause（根因）、resolution（确认方案）、scope（适用范围/不适用条件）；中间试错、错误猜测不进知识层。\n2. 准入门槛：只有 status=closed 且 review_status=approved（人工或资深审核）的工单结论进高置信 index；未审核的进低置信/草稿区，不参与正式召回或显著降权。\n3. 治理 metadata：每条带 source(ticket_id)、version、review_status、confidence、feedback_count；错误知识可一键置 deprecated 快速下线（从索引/缓存清除）。\n4. 反馈闭环：被引用后用户纠正或差评的知识进回归集，复核后下线或修正，防止同一错误反复污染。\n参数怎么定：抽取用 LLM 按固定 schema 抽 + 人工抽检合格率门槛（如低于 90% 收紧 prompt）；低置信区与高置信区分两个 source / 加 confidence 过滤；下线动作要同时失效缓存。我这边「智能工单沉淀 QA」就是这条路——抽结论而非堆原始对话。",
      "过程记录和最终知识应分层。", ["工单","数据质量"]],
    ["如何衡量 RAG 效果？",
      "做法（分检索层 / 生成层 / 工程层三组指标，全部挂在人工标注业务问题集上）：\n1. 检索层：Recall@K（相关文档进没进 Top-K）、MRR（第一个相关文档的排名倒数）、NDCG@K（带位置权重的排序质量）、Context Precision（召回块里真相关的占比）。\n2. 生成层：Answer Correctness（答案对不对）、Faithfulness（答案是否只依据证据、有无幻觉）、引用正确率（标注的 source 是否真支撑该句）、覆盖率（要点答全没）、拒答准确率（无证据时是否正确拒答而非编）。\n3. 工程层：p50/p95 延迟、平均送入 token、单 query 成本，与质量一起看（别为了 +2% Recall 让延迟翻倍）。\n4. 拆分而非一个总分：总准确率掉了无法定位，按上面分项才知道是召回崩了还是生成崩了。\n参数怎么定：用 RAGAS/自建脚本算 Context Precision/Recall/Faithfulness/Answer Correctness 四件套，挂在 150-300 条人工标注集上做版本回归；每次只改一个变量比分项变化；把生产坏 case 持续回流扩充该集（我这边把真实事故沉淀成 eval 回归用例，step count/召回都列一等指标）。",
      "一个总准确率不足以定位问题。", ["评测"]],
    ["没有标准答案集时怎么做评测？",
      "做法（Golden Set 是逐步沉淀的资产，从真实日志冷启动）：\n1. 抽样来源：从生产 query 日志抽，优先覆盖高频（占流量大）、高风险（金额/合规/安全）、历史失败（用户差评/转人工）三类，而不是均匀随机。\n2. 标注内容：每条标 query + 相关 doc/chunk 列表（给 Recall/NDCG）+ 可接受答案/要点（给 Answer Correctness）+ 是否应拒答；由领域专家标，关键样本必须人工。\n3. LLM 辅助初标：用强模型先生成候选相关文档与参考答案，人工只做复核/纠正，降标注成本——但高风险样本不许只靠 LLM。\n4. 规模与版本：从 30-50 条冷启动（先能跑回归），迭代扩到 200-500 条；golden set 进 git 管版本，标注口径写评审指南保持一致，改了要记录 diff。\n5. 持续沉淀：每抓到一个线上坏 case 就剥离敏感数据加进集（保留失败形态），让评测集随业务演进。\n参数怎么定：先保证覆盖度而非数量——把流量按意图聚类，每类至少几条；用 inter-annotator 一致性抽查标注质量；评测集本身当产品资产维护，不是一次性脚本。",
      "Golden Set 是逐步沉淀的产品资产。", ["Golden Set"]],
    ["如何把准确率从 70% 提升到 85%？",
      "做法（先归因再优化，每次只动一个变量做固定集回归，不堆技术）：\n1. 失败分桶：把 30% 失败 case 按类型拆——缺知识（库里根本没有）、召回失败（有但没召回）、排序失败（召回了但没排进 final_k）、生成失败（证据够但答错/幻觉/没拒答），统计各桶占比找最大损失源。\n2. 对症下药：缺知识→补数据/扩文档源（最贵但有时最有效）；召回失败→优化切片+上 hybrid+Query Rewrite；排序失败→加 cross-encoder rerank、调 recall_k；生成失败→prompt 加引用/拒答约束、缩 final_k 防淹没、冲突排序。\n3. 单变量回归：每次只改一个变量，在固定 golden set（200+ 条）上跑，记录该变量对总分及各分项的影响，别同时上 rerank+换 embedding+改 prompt（出问题无法归因）。\n4. 守住成本/延迟护栏：每次优化同时看 p95 延迟和 token 成本，避免 +Recall 但延迟/成本爆掉。\n参数怎么定：按桶占比排优先级（先修最大桶），算每个优化的「指标增益/成本」性价比；维护一张变更日志（改了什么→各分项 delta→延迟成本 delta），用它讲清 70→85 是哪几步贡献的，而不是只报最终一个数。",
      "先归因，再优化；不要把所有技术一起堆上去。", ["优化"]],
    ["Agentic RAG 与普通 RAG 有什么区别？",
      "做法（普通=固定一次检索；Agentic=模型自主决策检索流程，但要硬护栏兜底）：\n1. 普通 RAG：query→（改写）→一次检索→rerank→回答，路径固定、可预测、便宜，适合单点事实问答。\n2. Agentic RAG：模型自主决定「要不要检索、查哪个 source、拆几个子查询、是否再查一轮验证、证据够没够」，是 ReAct/工具循环——适合多跳、跨源、需迭代验证的复杂问题。\n3. 代价与控制：每多一轮=多一次 LLM+检索的延迟和成本，且不确定性上升、可能进环。必须设硬护栏：max_retrieval_rounds（如 3）、source 白名单、停止条件（证据足够/达上限）、无进展检测（连续两轮检索结果无新信息则停）。\n4. 何时用：简单问答别上 Agentic（白白多花钱和延迟）；要综合多文档、需要根据中间结果决定下一步查什么时才上。\n参数怎么定：起点 max_rounds=3、每轮 final_k=5、加 step/round count 为一等评测指标（我这边把 71 步 Fibonacci 事故后 step count 列一等指标就是这教训）；用 trajectory eval 断言不超轮次、不重复无效检索；超预算 soft landing 让模型基于已有证据收尾而非死循环。",
      "简单问答不必使用 Agentic RAG。", ["Agentic RAG"]],
    ["父子索引有什么价值？",
      "做法（检索粒度与生成粒度分离：小块命中、父块补全）：\n1. 结构：父块=完整一节/一页（如 1500-2000 token），子块=父块内切的 300 token 小片；只对子块做 embedding 进向量索引，父块单独存（带 parent_id 关联）。\n2. 检索：用子块向量做精确匹配命中（小块语义集中、相似度判别强），命中后不直接送子块，而是按 parent_id 取回所属父块送进上下文——回答时拿到完整连贯上下文，避免答案被切碎在子块边界。\n3. 控父块大小：父块太大（>2000 token）会把命中点周围一堆无关内容也带进来重新引入噪声、挤占 token，按一节为单位而非整篇文档。\n4. 去重合并：多个子块命中同一父块时父块只取一次，避免重复送同一大段。\n参数怎么定：子块 300 / 父块按结构（一个 ## 小节）；在 golden set 上对比「直接送子块」vs「子块命中→送父块」的 Faithfulness/Answer Correctness，父子索引一般提连贯性和正确率但增 token，按 token 预算定父块上限；强上下文文档（合同/流程）收益最大，FAQ 型可不用。",
      "典型的检索粒度与生成粒度分离。", ["父子索引"]],
    ["如何处理表格、PDF 和图片文档？",
      "做法（解析质量决定 RAG 上限，按版面类型解析并保留结构，绝不暴力摊平）：\n1. 版面解析：用 layout parser（unstructured / PyMuPDF / Azure Document Intelligence）拿标题层级、段落、表格区域、页码坐标；不同元素分类型处理而非整页当纯文本。\n2. 表格：不要 flatten 成一行无结构文本——保留列名+行语义，转成 Markdown 表格或「列名:值」键值对，或每行单独成一个带表头上下文的 chunk；金额/日期等结构化字段确保不被 token 截断切碎。\n3. 扫描件/图片：先 OCR（含表格结构识别）拿文本；图表/示意图可用多模态模型生成视觉描述文本入库，或用多模态 embedding（CLIP 类）做图文检索；我这边工具管线对图片是「并发交视觉代理转文本 + 原始 data URL 存 metadata」，同思路——视觉转述进检索，原图留底。\n4. 来源可追溯：每个 chunk 保留 page、标题路径、表格定位，回答时能标到具体页/表。\n参数怎么定：对解析建抽样评测——随机抽 30-50 个表格/页人工核对解析合格率（行列对没对、标题挂对没），合格率不达标先修解析再谈检索；表格密集文档优先选带表格结构识别的 parser，别用纯文本提取器。",
      "文档解析质量通常决定 RAG 上限。", ["多模态","文档解析"]]
  ]

{
  id: "memory", title: "Context Engineering 与 Memory",
  desc: "长任务不是把上下文窗口塞满。真正可靠的设计，会区分消息、状态、摘要、记忆和原始事件。",
  items: [
    ["短期记忆和长期记忆有什么区别？",
      "做法（按生命周期/写入策略/读取方式三轴分开建模，不是一个向量库装两种东西）：\n1. 短期记忆 = 当前 thread 的工作上下文，存活范围 = 一个 thread：包括 message 序列（HumanMessage/AIMessage/ToolMessage 加 tool_call_id 链）、阶段摘要、task state（如未交付物 undelivered 标记）。它强顺序、强即时，由 checkpointer 每步持久化（我用 Aegra Checkpoint），重读直接拿全量。\n2. 长期记忆 = 跨 thread 的稳定事实/偏好/经验，存活范围 = user_id：走 mem0 + pgvector，写入是 fire-and-forget 后台 ADUN（Add/Update/Delete/No-op）去重，读取是按需 search（topK 5、cosine `<=>` 转 1-distance 排序），不全量带入。\n3. 关键区别在写入门槛：短期是「无条件全收」（对话本来就该完整记录），长期是「高门槛筛选」——只有未来可复用、稳定、用户授权的才进，否则积累噪声反而拉低召回。\n参数怎么定：短期窗口看 context_window 与 max_output 分开建模后剩余预算（别把 128K max_output 当窗口，会提前压缩）；长期写入门槛用一批正负样本扫「该记 vs 不该记」的判定准确率，看 precision 拐点，宁可漏记不可错记噪声。",
      "两者在生命周期、写入策略和读取方式上都不同。", ["Memory"]],
    ["Memory 与 RAG 有什么区别？",
      "做法（用数据归属和写入触发区分，而不是用「都用向量检索」一笔抹平）：\n1. 归属不同：RAG 检索的是组织级共享知识（文档/工单/QA），key 是 doc_id；Memory 检索的是 user_id 维度的私有历史与偏好，key 是 user_id——我两套都跑 pgvector，但索引和 namespace 完全隔离。\n2. 写入触发不同：RAG 是离线 ingest（解析→分块→embed→入库，文档变了才重建）；Memory 是在线 fire-and-forget，对话里抽取候选→ADUN 去重→后台写。\n3. 读取路径不同：RAG 走 kb_retrieve 联邦检索（按 provider 分数分组不混排，filter 与 source 声明求交集下发）；Memory 走 mem0 search 或每轮 build_turn_reminder 主动注入（并行 + 3s 预算 + 门槛）。\n4. 更新/遗忘不同：RAG 靠 version/effective_date 重建，旧版整体下线；Memory 靠 ADUN 的 Update/Delete 在条目级纠错，还要支持用户主动删。\n参数怎么定：判断一条数据该进 RAG 还是 Memory，先问归属——多用户共享且权威 → RAG；单用户私有且会变 → Memory；隐私敏感的（手机号/订单）哪边都要带 tenant 过滤且默认短 TTL。",
      "不要仅用存储技术定义二者。", ["Memory","RAG"]],
    ["Memory 应该存原始对话、摘要还是结构化事实？",
      "做法（三层各司其职、同时存，关键 ID 永远走结构化层而非自然语言）：\n1. 原始事件层：完整 transcript 留在持久化 checkpoint（Aegra），只用于审计、回放、从源头重新生成摘要——这是「单一事实源」，压缩永远不动它（我做 ephemeral compaction，压缩只改本轮 llm_messages）。\n2. 摘要层：阶段摘要用于低成本理解历史，进 llm_messages 省 token；但摘要会漏会幻觉，所以它只描述「发生了什么」，不承载可执行的精确值。\n3. 结构化事实层：order_id、file_path、tool_call_id、权限标记等存成结构化快照（kv 或 task state 字段），读取时按字段精确取，不靠模型从摘要里抠。\n4. 红线：业务 ID 和权限绝不能只活在自然语言摘要里——摘要一次幻觉就把订单号改了，结构化层是兜底。\n参数怎么定：哪些字段进结构化层，按「错了会造成副作用」筛——支付/外发/删除涉及的标识符全部结构化；纯叙述性的留给摘要。验证方法：构造一个「压缩后仍要用到 order_id」的 eval 任务，断言压缩后还能精确取回。",
      "原文、摘要、事实各有职责。", ["分层存储"]],
    ["如何判断信息是否值得进入长期记忆？",
      "做法（规则粗筛 + 模型抽取 + 三道门槛，写入比召回更要克制）：\n1. 规则粗筛：显式偏好句式（「我以后都用 X」「记住我是 Y」）和长期事实（角色/常用配置）直接进候选；一次性指令、寒暄、临时上下文直接丢。\n2. 模型抽取候选：让模型把对话抽成结构化 memory 候选（fact + 类型 + 关联实体），而不是整段塞。\n3. 三道门槛串联：去重（mem0 ADUN 先 search 近邻，命中相似就走 Update/No-op 不新增）→ 冲突检测（与已有事实矛盾就标冲突待解）→ 置信度门槛（低于阈值不写，未经用户确认的推断默认不写）。\n4. 写入是 fire-and-forget 返回 queued、后台执行（持强引用防 GC），定位 best-effort——所以宁可漏写也别写错，错的长期记忆比没有更糟。\n参数怎么定：用正负样本集扫置信度阈值看 precision/recall 拐点，目标是高 precision（少写错）；相似去重的距离阈值（cosine）同样在样本上扫，太松会重复积累、太紧会漏合并。",
      "写入比召回更需要克制。", ["写入策略"]],
    ["如何处理错误记忆和记忆冲突？",
      "做法（每条记忆带溯源四元组 + 冲突按优先级解、不盲目覆盖 + 可纠正可遗忘）：\n1. 每条记忆固定带 {source, timestamp, confidence, version}：source 区分用户明示 vs 模型推断，timestamp 给时间优先，confidence 给置信优先，version 单调递增便于回溯。\n2. 冲突解决优先级：用户明确确认 > 高置信新来源 > 时间更近——新事实与旧事实矛盾时走 ADUN 的 Update（把旧的标 superseded、version+1），而不是 Delete 后 Add 丢历史，更不是静默覆盖。\n3. 低置信冲突不自动定夺：标 conflict 状态，下次相关对话回问用户确认，确认后才提 confidence 并定版。\n4. 提供查看/修改/删除入口（用户能列出自己的 memory 并删），删除要同步主存储 + 向量索引 + 缓存。\n5. 闭环：每抓到一条错误记忆就剥成回归 eval 用例（如「旧偏好被新明示覆盖后是否生效」），进 baseline 门禁。\n参数怎么定：confidence 初值按 source 给（用户明示 0.9、模型推断 0.5），随被复用/被确认上调、随长期不用衰减；冲突判定的语义相似阈值在样本上扫，避免把「补充」误判成「冲突」。",
      "Memory 必须可纠正、可遗忘。", ["冲突"]],
    ["长对话超出 Context Window 怎么办？",
      "做法（两级压缩 + 关键状态外移 + 原始历史留底，绝不机械删最早消息）：\n1. 先把 context_window 和 max_output 分开算（我踩过把 128K max_output 当窗口导致提前压缩的坑），算出真实可用预算才决定何时压。\n2. Tier1（不调 LLM）：把旧的、大的、可再生工具结果 offload 到 Artifact——按 carve allowlist（DEFAULT_CARVE_TOOLS）只 carve 可重新拉取的结果，交付物/知识/Memory/subagent 结论不 carve；消息里留引用 + 预览。这步免费、无损语义。\n3. Tier2（用模型）：Tier1 还不够才摘要中间历史，且必须保留最近 human 边界（最后一条 HumanMessage 之后的轨迹完整留）；摘要失败退回 tail window 兜底。\n4. 关键事实和 task state 写结构化层、完整历史留 checkpoint 事件库，需要时再检索回来。\n5. 稳定性：按 thread 连续摘要失败 3 次触发 circuit breaker（进程内，重启丢——诚实标注：完整跨进程 breaker 是设计方向）。\n触发条件怎么定：Tier1 在 token 占用过预算（如 > 70%）或单条工具结果超大时触发；Tier2 在 Tier1 后仍超阈值时触发。压缩只改本轮 llm_messages（ephemeral compaction），持久 transcript 不动。",
      "上下文窗口变大也不代表应该全部塞入。", ["Context"]],
    ["滑动窗口和摘要压缩各有什么缺陷？",
      "做法（认清各自失效形态，用「结构化兜底 + 摘要可回溯重生成」绕开，而不是无限摘要套摘要）：\n1. 滑窗的缺陷：硬截最近 N 条会丢早期约束与依赖（如开头定的角色/格式约束、早期工具产出的 order_id）——后果是模型「失忆」违反早先规则。所以滑窗只能当摘要失败的兜底，不能当主策略。\n2. 摘要的缺陷：可能漏关键信息、可能幻觉；更糟的是递归摘要（对摘要再摘要）会累积误差，越摘越偏。\n3. 解法一：关键状态结构化外移（order_id/file_path/权限走结构化快照），摘要丢了也能从结构化层取回，不依赖摘要的准确性。\n4. 解法二：摘要引用原始事件 id，必要时从原始 transcript 重新生成摘要（我的原始历史永远留在 checkpoint），而不是在旧摘要上叠新摘要。\n5. 解法三：保留最近 human 边界，确保当前回合的指令永不被压掉。\n参数怎么定：摘要质量用 eval 验证——构造「早期约束需在很后面才生效」的多轮任务（turns），断言压缩后约束仍被遵守；递归层数设上限（如最多 1 层摘要 + tail），超了就回原文重生成。",
      "摘要不是可靠数据库。", ["压缩"]],
    ["压缩后如何保留工具调用依赖？",
      "做法（精确依赖走结构化快照、摘要只描述过程，恢复时从快照精确取值）：\n1. 工具结果 offload 到 Artifact 时，保留结构化快照而非只留一句摘要：{tool_call_id, 关键输出字段（order_id/file_path/url）, 下游引用, 副作用状态（如 已写库/已发送）}，消息里留引用 + 预览。\n2. 摘要层只写「调了什么工具、为什么、结果概况」，绝不承载可执行的精确值——精确值一律从结构化快照按字段读。\n3. carve 策略保证不丢关键依赖：交付物/知识/Memory/subagent 结论不进 carve allowlist（不被 offload），只 carve 可再生的大结果；即便 carve 了，引用 + 快照也能精确还原。\n4. 副作用幂等：快照里记 side-effect 状态，恢复后再次操作前先查快照避免重复执行（重复发送/重复扣款）。\n5. 必要时回原始事件验证：快照存疑就从 checkpoint 原始 ToolMessage 核对。\n参数怎么定：哪些字段进快照，按 contract golden 测试固定——断言 ToolResult artifact 的 key/type 形状稳定（忽略 id/时间/文案）；构造「压缩后下一步要用上一步 order_id」的 eval，断言精确取回成功，这是回归门禁项。",
      "精确依赖不能交给自然语言记忆。", ["工具依赖"]],
    ["如何设计上下文分层？",
      "做法（按层分配独立 token 预算 + 优先级，组装前去重裁剪，本质是信息预算管理）：\n1. 分层（从稳定到易变）：系统/策略层（system prompt + 工具定义，做 prompt cache 稳定前缀）→ 当前 task state → 阶段摘要 → 最近消息（含 human 边界）→ 按需召回的长期记忆 + 外部知识（kb_retrieve/build_turn_reminder）→ 动态 env/reminder。\n2. 缓存友好排布：稳定内容放前缀（命中 prompt cache），动态 env/时间/turn reminder 放尾部，避免每轮 cache 失效；Tool Registry 确定性排序也是为了 cache 命中 + 可重复测试。\n3. 每层独立预算 + 优先级：超总预算时按优先级裁——先砍可再生工具结果（Tier1 offload）、再摘要中间历史（Tier2），系统层和当前任务状态最后动。\n4. 组装前去重：同一事实在记忆和知识里都召回时合并；主动注入（build_turn_reminder）按门槛过滤（team 0.45 / tickets 0.5），低分不注入避免占预算。\n参数怎么定：各层预算按总窗口比例分（如系统层固定、最近消息留足、召回层给上限 N 条），在 eval 上调每层占比看 passed/token/cost 的性价比拐点——多塞召回若不提升 passed 就是浪费预算。",
      "Context Engineering 本质是信息预算管理。", ["Context Engineering"]],
    ["如何做多租户 Memory 隔离？",
      "做法（隔离条件服务端生成、绑真实身份，缓存键和向量索引都带租户边界，不靠模型自觉）：\n1. 读写都强绑服务端身份：mem0 的 add/search 都从 ToolExecutionContext 取 user_id（不接受模型/前端传入的 id），匿名走固定 bucket 映射——过滤条件在服务端拼，模型无权改。\n2. 存储层物理/逻辑隔离：pgvector 检索 where 强制带 user_id（行级），租户规模大时可按 tenant 分索引/分表物理隔离。\n3. 缓存键带租户边界：kb_retrieve 的 Redis 缓存 key = (query, topK, filter, source) 还要含 user/tenant，否则会串户（A 命中 B 的缓存）。\n4. 日志脱敏 + 删除/保留：日志里敏感字段脱敏；提供按 user 全量删除（同步主存储 + 向量索引 + 缓存），保留期到自动清。\n5. 红线：绝不在 prompt 里写「只看 tenant X 的数据」指望模型遵守——隔离必须在检索层 where 条件硬切。\n参数怎么定：写一个跨租户串扰 eval（A 的 query 断言绝不召回 B 的 memory），并验证缓存 key 含租户后命中率与隔离都正确；保留周期按数据类型设 TTL（见遗忘题）。",
      "不能依赖模型在 Prompt 中遵守租户边界。", ["多租户","隐私"]],
    ["长期记忆如何做遗忘和衰减？",
      "做法（按类型设 TTL + 置信度随时间衰减 + 删除同步清三处，遗忘也是能力）：\n1. 按数据类型分 TTL：稳定偏好/角色无 TTL 或很长（如 1 年）；任务态/临时事实短 TTL（如 7 天）；隐私敏感（订单/手机号）最短并默认到期清。\n2. 衰减而非硬删：confidence 随时间和「最近是否被复用/被确认」衰减——长期不命中的条目分数降低，检索排序自然沉底；被再次确认则回升。\n3. 复用信号驱动保留：每次 search 命中且被采纳就刷新 last_used 并小幅提 confidence，实现「用进废退」。\n4. 删除要原子清三处：主存储 + 向量索引 + Redis 缓存一起删，漏一处会出现「删了还能搜到」的幽灵记忆。\n5. 合规：删除后保留审计元数据（谁在何时删了某 id）而非内容副本，满足可追溯又不留数据。\n参数怎么定：TTL 和衰减半衰期在数据上调——看「过期清理后 precision 是否上升、有用记忆是否被误清」；衰减曲线（如指数 half-life）的半衰期按类型分别设，临时态衰减快、偏好衰减慢。",

      "做法（先按单任务成本分布找高成本失败任务，再砍上下文/路由/缓存，不只盯总账）：\n1. 上下文瘦身（最大头）：两级压缩——Tier1 把旧的可再生大工具结果 offload 到 Artifact（carve allowlist，交付物/知识/Memory/subagent 结论不 carve），消息只留引用 + 预览，不调 LLM 零成本；Tier2 才用模型摘要中间历史并保留最近 human 边界。这直接砍掉每轮重复喂的历史 token。\n2. 缓存：prompt 稳定前缀（系统提示 + 工具定义，Tool Registry 确定性排序保证前缀稳定）做 prompt cache，动态 env/reminder 放尾部不破坏缓存；kb_retrieve 结果 Redis 缓存 10 min（query/topK/filter/source 为键）。\n3. 按需加载：tool_search 基于名称描述发现工具，不把全部工具 schema 一次性塞进上下文；简单任务路由小模型（见模型对比的路由表）。\n4. 循环兜底：max_steps + deadline + stuck detector，防 71 步 Fibonacci 那种循环烧 token；工具大结果 Artifact 化不进上下文。\n参数怎么定：把每任务 cost 画成分布，盯长尾——高成本往往不是正常任务而是循环/反复检索的失败任务，优化它们比压平均更值；缓存 TTL 按数据新鲜度定（检索 10 min）；context_window 与 max_output 分开建模（曾把 128K max_output 误当窗口导致提前压缩、反而多花钱）。"
      ,
      "成本常与循环、上下文和模型路由有关。", ["成本"]],
    ["如何优化端到端延迟？",
      "做法（先拆关键路径分段计时，再并行无依赖步骤 + 缓存 + 流式改体感，不牺牲权限校验）：\n1. 分段测量：首 token / 检索 / 模型 / 工具 / 网络各记一段（OTEL span 已分节点），找出真正的瓶颈段再优化——不要凭感觉优化。我曾把「客户端 8s 加载」根因定位到沙箱文件面板 exec 争用而非网络，就是靠分段。\n2. 并行无依赖步骤：工具编排区分 safe 可并行 / 非 safe 独占，safe 工具用并发跑；多 source 知识注入 build_turn_reminder 并行检索 + 3s 预算（超时降级而非卡死）。\n3. 缓存与预热：prompt 稳定前缀 cache；sandbox warmup 只对标记过用沙箱的 thread，在模型思考期异步 warm，把冷启藏在 LLM 延迟里（warm exec 实测约 0.3s）；分享页外壳缓存 60s TTL 省 meta 往返。\n4. 减串行 + 流式：能合并的多次模型调用合并；流式 SSE 让用户先看到 token 改善体感（即使总时长不变）；LLM retry 全耗尽返回 AIMessage 让 SSE 闭合，前端不卡 thinking。\n参数怎么定：盯 P95/P99 不只 P50（尾延迟决定体感）；每个并行/缓存优化加超时降级预算（注入 3s、列目录超时降级），宁可降级也不卡死；底线是权限检查（图级 HITL interrupt、pipeline 动态权限 fail closed）和结果验证不能为了快跳过。"
      ,
      "先测量关键路径，再优化。", ["性能"]],
    ["如何设计线上 A/B 测试？",
      "做法（按 user/session 稳定分桶而非按单条消息，主指标 + 护栏指标 + 最短观察期，高风险先影子）：\n1. 分桶单位是用户或会话不是消息：Agent 多轮且有跨轮学习/记忆效应（mem0 会写入历史），按单条消息随机分组会让同一会话横跨两个变体造成跨轮污染，结论失真。用 user_id hash 取模稳定分桶，保证同一用户始终一个变体。\n2. 可比性校验：分桶后核对两组的知识库版本、权限分布、业务类型分布一致（用 trace 维度对比），不一致就重新分桶或分层，否则是混杂变量。\n3. 指标分层：主指标（任务成功率）+ 护栏指标（成本、P95 延迟、接管率、安全事件——护栏退化即使主指标涨也要停）；定义最短观察周期到统计显著（按基线方差和最小可检测效应反算样本量）。\n4. 高风险先影子：删数据/外发类操作不直接 A/B，先影子流量旁路跑新变体只记录不执行，对比决策分布安全后再灰度。\n参数怎么定：样本量按主指标基线 + 期望提升用功效分析反算（避免过早下结论）；观察期至少覆盖一个完整业务周期消除日内/周内波动；护栏阈值用线上红线（如成本上浮 >X%、接管率上浮 >Y pp 自动叫停），保留按桶快速回滚。"

{
  id: "frontend", title: "流式交互与 Agent 前端",
  desc: "Agent UI 不只是打字机效果。它要准确表达任务、工具、审批、错误、恢复和用户控制权。",
  items: [
    ["SSE 与 WebSocket 如何选择？",
      "做法（按通信模式选，Agent 对话默认 SSE + 独立控制 HTTP 接口，不要为了「实时」上 WS）：\n1. 默认 SSE：单向 server→client、纯文本/事件流，走普通 HTTP/1.1 或 h2，content-type text/event-stream、Cache-Control no-cache、Connection keep-alive；浏览器原生 EventSource 自带断线重连 + Last-Event-ID，基础设施（CDN/反代/防火墙）对它兼容好，不必握手升级。\n2. 控制信令（取消、审批 resume、点赞）走独立 POST 接口，不复用流连接——SSE 本身没有客户端→服务端通道，硬塞会把架构搞复杂。\n3. 上 WebSocket 的判定：需要双向高频小消息（语音 ASR、多人协同光标、客服双向输入态）、或单连接要同时跑多路双向 RPC 时才用 WS；代价是要自己实现重连退避、心跳 ping/pong、断线补发，浏览器不给你兜底。\n4. SSE 的硬约束记住两条：HTTP/1.1 下同域 6 连接上限（用 h2 多路复用绕过，或合并到一条流按 runId 分区）；反代必须关 buffering（nginx proxy_buffering off / X-Accel-Buffering: no）否则增量被攒着一次性吐出，打字机变「卡顿块」。\n参数怎么定 / 怎么验证：先按「是否需要 client→server 实时通道」一刀切——纯 Agent 回答类 99% 是 SSE；用 curl -N 直连看首字节延迟（TTFB）和增量是否逐条到达来验证 buffering 没生效，再上浏览器。我在 agent-server 里聊天流就是 SSE（Aegra 承载 AG-UI 流式），取消/审批是独立 HTTP 接口，验证过 nginx 反代要显式关 buffer 才不抖。",
      "传输方案由通信模式决定，不是性能口号。", ["SSE","WebSocket"]],
    ["AG-UI 与 SSE 是什么关系？",
      "做法（分清「事件语义层」和「传输层」两件事，AG-UI 是前者、SSE 是后者，可任意组合）：\n1. AG-UI 定义的是 Agent↔前端交换哪些结构化事件及其字段语义：run 生命周期（run_started/run_finished/run_error）、文本增量（text_message_start/text_message_content/text_message_end）、工具调用（tool_call_start/tool_call_args/tool_call_end/tool_call_result）、状态快照与增量（state_snapshot/state_delta，delta 用 JSON Patch RFC6902）。它不规定字节怎么传。\n2. SSE 只是承载通道：把每个 AG-UI 事件序列化成 JSON，按 SSE 帧格式发——event: <type>\\ndata: <json>\\nid: <sequence>\\n\\n；前端 EventSource 收到后 JSON.parse 再按 type 路由。换成 WebSocket 也能传同一套事件，语义不变。\n3. 为什么要这层分离：前端按事件类型更新不同视图（文本 reducer 拼字、工具行 upsert、state 视图打 JSON Patch），而不是解析一个混在一起的字符串协议；后端换传输（SSE→WS）或换 Agent 框架（LangGraph→别的）时，前端事件处理逻辑不动。\n4. 落地要点：AG-UI 的 text/tool 事件天然带 message_id / tool_call_id，正好做 reducer 的主键（见去重那题）；state_delta 用标准 JSON Patch 而非自定义 diff，前端用现成 fast-json-patch 应用，省得双方手写合并。\n参数怎么定 / 怎么验证：用 contract golden test 锁死「事件序列的形状」——固定一组输入跑出事件流，断言 type 序列和关键字段 key/type 形状（忽略 id/timestamp/文案），后端改实现时这套测试挡住协议漂移。我在 agent-server 做过 contract golden（固定 ToolResult artifact 的 key/type，忽略 id/时间/文案），同思路可覆盖 AG-UI 事件流。",
      "一个是事件语义，一个是传输通道。", ["AG-UI","SSE"]],
    ["流中如何表达文本、工具调用和错误？",
      "做法（统一事件 Envelope，所有事件同一信封 + type 区分，绝不把内容拼成一个裸字符串协议）：\n1. Envelope 字段固定为 {type, runId, messageId, sequence, timestamp, payload}：type 是事件类型枚举；runId 标识本次运行（断线重连/取消按它定位）；messageId 标识某条助手消息（文本增量按它累加，不靠数组末项）；sequence 是该 run 内单调自增整数（去重排序的依据）；timestamp 是服务端发出毫秒时间戳（算延迟/排错）；payload 放该类型专属数据。\n2. 事件类型枚举：run_started（payload: {threadId, model}）、text_delta（{messageId, delta}）、message_end（{messageId, finishReason}）、tool_started（{toolCallId, name, argsPreview}）、tool_args_delta（{toolCallId, deltaJson} 流式拼参数）、tool_finished（{toolCallId, status, resultSummary, artifactRef?}）、state_updated（{patch} JSON Patch）、approval_required（{interruptId, action, params}）、error（{code, message, retryable}）、cancelled（{reason}）、run_finished（{status, usage}）。\n3. 前端按 type 分发到不同 reducer/视图：text_delta 走文本累加器（key=messageId）、tool_* 走工具行表（key=toolCallId）、state_updated 打 JSON Patch、error/cancelled 收尾 UI。一个 switch(type) 即路由，不用正则切字符串。\n4. error 一定带 retryable 和 code，前端据此决定是「自动重连」还是「展示给用户让其重试」；run_finished 带 usage（token/cost）供前端展示与对账。\n参数怎么定 / 怎么验证：sequence 用服务端单调计数器（每个 run 从 0/1 起），timestamp 用服务端时钟（别用客户端，避免时钟漂移）。验证时把一条真实流录下来逐帧断言：每个 text_delta 都有 messageId、sequence 连续无跳号、最后必有 run_finished 闭合——这条「流必闭合」是前端不卡在 thinking 的前提。我在后端约定 LLM retry/fallback 全耗尽也返回 AIMessage（让流正常闭合），就是为了保证 run_finished 一定发出。",
      "不要把所有内容混成一个字符串协议。", ["事件协议"]],
    ["用户点击停止生成，前后端如何处理？",
      "做法（关浏览器连接 ≠ 取消任务；取消必须是从控制接口显式传播到模型流/工具/子任务的信号）：\n1. 前端立刻进入 stopping 态（按钮置灰 + 文案改「正在停止」），并发 POST /runs/{runId}/cancel（独立接口，不依赖 SSE 通道）；UI 先乐观停字，但终态以后端 cancelled 事件为准。\n2. 后端按 runId 找到该 run 的 cancellation_token 置位 + 对应 asyncio.Task 调 task.cancel()；模型流侧直接 close 掉上游 provider 的 httpx/aiohttp 响应流（停止读取即停止计费累加），自建 vLLM 则 abort(request_id) 把序列移出调度队列与 KV Cache。\n3. 工具/子任务 cooperative cancel：长循环里周期检查 token.is_set()，并在 finally 里关沙箱/文件/连接释放资源（CancelledError 必须在 finally 兜底，否则取消反而泄漏）；子任务共享同一 token 向下传播。\n4. 写终态 + 通知：DB 标 status=cancelled，Checkpoint 存到取消点，发 cancelled + run_finished 事件让前端从 stopping 落地。\n5. 不可取消的副作用（已发出的写操作、已发的通知）只能阻止后续步骤，区分 cancelled / partially_completed 并用幂等键处理半完成态，UI 如实告知「已停止，X 已执行无法撤销」。\n参数怎么定 / 怎么验证：取消请求要幂等（重复点不报错）；前端给个 stopping 超时兜底（如 5s 没收到 cancelled 就强制本地落地 + 后台轮询 DB 校正）。我的 BackgroundTaskRunner 已有 cancel event、Task.cancel 和 terminal 状态落库；主 Agent 流的 abort 是否一路下传到上游 provider 要按当前实现说——后台取消机制是已落地证据，provider 级 abort 是下一层要补的。",
      "关闭浏览器连接不等于取消后端任务。", ["取消"]],
    ["断线重连后如何恢复输出？",
      "做法（恢复靠服务端事件日志补发，而不是重新跑模型；前端记游标、服务端按游标续发）：\n1. 服务端给每个 run 的事件分配单调 sequence，并短期持久化最近事件（Redis List/Stream，按 runId key，TTL 如 600s，或保留最近 N=500 条）；这是断点续传的事实源。\n2. 前端持久化「最后确认的 sequence」（或 EventSource 的 lastEventId）；断线后 EventSource 自动重连并在 Last-Event-ID 头带上它，或自建流时拼 ?after=<seq> 游标。\n3. 服务端按游标补发：从 lastSeq+1 开始把缺失事件按序回放，再接上实时流；若 run 仍在跑则继续订阅，若已结束则直接返回最终状态快照（state_snapshot + 完整助手消息）一次性补齐，省得逐条回放。\n4. 边界处理：游标超出保留窗口（事件已过期）时，降级为下发完整 state_snapshot（当前全量状态）而非报错；前端收到 snapshot 就用它覆盖本地状态作为基准，再继续增量。\n参数怎么定 / 怎么验证：保留窗口 TTL/条数按「最坏断网时长 × 事件速率」估（如 10 分钟 × 几条/秒 → 600s 或 500 条起步，看内存压力调）。验证：人为 kill 连接再重连，断言不丢字不重字（结合 sequence 去重）、且 run 结束后重进页面能拿到完整最终态。诚实边界：我做了基于 DB 终态 + 轮询的恢复（后台任务重进页面按 runId 查状态/结果），但「事件级 SSE replay 日志」是设计方案、尚未实战，会如实区分。",
      "恢复需要事件日志，不只是重新请求模型。", ["断线恢复"]],
    ["如何避免重复消息与乱序？",
      "做法（用 id + sequence 做幂等 reducer，状态按 messageId/toolCallId 定位，绝不靠数组最后一项）：\n1. 前端按 runId 分区维护已处理 sequence 的水位（lastSeq）和已见 id 的集合；收到事件先查重：sequence <= lastSeq 或 id 已见过 → 直接丢弃（重连补发会带来重复，这步是关键）。\n2. reducer 伪代码：function reduce(state, ev) { if (seen.has(ev.id)) return state; seen.add(ev.id); if (ev.sequence === lastSeq + 1) { state = apply(state, ev); lastSeq++; drainBuffer(); } else if (ev.sequence > lastSeq + 1) { buffer.set(ev.sequence, ev); } return state; }——按序应用，乱序的暂存进 buffer，等中间的补齐后 drainBuffer 连续刷出。\n3. 文本累加严格按 messageId：state.messages[messageId].text += delta，而不是 push 到末尾再拼——并行/交错的多条消息才不会串台。\n4. 工具状态按 toolCallId upsert：tools[toolCallId] = {...tools[toolCallId], ...patch}，同一工具的 started→args→finished 都更新同一行，乱序到达也能合并。\n5. 长时间等不到缺号事件（如等待窗口 2-3s 超时）就主动拉一次 state_snapshot 校正，而非无限等。\n参数怎么定 / 怎么验证：buffer 等待超时按网络抖动设（2-3s 起）；seen 集合按 run 结束清理防内存涨。验证：mock 一段乱序+重复事件流灌进 reducer，断言最终 state 与有序无重时一致——这正是并行工具调用场景最容易出问题的地方，要专门造乱序用例。",
      "并行工具调用时尤其重要。", ["幂等","顺序"]],
    ["Markdown 流式渲染为什么会抖动？",
      "做法（抖动来自「未闭合结构反复重排」+「每 token 一次 React 渲染」，从批量 flush + 增量解析两头治）：\n1. 批量缓冲 token：把 text_delta 攒进 buffer，用 requestAnimationFrame 或固定节流窗口 30-80ms flush 一次（再用 startTransition 让渲染可中断），把「每 token 渲染」降到「每帧渲染」，CPU 和重排骤降。中文/英文都按这个窗口，太短没省到、太长打字感变迟钝。\n2. 增量/容错解析：用支持流式的解析器（如 streaming-markdown / markdown-it 配合容错），对「未闭合结构」做预处理——检测到奇数个代码围栏（三个反引号）时，把当前未闭合代码块临时按纯文本/pre 渲染，等闭合事件到了再切回高亮，避免半截代码块触发整页重排。\n3. 表格/列表同理：未出现行分隔或下一项前，先按纯文本占位，识别完整一行/一项再升级为表格/列表节点，减少 DOM 结构频繁切换。\n4. 减少 React 工作量：渲染后的 Markdown 用 memo / 稳定 key 缓存已完成段落（已 message_end 的消息不再重渲），只让「正在生成的最后一段」参与高频更新；代码高亮（如 shiki）放 message_end 后做一次，流式期间不每帧高亮。\n参数怎么定 / 怎么验证：flush 窗口 30-80ms 内扫，用 React Profiler / Performance 面板看每秒渲染次数和长任务（目标无 >50ms 长任务、帧率稳定）从而定窗口；用一段含代码块/表格的长流回放，肉眼+Profiler 验证不抖。优化的是渲染频率和解析策略，不是关掉流式。",
      "优化渲染频率和解析策略，而非关闭流式。", ["Markdown","性能"]],
    ["如何处理不完整 JSON 或 Tool Call 参数？",
      "做法（执行边界严格卡在「工具参数完整」之后；流式期只给状态提示，不拿半截 JSON 当数据）：\n1. 流式拼参数阶段（tool_call_args / tool_args_delta），前端 UI 只显示「正在准备参数…」+ 工具名，不解析、不展示半成品 JSON，更不触发执行；后端把 delta 累积到 buffer。\n2. 后端收到 tool_call_end（参数完整）才做 Pydantic/JSON Schema 校验：解析失败或校验不过 → 走异常收敛返回结构化 error（带可读原因），让模型下一轮自我修正，绝不把未闭合 JSON 喂给工具。\n3. 前端若确实想流式预览参数（如展示「正在写文件 path=…」），用结构化事件（后端把已确定的字段做成键值事件单独发），或用容错的 partial-JSON 解析器（如 best-effort streaming JSON parser）只读已闭合的顶层键，且明确标注「预览，未最终确定」。\n4. 校验通过才进统一 execute_tool Pipeline（参数校验→业务校验→权限→执行→结果收敛），执行点之前任何环节失败都 fail closed（拒绝执行）而非带着脏参数跑。\n参数怎么定 / 怎么验证：校验用工具自身的 Pydantic 模型（单一事实源），错误信息要含字段名和期望类型供模型修正。验证：构造「参数中途断流」「JSON 缺右括号」的事件序列，断言前端不执行、后端返回可读 error、模型能据此重试。我在 agent-server 的 execute_tool Pipeline 就是参数校验前置 + 异常收敛 + 错过权限点 fail closed deny。",
      "执行边界必须在参数完成之后。", ["Tool Call"]],
    ["多个工具并行执行时前端如何展示？",
      "做法（以 toolCallId 为主键渲染独立任务行，每行独立状态机，绝不让并行事件去覆盖同一个「正在思考」）：\n1. 数据结构：tools 是个 Map<toolCallId, {name, status, argsPreview, resultSummary, artifactRef, startedAt, finishedAt}>，所有 tool_* 事件按 toolCallId upsert 到对应行——并行工具天然各占一行，互不覆盖。\n2. 每行状态机：pending（已声明未跑）→ running（tool_started）→ success / failed（tool_finished.status）→ retrying（重试事件回到 running）；UI 给每态对应图标/颜色，failed 提供「重试」「查看错误」。\n3. 顶部总体阶段展示真实聚合（如「3 个工具：2 成功 1 运行中」）或当前活跃工具名，不要伪造一条线性进度条假装单线程顺序——并行场景下线性进度是骗人的。\n4. 结果展示分层：长结果（artifactRef 指向大结果）默认折叠成 resultSummary 一行，点开才拉全文/证据；图片类结果走视觉转述文本 + 原图引用（tool role 不能带 image block）。\n5. 排序稳定：按 startedAt 或确定性顺序排行，避免事件乱序导致行跳动（结合 toolCallId 做稳定 key）。\n参数怎么定 / 怎么验证：用 toolCallId 做 React key 保证行不复用错乱；并行上限与后端编排一致（safe 工具可并行、非 safe 独占）。验证：mock 两个工具交错的 started/finished 事件，断言两行各自推进、互不串台。我后端有工具并发编排（区分 safe 可并行 / 非 safe 独占 + max concurrent）与大结果 Artifact 化，前端正好按 toolCallId 分行对接。",
      "不要让并行事件覆盖同一个「正在思考」状态。", ["并行 UI"]],
    ["页面关闭后 Agent 如何继续运行？",
      "做法（任务生命周期与 HTTP 连接生命周期解耦；长任务交后台任务系统持有，前端按 runId 重新订阅）：\n1. 长任务不依附浏览器连接：提交即落库（status=queued）并由后台 Runner（asyncio Task）执行，连接断了任务照跑；DB 是 queued/running/progress/terminal 的事实状态源，Redis Pub/Sub 只做实时事件（断了可降级轮询 DB）。\n2. 前端重进页面：用 runId / threadId 查当前状态——仍 running 就重新订阅事件流（接断点续传），已 terminal 就拉最终结果快照。用户可选「继续看」或「取消」。\n3. 结果送达保证：终态结果先标 undelivered，下一轮对话（call_model）注入一次后标 delivered，确保用户哪怕错过了实时流也能在下次看到产出（避免「交付物没送达」）。\n4. 短对话也要明确语义：约定「连接断开是否=取消」并告知用户——短问答可设连接断即取消省资源，长任务则不取消。\n5. 重启边界：进程重启时把没有 Runner 在跑的 queued/running 标 interrupted（不跨进程续跑），UI 显示「已中断，可重试」而非假装在跑。\n参数怎么定 / 怎么验证：心跳/进度按任务粒度写 DB（如每步或每若干秒）供轮询。验证：发起长任务→关页面→重开，断言能查到状态并拿到结果。我的 BackgroundTaskRunner（DB 终态 + Redis 实时事件 + undelivered→delivered 注入）是已落地证据；「跨进程续跑」诚实标注为未做（重启标 interrupted）。",
      "HTTP 连接生命周期与任务生命周期分离。", ["后台任务"]],
    ["高并发 SSE 如何避免连接耗尽？",
      "做法（异步非阻塞 + 心跳/超时/上限 + 跨实例 Broker 分发，每条连接别背巨大上下文）：\n1. 用异步服务器（FastAPI/uvicorn + asyncio），一个 worker 靠事件循环扛大量 idle 长连接（连接多但多在等），不要每连接一线程；进程数按 CPU 定，连接靠 async 撑。\n2. 心跳保活：每 15-30s 发一个 SSE comment（: ping\\n\\n）或空事件，防中间代理/LB 把 idle 连接掐断；同时设空闲超时（如 60-120s 无活动且非运行中则关）回收僵尸连接。\n3. 连接上限与清理：按用户/IP 限同时连接数（如每用户 3-5 条），单实例设全局上限并在到顶时 503 + Retry-After；客户端断开（asyncio CancelledError / request.is_disconnected）立即清理订阅、退订 Pub/Sub、释放 buffer，避免泄漏。\n4. 跨实例分发：多副本时事件不能只在产生它的进程内——用 Redis Pub/Sub（或 Stream）做 Broker，按 runId channel 广播，任意实例上的订阅连接都能收到；这样连接落在哪个 pod 都能拿到事件。\n5. 代理层配合：关 SSE 路由的 buffering（nginx proxy_buffering off / X-Accel-Buffering: no）、proxy_read_timeout 调大于心跳间隔、HTTP/2 提升多路复用绕开 6 连接上限。\n参数怎么定 / 怎么验证：心跳 15-30s 取「小于最严格中间层 idle 超时的一半」；连接上限按内存预算反推（每连接常驻字节 × 上限 < 安全内存）。监控活跃连接数、发送队列积压、每连接内存。诚实边界：1000 QPS / 完整压测我没实测过，以上是工程默认值与方法；Redis Pub/Sub 做实时事件分发我已落地（BackgroundTaskRunner），高并发 SSE 调优为设计/经验值。",
      "不要在每个连接中持有巨大上下文。", ["SSE","高并发"]],
    ["如何实现前端乐观 UI？",
      "做法（低风险交互乐观、高风险动作等确认；本地先占位 + clientMessageId，服务端确认再对账）：\n1. 发消息即乐观：用户点发送立刻 push 一条本地消息，带 clientMessageId（前端生成 uuid）+ status=pending，UI 先渲染出来，输入框即可清空——不等网络往返。\n2. 服务端确认对账：后端在 run_started / message_created 事件里回带 clientMessageId 和真实 serverId，前端按 clientMessageId 找到那条本地消息、把 id 换成 serverId 并置 status=sent，避免「本地一条 + 服务端一条」重复。\n3. 失败保留可重试：请求失败/超时把该消息标 status=failed 但保留文本内容，提供「重试」「编辑后重发」，不要静默吞掉用户输入。\n4. 高风险不盲目乐观：工具写操作、审批、删除/发布类，UI 显示「待确认/执行中」中间态，等后端 tool_finished / approval 结果回来再落定，绝不先假装成功——回滚一个已展示的「已发布」体验很糟且误导。\n5. 并发与顺序：乐观消息也要进同一套 id+sequence reducer，服务端事件回来时按 clientMessageId 合并而非追加，防乱序导致重复。\n参数怎么定 / 怎么验证：失败重试做指数退避（如 1s/2s/4s，上限 3 次）再转人工重试按钮。验证：断网发消息→看到 pending→恢复后确认变 sent 不重复；造服务端拒绝场景断言变 failed 且内容还在。原则：低风险乐观提升手感，高风险保守保正确。",
      "低风险交互乐观，高风险动作保守。", ["Optimistic UI"]],
    ["Agent UI 如何展示思考过程？",
      "做法（展示可验证的「行动轨迹」而非伪造模型脑内独白，也不泄露系统 prompt/私有 CoT）：\n1. 用结构化事件还原轨迹，不是把模型隐藏思维链原文打出来：正在检索什么（kb_retrieve 的 query + 命中库）、调了哪个工具（tool_started.name + 关键参数摘要）、拿到什么状态（tool_finished.status + resultSummary）、下一步要什么（需要审批/需要用户补信息）。\n2. UI 形态：一个可折叠的「执行步骤」时间线，每步一行（图标 + 一句话 + 可展开证据），默认折叠只显示当前阶段，用户想看再展开——既透明又不刷屏。\n3. 若模型确实产出 reasoning/thinking 流（部分模型有独立思考通道），把它放在明确标注「思考中」的独立折叠区、与正式回答分开，且可由策略关闭；不要把它当正式答案混排，也不要声称这是「它真实的内心」。\n4. 安全：步骤展示要脱敏——不暴露系统提示词、内部工具白名单、密钥、其他用户数据；检索 query 可显示但结果证据按权限裁剪。\n参数怎么定 / 怎么验证：轨迹来源就是已有的 tool_*/state_updated/kb 事件，不需要模型「自述」。验证：对照一次真实 run 的事件流，断言时间线每一步都能在事件里找到出处（可验证），没有任何「编出来的」描述。原则：展示行动轨迹，不伪造脑内独白。",
      "展示行动轨迹，不伪造「脑内独白」。", ["UX","透明度"]],
    ["如何设计人工审批体验？",
      "做法（审批=让用户在执行前完整理解后果并可改可拒；用 interrupt 事件承载，审批后锁版本防漂移）：\n1. 触发与展示：后端在执行高风险工具前发 approval_required 事件（payload: {interruptId, toolCallId, action, target, params, impact, evidenceRefs}），前端弹审批卡，明确列：将执行什么动作、作用对象、关键参数、预估影响、来源证据（点开可看检索/计算依据）。\n2. 文案具体到动作和数量：按钮不写「确认/取消」，写「发布这 3 条记录」「向 12 个客户发送通知」——让用户一眼知道后果规模。\n3. 可改可拒：支持 accept / edit（改参数后批准，编辑按 toolCallId 精确匹配回原工具调用）/ deny（拒绝并可填原因，原因回传给模型）；resume 走独立 POST（带 interruptId + 决定 + 修改后的 params）。\n4. 锁版本防悄改：审批展示的参数/内容做快照绑定 interruptId，用户批准的就是他看到的那个版本；若期间内容会变（如引用了会刷新的数据），要么锁快照、要么提示「内容已更新，请重新确认」，绝不「批的是 A、执行的是 B」。\n5. 时效与兜底：提示审批是否有时效（如 N 分钟未响应则任务挂起/超时），错过 interrupt 点的动态权限请求 fail closed（默认拒绝）而非放行。\n参数怎么定 / 怎么验证：高风险工具清单 = 静态权限白名单（写/删/发/付类）；超时按业务定（如 10 分钟）。验证：构造一次需审批的工具调用，断言不批不执行、edit 后执行的是改后参数、deny 后模型收到拒绝原因。我后端有图级 HITL（静态权限 interrupt，可 accept/edit/deny，编辑按 tool call id 匹配）+ Pipeline 动态权限 fail closed deny，正好对接这套审批 UI。",
      "审批要让用户真正理解后果。", ["HITL","UX"]],
    ["如何处理流式内容安全？",
      "做法（边发边检，命中阈值即停发+取消下游，前端收 blocked 替换未完成内容；只在完整生成后审核会导致已泄露）：\n1. 增量检测：后端在把 text_delta 推给客户端前过一道安全检测（关键词/分类器/规则），按滑动窗口（如最近 N 字 + 累积全文）评分，避免逐字误判也避免攒到最后才查。\n2. 命中处置：达风险阈值立即停止向客户端再发增量，并取消下游模型生成（同取消机制：cancellation_token + 停读 provider 流），不让风险内容继续产出和外泄。\n3. 通知前端：发 blocked / error 事件（payload: {code, reason}），前端把该消息已渲染的未完成内容替换为合规提示（如「此内容因安全策略已被拦截」），不保留半截风险文本。\n4. 日志与留痕：服务端只记必要的风险标签/分类和 messageId 供审计，避免把敏感原文大面积落日志扩散；命中样本按最小化原则保存。\n5. 输入侧同样处理：用户输入也先过检测，必要时在 run_started 前直接拒绝，省得生成后再拦。\n参数怎么定 / 怎么验证：阈值在标注好的正负样本集上扫，看误杀率/漏检率拐点取值；窗口大小平衡「早拦」与「上下文误判」。验证：构造会逐步生成风险内容的用例，断言在越过阈值的那一帧就停发并发 blocked，前端不残留风险文本。诚实边界：流式内容实时审核我未实战，以上是方法与设计；取消下游所需的 cancellation 机制我已落地，可作为承载基础。",
      "只在完整生成后审核会造成内容已泄露。", ["内容安全"]]
  ]
