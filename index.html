{
  id: "eval", title: "评测、可观测与成本",
  desc: "如果无法定义成功、定位失败和比较版本，就还没有一个可持续迭代的 Agent 产品。",
  items: [
    ["如何定义 Agent 的成功率？",
      "成功率必须是「可程序验证的业务终态命中率」，绝不让模型给自己打分——模型自评等于让考生改自己的卷子。\n\n- 终态断言写死在 golden yaml 里，判的是「做没做成」不是「答得好不好」:工单类断言 `status=resolved` 且 `assignee` 已填;报告类断言产出 artifact 存在且含必填字段(fenced code / 表格 / 引用来源 `≥1`);数据类断言 `ToolResult.payload` 命中期望值。我在 agent-server 的真实 eval 就是按 task yaml 的断言判 `passed`,同时记 `steps`/`latency`/`token`/`cost`。\n- 别用 `0/1`,要分三档:`success`(终态全命中)/ `partial`(主断言部分命中,如报告生成了但缺引用)/ `takeover`(触发了 `human_approval` 或 soft landing 兜底)——把这三类混成一个数,你根本不知道是真成了还是兜底了。\n- 三源校验分工:能程序判的(DB 行、artifact 形状)走 contract 断言;语义对错走 LLM-as-Judge 给 `judge_score`;高风险样本(删数据、外发)抽样人工标注校准 Judge。\n- 成功率永远按任务类型切片报,不报单一总分——规划/抽取/RAG 基线天差地别,合并会掩盖某类退化。\n\n一条 golden 任务的断言形态:\n\n```yaml\nid: ticket-resolve-basic\nprompt: \"处理这条工单并标记完成\"\nassert:\n  status: resolved\n  assignee: not_empty\noutcome: [success, partial, takeover]\n```\n\n**取舍:** 自动断言写多严是有代价的——写太松会把绕远路的也判过,写太死又频繁误杀正常变体。我的定法是先在 `50-100` 条 golden set 上人工标三档,再让自动断言 + Judge 复跑,统计自动判定与人工标注的一致率(目标 `Cohen kappa ≥ 0.8`);不达标就说明断言松了或 Judge rubric 不清,回去改断言,而不是放宽门槛凑数。\n\n**延伸:** 可以追问 `partial` 怎么进趋势——我把它单列而不是折半算分,因为「稳定 partial」和「时好时坏」是两种完全不同的健康度,平均掉就看不见了。", "先定义业务成功，再定义模型指标。", ["任务成功率"]],
    ["最终答案正确是否代表执行过程正确？",
      "不代表，而且这是个陷阱——碰巧答对但绕了远路、调了禁止工具，照样得判 fail，所以结果评测和轨迹评测必须两条线分开打分。\n\n- 轨迹评测是独立一层:我在 agent-server 有专门的 trajectory test,用 fake 脚本模型跑真实 live graph(`build_chat_graph`),零模型成本地断言工具选择、调用顺序、步数膨胀——它只测「过程」,和测「结果」的 eval 完全隔离。\n- 安全策略是硬门槛,不进平均分:禁止工具命中、HITL 该 interrupt 没 interrupt,无论结果对错直接 fail——这类绝不能被高分稀释掉。\n- 轨迹断言项要具体:是否调了越权 sandbox 写、是否产生多余写/重复检索、参数字段对不对、`step count` 超没超阈。71 步 Fibonacci 那次事故(模型一步步算到 71 才停)直接让我把 `step count` 列为一等评测指标。\n- 反例要固化成回归:答对但多调 3 次工具的判 `partial` 而非 `pass`,断言 `steps ≤ 期望上限`。\n\n**取舍:** 过程指标和结果指标该不该合一个总分?我坚持各设独立 baseline 门槛、任一回退都拦 PR——合并的好处是看着简洁,但代价是「过程烂结果对」会被高结果分掩盖,而过程烂恰恰是上线后会爆的雷,所以我宁可多维护一套门禁。\n\n**边界:** trajectory 用例从哪来——从生产坏 trace 里挑「结果对但过程错」的案例(Langfuse 按 session 定位),剥成用例断言其正确轨迹,可以现场展开一条真实的怎么剥。", "结果评测与轨迹评测要分开。", ["Trajectory"]],
    ["如何构建 Golden Dataset？",
      "Golden Dataset 不是攒一堆 happy path，而是「每条事故沉淀成一条 yaml」，刻意补 hard case——只收容易成功的样本，等于给自己发了张假的及格证。\n\n- 来源三类按比例抽:真实流量(按 session 从 Langfuse 捞)、历史失败 trace、高风险场景(删除/外发/越权);专门留「该用工具却没用」「把工具失败当无数据」「失忆」这类失败形态,这些才是模型真会栽的地方。\n- 每条 yaml 字段固定:`id`(kebab)、`prompt`(单轮)或 `turns`(多轮上下文回归)、期望终态断言、允许/必须/禁止工具、相关文档 id、`source_trace_id`(挂回事故 trace,UI 一键跳现场);客户数据剥离只留失败形态。\n- 数据集是 git 资产 + Langfuse dataset 双写:任务集 upsert 成 Langfuse dataset `agent-server-evals`,每次跑挂一个 experiment run 做历史对比。\n- 领域专家两人独立标 + 一致性复核,分歧条目讨论收敛并记 kappa。\n\nyaml 字段骨架:\n\n```yaml\nid: tool-failure-honesty\nturns:\n  - \"查一下这个客户的工单\"\nrequired_tools: [kb_retrieve]\nforbidden_tools: [sandbox_write]\nexpect: 工具失败时如实告知,不得当作无数据\nsource_trace_id: ffe4ee3c09684f7b\n```\n\n**取舍:** dev set 和 frozen 回归集要不要分开?我分——dev set 调参可频繁改图迭代快,frozen 集(`evals/baselines/baseline.json`)是 PR 评审的门禁事实源,改它必须 review。代价是维护两套、偶尔会漂移,但好处是迭代速度和门禁稳定性两不耽误,不会因为调参顺手把门禁也松了。\n\n**延伸:** 规模怎么起步、怎么演进——`50-80` 条覆盖主路径 + 已知失败形态起步,每抓到一次新的生产坏行为就 `+1` 条,定期审 dev/frozen 是否随生产分布漂移(变了就补样),用一致率 `≥0.8` 卡标注质量。", "避免只收集容易成功的 happy path。", ["Golden Set"]],
    ["如何评估工具选择准确率？",
      "工具评测最容易犯的错是锁唯一答案——真实 agent 常有多条等价合法轨迹，所以我按「允许/必须/禁止」三集合判，而不是逐步精确比对。\n\n- 三集合判定是核心:每个任务标 `required`(必须调到)、`allowed`(可调可不调)、`forbidden`(一调即 fail),判定 = `required` 全覆盖 ∧ `forbidden` 零命中。\n- 多合法路径用集合 / 偏序断言而非精确序列:「先检索再回答」只断言 retrieve 在 answer 之前(偏序),不要求工具精确顺序,并行 safe 工具不计顺序——否则正常的等价方案会被判假阴。\n- 指标集要分层:`tool_selection_accuracy`(选对工具的任务占比)、参数字段准确率(逐字段比对,如 `kb_retrieve` 的 `source`/`filter`/`topK`)、`invalid_call_rate`(Pydantic 或业务校验失败的调用占比,我的 `execute_tool` pipeline 会把这两类挡下并收敛异常)、平均步数。\n- alias 兼容老 transcript:旧会话的 `kb_search` 现在路由到 `kb_retrieve`,评测按规范化后的工具名比对,避免改名造成假阴。\n\n判定逻辑:\n\n```text\npass = required ⊆ called  ∧  forbidden ∩ called = ∅\n顺序:仅断言偏序(retrieve ≺ answer),safe 工具不计序\n```\n\n**取舍:** 参数字段准确率要不要一刀切 `100%`?我按字段分级——关键过滤字段如 `business_line` 要求 `100%`(错一个检索召回全错),非关键字段容忍区间。代价是标注更细,但好处是把评测精度花在真正会致命的字段上,而不是均摊到每个字段都管不到位。\n\n**边界:** 怎么补样最有效——从生产里挑「该用工具没用」和「乱调工具」两类各补,再在 trajectory test 里用 fake 脚本模型零成本跑断言三集合 + 步数上限,可以展开 fake 模型怎么造确定性轨迹。", "工具评测要允许等价方案。", ["Tool Eval"]],
    ["如何评估 RAG 召回与生成？",
      "RAG 评测必须检索层和生成层分开打分、再用端到端兜底——只看最终答案对不对，你永远定位不了是检索没召回还是生成在幻觉。\n\n- 检索侧独立打分(需要 query→相关 chunk 标注):`Recall@K`(`K∈{5,10}`)、`MRR`、`NDCG@10`、`Context Precision`。我的 `kb_retrieve` 是联邦检索,pgvector 用 cosine `<=>` 转 `1-distance` 当分数,跨 provider 分数分组不混排——评测也要分 provider 算召回,混排算会被强库掩盖弱库。\n- 生成侧独立打分:答案正确性(对 golden answer)、`Faithfulness`(每句能否被检回上下文支撑,防幻觉)、引用正确率(标注来源 id 是否真出现且对得上)、拒答准确率(无依据时是否正确拒答而非编)。\n- 过滤能力要单测:tickets source 声明 `business_line` 过滤、qa source 不声明(schema 无此字段),断言过滤按 `source.filters` 求交集下发、未声明字段的库自动无过滤检索,否则会漏检。\n- 端到端兜底:把检索 + 生成接回真实 graph 跑任务成功率,专盯「Recall 涨了但答案正确性没涨」的背离信号。\n\n分层指标:\n\n```text\n检索层: Recall@K (K∈{5,10}) / MRR / NDCG@10 / Context Precision\n生成层: 答案正确性 / Faithfulness(逐句溯源) / 引用正确率 / 拒答准确率\n分数: pgvector cosine <=> → 1-distance,跨 provider 分组不混排\n```\n\n**取舍:** `topK` 和过滤阈值怎么定,是追 Recall 还是追 Faithfulness?我固定其它变量在 golden set 上扫,看两者的联合拐点——注入门槛 `team 0.45` / `tickets 0.5` 就是这么扫出来的。一味拉高 `topK` 能涨 Recall,但塞进更多噪声会拖垮 Faithfulness 还多花 token,所以取的是联合拐点不是单指标最大值。\n\n**延伸:** Faithfulness 怎么判才不虚——用 LLM-as-Judge 逐句判并人工抽检校准,可以展开逐句判比整篇判贵但能定位到具体哪句在编。", "检索和生成必须分层定位。", ["RAG Eval"]],
    ["LLM-as-a-Judge 有什么问题？",
      "Judge 不是真理机器，它有系统性偏差——位置、长度、自我偏好、提示敏感，所以它只能做可规模化的语义判断，高风险维度绝不能全靠它。\n\n- 已知偏差逐一对冲:位置偏差(偏好先出现的候选)→ 成对比较交换 A/B 顺序各判一次取一致结果;长度偏好(偏长答案)→ rubric 明确「简洁正确优于冗长」并对长度归一;自我偏好(偏好同家族输出)→ Judge 用与被测不同家族的模型;提示敏感 → 固定 rubric 模板不临场改。\n- Rubric 要可操作不可含糊:不写「答得好给高分」,而是分维度 `0-5` 打(事实正确性 / 引用支撑 / 完整性 / 简洁性),每分档给明确判据,输出结构化 JSON 便于聚合。\n- 多次采样降方差:同一条判 3 次取多数 / 均值,方差大的样本标记送人工。\n- 用人工标注校准:在带人工标签的子集上算 Judge 与人工的一致率(kappa),低于 `0.8` 就改 rubric 或换 Judge 模型。\n\n结构化打分输出:\n\n```json\n{\n  \"dimension\": \"faithfulness\",\n  \"score\": 4,\n  \"evidence\": \"第二段引用与检回上下文一致\"\n}\n```\n\n**取舍:** 什么该交给 Judge、什么不能?我的线是——专业事实判断(如业务规则对错)这类 Judge 不可靠的维度直接降级为程序断言或人工,Judge 只接可规模化的语义维度;高风险指标(安全 / 越权)设硬门槛走人工 + 规则,绝不进 Judge 平均分。代价是覆盖面没那么「全自动」,但好处是不会被一个偏心的裁判把致命问题判过。\n\n**边界:** 可以追问交换顺序还压不住的偏差怎么办——某些维度交换后两次结论还打架,这种本身就该判「Judge 不可裁」送人工,而不是硬取一个。", "Judge 是规模化辅助，不是真理机器。", ["LLM Judge"]],
    ["一次 Agent 执行应该记录哪些 Trace？",
      "Trace 的唯一验收标准是「能否从一条业务失败凭 run_id 一路反查到出问题的具体 span」——记得再多，串不起来就是死数据。\n\n- 用统一 `runId` 串全链路 + 每节点一个 OTEL span:顶层维度记 `run_id`、`thread_id`、`user_id`、`tenant`、`model id`、prompt 版本(稳定前缀 hash)、知识库版本、入口渠道(web / lark)。\n- `call_model` span 是排障重灾区,要记全:每轮喂进去的消息条数(排查上下文压缩/失忆就数这个)+ token usage(来自 `stream_options.include_usage`)+ cost;tools span 记工具名 + 规范化参数 + 结果摘要 + `invalid_call` 标记。\n- 检索/决策细节单独留:`kb_retrieve` 记命中 `doc_id` 列表 + 分数 + 用了哪个 `source`/`filter`;HITL 记 accept/edit/deny;retry/fallback 记重试次数与 fallback 链路径(显式配置不静默换模型,trace 要看到从 A 落到 B)。\n- 反馈与终态闭环:最终 status(`success`/`partial`/`cancelled`/`interrupted`)、用户点赞点踩、soft landing 是否触发。我的 `execute_tool` pipeline 每步开 OTEL span,BackgroundTaskRunner 把 `queued`/`running`/`terminal` 写 DB(可靠事实)+ Redis Pub/Sub 发实时事件。\n\nspan 树形态:\n\n```text\nrun_id ─┬─ call_model  (msg_count, token_usage, cost)\n        ├─ tools.kb_retrieve  (doc_ids, scores, source/filter)\n        ├─ hitl  (accept/edit/deny)\n        └─ status  (success|partial|cancelled|interrupted)\n```\n\n**取舍:** trace 完整性和体积/合规怎么平衡?我对敏感字段(客户 PII / 凭证)落 trace 前脱敏或只存 `sha256` + R2 引用 key,大结果 Artifact 化后只留 key + 预览。代价是 trace 里看不到原文、排障时要多跳一次引用,但好处是 trace 体积不爆炸、也不会把 PII 大面积扩散到日志层。\n\n**延伸:** 可以追问消息条数为什么单列成一等字段——因为上下文类 bug(失忆/压缩吃消息)几乎都靠数每轮 LLM 输入条数定位,它是最高频的排障入口。", "Trace 要支持从业务失败反查到具体节点。", ["Trace","Langfuse"]],
    ["Prompt 或模型升级后如何回归？",
      "回归的铁律是「在同一 frozen golden set 上新旧版对比，且绝不看平均分」——平均分会把单点退化平滑掉，而单点退化往往是上线后最致命的那个。\n\n- 跑对比:`uv run python -m evals.run`(全量 `make eval`)在固定任务集上分别跑旧版/新版,对比 `passed` / `steps` / `latency_s` / `cost_usd` / `judge_score` 五维;配了 `AGENT_LANGFUSE_*` 时每次挂成一个 experiment run,Langfuse 的 `Datasets→Runs` 逐 run 对比修复前后。\n- 门禁是硬的:本地 `evals/baselines/baseline.json` 是 PR 评审事实源——总分回退、或任一关键安全/工具用例从 `pass` 变 `fail`,直接拦 PR。\n- 失败分类对比,不只看分数:按失败形态聚类(失忆 / 该用工具没用 / 越权 / 步数膨胀),新版若引入新的失败类别即使总分持平也要 block——总分持平可能是「修好一个、引入一个」。\n- 上线分阶段:先影子流量(旁路跑新版不影响用户,对比分布),再按 user/session 稳定分桶 `5%→25%→100%`,每档观察护栏指标(成本、延迟、接管率),保留一键回滚到上一版本配置。\n\n回归命令:\n\n```bash\nuv run python -m evals.run        # 单任务/全量\nmake eval                          # 全量对比五维\n```\n\n**取舍:** 放量节奏快还是稳?我对硬门槛用例(删数据确认、越权拒绝)设 `100% pass` 一票否决,放量按样本量算到统计显著才进下一档——这牺牲了上线速度,但 agent 的退化常常是低频高危的,跑快了等于拿用户当测试集。\n\n**边界:** 可以展开自动回滚——我的滚动重启脚本健康检查失败会自动回滚上一版本,配置回滚走 admin 后台「应用并重启」,能聊一次健康检查失败触发回滚的真实链路。", "不能只看平均分，要看关键案例退化。", ["回归测试"]],
    ["如何比较两个模型？",
      "比较两个模型，结论通常不是「选谁」而是「按任务路由谁」——一个模型几乎不可能在规划/抽取/RAG 全维度都赢，强行二选一一定选错某一类。\n\n- 严格控制变量:ModelCatalog 里换 `model id`,prompt 稳定前缀、工具集、golden set 全部不变,跑同一 `evals.run`,输出每模型的 `passed` / `tool_selection_accuracy` / `P50`/`P95` latency / token / 单任务 cost / 跨次稳定性(同输入多跑的方差)/ 安全表现(禁止工具命中率)。\n- 分层报表是关键:按任务类型切(规划 / 长上下文 / 抽取 / RAG / 工具编排)——一个模型常擅长规划但抽取慢且贵,合并成总分会让你选错。\n- 成本/质量散点找帕累托前沿:每模型每任务画到 `cost×quality` 平面取前沿;`P95` 延迟单独看,体感由尾延迟决定不是 `P50`。\n- 结论落地为路由表:简单抽取走小模型省成本,复杂规划走大模型,配 fallback 链(显式配置不静默换)。\n\n路由结论形态:\n\n```text\n抽取/简单  → small model  (省 cost)\n规划/复杂  → large model  (高 quality)\nfallback   → A 落 B 显式配置,不静默换\n采信门槛   → 每层 ≥30 条样本\n```\n\n**取舍:** 稳定性和峰值能力哪个优先?我对生产场景把稳定性放前面——同输入跑 5 次看 pass 是否抖动,抖动大的模型即使峰值分高也不进生产路由。代价是可能放弃一个偶尔很惊艳的模型,但生产要的是可预期,一个时好时坏的模型会让对账和回归全失真。\n\n**延伸:** 路由阈值怎么落地——按各层 cost/quality 拐点定,并写进 catalog 的 fallback/路由配置;可以追问分层结论的样本量门槛,我要求每层至少 `30` 条才采信分层结论。", "形成任务路由通常比选唯一模型更合理。", ["模型评测"]],
    ["如何发现线上能力退化？",
      "线上退化最可怕的一类是「没有任何代码变更、探针分数却掉了」——那是模型提供商无感升级，所以监控不能只盯自家发布，得靠固定探针 + 趋势告警在用户投诉前先发现。\n\n- 固定探针(canary)是早发现的关键:一小组 golden 任务定时(如每小时)回放打分,分数掉破阈值即告警,这能在没人投诉前先报警。\n- 核心指标做时间趋势:任务成功率、`human_takeover` 率、工具错误率(`invalid_call` + 异常)、循环率(`step count` 超阈占比)、拒答率、单任务 cost、`P95` latency,按天/小时画趋势并设环比告警。\n- 多维切片,别合并看:同一指标按 `model` / prompt 版本 / 知识库版本 / 业务类型切——退化常只在某一维出现(如某业务线 RAG 召回掉),合并就看不出来。\n- 关联归因:异常点自动关联时间窗内的发布 / 配置变更 / 知识库更新;没有代码变更但探针分掉,就按 trace 里的 `model id` 与时间确认是不是上游模型变了。\n\n告警阈值:\n\n```text\ncanary 频率: 高风险 5-15 min / 普通 1 h\n告警线: 历史均值 ± 2-3σ  或  业务红线(成功率 < X% / P95 > Y s)\n```\n\n**取舍:** 探针频率高了费钱、低了滞后,怎么取?我按风险分档——高风险路径 `5-15 min`、普通 `1 h`;告警阈值用历史均值 `± 2-3σ` 或固定业务红线(如成功率跌破 `X%`、`P95` 超 `Y s`)。代价是探针本身有持续成本,但比起退化静默跑几天烧掉的成本和信任,这点钱必须花。\n\n**边界:** 什么算闭环——每次告警必须能回放到具体坏 trace 才算,并沉淀成新 golden 用例;可以展开一次「无代码变更退化」的真实定位过程。", "模型提供商升级也可能造成无代码变更的退化。", ["监控"]],
    ["Langfuse 等平台中重点看什么？",
      "在 Langfuse 里我不看 trace 数量，只看一件事：能不能「按版本 × 业务维度做对比」——看不了对比的平台只是个日志垃圾场。\n\n- 主视图是 `Datasets→Runs`:每次 eval 挂一个 experiment run 到 dataset `agent-server-evals`,逐 run 对比 `passed`/`steps`/`latency_s`/`cost_usd`/`judge_score`——这是判断版本好坏的主入口。\n- 单 trace 排障有固定顺序:逐 generation 看模型「实际」收到的上下文与工具结果,排上下文/压缩类问题就数每轮 LLM 输入的消息条数;先证伪持久层(查 Aegra checkpoint 链是否连续)再查运行时变换(压缩是否把消息吃了),别一上来就怀疑运行时。\n- 聚合维度看分布:节点耗时分布(哪个 span 慢)、token/cost 按模型分组、错误分布(按异常类型)、工具成功率(按工具名)、用户反馈(赞/踩)、Judge 分数趋势。\n- 全链路靠同一 `run_id` 串:前端 → Aegra 编排 → `call_model` → 检索 → 工具,从一条业务投诉能凭 `run_id` 跳到对应 trace 的具体节点。\n\n排障固定顺序:\n\n```text\n1. 数每轮 LLM 输入消息条数(上下文/压缩问题)\n2. 证伪持久层: Aegra checkpoint 链是否连续\n3. 再查运行时变换: 压缩是否吃了消息\n```\n\n**取舍:** 排障是先广撒网还是先证伪?我坚持「先证伪再深查」——窗口问题先数消息条数、再查 checkpoint,最后才查压缩。这看着慢,但 agent 排障最容易犯的错就是凭直觉直奔运行时,结果根因在持久层,先证伪能砍掉大半冤枉路。\n\n**延伸:** 可以追问这套怎么形成闭环——把每次定位到的坏 trace 用 `source_trace_id` 挂回新建的 eval 任务,形成「线上发现→沉淀用例→回归门禁」的循环。", "准备你实际使用过的字段和 Dashboard。", ["Langfuse"]],
    ["如何控制 Token 成本？",
      "控成本别盯总账，要按单任务成本画分布去抓长尾——高成本几乎从来不是正常任务，而是循环/反复检索的失败任务，优化它们比压平均值值钱得多。\n\n- 上下文瘦身是最大头,两级压缩:Tier1 把旧的可再生大工具结果 offload 到 Artifact(carve allowlist,交付物/知识/Memory/subagent 结论不 carve),消息只留引用 + 预览,不调 LLM 零成本;Tier2 才用模型摘要中间历史并保留最近 human 边界。这直接砍掉每轮重复喂的历史 token。\n- 缓存两层:prompt 稳定前缀(系统提示 + 工具定义,Tool Registry 确定性排序保证前缀稳定)做 prompt cache,动态 env/reminder 放尾部不破坏缓存;`kb_retrieve` 结果 Redis 缓存 `10 min`(`query`/`topK`/`filter`/`source` 为键)。\n- 按需加载工具:`tool_search` 基于名称描述发现工具,不把全部工具 schema 一次性塞进上下文;简单任务路由小模型。\n- 循环兜底防烧钱:`max_steps` + `deadline` + stuck detector,防 71 步 Fibonacci 那种循环;工具大结果 Artifact 化不进上下文。\n\n两级压缩:\n\n```text\nTier1 (零 LLM): 旧可再生大工具结果 → Artifact,消息只留引用+预览\n               carve allowlist: 交付物/知识/Memory/subagent 结论 不 carve\nTier2 (调模型): 摘要中间历史,保留最近 human 边界\n```\n\n**取舍:** 压缩省 token 和保信息哪个优先?我用 carve allowlist 把边界划死——交付物、知识、Memory、subagent 结论绝不 carve,只 offload 可再生的大工具结果。代价是这类内容会一直占上下文成本,但好处是绝不会为了省钱把用户真正要的东西压没了,省错了比多花钱更糟。\n\n**边界:** 可以展开一个反直觉坑——我曾把 `128K max_output` 误当 `context_window`,导致提前压缩反而多花钱;`context_window` 与 `max_output` 必须分开建模,这是个值得追问的细节。", "成本常与循环、上下文和模型路由有关。", ["成本"]],
    ["如何优化端到端延迟？",
      "优化延迟第一步永远是分段计时定位瓶颈，绝不能凭感觉——我曾把「客户端 8s 加载」根因定位到沙箱文件面板 exec 争用而非网络，靠的就是分段，否则会把功夫全花在错的地方。\n\n- 分段测量打底:首 token / 检索 / 模型 / 工具 / 网络各记一段(OTEL span 已分节点),找出真正瓶颈段再动手。\n- 并行无依赖步骤:工具编排区分 safe 可并行 / 非 safe 独占,safe 工具并发跑;多 source 知识注入 `build_turn_reminder` 并行检索 + `3s` 预算(超时降级而非卡死)。\n- 缓存与预热把冷启藏起来:prompt 稳定前缀 cache;sandbox warmup 只对标记过用沙箱的 thread,在模型思考期异步 warm,把冷启藏进 LLM 延迟里(warm exec 实测约 `0.3s`);分享页外壳缓存 `60s` TTL 省 meta 往返。\n- 流式改体感:流式 SSE 让用户先看到 token(即使总时长不变体感就好);LLM retry 全耗尽返回 `AIMessage` 让 SSE 闭合,前端不卡 thinking。\n\n**取舍:** 为了快能不能跳权限校验?绝对不能——底线是权限检查(图级 HITL interrupt、pipeline 动态权限 fail closed)和结果验证不能为了快跳过。同样每个并行/缓存优化都加超时降级预算(注入 `3s`、列目录超时降级),宁可降级也不卡死。牺牲的是极端情况下的完整性,换的是永不卡死和永不越权。\n\n**延伸:** 可以追问为什么盯 `P95`/`P99` 不盯 `P50`——尾延迟决定体感,`P50` 漂亮但 `P99` 飙高的系统用户照样觉得卡,能展开一个尾延迟优化案例。", "先测量关键路径，再优化。", ["性能"]],
    ["如何设计线上 A/B 测试？",
      "Agent 的 A/B 最致命的坑是分桶单位——必须按 user/session 稳定分桶，绝不能按单条消息，因为 agent 多轮且有跨轮记忆效应（mem0 会写历史），按消息随机分会让同一会话横跨两个变体造成跨轮污染，结论直接失真。\n\n- 稳定分桶:用 `user_id` hash 取模,保证同一用户始终落同一变体,消除跨轮污染。\n- 可比性校验:分桶后核对两组的知识库版本、权限分布、业务类型分布一致(用 trace 维度对比),不一致就重新分桶或分层,否则是混杂变量。\n- 指标分层:主指标(任务成功率)+ 护栏指标(成本、`P95` 延迟、接管率、安全事件);护栏退化即使主指标涨也要停。\n- 高风险先影子:删数据/外发类操作不直接 A/B,先影子流量旁路跑新变体只记录不执行,对比决策分布安全后再灰度。\n\n分桶与叫停:\n\n```text\n分桶: bucket = hash(user_id) % N   # 永远按 user/session,绝不按 message\n护栏自动叫停: cost 上浮 > X%  或  接管率上浮 > Y pp\n```\n\n**取舍:** 观察期短了出结论快、长了拖进度,怎么取?我按主指标基线 + 期望提升用功效分析反算样本量,观察期至少覆盖一个完整业务周期消除日内/周内波动——这牺牲了拿结论的速度,但 agent 指标方差大,过早下结论比晚下结论危险得多。\n\n**边界:** 可以追问护栏怎么自动叫停——护栏阈值用线上红线(成本上浮 `>X%`、接管率上浮 `>Y pp` 自动叫停)并保留按桶快速回滚,能展开一次护栏触发叫停但主指标还在涨的两难决策。", "关注跨轮污染和样本独立性。", ["A/B Test"]]
  ]
},
{
  id: "frontend", title: "流式交互与 Agent 前端",
  desc: "Agent UI 不只是打字机效果。它要准确表达任务、工具、审批、错误、恢复和用户控制权。",
  items: [
    ["SSE 与 WebSocket 如何选择？",
      "传输方案由通信模式决定，不是「实时」这个口号决定的——Agent 对话默认就该是 SSE + 独立控制 HTTP 接口，绝大多数场景上 WebSocket 是过度设计。\n\n- **默认 SSE 的理由很硬**:它是单向 server→client 的纯事件流,走普通 HTTP/1.1 或 h2,content-type `text/event-stream`、`Cache-Control: no-cache`、`Connection: keep-alive`;浏览器原生 `EventSource` 自带断线重连 + `Last-Event-ID`,CDN/反代/防火墙对它兼容好,不必握手升级。\n- **控制信令必须分流**:取消、审批 resume、点赞这些 client→server 动作走独立 `POST` 接口——SSE 压根没有客户端→服务端通道,硬塞会把架构搞复杂。\n- **什么时候才真上 WS**:需要双向高频小消息(语音 ASR、多人协同光标、客服双向输入态),或单连接要同时跑多路双向 RPC。代价是重连退避、心跳 `ping/pong`、断线补发全得你自己写,浏览器一样都不兜底。\n\n**取舍:** 我按「是否需要 client→server 实时通道」一刀切——纯 Agent 回答类 99% 是 SSE,牺牲的是双向实时能力,换来的是基础设施零摩擦和浏览器自带的重连兜底,这笔账对话场景绝对划算。另外 SSE 有两条硬约束逃不掉:HTTP/1.1 下同域 6 连接上限(用 h2 多路复用或按 `runId` 合并到一条流绕过),以及反代必须关 buffering(`nginx proxy_buffering off` / `X-Accel-Buffering: no`),否则增量被攒着一次性吐,打字机变「卡顿块」。\n\n**边界:** agent-server 里聊天流就是 SSE(Aegra 承载 AG-UI 流式),取消/审批走独立 HTTP。我踩过 nginx 反代不显式关 buffer 就抖的坑——验证方法是 `curl -N` 直连看 TTFB 和增量是否逐条到达,确认 buffering 没生效再上浏览器。",
      "传输方案由通信模式决定，不是性能口号。", ["SSE","WebSocket"]],
    ["AG-UI 与 SSE 是什么关系？",
      "这俩根本不在一层，没法二选一——AG-UI 是「事件语义层」(交换哪些结构化事件),SSE 是「传输层」(字节怎么走),是正交关系,可任意组合。把它们混为一谈是这题最常见的错。\n\n- **AG-UI 管的是语义**:run 生命周期(`run_started`/`run_finished`/`run_error`)、文本增量(`text_message_start`/`text_message_content`/`text_message_end`)、工具调用(`tool_call_start`/`tool_call_args`/`tool_call_end`/`tool_call_result`)、状态快照与增量(`state_snapshot`/`state_delta`,delta 用 JSON Patch RFC6902)。它完全不规定字节怎么传。\n- **SSE 只是承载通道**:把每个 AG-UI 事件序列化成 JSON 按 SSE 帧发——\n\n```text\nevent: <type>\ndata: <json>\nid: <sequence>\n\n```\n\n  前端 `EventSource` 收到 `JSON.parse` 再按 `type` 路由。换成 WebSocket 传同一套事件,语义一字不变。\n- **分离换来的是双向解耦**:前端按事件类型更新不同视图(文本 reducer 拼字、工具行 upsert、state 打 JSON Patch),不用解析混在一起的字符串协议;后端换传输(SSE→WS)或换 Agent 框架(LangGraph→别的),前端事件处理逻辑不动。\n\n**取舍:** 用标准(AG-UI 的 `message_id` / `tool_call_id` 天然当 reducer 主键、`state_delta` 用标准 JSON Patch 配 fast-json-patch)而不是自定义 diff,牺牲一点「自由发挥」,换来双方都不用手写合并逻辑、协议契约可测——我认为这笔交换非常值。\n\n**延伸:** 怎么防协议漂移可以展开——我在 agent-server 做过 contract golden test 锁死「事件序列的形状」:固定一组输入跑出事件流,断言 `type` 序列和关键字段 key/type 形状(忽略 id/timestamp/文案),后端改实现时这套测试就挡住漂移。同思路可直接覆盖 AG-UI 事件流。",
      "一个是事件语义，一个是传输通道。", ["AG-UI","SSE"]],
    ["流中如何表达文本、工具调用和错误？",
      "核心判断只有一条:所有事件套同一个 Envelope,用 `type` 区分,绝不把内容拼成一个裸字符串协议——字符串协议看着省事,扩一个新事件类型就得全员改解析。\n\n- **Envelope 字段固定**:\n\n```json\n{\n  \"type\": \"...\",\n  \"runId\": \"...\",\n  \"messageId\": \"...\",\n  \"sequence\": 0,\n  \"timestamp\": 0,\n  \"payload\": {}\n}\n```\n\n  `type` 是事件类型枚举;`runId` 标识本次运行(断线重连/取消按它定位);`messageId` 标识某条助手消息(文本增量按它累加,不靠数组末项);`sequence` 是该 run 内单调自增整数(去重排序的依据);`timestamp` 是服务端发出毫秒时间戳(算延迟/排错);`payload` 放该类型专属数据。\n- **事件类型枚举要覆盖全生命周期**:\n\n```text\nrun_started        payload: {threadId, model}\ntext_delta         {messageId, delta}\nmessage_end        {messageId, finishReason}\ntool_started       {toolCallId, name, argsPreview}\ntool_args_delta    {toolCallId, deltaJson}      流式拼参数\ntool_finished      {toolCallId, status, resultSummary, artifactRef?}\nstate_updated      {patch}                       JSON Patch\napproval_required  {interruptId, action, params}\nerror              {code, message, retryable}\ncancelled          {reason}\nrun_finished       {status, usage}\n```\n- **前端一个 `switch(type)` 即路由**:`text_delta` 走文本累加器(key=`messageId`)、`tool_*` 走工具行表(key=`toolCallId`)、`state_updated` 打 JSON Patch、`error`/`cancelled` 收尾 UI,不用正则切字符串。`error` 一定带 `retryable` 和 `code`,前端据此决定「自动重连」还是「展示给用户重试」;`run_finished` 带 `usage`(token/cost)供展示与对账。\n\n**取舍:** `sequence` 用服务端单调计数器(每个 run 从 0/1 起)、`timestamp` 用服务端时钟而非客户端——牺牲一点客户端自主性,换来跨设备/跨重连的全局可定序,避免时钟漂移把顺序搞乱。\n\n**边界:** 最关键的不变量是「流必闭合」——每个 `text_delta` 都有 `messageId`、`sequence` 连续无跳号、最后必有 `run_finished`。我在后端约定 LLM retry/fallback 全耗尽也返回 `AIMessage` 让流正常闭合,就是为了保证 `run_finished` 一定发出,前端不会永远卡在 thinking。验证就是录一条真实流逐帧断言这三条。",
      "不要把所有内容混成一个字符串协议。", ["事件协议"]],
    ["用户点击停止生成，前后端如何处理？",
      "关浏览器连接 ≠ 取消任务——你以为停了,GPU 还在算、Token 还在计费。真正的取消是一条从控制接口显式传播到「模型流 → 工具 → 子任务」的信号,且终态必须落库。\n\n1. **触发与传播**:前端立刻进 stopping 态(按钮置灰 + 文案改「正在停止」),并发 `POST /runs/{runId}/cancel`(独立接口,不依赖 SSE);UI 先乐观停字,但终态以后端 `cancelled` 事件为准。\n2. **真正止血在模型流**:后端按 `runId` 找到该 run 的 `cancellation_token` 置位 + 对应 `asyncio.Task` 调 `task.cancel()`;模型流侧直接 `close` 掉上游 provider 的 httpx/aiohttp 响应流——停止读取就停止了计费累加,这才是「立即」的关键;自建 vLLM 则 `abort(request_id)` 把序列移出调度队列与 KV Cache。\n3. **资源回收靠 `finally`**:工具/子任务 cooperative cancel——长循环里周期检查 `token.is_set()`,并在 `finally` 里关沙箱/文件/连接(`CancelledError` 必须在 `finally` 兜底,否则取消反而泄漏 FD);子任务共享同一 token 向下传播。最后 DB 标 `status=cancelled`、Checkpoint 存到取消点、发 `cancelled` + `run_finished` 让前端从 stopping 落地。\n\n**取舍:** 「能取消什么」有硬边界——已发出的写操作、已发的通知取消不了,第三方 API 通常也停不了服务端计算只能停读取。所以我不把状态二值化,而是区分 `cancelled` / `partially_completed`,半完成态用幂等键对账,UI 如实告知「已停止,X 已执行无法撤销」。另外取消请求要幂等(重复点不报错),前端给 stopping 超时兜底(如 5s 没收到 `cancelled` 就强制本地落地 + 后台轮询 DB 校正)。\n\n**边界:** 诚实说边界——我的 BackgroundTaskRunner 已落地 cancel event、`Task.cancel` 和 terminal 状态落库,这是真实证据;但主 Agent 流的 abort 是否一路下传到上游 provider,按当前实现是下一层要补的,后台取消是已落地,provider 级 abort 还没接全。",
      "关闭浏览器连接不等于取消后端任务。", ["取消"]],
    ["断线重连后如何恢复输出？",
      "恢复靠服务端事件日志补发,绝不是重新跑一遍模型——重跑既烧钱又会产出和断线前不一致的内容。前端记游标、服务端按游标续发,才是正解。\n\n1. **服务端给每个 run 的事件分配单调 `sequence`**,并短期持久化最近事件(Redis List/Stream,按 `runId` key,TTL 如 `600s`,或保留最近 `N=500` 条)——这是断点续传的事实源。\n2. **前端持久化「最后确认的 `sequence`」**(或 `EventSource` 的 `lastEventId`);断线后 `EventSource` 自动重连并在 `Last-Event-ID` 头带上它,自建流则拼 `?after=<seq>` 游标。\n3. **服务端按游标补发**:从 `lastSeq+1` 起把缺失事件按序回放再接上实时流;若 run 仍在跑就继续订阅,若已结束就直接返回最终状态快照(`state_snapshot` + 完整助手消息)一次性补齐,省得逐条回放。\n4. **游标过期降级**:游标超出保留窗口(事件已过期)时,下发完整 `state_snapshot`(当前全量状态)而非报错;前端用它覆盖本地状态作为基准再继续增量。\n\n**取舍:** 保留窗口 TTL/条数按「最坏断网时长 × 事件速率」估(如 10 分钟 × 几条/秒 → `600s` 或 `500` 条起步,看内存压力调)——窗口越大恢复体验越好但内存成本越高,所以我宁可设个合理窗口 + 过期降级 snapshot 兜底,而不是无限留存事件。\n\n**边界:** 诚实区分已落地和设计——我做了基于 DB 终态 + 轮询的恢复(后台任务重进页面按 `runId` 查状态/结果),这是真证据;但「事件级 SSE replay 日志」目前是设计方案、尚未实战。验证靠人为 kill 连接再重连,断言不丢字不重字(结合 `sequence` 去重)、run 结束后重进页面能拿到完整最终态。",
      "恢复需要事件日志，不只是重新请求模型。", ["断线恢复"]],
    ["如何避免重复消息与乱序？",
      "关键是用 id + `sequence` 做幂等 reducer,状态按 `messageId`/`toolCallId` 定位,绝不靠数组最后一项——重连补发必然带来重复,靠「末项追加」的写法一遇并行工具就串台。\n\n- **先查重再处理**:前端按 `runId` 分区维护已处理 `sequence` 的水位(`lastSeq`)和已见 id 的集合;收到事件先查——`sequence <= lastSeq` 或 id 已见过就直接丢弃。这步是抗重连补发的核心。\n- **按序应用、乱序暂存**:reducer 伪代码——\n\n```javascript\nfunction reduce(state, ev) {\n  if (seen.has(ev.id)) return state;\n  seen.add(ev.id);\n  if (ev.sequence === lastSeq + 1) {\n    state = apply(state, ev);\n    lastSeq++;\n    drainBuffer();\n  } else if (ev.sequence > lastSeq + 1) {\n    buffer.set(ev.sequence, ev);\n  }\n  return state;\n}\n```\n\n  中间号没到就进 `buffer`,补齐后 `drainBuffer` 连续刷出。\n- **状态严格按主键定位**:文本累加 `state.messages[messageId].text += delta`(不 push 末尾再拼),工具状态 `tools[toolCallId] = {...tools[toolCallId], ...patch}`(started→args→finished 都更新同一行),这样并行/交错/乱序到达都能正确合并。\n\n**取舍:** 等不到缺号事件不能无限等——我设个等待窗口(`2-3s` 起,按网络抖动调)超时就主动拉一次 `state_snapshot` 校正,牺牲一次额外请求换取「不会因为丢一个事件就永久卡住」。`seen` 集合按 run 结束清理防内存涨。\n\n**边界:** 这正是并行工具调用最容易翻车的地方,要专门造乱序+重复用例——mock 一段乱序重复事件流灌进 reducer,断言最终 state 与「有序无重」时完全一致。",
      "并行工具调用时尤其重要。", ["幂等","顺序"]],
    ["Markdown 流式渲染为什么会抖动？",
      "抖动的根因是两件事叠加:「未闭合结构反复重排」+「每 token 一次 React 渲染」。所以要从批量 flush + 增量解析两头治,而不是把流式关掉——关流式是把孩子和洗澡水一起倒掉。\n\n- **批量缓冲压渲染频率**:把 `text_delta` 攒进 buffer,用 `requestAnimationFrame` 或固定节流窗口 `30-80ms` flush 一次(再用 `startTransition` 让渲染可中断),把「每 token 渲染」降到「每帧渲染」,CPU 和重排骤降。中英文都按这窗口——太短没省到、太长打字感变迟钝。\n- **容错解析压重排**:用支持流式的解析器(streaming-markdown / markdown-it 配容错),对未闭合结构预处理——检测到奇数个代码围栏(三个反引号)就把当前未闭合代码块临时按纯文本/`pre` 渲染,等闭合事件到了再切回高亮,避免半截代码块触发整页重排。表格/列表同理:未出现行分隔前先按纯文本占位,识别完整一行/一项再升级为节点。\n- **减少 React 工作量**:渲染后的 Markdown 用 `memo` / 稳定 key 缓存已完成段落(已 `message_end` 的不再重渲),只让「正在生成的最后一段」高频更新;代码高亮(shiki)放 `message_end` 后做一次,流式期间不每帧高亮。\n\n**取舍:** flush 窗口本质是「流畅度 vs 打字实时感」的权衡——我按 React Profiler/Performance 面板里「每秒渲染次数 + 长任务」定,目标是无 `>50ms` 长任务、帧率稳定,在 `30-80ms` 区间扫到那个拐点,而不是凭感觉拍。\n\n**边界:** 优化的是渲染频率和解析策略,绝不是降低流式体验。验证用一段含代码块/表格的长流回放,肉眼 + Profiler 一起看是否还抖。",
      "优化渲染频率和解析策略，而非关闭流式。", ["Markdown","性能"]],
    ["如何处理不完整 JSON 或 Tool Call 参数？",
      "执行边界必须严格卡在「工具参数完整」之后——流式期只给状态提示,绝不拿半截 JSON 当数据喂工具。流式拼参数时把未闭合 JSON 当真,是这题最危险的错。\n\n1. **拼参数阶段**(`tool_call_args` / `tool_args_delta`)前端 UI 只显示「正在准备参数…」+ 工具名,不解析、不展示半成品 JSON、更不触发执行;后端把 delta 累积到 buffer。\n2. **收到 `tool_call_end`(参数完整)才校验**:用工具自身的 Pydantic/JSON Schema model(单一事实源)做校验,解析失败或不过 → 走异常收敛返回结构化 `error`(带字段名 + 期望类型的可读原因),让模型下一轮自我修正,绝不把未闭合 JSON 喂给工具。\n3. **校验通过才进统一 `execute_tool` Pipeline**(参数校验→业务校验→权限→执行→结果收敛),执行点之前任何环节失败都 fail closed(拒绝执行)而非带脏参数跑。\n\n**取舍:** 如果产品真要流式预览参数(如「正在写文件 `path=…`」),我不直接 parse 半截 JSON——而是让后端把已确定的字段做成键值事件单独发,或用容错的 best-effort streaming JSON parser 只读已闭合的顶层键,且明确标注「预览,未最终确定」。牺牲一点预览即时性,换取「绝不把未定参数当真」的安全边界。\n\n**边界:** agent-server 的 `execute_tool` Pipeline 就是参数校验前置 + 异常收敛 + 错过权限点 fail closed deny。验证靠构造「参数中途断流」「JSON 缺右括号」的事件序列,断言前端不执行、后端返回可读 `error`、模型能据此重试。",
      "执行边界必须在参数完成之后。", ["Tool Call"]],
    ["多个工具并行执行时前端如何展示？",
      "以 `toolCallId` 为主键渲染独立任务行,每行一个独立状态机——绝不让并行事件去覆盖同一个「正在思考」。并行场景下伪造一条线性进度条是在骗用户。\n\n- **数据结构天然分行**:`tools` 是个 `Map<toolCallId, {name, status, argsPreview, resultSummary, artifactRef, startedAt, finishedAt}>`,所有 `tool_*` 事件按 `toolCallId` upsert 到对应行,并行工具各占一行互不覆盖。\n- **每行独立状态机**:`pending`(已声明未跑)→ `running`(`tool_started`)→ `success` / `failed`(`tool_finished.status`)→ `retrying`(重试回到 running);每态给图标/颜色,`failed` 提供「重试」「查看错误」。\n- **顶部展示真实聚合**:如「3 个工具:2 成功 1 运行中」或当前活跃工具名,不要造一条假装单线程的线性进度条。\n- **结果分层展示**:长结果(`artifactRef` 指向大结果)默认折叠成 `resultSummary` 一行,点开才拉全文/证据;图片类走视觉转述文本 + 原图引用(tool role 不能带 image block)。\n\n**取舍:** 排序要稳定——用 `toolCallId` 做 React key 保证行不复用错乱,按 `startedAt` 或确定性顺序排,避免事件乱序导致行跳动。这是「实时反映顺序」与「视觉稳定」的权衡,我选稳定 key + 确定性排序,牺牲一点「严格按到达顺序」换不跳动。并行上限要和后端编排一致(safe 工具可并行、非 safe 独占)。\n\n**边界:** 我后端有工具并发编排(区分 safe 可并行 / 非 safe 独占 + max concurrent)与大结果 Artifact 化,前端正好按 `toolCallId` 分行对接。验证靠 mock 两个工具交错的 `started`/`finished` 事件,断言两行各自推进、互不串台。",
      "不要让并行事件覆盖同一个「正在思考」状态。", ["并行 UI"]],
    ["页面关闭后 Agent 如何继续运行？",
      "任务生命周期必须和 HTTP 连接生命周期解耦——长任务交后台任务系统持有,前端只是按 `runId` 重新订阅的「视图」,连接断了任务照跑。把任务绑死在浏览器连接上是根上的错。\n\n1. **长任务不依附连接**:提交即落库(`status=queued`)由后台 Runner(`asyncio` Task)执行;DB 是 queued/running/progress/terminal 的事实状态源,Redis Pub/Sub 只做实时事件(断了可降级轮询 DB)。\n2. **前端重进页面用 `runId` / `threadId` 查状态**:仍 running 就重新订阅事件流(接断点续传),已 terminal 就拉最终结果快照,用户可选「继续看」或「取消」。\n3. **结果送达要兜底**:终态结果先标 `undelivered`,下一轮对话(`call_model`)注入一次后标 `delivered`——确保用户哪怕错过实时流,下次也一定看到产出,避免「交付物没送达」。\n4. **重启边界要诚实**:进程重启时把没有 Runner 在跑的 queued/running 标 `interrupted`(不跨进程续跑),UI 显示「已中断,可重试」而非假装在跑。\n\n**取舍:** 短对话也要明确「连接断开是否=取消」并告知用户——短问答可设连接断即取消省资源,长任务则不取消。这是「省资源 vs 不丢任务」的权衡,我按任务时长分档处理,而不是一刀切。\n\n**边界:** 我的 BackgroundTaskRunner(DB 终态 + Redis 实时事件 + `undelivered`→`delivered` 注入)是已落地证据;但「跨进程续跑」诚实标注为未做——重启就标 `interrupted`。验证靠发起长任务→关页面→重开,断言能查到状态并拿到结果。",
      "HTTP 连接生命周期与任务生命周期分离。", ["后台任务"]],
    ["高并发 SSE 如何避免连接耗尽？",
      "高并发 SSE 的瓶颈不是 CPU 是连接数和内存,所以打法是「异步非阻塞 + 心跳/超时/上限 + 跨实例 Broker 分发」,且每条连接绝不背巨大上下文——一条连接拖着大 context,几千连接直接把内存吃穿。\n\n- **异步撑 idle 长连接**:用 FastAPI/uvicorn + `asyncio`,一个 worker 靠事件循环扛大量 idle 连接(连接多但多在等),不要每连接一线程;进程数按 CPU 定,连接靠 async 撑。\n- **心跳 + 超时回收僵尸**:每 `15-30s` 发一个 SSE comment(`: ping\\n\\n`)或空事件,防中间代理/LB 掐断 idle 连接;同时设空闲超时(如 `60-120s` 无活动且非运行中则关)。\n- **上限 + 跨实例分发**:按用户/IP 限同时连接数(如每用户 `3-5` 条),单实例设全局上限,到顶 `503` + `Retry-After`;客户端断开(`CancelledError` / `request.is_disconnected`)立即清理订阅、退订 Pub/Sub、释放 buffer。多副本时事件不能只在产生它的进程内——用 Redis Pub/Sub(或 Stream)按 `runId` channel 广播,连接落在哪个 pod 都能收到。\n- **代理层配合**:SSE 路由关 buffering、`proxy_read_timeout` 调大于心跳间隔、HTTP/2 多路复用绕开 6 连接上限——\n\n```nginx\nlocation /sse/ {\n    proxy_buffering off;\n    add_header X-Accel-Buffering no;\n    proxy_read_timeout 3600s;\n    proxy_http_version 1.1;\n}\n```\n\n**取舍:** 心跳间隔取「小于最严格中间层 idle 超时的一半」(`15-30s`),太长会被掐断、太短白耗带宽;连接上限按内存预算反推(每连接常驻字节 × 上限 < 安全内存)——本质是「保活成本 vs 连接密度」的平衡,我盯活跃连接数、发送队列积压、每连接内存来调。\n\n**边界:** 诚实说——Redis Pub/Sub 做实时事件分发我已在 BackgroundTaskRunner 落地,这是真证据;但 `1000 QPS` / 完整压测我没实测过,上面的连接上限和心跳值是工程默认与方法论,不是压测拐点。",
      "不要在每个连接中持有巨大上下文。", ["SSE","高并发"]],
    ["如何实现前端乐观 UI？",
      "乐观 UI 不是「全都先假装成功」——分界线是风险:低风险交互乐观、高风险动作等确认。回滚一个已展示的「已发布」体验极差且误导用户,所以高风险绝不盲目乐观。\n\n- **低风险即时乐观**:用户点发送立刻 push 一条本地消息,带 `clientMessageId`(前端生成 uuid)+ `status=pending`,UI 先渲染、输入框即清空,不等网络往返。\n- **服务端确认对账**:后端在 `run_started` / `message_created` 事件里回带 `clientMessageId` 和真实 `serverId`,前端按 `clientMessageId` 找到本地消息、把 id 换成 `serverId` 并置 `status=sent`,避免「本地一条 + 服务端一条」重复。\n- **失败保留可重试**:请求失败/超时标 `status=failed` 但保留文本,提供「重试」「编辑后重发」,绝不静默吞用户输入。\n- **高风险显式中间态**:工具写操作、审批、删除/发布类,UI 显示「待确认/执行中」,等后端 `tool_finished` / approval 结果回来再落定,绝不先假装成功。\n\n**取舍:** 乐观消息也必须进同一套 id+sequence reducer,服务端事件回来时按 `clientMessageId` 合并而非追加——牺牲一点实现简洁,换取「乐观条和真实条不会因乱序变成两条」。失败重试做指数退避(如 `1s/2s/4s`,上限 `3` 次)再转人工重试按钮。\n\n**边界:** 原则是「低风险乐观提升手感,高风险保守保正确」。验证靠断网发消息→看到 pending→恢复后确认变 sent 不重复;再造服务端拒绝场景断言变 failed 且内容还在。",
      "低风险交互乐观，高风险动作保守。", ["Optimistic UI"]],
    ["Agent UI 如何展示思考过程？",
      "展示的应该是可验证的「行动轨迹」,而不是伪造模型脑内独白,更不能泄露系统 prompt 或私有 CoT——把编出来的「内心戏」当透明度,既骗用户又有安全风险。\n\n- **用结构化事件还原轨迹**:正在检索什么(`kb_retrieve` 的 query + 命中库)、调了哪个工具(`tool_started.name` + 关键参数摘要)、拿到什么状态(`tool_finished.status` + `resultSummary`)、下一步要什么(需要审批/需要用户补信息)——每一步都能在事件流里找到出处。\n- **UI 形态是可折叠时间线**:每步一行(图标 + 一句话 + 可展开证据),默认折叠只显示当前阶段,用户想看再展开,既透明又不刷屏。\n- **reasoning 流要隔离标注**:若模型确实有独立思考通道,把它放进明确标注「思考中」的独立折叠区、与正式回答分开,且可由策略关闭;不要当正式答案混排,也不要声称「这是它真实的内心」。\n- **安全脱敏**:步骤展示不暴露系统提示词、内部工具白名单、密钥、其他用户数据;检索 query 可显示但结果证据按权限裁剪。\n\n**取舍:** 轨迹来源就是已有的 `tool_*`/`state_updated`/kb 事件,不需要模型「自述」——我宁可只展示能被事件验证的行动,牺牲一点「看起来更像在思考」的戏剧感,换取每一步都可追溯、不会编造。\n\n**边界:** 验证方法很直接——对照一次真实 run 的事件流,断言时间线每一步都能找到出处,没有任何「编出来的」描述。原则就是展示行动轨迹,不伪造脑内独白。",
      "展示行动轨迹，不伪造「脑内独白」。", ["UX","透明度"]],
    ["如何设计人工审批体验？",
      "审批的本质是让用户在执行前完整理解后果并可改可拒——「批的是 A、执行的是 B」是审批体验最致命的失败。所以用 interrupt 事件承载,审批后必须锁版本防漂移。\n\n- **触发与展示**:后端在执行高风险工具前发 `approval_required` 事件(payload: `{interruptId, toolCallId, action, target, params, impact, evidenceRefs}`),前端弹审批卡,明确列:将执行什么动作、作用对象、关键参数、预估影响、来源证据(点开可看检索/计算依据)。\n- **文案具体到动作和数量**:按钮不写「确认/取消」,写「发布这 3 条记录」「向 12 个客户发送通知」,让用户一眼知道后果规模。\n- **可改可拒**:支持 `accept` / `edit`(改参数后批准,编辑按 `toolCallId` 精确匹配回原工具调用)/ `deny`(拒绝并填原因,原因回传给模型);resume 走独立 `POST`(带 `interruptId` + 决定 + 修改后 `params`)。\n- **锁版本防悄改**:审批展示的参数/内容做快照绑定 `interruptId`,用户批准的就是他看到的那个版本;若期间内容会变(如引用了会刷新的数据),要么锁快照、要么提示「内容已更新,请重新确认」。\n\n**取舍:** 审批要不要设时效是个权衡——N 分钟未响应则任务挂起/超时(如 `10` 分钟,按业务定)能回收资源,但也可能打断慢决策的用户。我选「设时效 + 错过 interrupt 点的动态权限请求 fail closed 默认拒绝」,宁可让用户重发也不放行未审批动作。\n\n**边界:** 我后端有图级 HITL(静态权限 interrupt,可 accept/edit/deny,编辑按 tool call id 匹配)+ Pipeline 动态权限 fail closed deny,正好对接这套审批 UI。验证靠构造一次需审批的调用,断言不批不执行、edit 后执行的是改后参数、deny 后模型收到拒绝原因。",
      "审批要让用户真正理解后果。", ["HITL","UX"]],
    ["如何处理流式内容安全？",
      "必须边发边检、命中阈值即停发 + 取消下游——只在完整生成后审核,等于内容已经泄露到客户端了,再拦没意义。这是流式安全和批式安全的根本区别。\n\n- **增量检测**:后端在把 `text_delta` 推给客户端前过一道安全检测(关键词/分类器/规则),按滑动窗口(最近 N 字 + 累积全文)评分——逐字判会误判、攒到最后才查会泄露,滑动窗口是两者的平衡。\n- **命中即止血**:达风险阈值立即停止再发增量,并取消下游模型生成(复用取消机制:`cancellation_token` + 停读 provider 流),不让风险内容继续产出外泄。\n- **通知前端替换**:发 `blocked` / `error` 事件(payload: `{code, reason}`),前端把已渲染的未完成内容替换为合规提示(如「此内容因安全策略已被拦截」),不保留半截风险文本。\n- **输入侧同样处理**:用户输入也先过检测,必要时在 `run_started` 前直接拒绝,省得生成后再拦。\n\n**取舍:** 阈值是「误杀率 vs 漏检率」的权衡——我在标注好的正负样本集上扫,取误杀/漏检的拐点取值;窗口大小则平衡「早拦」与「上下文误判」。日志只记必要的风险标签/分类和 `messageId` 供审计,按最小化原则保存命中样本,不把敏感原文大面积落日志扩散。\n\n**边界:** 诚实说——流式内容实时审核我未实战,上面是方法与设计;但取消下游所需的 cancellation 机制我已落地,可作为承载基础。验证靠构造会逐步生成风险内容的用例,断言在越过阈值那一帧就停发并发 `blocked`,前端不残留风险文本。",
      "只在完整生成后审核会造成内容已泄露。", ["内容安全"]]
  ]
},
{
  id: "backend", title: "后端架构、数据与部署",
  desc: "Agent 仍然是分布式系统。FastAPI、任务队列、数据库、缓存、限流和容灾一样都不会消失。",
  items: [
    ["FastAPI 的同步和异步接口有什么区别？",
      "`def` 和 `async def` 在 FastAPI 里走两条完全不同的执行路径,选错的代价是把整个事件循环锁死、所有并发请求一起卡死——所以这题的本质不是语法,是「别在 async 路径里偷偷塞阻塞调用」。\n\n- **两条路径要先分清**:`async def` 路由直接在主事件循环里跑,适合等 I/O(LLM 流、PG、Redis、HTTP);`def` 路由 FastAPI 会自动丢到 anyio 线程池(默认 `40 worker`)执行,反而不阻塞循环——所以遗留的阻塞库老老实实写成 `def` 是安全的。\n- **真正会出事的是 async def 里调阻塞调用**:同步 SDK、`time.sleep`、CPU 密集(本地 FastEmbed `384 维` embedding、大 JSON 序列化)会卡住整个 loop,一卡全卡。\n- **阻塞代码三种放法对症下药**:I/O 阻塞库用 `await loop.run_in_executor(None, fn, *args)` 或 `anyio.to_thread.run_sync` 丢线程池;纯 CPU 密集(不放 GIL)用 `ProcessPoolExecutor` 或拆独立服务;DB 直接上原生 async 驱动(`asyncpg` / SQLAlchemy async),别在 async 里用 `psycopg2` 同步游标。\n- **要破一个误区**:异步只提高 I/O 并发吞吐,不会让单次推理更快——一次 `30s` 的 LLM 调用,async 的价值是这 `30s` 里还能服务别的请求。\n\n**取舍:** CPU 密集为什么不靠调大线程池而要走进程池?因为 GIL 在,线程池开再大也是假并发,CPU 任务必须进程隔离;代价是进程间通信和序列化开销,所以我只对真正 CPU 密集的活儿这么干,I/O 的还是留线程池。\n\n**边界:** 怎么证明没踩坑?压测时盯事件循环延迟——中间件里记 `loop.time()` 前后差,正常 `<10ms`;某接口 P99 飙到几百 ms,基本就是有阻塞调用混进了 async 路径。",
      "重点是不要在 async 路径中直接执行阻塞操作。", ["FastAPI","Async"]],
    ["长任务为什么不能一直占用 HTTP 请求？",
      "任务生命周期必须和请求生命周期解耦——HTTP 连接是不可靠的临时通道,不是任务的家。把长任务绑在一个连接上,连接一断任务就丢且无法续看,这是结构性错误不是优化问题。\n\n- **长连接会被一层层超时砍断**:nginx `proxy_read_timeout` 默认 `60s`、Cloudflare Tunnel `100s`、网关/LB 各有上限;再加上客户端切网、滚动发布 SIGTERM、浏览器刷新,任何一个都能让你前功尽弃。\n- **正确结构是「创建即返回 + 订阅看进度」**:`POST` 创建一条持久化 run(落库 `status=queued` + 返回 `runId`),交后台 Worker 执行,HTTP 立刻返回;进度靠 SSE 订阅(`GET /runs/{runId}/events`)或轮询状态,SSE 断了用 `Last-Event-ID` 从 `sequence` 续传、靠 DB 重放历史事件。\n- **这套我在 agent-server 的 BackgroundTaskRunner 落地了**:`asyncio.Task` 管运行时生命周期 + DB 管 `queued`/`running`/`progress`/terminal 事实状态,Redis Pub/Sub 只做实时事件分发(订阅失败可降级轮询 DB);进程重启时把没有对应 Runner 的 `queued`/`running` 记录标 `interrupted`,绝不假装还在跑。\n- **短时流式对话可以保连**(Aegra 承载 chat graph 的 AG-UI 流),但即使保连,状态也写进 Checkpoint——连接只是「实时视图」不是「唯一真相」,断了能从 Checkpoint 恢复。\n\n**取舍:** 什么时候保连、什么时候转后台?我按「网关超时」划线——单次同步窗口设在网关超时之内(网关 `100s` 则 `<90s`),超了就转后台 run;牺牲的是短任务也多一次落库往返,换来的是永不丢任务。\n\n**延伸:** 验证手段我喜欢用「发请求后立即 kill 客户端」的测试,断言任务仍跑完、状态可查、SSE 能重连续看——这才证明真解耦了,而不是连接没断时碰巧能用。",
      "把任务生命周期与请求生命周期分离。", ["任务队列"]],
    ["Agent 任务队列如何设计？",
      "Agent 任务和普通 MQ 消息根本不是一回事——它有副作用、可被取消、要能恢复,所以普通队列的 at-least-once 语义必须配幂等才安全,否则一次重投就重复扣费、重复发消息。\n\n- **消息体先把恢复和幂等需要的字段带全**:\n\n```json\n{\n  \"runId\": \"<UUID>\",\n  \"tenantId\": \"...\",\n  \"priority\": 0,\n  \"model\": \"...\",\n  \"budget\": {\"max_steps\": 25, \"max_tokens\": 0, \"max_cost_usd\": 0, \"deadline_ts\": 0},\n  \"idempotency_key\": \"hash(tenantId + 业务输入)\",\n  \"state_version\": 0,\n  \"payload\": {}\n}\n```\n\n其中 `idempotency_key = hash(tenantId + 业务输入)`,去重投递和工具副作用都靠它。\n- **存活检测用租约 + 续租**,覆盖 Worker 崩溃:领取后写 `locked_by` + `lease_expires_at = now()+30s`,每 `10s` 续租一次;一个扫描器把 `lease_expires_at < now()` 且 `status=running` 的重置回 `queued` 重投。\n\n```sql\nUPDATE tasks SET lease_expires_at = now() + interval '30 seconds'\nWHERE runId = ? AND locked_by = ?;\n```\n\n- **并发池按资源维度切**,不要一个全局池:每个 model 一个 `asyncio.Semaphore`(按上游 TPM/RPM 配额)、每类高成本工具(沙箱、爬虫)一个池,避免一个慢模型把所有 Worker 占满。\n- **重试要分类**,不能一刀切重投:`retry_count` 超 `maxRetries`(如 `3`)进 `dead_letter` 表;429/5xx/超时可指数退避重试(`base 1s`, `factor 2`, `max 60s`, 加 jitter 防重试风暴),4xx 参数错/权限错直接死信不重试(重试也是错)。\n- **取消走 cooperative**:cancel 把 DB `status` 置 `cancelling`,Worker 在步骤间检查这个标志,落 `cancelled` 终态——不能硬杀,否则副作用悬空。\n\n**取舍:** lease 时长怎么定?取「单步最坏耗时 × 2~3」——太短会误判存活 Worker 触发重复执行,太长则崩溃后恢复慢;我宁可偏长一点配幂等兜底,也不接受误判。\n\n**边界:** 两个测试最值钱——「重复投递同 `idempotency_key`」断言副作用只发生一次、「续租中途杀 Worker」断言任务被重新领取且不重复执行已完成步骤。",
      "关注 at-least-once 语义与副作用幂等。", ["Queue"]],
    ["PostgreSQL、Redis、向量库分别存什么？",
      "分工的判断标准就一条:丢了能不能恢复。能从别处重建的进 Redis,不能丢的进 PG——Redis 永远不当唯一真相源,否则一次 flush 就是数据事故。\n\n- **PostgreSQL 存所有事实数据**:`users`、`thread`、`message`、`run`、`run_step`、`tool_call`、`artifact` 元数据、`feedback`、审计日志、Checkpoint——强一致、要事务、要审计的都在这;我的库还跑 pgvector,Memory 和知识库的向量列复用同一个 PG 实例,cosine 用 `<=>` 算子、`1-distance` 转相似度。\n- **Redis 存可重建的临时态**:`tool_search` 缓存、`kb_retrieve` 缓存(`key=query+topK+filter+source`, `TTL 10min`)、限流令牌桶计数、分布式锁、BackgroundTaskRunner 的实时事件 Pub/Sub、沙箱 warmup 标记——原则就是 Redis 全丢系统能从 PG 重建,只是慢一点。\n- **向量库这里就是 pgvector**,存 embedding + metadata 做语义召回;超大规模或要独立扩缩才上专用库(Milvus/Qdrant)。\n- **原始大文件**(用户上传、Agent 产出的大 artifact)放对象存储 R2/S3,DB 只存 key 和元数据,key 带租户前缀(`tenant/{id}/...`)。\n\n**取舍:** 向量库为什么不一上来就用专用库?因为复用 pgvector 省掉一整套独立运维和数据同步成本,中小规模够用;牺牲的是极致召回性能和水平扩展上限,等真撞到规模天花板再迁。\n\n**边界:** 怎么证明没有数据偷偷只活在 Redis?给每个 key 都设 TTL(缓存 `600s`-`10min`、锁 `30s`)杜绝「假持久化」,再做一次「`flushall` Redis 后重启」演练,断言所有功能仍可用(最多首访慢)。",
      "按一致性和访问模式分工。", ["PostgreSQL","Redis"]],
    ["如何设计多租户数据隔离？",
      "隔离绝不能只靠业务代码每条 SQL 手写 where——人总会漏一条,迟早出越权。真正的判断是「把兜底下沉到数据库层」,让漏写的那条 SQL 也查不出别人的数据。\n\n- **`tenantId` 的来源先锁死**:从认证上下文(JWT claim / session)取,绝不从请求体取;进请求后放进 context var,服务层和数据访问层都从这里读,不层层传参(传参也会漏)。\n- **隔离强度三档按合规和规模选**:\n  - ①共享表 + RLS(PostgreSQL ROW LEVEL SECURITY,DB 层强制过滤,最省成本);\n  - ②独立 schema(每租户一套表,`search_path` 切换,更强);\n  - ③物理库(强合规/大客户,最彻底也最贵)。多数中小规模 RLS 起步。\n\nRLS policy 示例(每次连接 `SET app.tenant_id=...`):\n\n```sql\nCREATE POLICY tenant_isolation ON some_table\n  USING (tenant_id = current_setting('app.tenant_id')::uuid);\n```\n\n- **隔离边界要覆盖所有存储**,不只主库:Redis key 带 tenant 前缀(`rl:{tenant}:{user}`)、对象存储 key 带 tenant 路径、向量检索 metadata filter 强制带 `tenant_id`(pgvector `WHERE` 子句 / Dify dataset 按租户分)、日志和 trace 打 tenant 标签。\n- **RLS 还有个连接池串号的暗坑**:用 `SET LOCAL app.tenant_id` 在事务内设,事务一结束自动失效,避免上一个租户的设置泄漏给下一个借连接的请求。\n\n**取舍:** 为什么默认 RLS 而不是直接物理库?RLS 几乎零额外成本就拿到 DB 层强制隔离,性价比最高;牺牲的是「同库邻居」的合规观感,所以遇到强合规大客户我才升到 schema 或物理库。\n\n**延伸:** 上线前我会故意在 staging 漏写一条 where 看 RLS 还挡不挡得住——挡住才证明 DB 层是真兜底不是摆设;再配一套「用 A 的 token 带 B 的 `runId`/key 访问每个接口、断言 404/403」的越权测试。",
      "只在 SQL where 中手写 tenantId 很容易遗漏。", ["多租户"]],
    ["多模型网关应具备哪些能力？",
      "网关不是 URL 转发器,它是「统一抽象 + 差异适配 + 可观测」三件套——少了哪一件,换 provider 时上层代码就得跟着改、出了事还查不到原始响应。\n\n- **统一入口但保留原始**:对内暴露统一的请求/流式事件格式,对各家协议(OpenAI / Anthropic / 自建)做适配;务必把原始响应原样存进 trace 一份,别只存解析后的,排障全靠它。\n- **路由按声明驱动**:我的 ModelCatalog 按 provider 分组声明每个模型的 `endpoint`/协议/`context_window`/`max_output`/`modality`/`cost`/`fallback` 链,`get_model` 用 `provider_of(model)` 路由到对应端点;特别强调 `context_window` 和 `max_output` 要分开建模——我踩过把 `128K` `max_output` 当窗口、导致提前压缩的坑。\n- **韧性层一个都不能少**:超时(连接 + 读流空闲超时)、按 provider 配独立重试、令牌桶限流、熔断(连续失败打开断路器、cooldown 后半开探测);`fallback` 链显式配置、显式记录切换,绝不静默换模型让上层蒙在鼓里。\n- **成本与 Token 统计**:流式请求带 `stream_options.include_usage` 拿准确 usage,逐 run 累计 prompt/completion token 和 cost,写进 run 做配额和账单。\n- **Tool Calling 差异适配**:各家 tool schema、并行 tool call、结果格式都不同,网关统一成内部格式;Prompt 稳定前缀做 provider 的 prompt cache,动态内容(env/reminder)放尾部最大化命中。\n\n**取舍:** fallback 为什么坚持显式记录而不静默切?静默切的体验更顺,但会埋下「用户拿到的其实是降级模型却不知道」的隐性质量问题;我宁可在 trace 里留一条切换记录,可观测性优先于表面顺滑。\n\n**边界:** 熔断阈值我设「`30s` 窗口内失败率 `>50%` 或连续 `5` 次失败」打开、`cooldown 30s` 后半开放 `1` 个探测;验证用「主模型注入 500」的故障注入,断言自动走 fallback 且 trace 看得到切换。",
      "网关不是简单的 URL 转发器。", ["模型网关"]],
    ["模型服务不可用时如何降级？",
      "降级要按任务风险分级,核心立场是:写操作宁可停,也不用低能力模型瞎执行。读类失败给个旧答案无伤大雅,写类用弱模型乱跑可能造成不可逆副作用,这两者绝不能用同一套降级策略。\n\n- **配 fallback 链,但先校验能力对齐**:备用模型的 `context_window`、`modality`(能不能读图)、Tool Calling 支持、数据合规(境内外)必须和主模型一致,否则会出「降级后突然不认图/不会调工具」的隐性故障。\n- **按任务类型分降级路径**:简单分类/抽取回退到规则或更小模型;问答回退到缓存答案或纯检索结果(直接给检索片段、不让模型生成);复杂写操作/有副作用的——暂停并明确提示「服务暂不可用,稍后重试」,绝不用低能力模型冒险。\n- **优雅闭合而不是抛异常**:我的实现里 LLM retry/fallback 全耗尽后返回一条说明失败的 `AIMessage`,而不是抛异常——目的是让 SSE 正常闭合、前端从 thinking 落地,不卡在转圈。\n- **熔断恢复要渐进**:cooldown 到了先半开放少量探测流量,连续成功 `N` 次再全量切回,避免刚恢复就被打挂二次熔断。\n\n**取舍:** 为什么写操作不给 fallback 兜底反而直接停?因为「错误地执行」比「暂时不可用」损失大得多——停了用户重试一下就行,弱模型把订单改错就回不来了;代价是可用性数字难看一点,但我接受。\n\n**边界:** 验证用「主 + 备全部注入故障」的测试,断言最终是优雅 `AIMessage` + SSE 闭合,而不是 500 或前端永久 loading。",
      "降级策略应按任务风险区分。", ["降级"]],
    ["如何做限流？",
      "Agent 的稀缺资源不是单纯 QPS,而是并发 run 和 Token——一个长 run 占着 Worker 半分钟、烧掉几万 token,限 QPS 根本拦不住它,所以必须多维度同时限。\n\n- **多维度令牌桶,维度叠加都要过**:`user`、`tenant`、`model`、`tool`、系统总量各一个桶;用 Redis 实现,单 key 用 Lua 脚本原子地「取当前令牌-补充-扣减」避免读改写竞态,超限返回明确的 `Retry-After` 秒数。\n- **区分两类资源是关键**:①请求速率(RPS/QPS)用令牌桶限突发;②正在执行的长任务数——这是 Agent 独有的,每租户限并发 run 数(如最多 `5` 个 running),用 Redis 计数器 + run 终态时回收,防一个租户占满 Worker。\n- **Token/成本配额比限 QPS 更贴近真实成本**:高成本任务按 TPM 和月度预算限——run 开始前预估或运行中累计 token,超 TPM 排队、超月度预算拒绝。\n- **和上游 provider 配额对齐**:每个 model 的本地并发 `Semaphore` 上限设成略低于 provider 的 RPM/TPM,本地先挡住,别把 429 推到上游再被动退避。\n\n**取舍:** 为什么花力气限并发 run 而不只限 QPS?因为 QPS 限的是「进来的速度」,run 限的是「占用的存量」,Agent 的痛点恰恰是存量堆积;代价是要多维护一套计数器和回收逻辑,但这是 Agent 区别于普通 web 服务的地方。\n\n**边界:** 参数我这么定——令牌桶 `capacity=允许突发量`、`refill rate=稳态 QPS`(如 `capacity 20` / `refill 10/s`),per-tenant 并发 run 上限按「`Worker 总数 / 租户数`」留余量;验证用并发压测断言超限返回 429 + 正确 `Retry-After`,且 A 打满不影响 B。",
      "Agent 的关键资源往往是并发 run 和 Token，而非单纯 QPS。", ["限流"]],
    ["如何管理模型和工具凭证？",
      "判断的基线很硬:模型上下文、Prompt、日志都是不可信暴露面,长期密钥永远不进这些地方——因为模型可能把它吐回给用户,日志可能被翻出来,一旦进去就是泄漏。\n\n- **密钥放专门 Secret Manager**(AWS Secrets Manager / Vault / GCP),运行时注入进程环境或内存,不写代码、不进 git、不进 Prompt、不落 DB 明文、不打日志;我的项目密钥走 `.env` / Secret,`agent.config.json` 用 `${VAR}` 插值引用而不存值本身。\n- **工具账户最小权限 + 轮换**:每个工具用独立的最小权限服务账号(只给需要的 scope)定期轮换;轮换支持双密钥并存的灰度窗口(新旧都接受一段时间),避免轮换瞬间打挂。\n- **沙箱用一次性短期令牌**:不给长期密钥,发任务级短 TTL token(STS 临时凭证 / 短期 JWT,TTL 几分钟到任务时长),并限可访问域名 allowlist 和资源范围,任务结束即失效。\n- **防泄漏到输出**:日志和 trace 落库前过一遍脱敏(正则匹配 `sk-`、`Bearer token` 等常见形态打码);工具返回结果注入上下文前也扫一遍,防模型把抓到的密钥再吐出来。\n\n**取舍:** 沙箱为什么坚持一次性短 token 而不复用长期密钥?复用省事,但沙箱跑的是不可信代码,一旦它拿到长期密钥就等于把钥匙交给攻击者;我用短 TTL + allowlist 把泄漏的爆炸半径压到「单次任务、有限域名」,代价是多一套发 token 的链路。\n\n**边界:** 怎么证明脱敏真接上了?故意在 Prompt/工具结果里塞个假 key,断言日志和 trace 里它被打码——没打码就说明脱敏链路是死的。",
      "模型上下文不应该接触长期密钥。", ["Secrets"]],
    ["如何设计 Agent 数据库 Schema？",
      "核心判断是按数据性质分表:事件序列、业务状态、灵活载荷各归各位,绝不把一切塞进一张 `messages` 表——塞一张表的结果是索引乱、回放难、JSONB 和热查询字段混在一起谁都查不快。\n\n- **核心表分清职责**(加起来约 9 张主表):\n\n```text\nthread      会话\nmessage     sequence + role + content\nrun         一次执行: status / version / model / cost / token\nrun_step    节点名 / 输入输出引用 / 耗时\ntool_call   tool_name / args / result_ref / status\ncheckpoint  LangGraph 状态快照 + version\nartifact    大产出元数据 + 对象存储 key\nfeedback    用户反馈\neval_result 评测结果\n```\n\n- **事件/顺序表保 append-only + sequence**:`message`、`run_step` 用单调 `sequence`(per-thread 或 per-run)保证回放和 SSE 续传顺序确定,不依赖 `created_at` 排序(同毫秒会乱)。\n- **列设计冷热分离**:高频过滤/排序字段(`tenant_id`、`thread_id`、`run_id`、`status`、`created_at`、`sequence`)用独立列 + 索引;schema 多变的节点输入输出、tool args/result 用 JSONB,要查 JSONB 内字段再建 GIN 或表达式索引。\n- **关键索引按查询模式建**:\n\n```sql\n(tenant_id, thread_id, created_at)   -- 拉会话历史\n(run_id, sequence)                   -- 拉单 run 时间线\n(status, lease_expires_at)           -- 给队列扫描器\n(tenant_id, status)                  -- 数并发 run\n```\n\n**取舍:** 大工具结果是留库还是 offload?我按大小划线——超过阈值(如 `8KB`)就 carve 到对象存储、DB 只存引用(我的两级压缩里 Tier1 就是把可再生大工具结果 offload 成 artifact);牺牲一次额外取数,换来热查询表不被大字段拖慢。\n\n**边界:** 验证关键查询有没有走索引就用 `EXPLAIN ANALYZE`,看到 `Index Scan` 而非 `Seq Scan` 才算过——大文本/大 JSONB 别进热查询表,拆出去或放对象存储。",
      "不要把所有内容塞进一张 messages 表。", ["Schema"]],
    ["如何处理并发更新和状态一致性？",
      "防并发我用 version 乐观锁 + CAS,而不是悲观行锁——Agent 状态冲突其实很少,悲观锁的吞吐代价不划算;真正的难点不在锁本身,而在「审批期间和任务恢复时拿到旧状态」这两个高危时刻。\n\n- **乐观锁靠 CAS**:`state`/`checkpoint` 表带 `version` 列,更新走如下语句;受影响行数=0 说明被人改过,重读最新再算(read-modify-write 重试,限次数防活锁)。\n\n```sql\nUPDATE state SET data = ?, version = version + 1\nWHERE id = ? AND version = ?;\n```\n\n- **同一 run 的关键状态迁移要串行化**:用 Redis 分布式锁(`SET key val NX PX 30000` + 续租)或 DB 行级 `FOR UPDATE`,保证「读状态→决策→写状态」原子,避免两个 Worker 同时推进同一 run;我的设计里主 graph 是对话状态的唯一写入者,后台任务结果通过注入一次的方式回流,不直接并发写。\n- **事件顺序用 sequence 不用时间戳**:并发产生的事件用单调 `sequence` 定序、消费端按 `sequence` 处理,杜绝 last-write-wins 覆盖掉更新的状态。\n- **外部副作用配幂等键**:调外部 API/发消息带 `idempotency_key`,恢复或重投时同 key 不重复执行;区分 `cancelled` / `partially_completed`,半完成的靠幂等键安全重放。\n\n**取舍:** 乐观锁 vs 悲观锁怎么选?冲突少就乐观锁(吞吐高、无锁等待),代价是高冲突场景会反复重试;我对 Agent 状态判定为低冲突,所以乐观锁起步、重试上限 `3-5` 次 + 指数退避兜底活锁。\n\n**延伸:** 我会专门测两个场景——审批(HITL)期间状态被并发改、任务从 Checkpoint 恢复时拿到旧 `version` 写入,断言都被 CAS 挡住并正确重试,这俩才是真出过事的地方。",
      "特别关注审批期间和任务恢复时的旧状态。", ["一致性"]],
    ["如何部署和扩缩容 Agent 服务？",
      "扩缩的前提是「状态全外置、实例无状态」,在此之上各组件按各自的瓶颈指标独立伸缩——把 API、流式层、Worker、沙箱当成一坨一起扩,是最常见也最浪费的错。\n\n- **拆组件分开扩**,因为瓶颈指标完全不同:API(auth/admin,按 QPS + CPU)、流式网关/Aegra(按活跃连接数,连接是它的瓶颈)、Worker(按队列积压 + 模型/工具并发)、沙箱执行器(按沙箱并发,独立池避免拖垮主服务);我的项目里 Aegra 承载 chat graph + Checkpoint + AG-UI 流,FastAPI 负责 auth/admin/沙箱侧栏/后台任务,本就分进程。\n- **状态外置、实例无状态**:所有状态进 PG/Redis/对象存储,任何实例都能处理任何请求,才能水平扩 + 滚动发布;Checkpoint 让 run 可在新实例恢复。\n- **扩缩指标各用各的**:API 用 HPA 看 CPU/QPS;Worker 看「队列积压深度 / 每 Worker 处理速率」自定义指标(KEDA 监听队列长度最直接);流式层看并发连接数。\n- **优雅发布**:SIGTERM 后 Worker 停领新任务、把当前 run Checkpoint 后让新实例接、或 drain 跑完;`terminationGracePeriodSeconds` 设足够长(如 `120s`)覆盖单步最坏耗时;BackgroundTaskRunner 重启时把无 Runner 的 `running` 标 `interrupted` 可被重新调度。\n\n**取舍:** 扩容和缩容要不要同速?不——我扩容快、缩容慢(缩容冷却 `5min` 防抖),HPA 目标 CPU `60-70%`;宁可多留一点闲置实例,也不接受抖动式频繁起停把正在跑的 run 折腾断。\n\n**边界:** 验证靠滚动发布演练——断言发布期间无 run 丢失、连接断了能重连续看;队列积压扩容阈值我按「`积压 / 吞吐 > 可接受等待时长`」定。",
      "不同组件的扩缩指标不同。", ["部署","容器"]],
    ["如何做灰度发布和快速回滚？",
      "AI 应用的发布单元根本不止代码——model、prompt、graph、tool schema、知识库各自是独立版本,必须能单独回滚;否则出了问题只能整套回退,定位不到是哪个组件哪个版本引入的。\n\n- **每个组件独立版本号**:模型版、Prompt 版、Graph 版、Tool schema 版、知识库快照版,每个 run 落库记完整版本组合:\n\n```json\n{\"model_ver\": \"...\", \"prompt_ver\": \"...\", \"graph_ver\": \"...\", \"kb_ver\": \"...\"}\n```\n\n出问题精确定位。\n- **分流要稳定**:按 `tenantId`/`sessionId` 做 hash 取模分桶(如 `hash(tenantId) % 100 < 5` 进新版),保证同一租户/会话稳定落同一版本、不会体验跳变;比例 `5% → 25% → 100%` 阶梯放量。\n- **护栏指标超阈值自动停推/回滚**:盯 tool 成功率、`step count`(步数膨胀是 Agent 跑偏的强信号,我把它列为一等指标——`71 步` Fibonacci 事故就是这么抓的)、错误率、P95 延迟、`cost/run`;任一显著劣于基线就停。\n- **组件级回滚**:因为版本独立,发现是新 Prompt 的锅就只回退 Prompt 版,不必回滚整套服务;知识库/Skill 用 allowlist 缩小可见集、Custom Agent prompt 只叠加不替换,回退影响面可控。\n\n**取舍:** 为什么不全量上、出事再回?因为 Agent 的劣化往往不是崩而是「悄悄变蠢」(步数涨、绕路、答非所问),全量上再发现就晚了;我用 `5%` 灰度 + `step count` 这类行为指标提前拦,代价是发布周期更长,但值。\n\n**边界:** 回滚触发我用「相对基线的相对劣化」——tool 成功率 `-5pp` 或 `step count` 中位数 `+50%` 即触发;上灰度前还要先在 eval 任务集上比 passed/steps/latency/cost 过门禁。",
      "AI 应用的发布单元不只是一份代码。", ["灰度"]],
    ["如何设计沙箱资源隔离？",
      "沙箱隔离的默认姿态应该是「禁网 + 资源硬限 + 用完即焚」,再按威胁模型逐级升级到 microVM——跑的是不可信代码,宽松默认值就是给攻击者留门。\n\n- **每任务独立环境 + cgroup 硬限**:\n\n```bash\ndocker run --rm \\\n  --cpus=1 \\\n  --memory=512m \\\n  --pids-limit=128 \\\n  --network none \\\n  --tmpfs /tmp \\\n  image@sha256:<digest>\n```\n\nCPU(如 `--cpus=1`)、内存(`--memory=512m`,超限 OOM kill)、进程数(`--pids-limit=128` 防 fork 炸弹)、wall-clock 超时(如 `60-120s` 强杀)、磁盘配额、临时文件系统(`--tmpfs /tmp`,销毁即清)。\n- **网络默认禁、白名单放行**:`--network none` 起步,需要外网只开 egress allowlist(指定域名/IP)、DNS 也限制;绝不让沙箱裸连内网(防 SSRF 打内部服务)。\n- **命令参数化执行不拼字符串**:用 argv 数组(`execve` 风格)而非 shell 拼接,杜绝命令注入;镜像和依赖固定版本(pin digest 而非 `latest`),供应链可控。\n- **用完即焚 + 凭证一次性**:任务结束销毁容器不复用;沙箱拿任务级短 TTL token、无长期密钥;我的项目 Cloudflare/E2B 实现同一个 SandboxProvider 抽象,并在模型思考期异步 warm 沙箱、把冷启动藏进 LLM 延迟里(仅对标记过用沙箱的 thread)。\n- **高风险升级隔离**:执行不可信代码的场景容器命名空间不够,上 microVM(Firecracker / gVisor)每任务一个,内核级隔离防容器逃逸。\n\n**取舍:** 要不要直接全上 microVM?最安全但冷启动和运维成本最高,多数任务用不着;我按威胁模型分级——常规任务容器 + cgroup + 禁网够用,只有跑真正不可信代码才升 microVM,安全和成本之间按风险定档。\n\n**边界:** 验证就跑逃逸测试——fork 炸弹、读 `/etc/shadow`、连内网 IP、超时死循环,断言全被 cgroup/网络策略/超时挡住;超时我设「正常任务 P99 × 1.5」、内存按实测 + buffer。",
      "高风险代码可考虑 microVM，具体取决于威胁模型。", ["沙箱"]],
    ["如何排查一次线上 Agent 慢请求？",
      "排查的第一动作永远是用 `runId` 拉完整时间线定位哪一段慢,绝不一上来就换更快模型——换模型是确认「模型推理本身慢」之后的最后手段,否则你只是在赌。\n\n1. **用统一 `runId` 串起全链路 trace**(Langfuse / OTEL span):把一次 run 拆成排队等待、知识检索、各次 LLM 调用、各工具执行、DB 查询、前端传输几段,看每段耗时占比,慢在哪一段一目了然。\n2. **比 P50 和 P95/P99 区分性质**:P50 也慢=系统性问题(模型本身慢、上下文太长、检索慢);只有 P95 翘起=尾部问题(某工具偶发超时、连接池耗尽排队、个别 run 步数爆炸)——两者根因和解法完全不同。\n3. **按高频根因逐个查**:①步数膨胀/循环(看 `step count`、Stuck Detector 该触发没触发);②上下文过长让每轮 LLM 变慢(数每轮喂的消息条数和 token,该压没压);③检索慢(`kb_retrieve` 缓存命中没、向量查询走索引没 `EXPLAIN ANALYZE`);④工具超时/重试堆叠;⑤DB 连接池耗尽(等连接的时间算进哪段);⑥沙箱冷启动(warmup 生效没)。\n4. **定位后对症修**:上下文长就调压缩阈值、循环就修 Stuck 检测、检索慢就建索引或加缓存、连接池就调 pool size。\n\n**取舍:** 为什么把「换模型」排在最后?因为换模型见效快但掩盖真因——可能慢的是检索或连接池,换了模型这次快了下次照样犯;我宁可多花时间在 trace 里找到那一段,也不接受治标。\n\n**延伸:** 每段我都设了 SLO(检索 `<500ms`、单次 LLM TTFT `<2s`),超 SLO 的段打告警;修完在该 `runId` 的回归 eval 任务上复跑,断言 latency 和 `step count` 回到基线才算闭环。",
      "时间线是最有效的第一证据。", ["排障"]]
  ]
},
{
  id: "llm", title: "LLM 基础与编码题",
  desc: "Agent 应用岗通常不要求训练大模型，但需要理解模型行为边界，并保留扎实的编程与系统基础。",
  items: [
    ["Transformer 的核心结构是什么？",
      "一句话：Transformer 的灵魂是自注意力，而它最贵的代价——`O(n²)` 复杂度——也全压在这一步，所以现代生成式 LLM 的演进基本都是围着这个 `n²` 省钱。\n\n- **注意力本体**最该讲清：每个 token 投影出 Q、K、V，`attention = softmax(QKᵀ/√d_k)·V`，除 `√d_k` 是为了防点积过大把 softmax 推到饱和区（梯度消失）。多头就是把 `d_model` 切成 `h` 份（如 `d_model=4096, h=32, 每头 d_k=128`）各自算再 concat，让不同头去关注不同的关系子空间。\n- **复杂度**从 `QKᵀ` 来：它是个 `n×n` 矩阵，时间和显存都 `O(n²·d)`——这就是长上下文成本的根因，KV Cache、滑窗注意力、FlashAttention 全是在这条线上省。\n- **一层 block 的骨架**：多头自注意力 + 残差 + LayerNorm（现在多是 Pre-LN，先 norm 再进子层，训练更稳）+ 前馈 FFN（两层线性，中间维度约 `4×hidden`，激活 GELU/SwiGLU）。\n- **现代生成式 LLM** 多用 Decoder-only + causal mask（第 `i` 个 token 只能看 `≤i`），配 RoPE 等相对位置编码做自回归；Encoder-Decoder 现在主要留给翻译类。\n\n**取舍：** 面试官真正想看的不是我背全结构，而是能不能手画一层 block 的数据流、说出每步张量形状（如 `[batch, seq, d_model]`）——能画出来说明我真懂，背得出说明我看过文档。\n\n**延伸：** 想加分就接一句 GQA/MQA——让多个 Q 头共享一组 K/V 来压 KV Cache 显存，这恰好把「`n²` 是根因」这个判断又落到了推理省钱的具体手段上。",
      "准备解释 attention 复杂度和多头注意力。", ["Transformer"]],
    ["Token 是什么？上下文窗口越大越好吗？",
      "直接给结论：窗口越大越好是个错觉——注意力 `O(n²)` 让成本超线性涨，而且有 lost-in-the-middle，塞满 `128K` 反而稀释关键证据，正解是上下文工程而不是堆窗口。\n\n- **先纠 token 的粒度认知**：token 是 tokenizer（BPE/BBPE/SentencePiece）切的子词，不等于字符或单词——英文一个词常 1-2 token，中文一个字常 1-2 token，所以同样字数中文更费 token；估成本/判截断一定要用模型自己的 tokenizer 算，别用 `len(text)`。\n- **大窗口的真实代价两条**：一是延迟和成本随长度超线性；二是 lost-in-the-middle——中段信息的召回率明显低于头尾。\n- **工程上要把两个量分开**：`context_window`（输入+输出总额度）和 `max_output`（单次最多生成多少）是两回事——我在 agent-server 就踩过把某模型 `128K` 的 `max_output` 误当窗口、过早触发压缩的坑，所以 catalog 里这俩字段是分开声明的。\n- **正解**是只把当前回合要用的系统规则、最近历史、检索证据放进去，旧的大工具结果 offload 成引用。\n\n**取舍：** 怎么证明「检索+压缩」赢过「全量塞窗口」？我在固定任务集上对比两者的答案正确率和 token 成本——通常压到 `8-12K` 的更便宜且不更差。我宁可花力气做上下文工程，也不靠换更大模型来掩盖塞太多的问题。\n\n**边界：** 判断「该压缩了」的信号是用 token 计数器看每轮真实输入长度逼近窗口——这是触发压缩、而不是触发「换大模型」的时刻。",
      "不同模型 tokenizer 不同，中文 Token 比例也不同。", ["Token"]],
    ["temperature、top-p、top-k 有什么作用？",
      "一句话：三个都是控随机性，但维度不同——工具调用/抽取这类要可复现的，我直接 `temperature` 锁 `0`，不让它发挥；要发散才往上调。\n\n- **`temperature` 是全局缩放**：`logits/T` 再 softmax。`T→0` 趋近 argmax（确定性最高），`T=1` 用原始分布，`T>1` 拉平更发散。\n- **`top-k` 是硬截断**：每步只在概率最高的 `k` 个候选里采样（如 `k=40`），砍长尾乱词。\n- **`top-p`（nucleus）是自适应截断**：按概率从高到低累加，取累计到 `p`（如 `0.9`）的最小候选集——候选数随分布自适应，比固定 `k` 更稳。\n- **落到场景的死参数**：结构化输出/工具调用/抽取分类用 `temperature 0-0.2`、`top_p 1`；RAG 问答 `0.2-0.4`；创意写作 `0.7-1.0` + `top_p 0.9`。\n\n**取舍：** `temperature` 和 `top_p` 多数 API 建议只大改一个，别同时调——两个都动会互相干扰，调出来的效果你说不清是谁的功劳。验证确定性的办法是把 `temperature` 锁 `0`、同一输入跑多次，看 `tool_call` 是否完全一致。\n\n**边界：** 有些 reasoning 模型根本不暴露 `temperature`，要按 provider 文档来——别假设这套参数全模型通用，这是个容易翻车的盲区。",
      "不同 API 对参数支持与实现可能不同。", ["Sampling"]],
    ["什么是幻觉？如何降低？",
      "先定调：幻觉不能消除只能压，而且压之前必须先分类——知识缺失、检索失败、生成不忠实三种的解法完全不同，上来就「优化 Prompt」是没找对病根。\n\n- **第一步永远是定位类型**：模型没这知识（知识缺失）/ RAG 没召回到模型硬编（检索失败）/ 证据在却答错或加戏（生成不忠实）。先看日志里模型当时实际收到的上下文，再决定补哪层。\n- **输入层**：RAG 给权威证据 + 工具实时查询（查库、查时间），把开放问答变有据问答。\n- **指令层**：要求带引用（cite `chunk_id`）、明确允许拒答（证据不足就说不知道）、强约束只用提供的上下文回答。\n- **输出层**：结构化输出 + Pydantic/schema 校验 + 业务规则校验（金额非负、日期合法），不合规就有限重试或降级人工。\n- **评测层**：把每次线上抓到的幻觉沉淀成回归用例（给定证据，答案必须出自证据），用 LLM-as-judge 或事实一致性指标量化。\n\n**取舍：** 哪层先补？我在 100-200 条标注集上分别测「裸 Prompt / +RAG / +引用 / +校验」的事实正确率，看哪层边际收益最大就先上。不忠实型最可控，能压到接近 `0`；知识缺失型靠 RAG 覆盖率，我不承诺 `100%`——承诺消除幻觉本身就是不诚实。\n\n**边界：** 三类里检索失败最容易被误诊成「模型笨」，其实是召回没命中——所以看日志确认上下文里到底有没有证据，是省最多时间的一步。",
      "把幻觉问题拆层，而不是只说优化 Prompt。", ["幻觉"]],
    ["为什么结构化输出仍可能失败？",
      "核心判断：JSON 能解析 ≠ 业务合法。结构化输出本质还是概率生成，我从不信它的 JSON 外观，一律后端 Pydantic 再校验 + 有限重试兜底。\n\n- **先认清失败形态**：缺必填字段、类型错（数字给成字符串）、枚举越界、被 `max_output` 截断成半截 JSON、外面包了 markdown 代码块、多吐解释文字。\n- **优先用原生约束**：能用就用 provider 的 JSON mode / `json_schema` / function calling（约束解码合规率最高），并预留足够 `max_tokens` 防截断。\n- **后端必须再校验**：`Pydantic model.model_validate(json.loads(raw))`，把 `ValidationError` 的具体字段错误拼成反馈喂回模型。\n- **有限重试 + 全失败降级**：失败把「上次输出 + 校验错误 + 再强调 schema」回喂，上限 `2-3` 次（避免无限烧钱），重试临时降 `temperature` 到 `0` 提稳；仍不合规就走兜底——返回结构化 error / 转人工 / 退安全默认值，绝不把没校验的 dict 往下游传。\n\n**取舍：** 重试次数按原生 JSON mode 的一次通过率定——通过率高就 `1-2` 次足够，没必要为了那 `0.x%` 一直重试烧钱。\n\n**边界：** contract 测试要断言输出能被目标 Pydantic model 解析、关键字段类型和取值域都对，而不是只断言 `json.loads` 不抛错——只测「能解析」是测了个寂寞，业务非法照样过。",
      "JSON 可解析不等于业务合法。", ["Structured Output"]],
    ["SFT、RAG 和 Prompt 应该怎么选？",
      "决策很简单：先问「变的是知识还是行为」，再按成本从低到高加——永远先 Prompt，知识变就 RAG，只有行为怎么调都不稳且有几千条标注才轮到 SFT。\n\n- **先 Prompt**：任务说明、输出格式、风格示例（few-shot）这类永远先用 Prompt——零训练成本、改一行就生效、最易评测。\n- **知识经常变 / 要引用溯源 / 私有文档 → RAG**：知识放外部库检索注入，更新只需重新 embed、不动模型。实时知识更新只能用 RAG，绝不用微调追——训练完知识就过期了。\n- **要稳定改行为/风格/领域格式、Prompt 怎么写都不稳、且有几千条以上高质量标注 → 才 SFT**：典型是固定输出 DSL、特定领域语气、压缩长 system prompt。\n- **实战常组合**：SFT 定行为 + RAG 供知识 + Prompt 调编排，先上便宜可评测的，不够再叠一层。\n\n**取舍：** 判断标准是失败归因——先建评测集量当前 Prompt 的失败率，失败是「不知道答案」就上 RAG，是「知道但格式/风格不稳」且 Prompt 救不动才上 SFT；SFT 至少几千条清洗数据 + 留 held-out 防过拟合。\n\n**边界：** 诚实说，我做过 RAG 和 Prompt 工程，SFT 能讲清适用判断和数据要求，但没有亲手微调上线的实战——这条线我会标清楚，不会假装做过。",
      "不要用微调解决实时知识更新。", ["SFT","RAG"]],
    ["什么是 KV Cache？为什么影响推理？",
      "一句话：KV Cache 用显存换速度，把 decode 从每步重算整段 `O(n²)` 降到只算新 token `O(n)`；但它的显存随序列和并发线性涨，长上下文高并发下往往比模型权重还吃显存，是限制最大 batch 和最长上下文的真正瓶颈。\n\n- **原理**：自回归每生成一个 token 只需它的 Q 去和历史所有 token 的 K、V 算注意力；历史 K、V 不变所以缓存下来，prefill 之后的 decode 显著加速。\n- **代价能算出来**：`KV 显存 = 2(K和V) × layers × seq_len × n_kv_heads × head_dim × batch × dtype字节`——随序列长度和并发线性涨，这就是为什么长上下文是奢侈品。\n- **优化手段**：GQA/MQA 让多 Q 头共享少量 K/V 头直接压 `n_kv_heads`；PagedAttention（vLLM）像虚拟内存分页管理避免碎片；prefix caching 复用相同前缀（如固定 system prompt）的已算 KV；KV 量化（INT8/FP8）再省一半，代价是轻微精度损失。\n\n**取舍：** prefix cache 是免费午餐——我把不常变的 system prompt / 工具定义放 Prompt 最前面、动态内容放尾部，最大化命中率（命中率可观测）；估容量就用上面公式算单请求 KV 显存反推最大并发。\n\n**边界：** 诚实说，vLLM/PagedAttention 这些我懂原理和取舍，但没有私有部署调优的实操经验——这是我会标出来的边界。",
      "可关联长上下文成本与并发容量。", ["KV Cache"]],
    ["Embedding 和生成模型有什么区别？",
      "一句话：它俩目标、输出、用法、评测口径四样都不同，最容易栽的坑是拿生成质量去评 embedding——embedding 好坏只能用检索任务衡量。\n\n- **输出形式**：embedding 把文本压成固定维度稠密向量（如 `384/768/1024` 维），生成模型预测下一个 token 产出文本。\n- **训练目标**：embedding 多用对比学习（正样本拉近、负样本推远）让语义近的向量距离小；生成是 next-token 预测。\n- **用法**：embedding 做检索/聚类/去重/语义相似，配 cosine 或内积 + 向量索引；生成做问答/写作/工具调用。在 RAG 里是上下游——embedding 召回 → 生成回答。\n- **一个必须守的工程点**：建库和查询必须用同一个 embedding 模型同一版本，换模型要全量重 embed；维度由模型定，pgvector 列要对齐（我这边 mem0 用本地 FastEmbed `384` 维）。\n\n**取舍：** 选 embedding 模型我看自己领域的 query→相关文档标注集上的 `Recall@5`/`MRR`，绝不看 MTEB 榜单第一就用——榜单分高不等于在我的语料上召得准。\n\n**边界：** 评测口径错配是高频陷阱——拿生成质量评 embedding、或拿通用榜单代替领域评测，都会选错模型，这点比记住维度数值重要得多。",
      "二者训练目标和输出形式不同。", ["Embedding"]],
    ["手写余弦相似度需要注意什么？",
      "思路要点：公式是 `cos = dot(a,b)/(‖a‖·‖b‖)`，但能拉开差距的不是写公式，而是零向量/维度不等的边界处理，以及「建库预归一化、查询退化成纯点积」这个生产级优化。\n\n- **朴素实现**（`O(n)` 时间、`O(1)` 空间）：先 assert 维度一致，再挡掉零向量避免除零。\n\n```python\nimport math\n\ndef cosine(a, b):\n    assert len(a) == len(b)\n    dot = sum(x * y for x, y in zip(a, b))\n    na = math.sqrt(sum(x * x for x in a))\n    nb = math.sqrt(sum(y * y for y in b))\n    if na == 0 or nb == 0:\n        return 0.0   # 零向量余弦未定义，约定返 0 避免除零\n    return dot / (na * nb)\n```\n\n- **边界要拦**：维度不等直接报错；全零向量、含 `NaN`/`Inf` 要挡；超大维度用 `float64` 累加或 `math.fsum` 减浮点误差。\n- **向量化**（批量别写 Python 循环）：单条 `np.dot(a,b)/(np.linalg.norm(a)*np.linalg.norm(b))`；一查多用矩阵 `A(m×d)` 对 `q(d)`——先 L2 归一化每行，再一次矩阵乘出 top-k。\n\n```python\nimport numpy as np\n\n# 一查多：A 是 m×d 候选矩阵，q 是 d 维查询向量\nA_n = A / np.linalg.norm(A, axis=1, keepdims=True)\nq_n = q / np.linalg.norm(q)\nsims = A_n @ q_n   # 一次矩阵乘得到全部相似度，再取 top-k\n```\n\n- **关键优化**：建库时预先归一化所有向量并存起来，查询时余弦退化成纯点积（省掉每次开方）——这正是 pgvector 用 `1-(a<=>b)` 把 cosine distance 转相似度、以及向量库普遍存归一化向量的原因。\n\n**取舍：** 零向量返回值是个约定不是真理——余弦在零向量上数学未定义，我约定返 `0` 是为了不让整条流水线因一个脏向量崩掉，但会在注释里写明这是约定。\n\n**延伸：** 高频追问「归一化后为何可用内积」——单位向量 `‖a‖=‖b‖=1`，`cos = dot/(1·1) = dot`；验证就用相同向量得 `1`、正交得 `0`、反向得 `-1`、零向量按约定得 `0`，再和 `sklearn.cosine_similarity` 对拍（容差 `1e-6`）。",
      "常见追问：归一化后为何可用内积。", ["算法"]],
    ["算法题如何展示思路？",
      "核心判断：算法面试评的是沟通和正确性证明，权重不低于跑通——所以别闷头写，按固定五步出声讲思路。\n\n1. **厘清需求**：复述题意、确认输入范围（`n` 多大决定能不能 `O(n²)`）、边界（空、单元素、重复、负数、溢出）、是否允许改原数据、是否有序。\n2. **先给朴素解 + 指出瓶颈**：如「暴力两重循环 `O(n²)`，瓶颈在重复查找」——先让面试官看到我能正确解，再优化。\n3. **选数据结构并说不变量**：哈希表换 `O(1)` 查找、堆维护 top-k、双指针/滑窗、并查集、BFS/DFS，说清循环不变量和为什么正确。\n4. **编码前列用例**：典型 `1-2` 个 + 异常用例（空/越界/重复），边写边对照。\n5. **写完分析时间空间复杂度**、说明能否再优化、有没有 trade-off。\n\n**取舍：** 很多人觉得跑通最重要，我的判断相反——沟通和正确性证明同样占分，所以我宁可慢一点全程出声讲、写完主动跑一遍用例，也不要闷头秒出一个自己都没验证的解。\n\n**延伸：** Agent 岗高频题型集中在字符串处理、哈希/双指针、堆（top-k、合并 k 路）、图遍历、以及并发控制（限流任务池、生产者消费者）——并发那一类几乎必考，值得专门准备。",
      "沟通过程和正确性证明同样重要。", ["算法"]],
    ["如何实现一个并发受限的异步任务池？",
      "思路要点：核心就一句「最多 `N` 个在跑，完一个补一个」；最简用 Semaphore，海量任务改 worker pool 省内存，再叠超时、错误隔离、取消三件套——下面是可运行实现。\n\n1. **Semaphore 最简法**（小批量够用）：`gather` 保证结果顺序与输入一致；`wait_for` 给单任务超时；`return_exceptions=True` 让单个失败不炸全体，事后逐个判 `isinstance(r, Exception)`。\n\n```python\nimport asyncio\n\nsem = asyncio.Semaphore(8)\n\nasync def run(task):\n    async with sem:\n        return await asyncio.wait_for(do(task), timeout=30)\n\nresults = await asyncio.gather(*[run(t) for t in tasks], return_exceptions=True)\n```\n\n2. **海量任务用 worker pool**（别一次建几万协程）：\n\n```python\nq = asyncio.Queue()\nfor t in tasks:\n    q.put_nowait(t)\n\nasync def worker():\n    while True:\n        t = await q.get()\n        try:\n            await do(t)\n        finally:\n            q.task_done()\n\nworkers = [asyncio.create_task(worker()) for _ in range(N)]\nawait q.join()               # 等清空\nfor w in workers:\n    w.cancel()               # 再收工\n```\n\n3. **取消与资源回收**：保留 `tasks = [asyncio.create_task(...)]`，外部要停就 `for t in tasks: t.cancel()`，每个任务在 `finally` 里释放资源（关连接/文件）。\n4. **JS 等价**：维护 `running` 计数 + 队列，promise 完成回调里 `running--` 并取下一个；或直接用 `p-limit` / `Promise.allSettled` 配并发闸。\n\n```javascript\nimport pLimit from \"p-limit\";\n\nconst limit = pLimit(8);\nconst results = await Promise.allSettled(\n  tasks.map((t) => limit(() => doTask(t)))\n);\n```\n\n**取舍：** 并发上限 `N` 不是拍脑袋——是 API 速率限制就贴它的 RPS，是 CPU 密集就贴核数，是外部连接就贴连接池大小；压测时画 p99 延迟和错误率随 `N` 的曲线取拐点，过了拐点再加并发只会更慢更错。\n\n**延伸：** 这就是并行工具调用的实际形态——我在 agent-server 里把 safe 工具并行、非 safe 独占，正是这套限并发编排落到了生产。",
      "很贴近并行工具调用的实际场景。", ["并发"]],
    ["Redis 在 Agent 系统中有哪些常见用途和风险？",
      "最关键的判断先说：Redis 是易失内存，绝不能当事实源——关键状态（任务终态、checkpoint）必须落 PostgreSQL，Redis 只做加速和实时通道，挂了能降级。\n\n- **实用场景**：限流（令牌桶/滑窗，`INCR`+`EXPIRE` 或 Lua 原子）、短期缓存（我这边 `kb_retrieve` 结果缓存 10min、`tool_search` 结果缓存）、分布式锁、任务进度、Pub/Sub 实时事件分发。\n- **穿透**（查不存在的 key 一直打 DB）：对空结果也缓存短 TTL 空值占位，或布隆过滤器先挡掉一定不存在的 key。\n- **击穿**（热 key 过期瞬间大量并发回源）：互斥锁/单飞只放一个请求去重建、其余等结果，或热 key 设逻辑过期不真删。\n- **雪崩**（大批 key 同时过期或 Redis 宕机）：TTL 加随机抖动（如 `base±10%`）打散过期、多级缓存、Redis 集群高可用 + 限流降级兜底。\n- **锁的坑**：锁必须带唯一 token + 合理 TTL，释放时用 Lua 比对 token 再删（防误删别人的锁）；锁过期早于业务完成会导致并发，要么 watchdog 续期、要么保证业务幂等。\n\n**取舍：** 缓存 TTL 按数据新鲜度容忍定——业务知识可 10min，强实时干脆别缓存；而事实源和加速层我严格分家，我的后台任务就是 DB 管事实状态、Redis Pub/Sub 只做实时事件，Redis 挂了能降级轮询 DB。\n\n**边界：** 最容易出事的不是缓存故障而是「把 Redis 当数据库」——一旦关键终态只存在 Redis，宕机就是数据丢失，这条线我从不越。",
      "准备缓存穿透、击穿、雪崩等基础题。", ["Redis"]],
    ["数据库索引如何影响向量与 metadata 查询？",
      "核心判断：向量索引和标量索引各管一半，但真正决定快慢的是「过滤和向量谁先走」，而这个顺序不能猜——最终用 `EXPLAIN ANALYZE` 在真实数据量上验真。\n\n- **两类索引分工**：向量索引（HNSW/IVFFlat）把全表暴力近邻降到候选子集；B-tree / 倒排 / GIN 负责 `tenant_id`、时间、`status`、`business_line` 这类标量过滤。\n- **执行顺序最关键**：高选择性过滤（过滤后只剩很少行）应先标量过滤、再在小集合上精确算距离，可能比走向量索引还快；低选择性则让向量索引先出候选再过滤。pgvector 还有 pre-filter vs post-filter 之分，post-filter 可能导致 top-k 被过滤后不足 `k` 个。\n- **给 planner 喂统计**：保证过滤列有索引、`ANALYZE` 更新统计信息，否则它选错路；复合查询常建组合或 partial 索引（如对常用 `status` 建 partial index）。\n\n**取舍：** 顺序不靠直觉靠 `EXPLAIN ANALYZE`——看实际走没走索引、估算行数 vs 实际行数差多少（差大说明统计过期）、耗时花在哪个节点；选择性高到一定程度就显式走精确搜索，我不预设「向量索引一定更快」。\n\n**延伸：** pgvector 我用 cosine 距离算子 `<=>` 转 `1-distance`，这块常被顺着追问 HNSW 与 IVFFlat 的取舍——这是下一道题。",
      "pgvector 常会继续追问 HNSW 与 IVFFlat。", ["PostgreSQL","索引"]],
    ["HNSW 与 IVFFlat 有什么区别？",
      "一句话选型：读多写多 + 要高召回低延迟 + 内存够就 HNSW（pgvector 默认推荐，我这边用它）；内存紧 / 数据量超大要省索引 / 能接受略低召回才 IVFFlat。\n\n- **HNSW**（分层可导航小世界图）：建多层邻接图，查询从顶层粗导航逐层下沉。召回高、查询快、对动态写入友好；代价是索引体积大、内存高、构建慢。关键参数 `m`（每节点邻居数，常 `16`）、`ef_construction`（建图候选集，常 `64-200`，越大越准越慢）、查询期 `ef_search`（调大提召回降速度）。\n- **IVFFlat**（倒排+聚类分桶）：先 kmeans 把向量分成 `lists` 个桶，查询只搜最近的 `probes` 个桶。索引轻、内存省、构建快；代价是需要足够数据训练聚类、召回受 `probes` 影响、数据分布变或数据量小时质量不稳，且新数据多了要重建。关键参数 `lists`（建议 `≈ rows/1000` 量级）、`probes`（查询期调大提召回降速度）。\n- **一句话记差异**：HNSW 拿内存和构建时间换召回与稳定性，IVFFlat 反过来拿召回稳定性换轻量。\n\n**取舍：** 参数不背死值，靠在自己数据上画 Recall vs Latency 曲线——HNSW 调 `ef_search`、IVFFlat 调 `probes`，找满足召回目标（如 `Recall@10≥0.95`）下最低延迟的点；建库先 HNSW `m=16`/`ef_construction=128`、IVFFlat `lists` 按行数定，再压测微调。\n\n**边界：** 诚实说，百万级以上向量库（如 Milvus）的大规模调优我没实操过，能讲清原理和参数取舍逻辑——这是我会标清的边界。",
      "参数最终应通过 Recall/Latency 曲线调优。", ["向量索引"]],
    ["如何看待 Prompt Engineering 与 Context Engineering？",
      "核心立场：单条神 Prompt 撑不住生产 Agent——长会话、多工具、知识更新下它必然不稳，稳定性来自每轮可控地决定「模型这一步到底看见什么」，这就是 Context Engineering。\n\n- **两者关注点不同**：Prompt Engineering 管「这一段指令怎么写」——角色、few-shot、输出格式、思维链，是单条 prompt 内的措辞；Context Engineering 管「每一步模型看见了什么」——系统规则、对话历史、长期记忆、检索证据、工具定义、当前状态，以及它们的优先级、预算和组装顺序，是一整套上下文供给系统。\n- **生产靠后者的具体手段**：稳定前缀（system+工具定义）放头部吃 prefix cache、动态 reminder/状态放尾部、旧大工具结果 offload 成引用、检索证据按预算和门槛注入、循环护栏和审批也算上下文的一部分。\n- **二者不对立**：Context Engineering 决定喂什么（骨架），Prompt Engineering 决定每块怎么措辞（用词），缺一不可。\n\n**取舍：** 力气往哪投？我给每类上下文设 token 预算（如检索证据 `3s` 内并行召回、按相关度门槛过滤），用评测集验证过——「改上下文系统」比「改 prompt 措辞」对成功率影响大得多，所以预算紧时我先优化前者。\n\n**延伸：** 这不是空谈——我在 agent-server 的两级压缩、KnowledgeSource 注册表注入、每轮 turn reminder，就是把 Context Engineering 工程化落地的三个实例，任一条都可以展开讲。",
      "这是当前 Agent 岗常见的认知题。", ["Context Engineering"]]
  ]
