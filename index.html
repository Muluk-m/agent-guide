{
  id: "backend", title: "后端架构、数据与部署",
  desc: "Agent 仍然是分布式系统。FastAPI、任务队列、数据库、缓存、限流和容灾一样都不会消失。",
  items: [
    ["FastAPI 的同步和异步接口有什么区别？",
      "做法（关键判断：def 和 async def 在 FastAPI 里走两条完全不同的执行路径，选错会把整个事件循环锁死）：\n1. async def 路由直接在主事件循环里跑，适合等待 I/O（LLM 流、PG、Redis、HTTP）；def 路由 FastAPI 会自动丢到 anyio 线程池（默认 40 worker）执行，不阻塞循环——所以遗留的阻塞库写成 def 反而安全。\n2. 真正的坑是 async def 里调用阻塞调用：同步 SDK、time.sleep、CPU 密集（如本地 FastEmbed 384 维 embedding、JSON 大对象序列化）会卡住整个 loop，所有并发请求一起卡。\n3. 阻塞代码三种放法：I/O 阻塞库用 await loop.run_in_executor(None, fn, *args) 或 anyio.to_thread.run_sync 丢线程池；纯 CPU 密集（不放 GIL）用 ProcessPoolExecutor 或拆成独立服务；DB 用原生 async 驱动（asyncpg / SQLAlchemy async），不要在 async 里用 psycopg2 同步游标。\n4. 异步只是提高 I/O 并发吞吐，不会让单次模型推理更快——一次 30s 的 LLM 调用，async 只是让这 30s 里能服务别的请求。\n参数怎么定 / 怎么验证：压测时盯事件循环延迟——在中间件里记录 loop.time() 前后差，正常应 <10ms；如果某接口下 P99 飙到几百 ms 说明有阻塞调用混进了 async 路径。线程池默认 40，I/O 密集可调 anyio 的 total_tokens，但 CPU 密集调大线程池没用（GIL），要走进程池。",
      "重点是不要在 async 路径中直接执行阻塞操作。", ["FastAPI","Async"]],
    ["长任务为什么不能一直占用 HTTP 请求？",
      "做法（关键判断：任务生命周期必须和请求生命周期解耦——HTTP 连接是不可靠的临时通道，不是任务的家）：\n1. 长连接会被一层层超时砍断：nginx proxy_read_timeout 默认 60s、Cloudflare Tunnel 100s、网关/LB 各有上限；客户端切网、滚动发布 SIGTERM、浏览器刷新都会断连，断了任务就丢且无法重连续看。\n2. 正确结构：POST 创建一条持久化 run（落库 status=queued + 返回 runId），交后台 Worker/Task 执行，HTTP 立刻返回；进度和结果靠 SSE 订阅（GET /runs/{runId}/events）或轮询 GET /runs/{runId} 状态。SSE 断了能用 Last-Event-ID 从 sequence 续传，靠 DB 重放历史事件。\n3. 我在 agent-server 的 BackgroundTaskRunner 就是这套：asyncio.Task 管运行时生命周期 + DB 管 queued/running/progress/terminal 事实状态，Redis Pub/Sub 只做实时事件分发（订阅失败可降级轮询 DB）。进程重启时把没有对应 Runner 的 queued/running 记录标 interrupted，不会假装还在跑。\n4. 短时流式对话可以保持连接（Aegra 承载 chat graph 的 AG-UI 流式），但即使保连，状态也写进 Checkpoint，断了能从 Checkpoint 恢复，连接只是「实时视图」不是「唯一真相」。\n参数怎么定 / 怎么验证：把对话超时阈值设在网关超时之内（如网关 100s，则单次同步窗口 <90s，超了转后台 run）；做一个「发请求后立即 kill 客户端」的测试，断言任务仍跑完且状态可查、SSE 可重连续看。",
      "把任务生命周期与请求生命周期分离。", ["任务队列"]],
    ["Agent 任务队列如何设计？",
      "做法（关键判断：Agent 任务有副作用、可被取消、要恢复，普通 MQ 的 at-least-once 必须配幂等才安全）：\n1. 任务消息字段：{runId(UUID), tenantId, priority, model, budget{max_steps:25, max_tokens, max_cost_usd, deadline_ts}, idempotency_key, state_version, payload}。idempotency_key = hash(tenantId + 业务输入)，用于去重投递和工具副作用幂等。\n2. 租约 + 续租（lease/heartbeat）：Worker 领取后写 locked_by + lease_expires_at = now()+30s，每 10s 续租一次（UPDATE ... SET lease_expires_at=now()+30s WHERE runId=? AND locked_by=?）。一个扫描器把 lease_expires_at < now() 且 status=running 的任务重置回 queued 重投——覆盖 Worker 崩溃场景。\n3. 并发池按资源维度分，不是一个全局池：每个 model 一个 asyncio.Semaphore（按上游 TPM/RPM 配额）、每类高成本工具（沙箱、爬虫）一个池，避免一个慢模型把所有 Worker 占满。\n4. 死信 + 重试分类：retry_count 超 maxRetries(如 3) 进 dead_letter 表;按错误分类——429/5xx/超时可指数退避重试（base 1s, factor 2, max 60s, 加 jitter 防重试风暴），4xx 参数错/权限错直接死信不重试。\n5. 取消：cancel 把 DB status 置 cancelling，Worker 在步骤间检查这个标志做 cooperative cancel，落 cancelled 终态。\n参数怎么定 / 怎么验证：lease 时长取「单步最坏耗时 × 2~3」，太短会误判存活 Worker、太长崩溃后恢复慢；用一个「重复投递同 idempotency_key」的测试断言副作用只发生一次；用「续租中途杀 Worker」断言任务被重新领取且不重复执行已完成步骤。",
      "关注 at-least-once 语义与副作用幂等。", ["Queue"]],
    ["PostgreSQL、Redis、向量库分别存什么？",
      "做法（关键判断：按「丢了能不能恢复」和「访问模式」分工，Redis 永远不当唯一真相源）：\n1. PostgreSQL 存所有事实数据：users、thread、message、run、run_step、tool_call、artifact 元数据、feedback、审计日志、Checkpoint。强一致、要事务、要审计的都在这。我的库还跑 pgvector（Memory 和知识库的向量列也复用同一个 PG 实例，cosine 用 <=> 算子，1-distance 转相似度）。\n2. Redis 存可重建的临时态：tool_search 结果缓存、kb_retrieve 缓存（key=query+topK+filter+source，TTL 10min）、限流令牌桶计数、分布式锁、BackgroundTaskRunner 的实时事件 Pub/Sub、沙箱 warmup 的 thread 标记。原则——Redis 全丢，系统能从 PG 重建，只是慢一点。\n3. 向量库（这里就是 pgvector）存 embedding + metadata 做语义召回；超大规模或要独立扩缩才上专用库（Milvus/Qdrant），但那是另一套运维成本。\n4. 原始大文件（用户上传、Agent 产出的大 artifact）放对象存储 R2/S3，DB 只存 key 和元数据，key 带租户前缀（tenant/{id}/...）。\n参数怎么定 / 怎么验证：给每个 Redis key 都设 TTL（缓存类 600s-10min、锁类 30s），杜绝无 TTL 的「假持久化」;做一次「flushall Redis 后重启」的演练，断言所有功能仍可用（最多首次访问慢），证明没有数据只活在 Redis 里。",
      "按一致性和访问模式分工。", ["PostgreSQL","Redis"]],
    ["如何设计多租户数据隔离？",
      "做法（关键判断：tenantId 不能只靠业务代码每条 SQL 手写 where，要在数据库层兜底，否则迟早漏一条）：\n1. tenantId 从认证上下文（JWT claim / session）取，绝不从请求体取；进入请求后放进一个 context var，服务层和数据访问层都从这里读，不层层传参。\n2. 隔离强度三档按合规和规模选：①共享表 + RLS（PostgreSQL ROW LEVEL SECURITY，建 policy USING (tenant_id = current_setting('app.tenant_id')::uuid)，每次连接 SET app.tenant_id=...，DB 层强制过滤，最省成本）;②独立 schema（每租户一套表，search_path 切换，隔离更强）;③物理库（强合规/大客户，彻底隔离也最贵）。多数中小规模 RLS 起步。\n3. 隔离边界要覆盖所有存储，不只是主库：Redis key 带 tenant 前缀（rl:{tenant}:{user}）、对象存储 key 带 tenant 路径、向量检索的 metadata filter 强制带 tenant_id（pgvector WHERE 子句 / Dify dataset 按租户分）、日志和 trace 打 tenant 标签。\n4. RLS 还要防「连接池复用串号」：用连接前 SET LOCAL app.tenant_id 在事务内，事务结束自动失效，避免上一个租户的设置泄漏给下一个借连接的请求。\n参数怎么定 / 怎么验证：写越权测试套件——用租户 A 的 token 带租户 B 的 runId/key 访问每个接口，断言 404/403 而非返回数据；RLS 上线前在 staging 故意漏写一条 where，验证 RLS 仍挡住（证明 DB 层是真兜底而非摆设）。",
      "只在 SQL where 中手写 tenantId 很容易遗漏。", ["多租户"]],
    ["多模型网关应具备哪些能力？",
      "做法（关键判断：网关是「统一抽象 + 差异适配 + 可观测」三件套，不是 URL 转发器）：\n1. 统一入口、保留原始：对内暴露统一的请求/流式事件格式，对各 provider 各自的协议（OpenAI / Anthropic / 自建）做适配；务必把原始响应原样存进 trace 一份用于排障，不要只存解析后的。\n2. 模型路由按声明驱动：我的 ModelCatalog 按 provider 分组声明每个模型的 endpoint/协议/context_window/max_output/modality/cost/fallback 链，get_model 用 provider_of(model) 路由到对应端点。context_window 和 max_output 分开建模（踩过把 128K max_output 当窗口、导致提前压缩的坑）。\n3. 韧性层：超时（连接 + 读流空闲超时）、按 provider 配独立重试、令牌桶限流、熔断（连续失败打开断路器一段时间再半开探测）。fallback 链显式配置、显式记录切换，绝不静默换模型让上层不知情。\n4. 成本与 Token 统计：流式请求带 stream_options.include_usage 拿准确 usage，逐 run 累计 prompt/completion token 和 cost，写进 run 记录做配额和账单。\n5. Tool Calling 差异适配：各家 tool schema、并行 tool call、tool 结果格式不同，网关统一成内部格式;Prompt 稳定前缀做 provider 的 prompt cache，动态内容（env/reminder）放尾部最大化命中。\n参数怎么定 / 怎么验证：熔断阈值如「30s 窗口内失败率 >50% 或连续 5 次失败」打开、cooldown 30s 后半开放 1 个探测请求;用「主模型注入 500」的故障注入测试断言自动走到 fallback 且 trace 里能看到切换记录。",
      "网关不是简单的 URL 转发器。", ["模型网关"]],
    ["模型服务不可用时如何降级？",
      "做法（关键判断：降级策略按任务风险分级，写操作宁可停也不用低能力模型瞎执行）：\n1. 配 fallback 链，但要校验能力对齐：备用模型的 context_window、modality（能不能读图）、Tool Calling 支持、数据合规（境内外）必须和主模型一致，否则会出现「降级后突然不认图/不会调工具」的隐性故障。\n2. 按任务类型分降级路径：简单分类/抽取类——回退到规则或更小模型;问答类——回退到缓存答案或纯检索结果（直接给检索片段不让模型生成）;复杂写操作/有副作用的——暂停并明确提示用户「服务暂不可用，稍后重试」，绝不用低能力模型冒险跑写操作。\n3. 优雅闭合而不是抛异常：我的实现里 LLM retry/fallback 全耗尽后返回一条 AIMessage（说明失败）而不是抛异常，目的是让 SSE 正常闭合、前端从 thinking 落地，不会卡在转圈。\n4. 熔断后恢复要渐进：断路器 cooldown 到了先半开放少量探测流量，连续成功 N 次再全量切回主模型，避免刚恢复就被打挂二次熔断。\n参数怎么定 / 怎么验证：给每条 fallback 链标注「能力等级」，路由前校验任务需求 ≤ 备用能力;用「主 + 备全部注入故障」的测试断言最终是优雅 AIMessage + SSE 闭合，而不是 500 或前端永久 loading。",
      "降级策略应按任务风险区分。", ["降级"]],
    ["如何做限流？",
      "做法（关键判断：Agent 的稀缺资源是并发 run 和 Token，不是单纯 QPS，要多维度同时限）：\n1. 多维度令牌桶，维度叠加都要过：user、tenant、model、tool、系统总量各一个桶。用 Redis 实现，单 key 用 Lua 脚本原子地「取当前令牌-补充-扣减」，避免读改写竞态；返回明确的 Retry-After 秒数让客户端知道何时重试。\n2. 区分两类资源：①请求速率（RPS/QPS）用令牌桶限突发;②正在执行的长任务数——这是 Agent 独有的，每租户限并发 run 数（如 per-tenant 最多 5 个 running run），用 Redis 计数器 + run 终态时回收，防一个租户把 Worker 占满。\n3. Token/成本配额：高成本任务按 TPM（tokens-per-minute）和月度预算限——run 开始前预估或运行中累计 token，超 TPM 排队、超月度预算拒绝。这比限 QPS 更贴近真实成本。\n4. 上游 provider 配额对齐：每个 model 的本地并发 Semaphore 上限设成略低于 provider 的 RPM/TPM，本地先挡住，避免把 429 推到上游再被动退避。\n参数怎么定 / 怎么验证：令牌桶容量=允许的突发量、补充速率=稳态 QPS（如 capacity 20 / refill 10/s）;per-tenant 并发 run 上限按「Worker 总数 / 租户数」留余量定;用并发压测验证超限返回 429 + 正确 Retry-After，且不同租户互不影响（A 打满不影响 B）。",
      "Agent 的关键资源往往是并发 run 和 Token，而非单纯 QPS。", ["限流"]],
    ["如何管理模型和工具凭证？",
      "做法（关键判断：模型上下文/Prompt/日志是不可信暴露面，长期密钥永远不进这些地方）：\n1. 密钥放专门 Secret Manager（AWS Secrets Manager / Vault / GCP Secret Manager），运行时注入进程环境或内存，不写代码、不进 git、不进 Prompt、不落 DB 明文、不打日志。我的项目里密钥走 .env / Secret，agent.config.json 用 ${VAR} 插值引用而不存值本身。\n2. 工具账户最小权限 + 轮换：每个工具用独立的最小权限服务账号（只给它需要的 scope），定期轮换;轮换支持双密钥并存的灰度窗口（新旧都接受一段时间）避免轮换瞬间打挂。\n3. 沙箱用一次性短期令牌：沙箱任务不给长期密钥，发任务级的短 TTL token（如 STS 临时凭证 / 短期 JWT，TTL 几分钟到任务时长），并限制可访问域名 allowlist 和资源范围，任务结束即失效。\n4. 防泄漏到输出：日志和 trace 落库前过一遍脱敏（正则匹配常见 key 形态如 sk-、Bearer token 打码）;工具返回结果注入上下文前也扫一遍，防止模型把抓到的密钥再吐出来。\n参数怎么定 / 怎么验证：轮换周期按敏感度（高敏 30-90 天）;沙箱 token TTL 设成「略大于任务最坏时长」而非固定大值;用一个「故意在 Prompt/工具结果里塞假 key」的测试断言日志和 trace 里被打码，证明脱敏链路真的接上了。",
      "模型上下文不应该接触长期密钥。", ["Secrets"]],
    ["如何设计 Agent 数据库 Schema？",
      "做法（关键判断：事件序列、业务状态、灵活载荷分开存——不要把一切塞进一张 messages 表）：\n1. 核心表：thread（会话）、message（带 sequence 顺序号 + role + content）、run（一次执行，status/version/model/cost/token）、run_step（每步：节点名/输入输出引用/耗时）、tool_call（tool_name/args/result_ref/status）、checkpoint（LangGraph 状态快照 + version）、artifact（大产出元数据 + 对象存储 key）、feedback（用户评价）、eval_result（评测结果）。\n2. 事件/顺序表保 append-only + sequence：message、run_step 用单调 sequence（per-thread 或 per-run），保证回放和 SSE 续传顺序确定;不依赖 created_at 排序（同毫秒会乱）。\n3. 列设计冷热分离：高频过滤/排序的字段（tenant_id、thread_id、run_id、status、created_at、sequence）用独立列 + 索引;节点的灵活输入输出、tool args/result 这种 schema 多变的用 JSONB 存，需要查 JSONB 内字段再建 GIN 索引或表达式索引。\n4. 关键索引：复合索引 (tenant_id, thread_id, created_at) 拉会话历史、(run_id, sequence) 拉单 run 时间线、(status, lease_expires_at) 给队列扫描器、(tenant_id, status) 数并发 run。大文本/大 JSONB 别进热查询表，拆出去或放对象存储。\n参数怎么定 / 怎么验证：用 EXPLAIN ANALYZE 验证关键查询走索引（Index Scan 而非 Seq Scan）;artifact 阈值——工具结果超过某大小（如 8KB）就 carve 到对象存储只在 DB 存引用（我的两级压缩里 Tier1 就是把可再生大工具结果 offload 成 artifact）。",
      "不要把所有内容塞进一张 messages 表。", ["Schema"]],
    ["如何处理并发更新和状态一致性？",
      "做法（关键判断：用 version 乐观锁 + CAS 防丢更新，关键状态迁移串行化，副作用配幂等键）：\n1. 乐观锁：state/checkpoint 表带 version 列，更新走 CAS——UPDATE ... SET data=?, version=version+1 WHERE id=? AND version=?;受影响行数=0 说明被别人改过，重读最新再算（read-modify-write 重试，限次数防活锁）。这比悲观行锁吞吐高，适合冲突少的场景。\n2. 同一 run 的关键状态迁移串行化：用 Redis 分布式锁（SET key val NX PX 30000 + 续租）或 DB 行级 FOR UPDATE，保证「读状态→决策→写状态」原子，避免两个 Worker 同时推进同一 run。我的设计里主 graph 是对话状态的唯一写入者（后台任务结果通过注入一次的方式回流，不直接并发写状态）。\n3. 事件顺序用 sequence 不用时间戳：并发产生的事件用单调 sequence 定序，消费端按 sequence 处理，杜绝 last-write-wins 覆盖掉更新的状态。\n4. 外部副作用幂等：调外部 API/发消息带 idempotency_key，任务恢复或重投时同 key 不重复执行;区分 cancelled / partially_completed，半完成的副作用靠幂等键安全重放。\n参数怎么定 / 怎么验证：乐观锁重试上限 3-5 次 + 指数退避;特别测两个高危场景——审批（HITL）期间状态被并发改、任务从 Checkpoint 恢复时拿到旧 version 写入，断言都被 CAS 挡住并正确重试。",
      "特别关注审批期间和任务恢复时的旧状态。", ["一致性"]],
    ["如何部署和扩缩容 Agent 服务？",
      "做法（关键判断：组件按各自的扩缩指标独立伸缩，状态全外置做到实例无状态）：\n1. 拆分组件分开扩：API（auth/admin，按 QPS + CPU 扩）、流式网关/Aegra（按活跃连接数扩，连接是它的瓶颈）、Worker（按队列积压 + 模型/工具并发扩）、沙箱执行器（按沙箱并发扩，独立池避免拖垮主服务）。我的项目里 Aegra 承载 chat graph + Checkpoint + AG-UI 流式，FastAPI 负责 auth/admin/sandbox 侧栏/后台任务，本就是分进程的。\n2. 状态外置、实例无状态：所有状态进 PG/Redis/对象存储，任何实例都能处理任何请求，才能水平扩 + 滚动发布。Checkpoint 让 run 可在新实例恢复。\n3. 扩缩指标各异：API 用 HPA 看 CPU/QPS;Worker 看「队列积压深度 / 每 Worker 处理速率」自定义指标（KEDA 监听队列长度最直接）;流式层看并发连接数。\n4. 优雅发布：SIGTERM 后 Worker 停止领新任务、把当前 run Checkpoint 后让新实例接、或优雅跑完（drain）;设 terminationGracePeriodSeconds 足够长（如 120s）覆盖单步最坏耗时。BackgroundTaskRunner 重启时把无 Runner 的 running 标 interrupted 可被重新调度。\n参数怎么定 / 怎么验证：HPA 目标 CPU 60-70%、扩容快缩容慢（缩容冷却 5min 防抖）;队列积压扩容阈值=「积压 / 吞吐 > 可接受等待时长」;做滚动发布演练，断言发布期间无 run 丢失、连接断了能重连续看。",
      "不同组件的扩缩指标不同。", ["部署","容器"]],
    ["如何做灰度发布和快速回滚？",
      "做法（关键判断：AI 应用的发布单元不止代码——model/prompt/graph/tool/知识库各自独立版本，能单独回滚）：\n1. 每个组件独立版本号：模型版本、Prompt 版本、Graph 版本、Tool schema 版本、知识库快照版本，每个 run 落库记录完整版本组合 {model_ver, prompt_ver, graph_ver, kb_ver}，出问题能精确定位是哪个组件的哪个版本引入的。\n2. 稳定分流：按 tenantId/sessionId 做 hash 取模分桶（如 hash(tenantId) % 100 < 5 进新版），保证同一租户/会话稳定落同一版本，不会一会儿新一会儿旧导致体验跳变;灰度比例 5% → 25% → 100% 阶梯放量。\n3. 监控护栏指标，超阈值自动停推/回滚：盯 tool 成功率、step count（步数膨胀是 Agent 跑偏的强信号，我把 step count 列为一等指标——71 步 Fibonacci 事故就是这么抓的）、错误率、P95 延迟、cost/run;新版任一指标显著劣于基线就停止放量。\n4. 组件级回滚：因为版本独立，发现是新 Prompt 的问题就只回退 Prompt 版本，不必回滚整套服务;知识库/Skill 用 allowlist 只缩小可见集、Custom Agent prompt 只叠加不替换，回退影响面可控。\n参数怎么定 / 怎么验证：回滚触发用「新版相对基线的相对劣化」如 tool 成功率 -5pp 或 step count 中位数 +50% 即触发;先在 eval 任务集上跑新版本组合比 passed/steps/latency/cost 过门禁，再上灰度。",
      "AI 应用的发布单元不只是一份代码。", ["灰度"]],
    ["如何设计沙箱资源隔离？",
      "做法（关键判断：默认禁网 + 资源硬限 + 用完即销毁，隔离强度按威胁模型升级到 microVM）：\n1. 每任务独立环境 + 资源 cgroup 硬限：CPU（如 --cpus=1）、内存（--memory=512m，超限 OOM kill）、进程数（--pids-limit=128 防 fork 炸弹）、wall-clock 超时（如 60-120s 强杀）、磁盘配额、临时文件系统（--tmpfs /tmp，容器销毁即清）。\n2. 网络默认禁、白名单放行：--network none 起步，需要外网时只开 egress allowlist（指定域名/IP），DNS 也限制;绝不让沙箱裸连内网（防 SSRF 打内部服务）。\n3. 命令参数化执行不拼字符串：用 argv 数组执行（execve 风格）而非 shell 字符串拼接，杜绝命令注入;镜像和依赖固定版本（pin digest 而非 latest），供应链可控。\n4. 用完即焚 + 凭证一次性：任务结束销毁容器，不复用;沙箱拿任务级短 TTL token（见凭证管理），无长期密钥。我的项目 Cloudflare/E2B 实现同一个 SandboxProvider 抽象，并在模型思考期异步 warm 沙箱把冷启动藏进 LLM 延迟里（仅对标记过用沙箱的 thread）。\n5. 高风险升级隔离：执行不可信代码的场景，容器命名空间不够，上 microVM（Firecracker / gVisor），每任务一个 microVM，内核级隔离防容器逃逸。\n参数怎么定 / 怎么验证：超时设「正常任务 P99 × 1.5」;内存按工作负载实测 + buffer;用逃逸测试（fork 炸弹、读 /etc/shadow、连内网 IP、跑超时死循环）断言都被 cgroup/网络策略/超时挡住。",

    ["如何排查一次线上 Agent 慢请求？",
      "做法（关键判断：先用 runId 拉完整时间线定位是哪一段慢，再对症，绝不一上来就换更快模型）：\n1. 用统一 runId 串起全链路 trace（Langfuse / OTEL span）：把一次 run 拆成排队等待、知识检索、各次 LLM 调用、各工具执行、DB 查询、前端传输几段，看每段耗时占比——慢在哪一段一目了然。\n2. 比 P50 和 P95/P99 区分性质：P50 也慢=系统性问题（模型本身慢、上下文太长、检索慢）;只有 P95 翘起=尾部问题（某个工具偶发超时、连接池耗尽排队、个别 run 步数爆炸）。两者根因和解法完全不同。\n3. 按高频根因逐个排查：①步数膨胀/循环（看 step count，Stuck Detector 是否该触发没触发）;②上下文过长导致每轮 LLM 变慢（数每轮喂给模型的消息条数和 token，看是否该压缩没压缩）;③检索慢（kb_retrieve 缓存是否命中、向量查询是否走索引 EXPLAIN ANALYZE）;④工具超时/重试堆叠;⑤DB 连接池耗尽（等连接的时间算进哪段）;⑥沙箱冷启动（warmup 是否生效）。\n4. 定位后对症修：上下文长就调压缩阈值、循环就修 Stuck 检测、检索慢就建索引或加缓存、连接池就调 pool size——换模型是最后手段，且只在确认是模型推理本身慢时。\n参数怎么定 / 怎么验证：给每段设 SLO（如检索 <500ms、单次 LLM TTFT <2s），超 SLO 的段打告警;修复后在该 runId 的回归 eval 任务上复跑，断言 latency 和 step count 回到基线。",

  items: [
    ["Transformer 的核心结构是什么？",
      "做法（讲清三件事：attention 怎么算、复杂度从哪来、现代 LLM 为何只用 Decoder）：\n1. 一层 block = 多头自注意力 + 残差 + LayerNorm（现在多是 Pre-LN：先 norm 再进子层，训练更稳）+ 前馈 FFN（两层线性，中间维度约 4×hidden，激活用 GELU/SwiGLU）。\n2. 注意力本体：每个 token 投影出 Q、K、V，attention = softmax(QKᵀ/√d_k)·V，除 √d_k 防点积过大把 softmax 推到饱和区。多头 = 把 d_model 切成 h 份（如 d_model=4096, h=32, 每头 d_k=128）各自算再 concat，让不同头关注不同关系子空间。\n3. 复杂度：QKᵀ 是 n×n 矩阵，时间和显存都是 O(n²·d)，这是长上下文成本的根因；KV Cache、滑窗注意力、FlashAttention 都是在这上面省。\n4. 现代生成式 LLM 多用 Decoder-only + causal mask（第 i 个 token 只能看 ≤i），配合 RoPE 等相对位置编码做自回归预测；Encoder-Decoder 现在主要留给翻译类任务。\n参数怎么定 / 怎么验证：面试时能手画一层 block 的数据流并说出每步张量形状（如 [batch, seq, d_model]）就过关；进一步能解释为什么 GQA/MQA 让多个 Q 头共享 K/V 来压 KV Cache 显存，就是加分项。",

    ["Token 是什么？上下文窗口越大越好吗？",

    ["temperature、top-p、top-k 有什么作用？",
      "做法（三者都是控制采样随机性，但作用维度不同，按场景给死参数）：\n1. temperature：缩放 logits 再 softmax（logits/T）。T→0 趋近 argmax（贪心、确定性高），T=1 用原始分布，T>1 拉平分布更发散。\n2. top-k：每步只在概率最高的 k 个候选里采样（如 k=40），砍掉长尾乱词。\n3. top-p（nucleus）：按概率从高到低累加，取累计达到 p（如 0.9）的最小候选集再采样，候选数随当前分布自适应——比固定 k 更稳。\n4. 给场景的实战取值：结构化输出 / 工具调用 / 抽取分类用 temperature 0-0.2、top_p 1（要可复现、要 schema 稳定，不要它发挥）；RAG 问答 0.2-0.4；创意写作 0.7-1.0 + top_p 0.9。多数 API 建议只调 temperature 或只调 top_p，别同时大改两个互相干扰。\n参数怎么定 / 怎么验证：工具调用类任务把 temperature 锁 0、跑同一输入多次看 tool_call 是否完全一致来验证确定性；创意类用人评或多样性指标（distinct-n）调；注意有些 reasoning 模型不暴露 temperature，要按 provider 文档说明，别假设参数都通用。",

    ["什么是幻觉？如何降低？",

    ["什么是 KV Cache？为什么影响推理？",
      "做法（讲清它省了什么、代价是什么、怎么进一步优化）：\n1. 原理：自回归每生成一个新 token 只需要它的 Q 去和历史所有 token 的 K、V 算注意力；历史 token 的 K、V 不变，所以缓存下来，把每步从「重算整段」O(n²) 降到「只算新 token」O(n)，prefill 之后的 decode 显著加速。\n2. 代价：KV Cache 显存 = 2(K和V) × layers × seq_len × n_kv_heads × head_dim × batch × dtype字节，随序列长度和并发线性涨，长上下文高并发下它往往比模型权重还吃显存，是限制最大 batch / 最长上下文的主因。\n3. 优化手段：GQA/MQA 让多 Q 头共享少量 K/V 头直接压 n_kv_heads；PagedAttention（vLLM）像虚拟内存一样分页管理避免碎片；prefix caching 复用相同前缀（如固定 system prompt）的已算 KV——这对话单里稳定前缀做 cache、动态内容放尾部的策略直接对应。\n4. 量化 KV（INT8/FP8）再省一半，代价是轻微精度损失。\n参数怎么定 / 怎么验证：把不常变的 system prompt / 工具定义放在 Prompt 最前面最大化 prefix cache 命中（命中率可观测）；估容量时用上面公式算单请求 KV 显存，反推最大并发。诚实边界：vLLM/PagedAttention 这些我理解原理和取舍，但没有私有部署调优的实操经验。",
      "可关联长上下文成本与并发容量。", ["KV Cache"]],
    ["Embedding 和生成模型有什么区别？",
      "做法（讲清目标、输出、用法、评测口径四点都不同）：\n1. 输出形式：Embedding 模型把文本压成固定维度稠密向量（如 384/768/1024 维），生成模型预测下一个 token 产出文本。\n2. 训练目标：Embedding 多用对比学习（正样本拉近、负样本推远）让语义相近的向量距离小；生成是 next-token 预测。\n3. 用法：Embedding 用于检索/聚类/去重/语义相似，配 cosine 或内积 + 向量索引；生成用于问答/写作/工具调用。二者在 RAG 里是上下游：embedding 召回 → 生成模型回答。\n4. 关键工程点：建库和查询必须用同一个 embedding 模型同一版本，换模型要全量重 embed；维度由模型定，pgvector 列要对齐（我这边 mem0 用本地 FastEmbed 384 维）。\n参数怎么定 / 怎么验证：embedding 好坏只能用检索任务衡量（Recall@k、MRR、nDCG），绝不能拿生成质量评判它；在自己领域的 query→相关文档标注集上跑 Recall@5/MRR 选模型，而不是看 MTEB 榜单第一就用。",

    ["手写余弦相似度需要注意什么？",
      "做法（公式 cos = dot(a,b)/(‖a‖·‖b‖)，重点是边界和归一化优化）：\n1. 朴素实现伪代码：先 assert len(a)==len(b)；dot=sum(x*y for x,y in zip(a,b))；na=sqrt(sum(x*x)); nb=sqrt(sum(y*y))；零向量保护 if na==0 or nb==0: return 0.0（定义未定，约定返回 0 避免除零）；return dot/(na*nb)。时间 O(n)、空间 O(1)。\n2. 边界：维度不等直接报错；全零向量、含 NaN/Inf 要拦；超大维度用 float64 累加或 math.fsum 减少浮点误差。\n3. 向量化：批量场景别写 Python 循环，用 numpy——单条 np.dot(a,b)/(np.linalg.norm(a)*np.linalg.norm(b))；一查多用矩阵 A(m×d) 对 q(d)：先 L2 归一化每行 A_n=A/np.linalg.norm(A,axis=1,keepdims=True)、q_n=q/np.linalg.norm(q)，则相似度=A_n @ q_n，一次矩阵乘搞定 top-k。\n4. 关键优化：建库时预先归一化所有向量并存起来，查询时余弦就退化成纯点积（省掉每次开方），这也是 pgvector 用 1-(a<=>b) 把 cosine distance 转相似度、以及向量库普遍存归一化向量的原因。\n参数怎么定 / 怎么验证：用已知例子自测——相同向量得 1、正交得 0、反向得 -1、零向量按约定得 0；和 sklearn.cosine_similarity 对拍验证数值一致（容差 1e-6）。常见追问「归一化后为何可用内积」：因为单位向量 ‖a‖=‖b‖=1，cos = dot/(1·1) = dot。",

    ["算法题如何展示思路？",

      "沟通过程和正确性证明同样重要。", ["算法"]],
    ["如何实现一个并发受限的异步任务池？",
      "做法（核心是「最多 N 个在跑，完一个补一个」，给可运行伪代码）：\n1. Python 最简法 asyncio.Semaphore：sem=asyncio.Semaphore(8)；async def run(task): async with sem: return await do(task)；results=await asyncio.gather(*[run(t) for t in tasks])。gather 保证结果顺序与输入一致，sem 把同时在跑的限到 8。\n2. 要超时和错误隔离：在 do 外包 asyncio.wait_for(do(task), timeout=30)，并用 gather(..., return_exceptions=True) 让单个失败不炸全体，事后逐个判 isinstance(r, Exception)。\n3. 海量任务用 worker pool 更省内存（别一次建几万协程）：建 asyncio.Queue 放任务，起 N 个 worker 协程循环 while True: t=await q.get(); try: await do(t) finally: q.task_done()，await q.join() 等清空再 cancel worker。\n4. 取消：保留 tasks=[asyncio.create_task(...)]，外部要停就 for t in tasks: t.cancel()，每个任务 finally 里释放资源（关连接/文件）。\n5. JS 等价：用计数信号量或 worker loop——维护 running 计数，promise 完成回调里 running-- 并从队列取下一个；或简易版 p-limit / Promise.allSettled 配并发闸。\n参数怎么定 / 怎么验证：并发上限 N 看下游瓶颈——是 API 速率限制就贴近其 RPS、是 CPU 密集就贴近核数、是外部库连接就贴连接池大小；压测时观察 p99 延迟和错误率随 N 的曲线取拐点。这就是并行工具调用的实际形态：我在 agent-server 里把 safe 工具并行、非 safe 独占，正是这套限并发编排。",
      "很贴近并行工具调用的实际场景。", ["并发"]],
    ["Redis 在 Agent 系统中有哪些常见用途和风险？",
      "做法（先列实用场景，再把缓存三大经典故障的解法说死）：\n1. 用途：限流（令牌桶/滑窗，INCR+EXPIRE 或 Lua 原子）、短期缓存（如我这边 kb_retrieve 结果缓存 10min、tool_search 结果缓存）、分布式锁、任务进度、Pub/Sub 实时事件分发。\n2. 缓存穿透（查不存在的 key 一直打到 DB）：对空结果也缓存一个短 TTL 的空值占位，或加布隆过滤器先挡掉一定不存在的 key。\n3. 缓存击穿（热 key 过期瞬间大量请求并发回源）：用互斥锁/单飞（只放一个请求去重建，其余等结果），或对热 key 设逻辑过期不真删。\n4. 缓存雪崩（大批 key 同时过期或 Redis 宕机）：TTL 加随机抖动（如 base±10%）打散过期时间、多级缓存、Redis 集群高可用 + 限流降级兜底。\n5. 锁的坑：锁必须带唯一 token + 合理 TTL，释放时用 Lua 比对 token 再删（防误删别人的锁）；锁过期早于业务完成会导致并发，要么续期（watchdog）要么保证业务幂等。\n参数怎么定 / 怎么验证：缓存 TTL 按数据新鲜度容忍定（业务知识可 10min，强实时别缓存）；最关键的判断——Redis 是易失内存，绝不能当事实源，关键状态（任务终态、checkpoint）必须落 PostgreSQL，Redis 只做加速和实时通道（我的后台任务就是 DB 管事实状态、Redis Pub/Sub 只做实时事件，挂了能降级轮询 DB）。",
      "准备缓存穿透、击穿、雪崩等基础题。", ["Redis"]],
    ["数据库索引如何影响向量与 metadata 查询？",
      "做法（向量索引和标量索引分工，最终用 EXPLAIN 验真）：\n1. 两类索引各管一半：向量索引（HNSW/IVFFlat）把全表暴力近邻搜索降到候选子集；B-tree / 倒排 / GIN 索引负责 tenant_id、时间、status、business_line 这类标量过滤。\n2. 过滤+向量的执行顺序很关键：高选择性过滤（过滤后只剩很少行）应先标量过滤再在小集合上精确算距离，可能比走向量索引还快；低选择性则让向量索引先出候选再过滤。pgvector 还有 pre-filter vs post-filter 之分，post-filter 可能导致 top-k 被过滤后不足 k 个。\n3. 给数据库可用的统计：保证过滤列有索引、ANALYZE 更新统计信息，否则 planner 选错路。\n4. 复合查询常建组合或 partial 索引（如对常用 status 建 partial index）。\n参数怎么定 / 怎么验证：永远用 EXPLAIN ANALYZE 在真实数据量上看实际走没走索引、估算行数 vs 实际行数差多少（差大说明统计过期）、耗时花在哪个节点；过滤选择性高到一定程度就显式走精确搜索。这块 pgvector 我用 cosine `<=>` 转 1-distance，常被追问 HNSW 与 IVFFlat 的取舍。",
      "pgvector 常会继续追问 HNSW 与 IVFFlat。", ["PostgreSQL","索引"]],
    ["HNSW 与 IVFFlat 有什么区别？",
      "做法（讲清原理、参数、各自适用场景，并给调参起点）：\n1. HNSW（分层可导航小世界图）：建多层邻接图，查询从顶层粗导航逐层下沉。召回高、查询快，对动态写入友好；代价是索引体积大、内存占用高、构建慢。关键参数 m（每节点邻居数，常 16）、ef_construction（建图候选集，常 64-200，越大越准越慢）、查询期 ef_search（候选集，调大提召回降速度）。\n2. IVFFlat（倒排+聚类分桶）：先 kmeans 把向量分成 lists 个桶，查询只搜最近的 probes 个桶。索引轻、内存省、构建快；代价是需要足够数据训练聚类、召回受 probes 影响、数据分布变化或数据量小时质量不稳，且新数据多了要重建。关键参数 lists（建议 ≈ rows/1000 量级）、probes（查询期，调大提召回降速度）。\n3. 选型：读多写多 + 要高召回低延迟 + 内存够 → HNSW（pgvector 默认推荐，我这边就用它）；内存紧张 / 数据量超大要省索引 / 可接受略低召回 → IVFFlat。\n参数怎么定 / 怎么验证：在自己数据上画 Recall vs Latency 曲线——HNSW 调 ef_search、IVFFlat 调 probes，找满足召回目标（如 Recall@10≥0.95）下最低延迟的点；建库参数 HNSW 先 m=16/ef_construction=128 起步、IVFFlat lists 按行数定再压测。诚实边界：百万级以上向量库（如 Milvus）大规模调优我没有实操，能讲清原理和参数取舍逻辑。",
      "参数最终应通过 Recall/Latency 曲线调优。", ["向量索引"]],
    ["如何看待 Prompt Engineering 与 Context Engineering？",
      "做法（区分两者的关注点，并说明生产 Agent 为何靠后者）：\n1. Prompt Engineering 关注「这一段指令怎么写」——角色设定、few-shot 示例、输出格式、思维链引导，是单条 prompt 内的措辞优化。\n2. Context Engineering 关注「模型在每一步到底看见了什么」——系统规则、对话历史、长期记忆、检索证据、工具定义、当前状态，以及它们的优先级、预算分配和组装顺序，是一整套上下文供给系统。\n3. 为什么生产靠后者：单条神 Prompt 在长会话、多工具、知识更新下必然不稳；稳定性来自每轮可控地决定放什么、压什么、注入什么。具体手段——稳定前缀（system+工具定义）放头部吃 prefix cache、动态 reminder/状态放尾部、旧大工具结果 offload 成引用、检索证据按预算和门槛注入、循环护栏和审批也是上下文的一部分。\n4. 二者不对立：Context Engineering 决定喂什么，Prompt Engineering 决定每块怎么措辞，前者是骨架后者是用词。\n参数怎么定 / 怎么验证：给每类上下文设 token 预算（如检索证据 3s 内并行召回、按相关度门槛过滤），用评测集验证「上下文系统的改动」比「改 prompt 措辞」对成功率影响大得多；我在 agent-server 的两级压缩、KnowledgeSource 注册表注入、每轮 turn reminder 就是把 Context Engineering 工程化落地的例子。",
      "这是当前 Agent 岗常见的认知题。", ["Context Engineering"]]
  ]
},
{
  id: "source", title: "agent-server 源码深挖",
  desc: "基于你的真实仓库整理。回答不仅要说明代码怎么写，还要讲清演进原因、生产故障、架构取舍以及当前仍存在的限制。",
  items: [
    ["为什么将 Agent 执行路径收敛为唯一的 build_chat_graph？", "演进原因（能力漂移：实现了不等于跑在用户路径上）：\n1. 早期有多条执行路径（live graph + Plan-Execute-Verify 影子栈），上下文压缩、循环护栏、Memory 这些能力分散实现，结果是「测试里走 A 路径、用户实际走 B 路径」，B 路径根本没接上压缩或护栏——这就是 Harness 漂移。\n2. 收敛动作：把 Aegra 提供的 chat_graph 定为唯一聊天执行路径，runtime/graph.py 的 build_chat_graph 是唯一 builder；所有复杂能力（Context Engineering、composition、统一 Tool Pipeline）都下沉到 call_model 前的组合层，而不是另起一条图。\n3. 关键一招：让 eval 也调用同一个 build_chat_graph（只把 checkpointer 换成 MemorySaver），保证「评测路径即生产路径」。能力只实现一次，生产/测试/评测三处行为天然一致。\n当前限制 / 怎么验证：收敛后任何新能力必须进 build_chat_graph 才算落地；用 trajectory 测试（脚本模型跑真实 live graph）断言工具选择/顺序，确保没有第二条隐形路径再长出来。已删的 PEV 影子栈就是反面教材——它设计完整却没承载真实流量，留着只会再造漂移。", "源码证据：runtime/graph.py、docs/architecture.md。可补充曾经删除 PEV 影子栈的原因。", ["源码","唯一执行路径","架构演进"]],
    ["为什么最终 Graph 只有 call_model、human_approval、tools、finalize 几个核心节点？", "做法（主循环最小化，复杂度沉到稳定的组合层而非节点数）：\n1. 四节点构成最小闭环：call_model（模型决策）→ human_approval（静态权限审批 interrupt）→ tools（工具执行）→ finalize（回合收尾、写终态），循环回到 call_model 直到模型不再发 tool_call。\n2. 复杂能力不上图、下沉到 call_model 之前：上下文压缩（compress_live_context）、知识注入（build_turn_reminder）、prompt 组装（composition helper）、Stuck Detector 全在进 call_model 前跑完；工具的校验/权限/视觉转述/Artifact 化全在 tools 节点内的统一 execute_tool Pipeline 里。\n3. 这样做的收益：每条路径（含 subagent、LangChain bridge）都共享同一套压缩、安全、观测，不会因为「某个业务节点忘了接护栏」而漏。\n面试官挑战「这不就是普通 ReAct」怎么答：节点拓扑确实是 ReAct 形态，但区别在复杂性的放置位置——业务节点越多，越难保证每条边都过安全/压缩/OTEL；我把这些做成 call_model 前的固定组合层和 tools 内的单一 choke point，节点数恒定而能力可叠加。", "面试官可能挑战“这是否只是普通 ReAct”。回答重点是复杂性放在稳定的组合层，而不是节点数量。", ["LangGraph","Graph 设计"]],
    ["为什么删除原先设计的 Plan-Execute-Verify 影子栈？", "复盘（路径真实性优先：架构图漂亮但用户不经过就不算生产能力）：\n1. PEV 在设计上完整（规划→执行→验证三段），但接入后发现它没有承载真实前端流量——用户的实际请求全走 live graph，PEV 是一套并行的影子实现。\n2. 维护两套会形成行为不一致的双系统：压缩/护栏/Memory 的修复要做两遍，且很容易只改了 live 那套，PEV 那套悄悄腐化（典型的能力漂移温床）。\n3. 决定：删除影子栈，把 PEV 里真正验证有效的能力（如分步骤验证的思路）逐步下沉到 live graph 的 call_model 组合层，而不是保留一个平行图。\n诚实边界：现在文档里若还提 PEV 能力，那是历史设计，不能说成「目前仍在运行」。这题的价值在于体现一个判断——宁可删掉漂亮但没流量的代码，也不要养两套会漂移的系统。", "这是很好的失败复盘题。不要把文档中的旧 PEV 能力说成目前仍在运行。", ["PEV","技术债","复盘"]],
    ["为什么选择 Aegra 承载 LangGraph，而 FastAPI 不直接执行聊天图？", "做法（用平台能力但不让平台吞掉业务 runtime）：\n1. 职责切分：Aegra 承载 chat graph 的执行 + Checkpoint 持久化 + AG-UI 流式（SSE 事件）；FastAPI 负责 auth/admin、沙箱文件侧栏、后台任务等辅助 API。两个进程，各司其职。\n2. 关键约束：业务 graph、tool、wiring 都在我自己仓库里（build_chat_graph + RuntimeWiring + 各 tool provider），Aegra 只是「跑图的平台壳」，不持有业务逻辑。这样平台层很薄。\n3. 收益：白拿 LangGraph 平台的 checkpoint/streaming/中断恢复，又不被它封装吞没——graph 怎么组装、工具怎么注册全在我手里。\n迁移成本（被问 Aegra 不可用怎么办）：因为业务 graph 自有、平台层薄，换一个能跑 compiled LangGraph + 提供 checkpointer 的承载即可，主要工作量在重接 SSE 流式协议和 checkpoint 后端，不用重写 agent 逻辑。这正是「薄平台层」设计买到的可迁移性。", "准备回答 Aegra 不可用时的迁移成本：业务 Graph 自有，平台层相对薄。", ["Aegra","FastAPI","边界"]],
    ["Context Compression 为什么只修改本轮 LLM 输入，而不修改持久化对话？", "做法（ephemeral compaction：压缩是临时视图，持久层永远是真相源）：\n1. 压缩只发生在调用模型前，compress_live_context 的返回值只赋给本轮 llm_messages，绝不回写 Checkpoint 里的完整 transcript。\n2. 原因：模型摘要有误差、carving 有可能丢关键信息，一旦覆盖持久化 transcript 就是永久损坏——审计回看、后续恢复、re-run eval 全废。\n3. 恢复路径：需要精确回看时，从 Checkpoint 的原始消息或被 offload 到 Artifact 的工具结果里取回（Tier1 carve 时消息里留了 artifact 引用 + 预览，可 read_artifact 还原）。\n源码证据 / 验证：compress_live_context 的返回值只进 llm_messages 不进 state 持久字段；可以用 contract golden 测试断言「压缩后 Checkpoint 链仍连续、消息条数不减」，证伪「压缩破坏持久层」这类怀疑——排查窗口问题时第一步永远是查 Aegra checkpoint 链是否连续，再查运行时变换。", "源码证据：compress_live_context 的返回值只用于 llm_messages。", ["Context","Ephemeral"]],
    ["两级上下文压缩具体是怎样工作的？", "做法（先便宜后昂贵，每级都可降级，绝不让压缩失败中断对话）：\n1. Tier1（不调 LLM，零成本）：把较旧且体积大的「可再生」工具结果 offload 到 Artifact，消息里只留文件引用 + 一段预览。可再生的判定靠 carve allowlist（DEFAULT_CARVE_TOOLS），搜索/Shell 输出这类能重读重跑的进名单。\n2. 判定是否进 Tier2：Tier1 后若 token 估算仍接近有效窗口（按 context_window 而非 max_output 算，且预留摘要输出 + 安全 buffer），才升级到 Tier2。\n3. Tier2（调模型，昂贵）：用模型摘要中间历史，但保留最近的 human 消息边界，且从 HumanMessage 边界切，绝不把 tool_call 与对应 ToolResult 拆散（拆散会让模型看到悬空的工具调用而报错）。\n4. 降级：Tier2 摘要调用失败就退回 tail window（只保留尾部最近若干消息），保证主对话不因压缩失败而断；连续失败按 thread 计数，3 次触发 circuit breaker 停 Tier2。\n源码证据 / 怎么验证：context/compression.py；用真实 eval 数每轮 LLM 输入的消息条数看压缩点是否合理，重放 context-retention-heavy-turn 这类回归任务确认压缩没把用户需求压丢。", "源码证据：context/compression.py。强调先便宜后昂贵、失败可降级。", ["Context Compression","Artifact"]],
    ["为什么工具结果 carving 使用允许名单，而不是所有大结果都压缩？", "做法（显式区分「可再生中间产物」与「承重结果」，默认安全不压）：\n1. 进 allowlist（可 carve）的：search、Shell/exec 输出这类中间结果——它们能重新搜索或重新执行拿回，offload 到 Artifact 不丢能力。\n2. 不进 allowlist（绝不 carve）的：交付物（最终产物）、知识检索结果（kb_retrieve）、Memory、subagent 结论、read_artifact 本身——这些要么是关键证据，要么是恢复路径，再次 carve 等于砍掉模型回答的依据。\n3. allowlist 是 DEFAULT_CARVE_TOOLS，把判断从「按结果大小一刀切」变成「按工具语义白名单」——大不代表可丢，小也可能承重。\n新增工具默认该安全还是可压（这是必问的追问）：默认不进 allowlist（即默认承重、不被 carve）——这是 fail-safe 方向，宁可多占点上下文也别误删模型需要的证据；只有确认某工具结果可重新获取，才显式加入 DEFAULT_CARVE_TOOLS。", "源码证据：DEFAULT_CARVE_TOOLS。追问可能是新增工具默认应该安全还是可压缩。", ["Carving","数据保真"]],
    ["上下文摘要如何避免丢失用户需求？", "做法（摘要里硬保用户消息 + 审计 lost count，但诚实说这是观测型不是证明）：\n1. 摘要 Prompt 明确要求逐字保留全部 HumanMessage——用户的需求/约束不允许被概括掉。\n2. 代码对被摘要的 HumanMessage 做规范化前缀保存审计，记录 lost count（被压缩掉的用户消息计数），写进观测。\n3. 切分从 human 消息边界开始保留尾部，避免把 tool_call 和 ToolResult 拆散。\n当前限制（必须主动说）：这个保存审计只比对规范化后的前缀，不是完整语义证明——它能发现「整条用户消息没了」，发现不了「语义被悄悄改写」。所以仍要靠多轮 eval 持续验证。\n怎么验证：把真实事故沉淀成回归任务（如 context-retention-heavy-turn），断言压缩后模型仍能复述早期约束；Langfuse 里逐 generation 看模型实际收到的上下文，确认用户原话还在。", "主动说明限制：保存审计只检查规范化前缀，不是完整语义证明。", ["摘要","保真审计"]],
    ["为什么摘要失败三次后需要 Circuit Breaker？", "做法（防成本与延迟风暴：别对一个稳定拒绝摘要的上游反复付费）：\n1. 触发场景：上下文已经很大、上游模型连续拒绝/失败摘要时，若每轮都继续发同样的付费 Tier2 调用，就是花钱买重复失败 + 叠加延迟。\n2. 机制：按 thread tracking key 记录连续摘要失败次数，达阈值（3 次）后熔断——停止 Tier2 尝试，直接退回窗口裁剪（tail window）；某轮摘要成功则计数清零。\n3. 效果：把「无限重试」收敛成「试 3 次就降级」，对话仍能继续（裁剪后照样进 call_model）。\n当前限制（主动承认）：这个连续失败计数保存在进程内，进程重启就清零——所以这是「不完整的 circuit breaker」，跨进程/重启场景下熔断状态会丢失，要做强一致得把状态外置到 Redis/DB。这是我列在未来优化里的运行态外置项之一。", "当前状态保存在进程内，重启后会丢失，这是可主动承认的局限。", ["Circuit Breaker","降级"]],
    ["为什么 Stuck Detector 必须按当前用户回合计算？", "复盘（扫整个 thread 会让线程永久锁死，真实事故回归）：\n1. 早期 bug：Stuck Detector 扫整个 thread 的轨迹，于是上一轮已经出现过的重复工具调用会污染后续回合——用户发新消息后，检测器看到历史里的重复立刻判 stuck，线程相当于被永久锁死，再也走不动。\n2. 修复：改用 current_turn_slice，只取「最后一条 HumanMessage 之后」的轨迹做检测。新回合从一段干净的轨迹起算，自然能恢复。\n3. 检测逻辑：在 current_turn_slice 内对每步算指纹（工具名 + 规范化参数 + 结果摘要），最近若干步指纹重复且 state 关键变量无推进 → 判 stuck；结合 state 是否推进是为了不误杀「参数相同但结果在变」的重试。\n源码 / 回归证据：测试里有真实事故回归 test_new_user_message_recovers_after_stuck，断言新 HumanMessage 后线程能恢复——这是把生产事故沉淀成永久护栏的典型。", "源码和测试中有真实事故回归：test_new_user_message_recovers_after_stuck。", ["Loop Guard","事故复盘"]],
    ["Agent 触发循环护栏后为什么不是直接返回固定错误？", "做法（soft landing：换无工具模型走一次正常组装，用用户语言收尾而非抛硬错）：\n1. 不抛固定英文错误的原因：生硬，且丢掉已完成进度——用户看到的是一句报错而不是「我做到哪了、卡在哪、下一步是什么」。\n2. soft landing 流程：护栏触发后仍走一次正常上下文组装（保留已完成轨迹），但把模型换成 unbound_model（没有 bind 任何工具的模型），并在尾部追加 soft_landing_section 收尾提醒。\n3. 双重保险：无工具模型从机制上保证它不可能再发 tool_call 进环；收尾提醒引导它用用户语言总结完成部分、失败原因、建议的下一步。\n源码证据：unbound_model + soft_landing_section。\n怎么验证：写 loop-trap eval（构造诱导重复调用的输入），断言触发护栏后返回的是用户可读总结、步数不超阈值、且这条消息里没有 tool_call。", "源码证据：unbound_model + soft_landing_section。", ["Soft Landing","UX"]],
    ["为什么 LLM 全部失败时要返回 AIMessage，而不是抛出异常？", "生产故障复盘（异常冒泡会让 SSE 流没有 closing event，前端永远 thinking）：\n1. 症状：在 Aegra/AG-UI 流式路径里，call_model 抛异常会直接冒泡中断 async stream，但 stream 没有正常的结束事件，前端收不到 finalize/end，UI 永远停在「thinking…」转圈。\n2. 解决：retry + fallback 链全部耗尽后，不抛异常，而是构造一条用户可见的失败 AIMessage 返回。graph 拿到正常的 AIMessage 就照常进 finalize → END，SSE 流正常闭合，Checkpoint 也把这次失败如实保存。\n3. 本质判断：可靠性不只是「后端别报错」，还包括「协议要完整结束」——一个没有 end 事件的流，对前端等于死锁。\n怎么验证：mock LLM 全失败，断言返回的是 AIMessage（非 raise）、SSE 序列里有结束事件、Checkpoint 里这一轮状态完整。这是一道很有价值的「流式协议完整性」故障题。", "这是非常有价值的生产故障题：可靠性不仅是后端不报错，也包括协议完整结束。", ["LLM Failure","SSE"]],
    ["多模型网关和 fallback 链是怎么设计的？", "做法（ModelCatalog 按 provider 分组声明，fallback 显式配置不静默换模型）：\n1. 声明层：ModelCatalog（llm/catalog.py）按 provider 分组，每个模型声明 provider、endpoint、协议、context_window、max_output、输入 modality、cost、fallback 链。\n2. 路由层：get_model（llm/client.py）按 provider_of(model) 把请求路由到该 provider 独立的端点和协议——不同 provider 端点/鉴权/协议都不同，靠 provider 分组而非一个全局 base_url。\n3. 调用顺序：先走用户选择的模型 → 失败则按该模型显式配置的 fallback 链逐个试 → 最后默认模型兜底。没有显式配置 fallback 的模型不会被悄悄换成别的——可控性优先。\n4. prompt cache 配合：系统提示词/历史前缀保持字节稳定做缓存，每轮变化的内容放尾部（见动态 reminder 那题）。\n源码证据：llm/catalog.py、llm/client.py、runtime/graph.py。fallback 显式化的代价是要手工维护链，但换来「绝不在用户不知情时换模型/换价位」的确定性。", "源码证据：llm/catalog.py、llm/client.py、runtime/graph.py。", ["ModelCatalog","Fallback"]],
    ["为什么 Context Window 和 Max Output 必须分开建模？", "故障复盘（一个字段含义搞错，整个 Agent 行为跟着错）：\n1. 事故：曾经把某模型的 max_output（如 128K 最大输出）误当成 context_window（上下文窗口）。结果压缩阈值按 128K 算，而真实可用窗口只有约其十分之一——系统在远未到容量时就疯狂触发压缩，白白增加成本、还无谓地丢上下文。\n2. 根因：context_window（模型一次能读多少）和 max_output（模型一次能写多少）是两个完全不同的物理量，混用就会让压缩判断错位。\n3. 修复：ModelSpec 里分别保存 context_window 和 max_output 两个字段；压缩阈值用 context_window 计算，并额外预留摘要输出空间 + 安全 buffer，留出模型本轮要写的 token 余量。\n源码证据：llm/catalog.py 的 ModelSpec、context/compression.py 的阈值计算。\n经验：这是「一个错误字段如何放大成整体行为故障」的标准案例——catalog 里的每个数字都是行为参数，配错一个比代码 bug 更隐蔽。", "这是很好的“一个错误字段如何影响整个 Agent 行为”案例。", ["Model Catalog","故障复盘"]],
    ["为什么动态的 env/reminder 放在 Prompt 尾部？", "做法（前缀字节稳定吃 prompt cache，易变内容全压到尾部）：\n1. prompt cache 的前提是前缀字节完全一致——模型服务按 token 前缀命中缓存，一个字节不同就 miss。\n2. 因此把系统提示词、工具说明、历史前缀这些每轮不变的内容放在最前面、保持字节稳定；把每轮都变的时间戳、环境信息、知识注入、任务提醒（turn reminder）放在输入尾部。\n3. 反例的代价：如果把当前时间戳放在前缀里，每轮时间一变整个前缀缓存全失效，等于关掉了 prompt cache，成本和延迟都上去。\n4. 自定义 Agent prompt 也通过规范化 key 做组装缓存，避免每次重拼。\n源码证据：composition helper 的 prompt 组装顺序、build_turn_reminder 把 reminder 放尾部。\n关联成本优化：prompt 内容的排序本身就是系统设计——同样的信息，放对位置能让 cache 命中率从近 0 拉到接近全命中。", "回答时可关联成本优化：Prompt 内容排序同样属于系统设计。", ["Prompt Cache","Context"]],
    ["为什么所有工具都必须经过 execute_tool Pipeline？", "做法（单一 choke point，安全逻辑只实现一次，工具作者无需自觉）：\n1. execute_tool（tools/pipeline.py）是工具层唯一入口，固定七步：① Pydantic 参数 schema 校验 ② 业务校验 ③ 权限检查 ④ 执行异常收敛（把各种异常统一成结构化 ToolResult，不让原始 traceback 进上下文）⑤ 图片视觉转述（ImageBlock 转文本，见视觉那题）⑥ 空结果显式标记（区分「查到 0 条」和「失败」）⑦ 大结果 Artifact 化 + OTEL span。\n2. 为什么强制单入口：live graph、subagent、LangChain bridge 三处都调工具，如果各自实现校验/权限，迟早有一处漏接安全逻辑。choke point 保证三处共享同一套。\n3. 设计哲学：统一入口比「要求每个工具作者自觉做校验」可靠得多——人会忘，pipeline 不会。\n源码证据：tools/pipeline.py。\n怎么验证：contract golden 固定 ToolResult 的 key/type 形状（忽略 id/时间/文案），保证任何工具的输出都符合统一契约；新增工具只要走 execute_tool 就自动获得全套安全/观测。", "源码证据：tools/pipeline.py。强调统一入口比要求每个工具作者自觉更可靠。", ["Tool Pipeline","Choke Point"]],
    ["图级 HITL 与工具自己的 check_permissions 如何分工？", "做法（图级静态门控 + Pipeline 动态检查，错过 interrupt 点则 fail closed）：\n1. 图级 HITL（graph 的 human_approval 节点）：按工具的静态权限声明，在真实执行前 interrupt 暂停，让用户 accept / edit / deny。这是「能不能动用这类能力」的静态门控。\n2. Pipeline 动态权限（execute_tool 内）：仍对每次调用做动态参数 + 权限检查——同一个工具不同参数可能风险不同，静态声明管不了。\n3. 关键边界处理：到了 Pipeline 阶段已经过了图的 interrupt 点，没法再弹审批。所以如果工具此时返回 ask（需要人确认），Pipeline 会 fail closed 降级为 deny，绝不擅自执行——「错过审批窗口 = 拒绝」而非「错过 = 放行」。\n4. 这是双层防线：静态能力门控（图级）+ 动态参数策略（Pipeline）。\n源码证据：graph.py human_approval、tools/pipeline.py 的权限分支。fail-closed 的代价是偶尔过严（本可放行的被拒），但安全方向上宁严勿松。", "这体现静态能力门控与动态参数策略的双层防线。", ["HITL","权限"]],
    ["人工编辑工具参数时如何避免多个同名调用相互覆盖？", "做法（按 tool call id 匹配 + 强制 dict 类型，防同名调用串改）：\n1. 问题：一轮里模型可能发多个同名工具调用（如两次 search），用户在审批界面编辑参数时，如果按工具名匹配就会把两个调用搞混、相互覆盖。\n2. 解决：审批 payload 为每个 tool call 带唯一 id，human_approval 节点编辑结果优先按 call id 精确匹配；只有为兼容旧客户端时才回退到按工具名匹配。\n3. 类型防御：替换进去的参数值必须是 dict——用户若传了列表或字符串，直接拒绝，防止把 tool args 结构搞成类型混淆（args 必须是命名参数对象）。\n源码证据：graph.py 的 human_approval 编辑分支。\n经验：这是协议细节决定正确性的例子——少了 call id 这一层，多调用并行 + 人工编辑就是一个静默的数据串改 bug。", "源码证据：graph.py human_approval。很适合体现你对协议细节的关注。", ["HITL","Tool Call ID"]],
    ["工具并发执行如何保证安全？", "做法（safe 可并行 / 非 safe 独占，最大并发上限，最终都过统一 Pipeline）：\n1. 分类：工具编排（tools/orchestration.py）把工具分成 safe（无依赖、副作用可控，可并行）和非 safe（写操作/破坏性，需独占串行）两类。\n2. 调度：safe 工具在最大并发上限内并行执行（用并发原语限流，避免无界并发打爆下游）；非 safe 的独占执行，不为降延迟而牺牲正确性。\n3. 统一收口：不管并行还是串行，每个调用最终都进同一个 execute_tool Pipeline，享受同一套校验/权限/视觉转述/Artifact 化/OTEL——并发只改「怎么调度」，不改「每次调用经过什么」。\n4. 原则：并行只用于真正无依赖且副作用可控的工具；read 类天然适合并行，write/delete 类绝不为了快而并发。\n源码入口：tools/orchestration.py、graph.py 的 tools 节点。\n怎么验证：trajectory 测试断言写类工具不被并行、并发数不超上限。", "源码入口：tools/orchestration.py、graph.py tools_node。", ["并发","工具编排"]],
    ["为什么 Tool Registry 要保证确定性排序并支持 alias？", "做法（确定性排序吃 cache + 可重复测试，alias 兼容旧 transcript）：\n1. 确定性排序：Tool Registry（tools/registry.py）按固定顺序产出工具列表，让 bind_tools 和系统提示词在不同进程启动之间字节稳定——这直接服务 prompt cache（前缀不变才命中）和可重复测试（每次跑出来的 prompt 一样，golden 才稳定）。\n2. alias：旧 transcript 里可能保存了已改名工具的旧名（如 kb_search → kb_retrieve），alias 让旧会话的 tool_call 仍能路由到现工具，不报「未知工具」。kb_retrieve.aliases=(kb_search,) 就是这么兼容退役的 kb_search 的。\n3. 冲突保护：注册时若 alias 撞上某个正式工具名，直接启动失败——宁可起不来，也不能静默把调用路由到错的工具。\n源码证据：tools/registry.py。\n经验：「排序随机」看着无害，实则同时砸掉 prompt cache 命中率和测试可重复性——确定性是这两者的隐形前提。", "源码证据：tools/registry.py。", ["Tool Registry","兼容性"]],
    ["动态 tool_search 目前真正解决了什么，和 deferred schema 有什么差距？", "诚实校准（区分「发现能力」与「运行中动态 bind 新 schema」，不照搬旧设计文档）：\n1. 当前确实做到的：tool_search（tools/tool_search/）基于工具名 + 描述做语义发现，让模型不用盲猜有哪些工具；搜索结果走 Redis 缓存减少重复检索；Skill 同理按需加载全文（SKILL.md 全文延迟加载）。这解决的是「模型知道有哪些能力可用」。\n2. 与 deferred schema 的差距：是否实现「运行中把搜到的新工具 schema 动态 bind 进当前 LLM 调用」，要以 live graph 实际的 collect_tools/bind_tools 路径为准——不能因为旧设计文档写了 deferred binding 就宣称完整动态绑定已上线。我会据实说：发现层已落地，运行时动态 bind 这一步要看代码当前怎么 collect/bind，可能还是「启动期 bind 全集」而非「搜到才 bind」。\n3. 为什么诚实重要：这正是面试官最容易抓的「文档 vs 实现」校准题——把「设计意图」当「已实现」是 agent 圈最常见的吹牛形态。\n源码证据：tools/tool_search/、registry.py 的 collect_tools/bind_tools。给出方法即可：要做真 deferred binding，得在搜中命中后重组 bind_tools 并触发一次 re-bind 的模型调用。", "这是面试官很可能抓住的文档与实现校准题。回答要诚实区分发现能力和真正动态绑定。", ["Tool Search","实况校准"]],
    ["为什么 Knowledge Base 被抽象成 Source，而不是每个库一个 Tool？", "做法（Source 是数据源声明层，Tool 是模型调用面，分层消除散落 if/else）：\n1. 分层：Knowledge Source（knowledge/sources.py）对照 Claude Code 的 MCP/Skill 那一层——每库声明一个 KnowledgeSource：id、provider、short/card（给系统提示词的描述）、filters（过滤能力域）、retrieve（检索函数）、injectable（是否主动注入）。Tool 层只有一个统一 kb_retrieve 消费所有 Source。\n2. 加新库 = 注册一个 source，零工具代码改动：不用再复制一份工具 schema、prompt 片段、注入逻辑——这些全由注册表统一驱动（KB cards 由 build_kb_fragment 从注册表生成，注入由 build_turn_reminder 遍历 injectable）。\n3. 扩展点：contrib provider 实现可选钩子 knowledge_sources(settings) 就能贡献库，core 团队的库在 build_chat_graph 注册。\n源码证据：knowledge/sources.py、tools/kb_retrieve/。\n经验：这是把「每加一个库就改一处 if/else」的反模式，换成「声明式注册表 + 统一消费」——抽象的价值是新增成本恒定。", "源码证据：knowledge/sources.py。体现消除散落 if/else 的抽象能力。", ["KnowledgeSource","扩展性"]],
    ["为什么不同 Knowledge Provider 的分数不能直接混排？", "做法（分数标定空间不同，按 provider 分组组内排序，不混排）：\n1. 问题：本地 pgvector 的 cosine 分数、Dify rerank 分数、其它 provider 的分数，标定空间完全不同——本地的 0.8 和 Dify 的 0.8 不代表同等相关性，直接比大小排序是拿苹果比橘子。\n2. 解决：kb_retrieve 联邦检索时按 provider 分组，只在同一 provider 的分数组内排序，分组结果一起交给模型判断，让模型基于内容而非跨源原始 score 取舍。\n3. 要真正跨源统一排序怎么办：必须再加一个统一 Reranker（把所有候选过同一个打分模型重新打分到同一标定空间），而不能直接比原始 score。这是设计方案，不是已落地。\n源码证据：tools/kb_retrieve/。补充：pgvector 用 cosine 距离 <=> 转相关性是 1 - distance；Dify 联邦下 tickets + qa 两个 source 的 metadata schema 还不同（tickets 6 字段含 business_line，qa 无 business_line）。", "源码证据：kb_retrieve/tool.py。", ["RAG","Score Calibration"]],
    ["为什么知识源需要显式声明支持的 Filter？", "做法（filter 与 source 声明求交集下发，未声明字段自动无过滤，治理空召回）：\n1. 真实问题沉淀：不同知识库 metadata 字段不一致。如果把 business_line 这种过滤条件无差别下发给一个没有该字段的库（如 qa 库无 business_line），该库会稳定返回空结果——一个静默的空召回 bug。\n2. 机制：每个 KnowledgeSource 声明自己支持的 filters；请求带来的 requested filter 与每个 source 的声明求交集——只把这个库认得的过滤字段下发给它，认不得的字段自动忽略（对该库变成无过滤检索）。\n3. 防漂移：过滤的枚举值也从注册表生成，减少大小写/字段名漂移导致的对不上。\n源码证据：knowledge/sources.py 的 filters 字段 + kb_retrieve 的交集下发逻辑。\n经验：这是由真实空召回事故机制化出来的——把「每个库手工记得下发哪些字段」换成「注册表声明 + 自动求交集」，从根上消除了「字段下错给空结果」这一类。", "这是由真实空召回问题沉淀出的机制。", ["RAG Filter","Schema"]],
    ["主动知识注入和 kb_retrieve 工具为什么要同时存在？", "做法（默认提示 + 按需深搜，两级机制）：\n1. 主动注入（build_turn_reminder）：解决「高相关团队知识，模型不一定主动想起去搜」的问题。每轮在 reminder 里遍历 injectable 的 source 并行检索，只取少量高分结果注入尾部。带预算和门槛防滥用：3s 延迟预算（超时就放弃注入不阻塞）、per-source 命中门槛（team 0.45 / tickets 0.5，分数不够不注入）。\n2. kb_retrieve 工具：解决「需要更多证据或跨数据源深检索」的问题，由模型在复杂问题时显式调用，topK 更大、可带 filter。带 Redis 10min 缓存（以 query/topK/filter/source 为键）避免工具循环里重复检索。\n3. 为什么两个都要：注入是「不用想就给的默认提示」，工具是「想清楚再深挖的按需检索」——注入若做大就每轮都重检索浪费预算，工具若没有则简单问题模型也得手动搜。\n当前限制（诚实）：kb_retrieve 的缓存 key 还不含 source version，知识库更新后缓存命中可能拿到旧结果，需要把 version 纳入 key 才能精确失效。\n源码证据：runtime 的 build_turn_reminder、tools/kb_retrieve/。", "可解释为“默认提示”与“按需深搜”的两级机制。", ["Proactive RAG","RAG"]],
    ["为什么使用 mem0，而不是自己维护一张 Memory 表？", "做法（自研表只会停在写入+向量搜，mem0 带 ADUN 事实管理，复用现有基建）：\n1. 自研表的天花板：很容易只做到「append 一行 + 向量召回」，缺事实提取、去重、更新、冲突解决——同一个事实说三遍存三条、新事实和旧事实矛盾时不知道删谁。\n2. mem0 的 ADUN 循环（tools/memory/mem0_store.py）：对每条记忆决策 Add / Update / Delete / No-op——新信息是该新增、还是更新已有、还是与旧记忆矛盾要删、还是重复直接忽略。这是「记忆管理」而非「记忆堆积」。\n3. 复用基建：mem0 复用现有 PostgreSQL + pgvector + 本地 FastEmbed（384 维 embedding），不引第二套向量库。\n4. 迁移策略：保留旧 Memory 表用于回滚，不一次性删——切后端要留退路。\n源码证据：tools/memory/mem0_store.py。\n注意：mem0_memories 表是 mem0 库私有 schema，不能手改（曾踩过坑）。", "源码证据：tools/memory/mem0_store.py。", ["mem0","Memory"]],
    ["Memory Add 为什么采用 fire-and-forget？有什么风险？", "做法（写入异步返回 queued，后台执行持强引用防 GC；诚实定位 best-effort）：\n1. 为什么异步：mem0 写一条记忆要跑 1-2 次 LLM 调用（事实提取 + ADUN 合并决策），同步等会明显阻塞用户响应。所以 memory_add 工具立即返回 queued，把实际写入丢到后台 asyncio task。\n2. 防 GC：后台 task 必须被持有强引用，否则 asyncio 可能把没人引用的 task 回收掉——写入还没跑完就被 GC 是个隐蔽坑。\n3. 风险（必须主动说）：① 进程退出时未跑完的写入会丢；② 用户无法立刻保证下一轮就能检索到刚说的事实（写入还在队列里）。所以当前定位是 best-effort Memory，不是事务性数据——真正的业务事实/权限数据绝不能只靠它。\n改进方向（设计方案非已落地）：换持久化队列（如 Redis Stream / DB outbox）+ 可观测的写入状态（queued/written/failed），让重启不丢、状态可查。\n源码证据：tools/memory/mem0_store.py 的异步写入路径。", "进一步改进可使用持久化队列和可观测写入状态。", ["Memory","异步写入","技术债"]],
    ["Memory 如何保证用户隔离？", "做法（user_id 取自真实执行上下文，查询带 user_id filter，匿名进固定 bucket）：\n1. 来源唯一：所有 memory add/search 的 user_id 都从真实 ToolExecutionContext 取（context.wiring 注入），不接受工具调用方传入——防止模型或上游伪造 user_id 串库。\n2. 查询隔离：mem0 search 带 user_id filter，只召回该用户的记忆；匿名用户映射到一个固定 bucket（统一归到一个匿名 user_id），不会和登录用户混。\n3. 测试覆盖：测试验证不同 wiring / 不同用户之间不串数据。\n4. 边界声明：这是 best-effort Memory，真正的业务事实和权限数据不该存进来——隔离做得再好，best-effort 的可靠性也不配承载权限决策。\n源码证据 / 验证：ToolExecutionContext 取 user_id 的路径、scripts/verify_user_isolation.sh 和相关隔离测试。\n经验：隔离的关键不是「记得加 filter」，而是「user_id 从受信上下文取、调用方无法覆盖」——把身份来源收口到一处。", "可结合 scripts/verify_user_isolation.sh 和相关测试说明。", ["Memory Isolation","安全"]],
    ["后台任务为什么既使用进程内 asyncio Task，又将状态持久化到数据库？", "做法（asyncio 管生命周期，DB 管事实状态，Redis 只做实时推送）：\n1. 职责三分（runtime/background_runner.py）：① 进程内 asyncio Task 负责实际执行的生命周期 + 取消（task.cancel）；② DB 负责 queued / running / progress / terminal 等事实状态的持久记录；③ Redis Pub/Sub 只做实时事件推送。\n2. 关键设计：正确性不依赖 Redis——Redis 是 best-effort 实时通道，订阅丢了/没收到事件，前端仍可轮询 DB 拿到权威状态。把「实时性」和「正确性」解耦，实时通道挂了不影响数据正确。\n3. 为什么不只用 DB：纯轮询延迟高、压 DB；Redis 补实时体验。为什么不只用 Redis：Pub/Sub 不持久，订阅者错过就丢，没法当事实源。\n源码证据：runtime/background_runner.py。\n经验：这是典型的「durable 状态层 + best-effort 通知层」分离——任何「推送即真相」的设计在生产里都会被丢消息打脸。", "源码证据：runtime/background_runner.py。", ["Background Task","Durability"]],
    ["服务重启时后台任务会发生什么？", "诚实边界（进程内协程重启即丢，标 interrupted 保证状态诚实，无跨进程续跑）：\n1. 现状：后台任务的执行协程是进程内 asyncio Task，进程重启后协程没了，无法继续跑——这是实事，不包装。\n2. 重启协调：启动时扫 DB，把那些「状态是 queued/running 但已经没有对应 Runner（协程）」的记录标成 interrupted，避免它们永远显示 running 这种幽灵态。优先保证状态诚实：宁可标「中断了」，也不能让用户盯着一个永远转的 running。\n3. 当前不具备的能力（必须主动承认）：跨进程任务续跑——重启后任务不会从断点接着跑，只是被诚实标记为中断。\n4. 要做强恢复的方法（设计方案）：外部持久队列（如 Redis Stream/SQS）+ 租约 Worker（lease/heartbeat 防重复执行）+ 任务级 Checkpoint（记录已完成步数，重启从断点续）。\n源码证据：background_runner.py 的启动协调逻辑。\n经验：能力缺口讲清楚 + 给出补法，比假装「能续跑」更显成熟度——这是我列在未来优化首位的项。", "这是必须主动承认的限制，反而能体现成熟度。", ["Orphan Task","技术债"]],
    ["后台任务结果为什么在下一轮注入，而不是直接写 Aegra Checkpoint？", "做法（跨进程不直接改 Checkpoint，标 undelivered → 下一轮 call_model 注入一次 → 标 delivered）：\n1. 边界问题：FastAPI 后台任务和 Aegra graph 是两个不同的运行进程/边界。后台任务直接跨进程去改 Aegra 的 Checkpoint，容易破坏消息顺序和并发一致性——两个写入者抢同一份对话状态是并发地狱。\n2. 交付协议（runtime/background_delivery.py）：后台任务完成后把终态结果标记为 undelivered（存 DB）；用户下一轮进入 call_model 时，由主 graph 把 undelivered 结果注入一次上下文，注入后标 delivered。\n3. 核心原则：主 graph 始终是对话状态的唯一写入者——后台任务只「投递信箱」，由对话流自己在合适时机取信并写进状态。单写入者 = 没有并发写冲突。\n源码证据：runtime/background_delivery.py。\n经验：这是跨进程边界下的「状态所有权」问题——谁拥有写权限要唯一，跨边界只能投递不能直写。", "这是跨进程边界下的状态所有权问题。", ["Background Delivery","一致性"]],
    ["Sandbox 预热为什么只针对使用过沙箱的 Thread？", "做法（Redis 标记用过沙箱的 thread，模型思考期异步 warm，把冷启藏进 LLM 延迟）：\n1. 不无差别预热的原因：每次纯聊天都启容器是纯浪费——大多数回合根本不用沙箱。\n2. 标记机制（sandbox/warmup.py）：工具实际用过 sandbox 后，用 Redis 给该 thread 打标。后续回合只有带标的 thread 才触发预热。\n3. 时机：在模型思考期（call_model 正在等 LLM 出 token 时）异步 warm 沙箱，把容器冷启动藏在本来就要等的 LLM 延迟里——用户感知不到额外等待。\n4. 对纯聊天的成本：只多一次轻量 Redis 查询（查有没有标），可忽略。\n源码证据：sandbox/warmup.py、graph.py 的预热触发点。\n经验：预热的艺术不是「预热得越多越好」，而是「只对会用的预热 + 把预热塞进已有的等待窗口」，两头都不浪费。", "源码证据：sandbox/warmup.py、graph.py。", ["Sandbox","预热"]],
    ["Cloudflare Sandbox 与 E2B 的抽象如何体现架构价值？", "技术判断修正（同一 SandboxProvider 抽象 + 基于同环境基准纠正错误归因）：\n1. 抽象：Cloudflare Sandbox 和 E2B 实现同一个 SandboxProvider 接口，调用方不感知后端——切换 provider 不动业务代码。\n2. 故障归因修正：最初怀疑 Cloudflare warm exec 慢，差点据此切 E2B。但做了同机同网基准测试，发现两者 warm exec 都约 0.3s——provider 不是瓶颈，真正慢的是部署机的网络路径（隧道/回源）。差点把「网络问题」错归成「provider 问题」。\n3. 抽象的真实价值：不是「Cloudflare 慢所以换 E2B」，而是 E2B 作为可快速落地的切换选项存在；但选型必须基于同环境基准，不能基于错误归因。抽象买到的是「选项」，不是「换了就快」。\n源码证据：sandbox/ 下的 SandboxProvider 实现。\n经验：这是很有说服力的「先证伪再决策」案例——性能问题不做控制变量的基准就换技术栈，很可能换完发现没用、真因还在网络层。", "这是源码项目里非常有说服力的技术判断修正案例。", ["SandboxProvider","Benchmark","复盘"]],
    ["为什么工具图片结果要先做视觉模型转述？", "做法（tool role 不能带 image block，并发交视觉代理转文本 + 原始 data URL 存 metadata）：\n1. 协议约束：OpenAI 兼容协议里 tool role 消息不能直接携带 image block——即使主模型支持视觉，也无法通过 tool 结果原样接收图片。这是协议层硬限制，不是模型能力问题。\n2. Pipeline 处理（tools/pipeline.py 的 _resolve_image_blocks）：把工具结果里的 ImageBlock 并发交给视觉代理（vision 模型）转述成文本，文本进 tool 结果供主模型推理；同时把原始 image 的 data URL 保存在 ToolResult 的 metadata。\n3. 双表示一致：模型看到的是文本转述（能推理），前端看到的是 metadata 里的原图 data URL（能展示）——两个不同但关联一致的表示，各取所需。\n源码证据：tools/pipeline.py 的 _resolve_image_blocks。\n经验：「主模型支持视觉」不等于「图片能从任何角色传进去」——协议层的角色限制比模型能力更先决定数据怎么流。", "源码证据：tools/pipeline.py _resolve_image_blocks。", ["Multimodal","ToolResult"]],
    ["为什么测试要分成单元、Trajectory、Contract 和真实 Eval 四层？", "做法（四层各打一类问题：函数正确 / 工具轨迹 / 协议形状 / 概率行为）：\n1. 单元：保证纯函数正确（压缩阈值计算、filter 求交集、call id 匹配等），快、确定。\n2. Trajectory（tests/trajectory）：用脚本化的 fake 模型（按预设脚本出 tool_call）跑真实 live graph，零 LLM 成本地检测工具选择、调用顺序、循环膨胀——这是「不花钱测 agent 行为骨架」的关键层。\n3. Contract Golden（tests/contract）：固定前端依赖的事件类型、工具名、ToolResult artifact 的 key/type 结构形状，忽略 id/时间/具体文案——后端文字没变不代表协议没破，这层专防静默破协议。\n4. 真实 Eval（evals）：用生产模型 + 任务集，比 passed / steps / latency / token / cost，用 MemorySaver 替 checkpointer、HITL 用 resume payload 自动批准——测概率性的真实行为。\n源码证据：tests/trajectory、tests/contract、evals。\n经验：确定性问题（单元/trajectory/contract）和概率性问题（eval）必须分层——拿 eval 测协议形状又贵又flaky，拿单元测 agent 行为又测不到。", "源码证据：tests/trajectory、tests/contract、evals。", ["Testing","Eval"]],
    ["为什么行为 Eval 必须跑生产同一条 Graph？", "做法（评测路径即生产路径：直接调 build_chat_graph，只换 checkpointer）：\n1. 反例的危害：如果 eval 用一条简化 chain，而生产用另一套 graph，eval 绿了也不代表生产对——真实的工具调用、上下文压缩、HITL 审批、安全行为全没被测到，纯属自欺。\n2. 做法：eval 直接调用生产同一个 build_chat_graph，只把生产 checkpointer 换成 MemorySaver（评测不需要持久化）；HITL 用与真实客户端相同的 resume payload 自动批准（模拟用户点 accept），让审批流也真实跑过。\n3. 收益：eval 覆盖的就是用户实际执行路径——压缩/护栏/审批/工具选择全是生产那一套。这也是当初收敛到唯一 build_chat_graph 的回报之一。\n源码证据：evals/ 调 build_chat_graph、用 MemorySaver、resume payload 自动批准。\n核心原则：评测路径即生产路径——任何「为了好测而简化的评测图」都是在测一个不存在的系统。", "可用“评测路径即生产路径”作为核心原则。", ["Eval","Production Parity"]],
    ["71 步 Fibonacci 事件说明了什么？", "复盘（最终答案对 ≠ agent 健康，step count 升为一等指标）：\n1. 事故：一个本应约 3 步完成的 Fibonacci 任务，曾膨胀到 71 步才结束——最终答案是对的，但延迟和成本爆炸。如果只看「最终文本对不对」，这个 agent 看起来完全健康，实则病得很重。\n2. 教训：agent 质量不能只评最终输出，过程效率（步数、重复调用、循环膨胀）是独立的健康维度。\n3. 沉淀的护栏：把 step count 列为一等指标——加 max_steps 告警、写 loop-trap eval 任务（构造诱导重复的输入断言步数不超阈值）、加 trajectory guard（脚本模型跑真实 graph 测循环膨胀）、Stuck Detector 按 current_turn_slice 检测重复。\n4. 这也是为什么真实 eval 要比 steps 而不只比 passed——71 步那次 passed=true，但 steps 暴露了真相。\n经验：「答案正确」是必要不充分条件；把过程指标（steps/latency/cost）和结果指标分开评，才抓得住这类隐性退化。", "这是回答 Agent 评测与 Loop Control 的最佳真实案例之一。", ["Step Inflation","事故复盘"]],
    ["事件契约 Golden Test 解决了什么问题？", "做法（固定协议形状而非文案，有意变更必须显式重录走 diff 审查）：\n1. 问题：前端按 ToolResult artifact 的 key 和 type 渲染对应组件（图片/任务/知识结果各一套 UI）。后端「文字没变」不代表「协议没破」——改个 artifact 的 type 字段，前端组件就渲染不出，但文本类测试全绿。\n2. 解法（tests/contract/test_event_contract.py）：Golden Test 只固定消息类型、工具名、artifact 的 key/type 结构形状，主动忽略 id、时间戳、具体文案这些本就该变的。盯住「契约」，放过「内容」。\n3. 变更纪律：有意改协议时必须显式重录 golden（regenerate），改动以 git diff 形式进 PR 审查——让「破坏前端契约」从一个静默事故变成一次必须有人 review 的显式动作。\n源码证据：tests/contract/test_event_contract.py。\n经验：跨前后端的契约必须有专门的形状测试——靠后端单测和前端单测各管一头，中间那条 AG-UI 事件契约就是没人守的真空地带。", "源码证据：tests/contract/test_event_contract.py。", ["AG-UI","Contract Test"]],
    ["插件化架构有哪些扩展点？为什么使用 entry point？", "做法（四类 Python entry point，装即注册卸即消失，core 不依赖具体业务）：\n1. 四类扩展点：LLM Provider、Skill Pack、Tool Provider、Sandbox Provisioner。业务私有能力（如公司的 Dify 知识库、企业 CLI）打成独立包，通过 Python entry point 注册，安装即生效、卸载即消失。\n2. 为什么用 entry point 而非核心仓库 if/else：在 core 里维护「if 装了 Dify 就 import…」这类条件导入会让核心逐渐被业务污染，且开源/私有边界糊掉。entry point 是 Python 标准的包级扩展机制——core 不 import 任何具体 provider，靠 entry point 在启动时被发现注册。\n3. 实例：contrib/agent_server_qlj 就是一个外挂包，声明 knowledge_sources(settings) 钩子贡献 tickets/qa 两个 Dify 库，core 完全不知道 Dify 的存在。\n源码证据：README 的 entry point 约定、contrib/agent_server_qlj、tools/providers.py 的钩子协议。\n经验：「core 不依赖任何具体业务 provider」是这套设计的硬约束——一旦 core 出现某个具体厂商的名字，扩展点就名存实亡。", "源码证据：README 和 contrib/agent_server_qlj。", ["Plugin","Entry Point"]],
    ["Custom Agent 的 Prompt 为什么只能叠加，不能替换系统 Prompt？", "做法（系统 Harness 先组装，Agent prompt 作为最后一层追加；Skill allowlist 只能缩小）：\n1. 风险：用户定义的 persona prompt 如果能替换系统 prompt，就能移除工具说明、安全规则、Operator 指令、权限边界——等于用户配置可以绕过整个系统治理，这是越权口子。\n2. 组装顺序：先组装基础 Harness（系统 prompt + 工具说明 + 安全规则 + 权限边界），再把 Custom Agent 的 prompt 作为「更具体的最后一层」追加在后面。persona 只能专门化/细化行为，删不掉前面的治理层。\n3. Skill 同理只能缩小：Custom Agent 的 Skill allowlist 只能从系统可见的 Skill 集合里做子集筛选，不能新增系统没授予的 Skill——能力只能收窄不能扩张。\n源码证据：composition 的 prompt 分层组装、Custom Agent 的 allowlist 求交逻辑。\n经验：用户可配置层和系统治理层的关系必须是「叠加 + 收窄」，绝不能是「替换 + 扩张」——任何让用户配置能覆盖安全规则的设计都是提权漏洞。", "这是防止用户配置绕过系统治理的重要边界。", ["Custom Agent","Prompt Hierarchy"]],
    ["如果让你现在继续优化 agent-server，优先做什么？", "做法（按线上失败频率和业务损失排序，先补三类已知风险）：\n1. 持久化恢复：把 Memory 写入（当前 fire-and-forget，进程退出可能丢）和长后台任务（当前进程内 asyncio，重启只能标 interrupted 不能续跑）迁到可恢复的持久化队列 + 租约 Worker + 任务级 Checkpoint，解决跨进程续跑这个最大缺口。\n2. 运行态外置：把进程内的运行状态外置或明确生命周期——compaction failure 的 circuit breaker 计数、Stuck Detector 的回合状态、Sandbox 标记等目前重启即丢，至少把熔断这类该跨重启稳定的状态搬到 Redis/DB。\n3. eval 闭环深化：继续从 Langfuse 坏 trace 沉淀回归任务，重点覆盖跨进程恢复、知识冲突解决（ADUN 的 Delete 决策对不对）、高风险审批（HITL fail-closed 路径），把每个生产事故变成永久门禁。\n排序原则：优化顺序由线上失败频率 × 业务损失定——不是「哪个技术更酷」，而是「哪个最常坏、坏了最贵」。\n按岗位微调：偏可靠性的岗位先讲 1/2，偏业务知识库的先讲知识冲突与 filter 治理，偏成本的先讲 prompt cache 命中率和压缩阈值调优。", "这是未来情景题。回答时可以根据目标岗位偏可靠性、成本或业务知识库调整优先级。", ["Roadmap","技术债"]]
  ]
}
    ];

    const productionDeepDiveA = [
{
  id: "streaming-deep", title: "生产场景深挖：流式输出",
  desc: "从传输协议一直问到断点续传、内容安全与跨服务观测。重点不是打字机效果，而是事件一致性、任务生命周期和资源回收。",
  items: [
    ["前端实现大模型流式输出，SSE与WebSocket选型逻辑是什么？各自优缺点、适用场景（结合高并发、跨端兼容）？",
      deepAnswer(
        "普通单向文本生成默认选 SSE；只有需要高频双向、语音/音视频、多人实时协作才上 WebSocket。选型由通信方向、网关兼容、客户端能力三件事决定，不是笼统比谁更快。",
        "1. SSE 服务端按 text/event-stream 输出，每帧三行：id: <seq>、event: <type>、data: <json>，空行结束；浏览器原生 EventSource 自动重连且自动回传 Last-Event-ID。但 EventSource 只能 GET、不能带自定义 Header，所以鉴权/POST body 场景改用 fetch + response.body.getReader() 自己读 ReadableStream，重连和 Last-Event-ID 要手写。\n2. 关键服务端配置：Content-Type: text/event-stream、Cache-Control: no-cache、X-Accel-Buffering: no，且 Nginx 侧 proxy_buffering off、proxy_cache off、chunked_transfer_encoding on、proxy_read_timeout 拉到 3600s，否则反代会把流缓冲成一坨整包下发。\n3. WebSocket 走一次 HTTP Upgrade 后是全双工，应用层要自定义帧类型、ping/pong 心跳（如 30s）、重连退避、ack 和背压；负载均衡要么 sticky 要么把会话状态外置。\n4. 高并发下两者都必须异步非阻塞（asyncio/uvicorn）、设每用户连接上限、空闲超时回收、跨实例用 Redis/Kafka 分发事件。",
        "WebSocket 双向能力强但运维成本高：很多企业代理/CDN 对长连 Upgrade 支持差，断线恢复要自己做。SSE 代理兼容最好、自带重连，但只能单向、且老式 LB 的 response buffering 会直接让流式失效。小程序和部分 WebView 不支持 fetch streaming，必须备 WebSocket 或 chunked request 甚至短轮询降级，否则这些端只能等整段返回。",
        "我的项目用 Aegra + AG-UI 承载 Agent 事件流，可以讲清分层：AG-UI 定义事件语义（text_delta / tool_started / …），SSE 只负责传输，二者解耦。Klook 企业级 IM SDK 那段经历（1000+ 客服、消息顺序/重连/跨端）让我对 WebSocket 心跳、重连退避、跨端帧解析有真实落地经验，这是已落地证据；agent-server 当前主路径是 SSE 流，WebSocket 是另一类业务才需要的方案。"
      ), "追问：为什么不是所有场景都用 WebSocket？如何做代理层配置？", ["SSE","WebSocket","AG-UI"]],
    ["流式返回过程中网络中断、前端重连，后端如何恢复上下文继续输出？如何避免重复输出、丢包？",
      deepAnswer(
        "恢复的关键不是重新请求模型，而是把生成任务与连接解耦，并给每个事件一个可持久化的单调顺序号。事件级补发和模型推理续跑是两层问题，要分开答。",
        "1. 每个 run 分配 runId，事件结构统一为 {runId, sequence, eventId, type, payload}；sequence 在该 run 内单调递增。事件落一份短期日志：用 Redis Stream（XADD run:{runId} *  field value）保存，设 TTL 600s 或 MAXLEN ~5000 截断，避免无界增长。\n2. 前端在内存里记 lastSeq；断线重连时把它放进 SSE 的 Last-Event-ID Header（或 fetch 重连时拼到 query/header）。\n3. 服务端收到重连：先用 XRANGE run:{runId} (lastEventId + 把 lastSeq 之后的缺口事件一次性补发，再 XREAD BLOCK 订阅实时增量，做到补发→无缝续订。\n4. 幂等：前端 reducer 按 eventId 去重，sequence 比当前小的丢弃；text_delta 按 messageId 追加而非覆盖，保证至少一次投递下不重复渲染。\n5. 若上游模型连接已断且不可续传：从最近 Checkpoint 恢复 Graph 状态、把已生成部分作为部分结果返回，并发 end 事件，绝不伪装成原流继续吐字。",
        "做到严格不丢需要事件持久化 + ack，写放大和延迟都比裸聊天高，所以 TTL/MAXLEN 是成本与可恢复窗口的权衡：窗口太短，离线久了的用户重连补不全只能回退 Checkpoint。第三方 API 流断了通常无法服务端续算，只能重跑或交付部分结果。Checkpoint 存的是 Graph 状态，不等于完整 SSE 事件日志，所以两者都要有。",
        "我的 Aegra Checkpoint 已经能恢复 thread/Graph 状态（checkpoint_* 链），这是已落地的；但事件级 replay（Redis Stream + Last-Event-ID 补发缺口）在 agent-server 当前版本是设计方案，不是已上线能力——我会诚实说明：能恢复对话状态，事件级断点重放是下一层要补的工程。"
      ), "区分状态恢复、事件补发和模型推理续跑。", ["断线恢复","幂等","Checkpoint"]],
    ["用户点击“停止生成”，后端如何立即终止LLM推理、释放GPU/CPU资源？如何避免资源泄露？",
      deepAnswer(
        "关闭浏览器连接 ≠ 取消任务；取消必须是从 API 显式传播到模型流、工具、子任务的控制信号，并且要把终态写库。",
        "1. 前端 POST /runs/{runId}/cancel；后端把该 runId 对应的 cancellation_token（asyncio.Event）置位并 task.cancel() 取消那个 asyncio.Task。\n2. 中断模型流：HTTP provider 直接 close 掉 response 的 httpx/aiohttp stream，停止 read 即停止 token 计费累加；自建 vLLM 走 abort(request_id)，把序列从调度队列和 KV Cache 移除（这部分我只能讲方法，没实操过私有部署）。\n3. 工具侧 cooperative cancel：长工具循环里周期性检查 token.is_set()，并在 finally 里关文件/HTTP 连接/沙箱/临时资源；子任务通过同一个 token 向下传播取消。\n4. 写终态：DB 标记 status=cancelled，发 cancelled + end 事件让前端从 stopping 落地，Checkpoint 保存到取消点。CancelledError 必须在 finally 兜资源释放——否则取消反而造成泄漏。",
        "部分第三方 API 不支持真正停服务端计算，只能停读取与停计费；已发生的 DB 写、文件落盘等副作用取消不了，只能阻止后续步骤，所以要区分 cancelled / failed / partially_completed，并用幂等键处理半完成状态。不在 finally 兜底释放，慢工具被 cancel 时会泄漏 FD/连接，高并发下累积成句柄耗尽。",
        "我的 BackgroundTaskRunner（runtime/background_runner.py）已落地 cancel event、Task.cancel 和 terminal 状态落库（queued/running/cancelled/interrupted），这是真实证据。主 Agent 流的 abort 是否一路下传到上游 LLM provider 要按当前实现说：我会把后台取消机制作为已落地证据，并明确 provider 级 abort（关 stream / vLLM abort）是下一层要补的。"
      ), "追问：CancelledError 在 finally 中怎么处理？不可撤销工具怎么办？", ["取消","资源回收"]],
    ["流式返回时，如何插入非文本事件（工具调用标记、思考过程、错误提示、分段标识），且不影响前端渲染？",
      deepAnswer(
        "不要在文本里嵌控制字符或特殊分隔符，而用有类型的事件 Envelope，让文本和状态事件走同一条有序流、不同渲染分支。这是事件建模问题，不是字符串解析技巧。",
        "1. 统一信封字段：{schemaVersion, runId, messageId, sequence, type, timestamp, payload}。type 枚举至少包含 text_delta、tool_started、tool_finished、stage、artifact、error、end。\n2. 前端用 reducer 按 (messageId 或 toolCallId) 更新实体：text_delta 只 append 到对应 message.content；tool_started/tool_finished 更新一张独立的工具卡片（按 tool_call_id 匹配）；artifact 渲染成文件/图片/知识组件。\n3. 思考过程只发 stage（如 stage: planning / retrieving）这种可验证的阶段摘要，不直接把模型私有 CoT 透传给用户。\n4. 错误必须 error 事件后紧跟 end（terminal），否则 UI 永远卡在 generating。\n5. Schema 演进向后兼容：前端遇到未知 type 默认忽略而非崩溃；新增字段只增不改，老客户端读不到新字段也能跑。",
        "信封字段越多越稳但带宽和解析成本上升，要在 payload 里只放必要增量。最大的坑是协议漂移：后端偷偷改了 artifact 形状，前端静默渲染错。所以契约要有测试钉死，否则每次后端改字段都可能让线上 UI 错乱却不报错。",
        "我的 agent-server 已有 AG-UI 事件契约 + Contract Golden Test（固定 ToolResult artifact 的 key/type 形状，忽略 id/时间/文案），这是已落地证据。可以重点讲 Tool Pipeline 如何统一产出 artifact（任务/图片/知识组件），以及 Contract Test 怎么防协议漂移。"
      ), "核心是事件建模，不是字符串解析技巧。", ["事件协议","Contract Test"]],
    ["多轮对话+流式输出，如何保证消息不乱序、上下文不丢失？跨服务流式透传（Java/Go后端+Python模型服务）如何实现？",
      deepAnswer(
        "顺序要在 run、message、event 三个层级分别定义；跨服务绝不能靠到达时间推断顺序，必须靠显式 sequence 和 correlation id。",
        "1. 入口（网关）生成 threadId / runId / messageId 并透传；Python 模型服务给每个事件打 run 内递增 sequence。\n2. Java/Go 网关做纯字节流透传：关闭响应缓冲与聚合压缩（Spring 用 ResponseBodyEmitter / Flux 直透并禁 gzip 聚合，Go 端每帧 flusher.Flush()），保留并原样转发 id/event 行，不要重新分帧。\n3. 每轮完成原子写入：消息 + Checkpoint 一起落，避免半写。同一 thread 默认串行 run；并发到来时用版本号/乐观锁拒绝旧 run 覆盖新状态，或 fork 成新分支。\n4. 网关必须有增量解析器：HTTP chunk 边界 ≠ 业务 event 边界，一个 SSE 事件可能被拆进两个 TCP 分片，要按空行重组帧再转发，不能按 chunk 当事件。\n5. correlation id（traceId/threadId/runId）贯穿全链路，跨服务日志靠它对齐顺序。",
        "代理层经典坑：buffer 把流憋成整包、idle timeout 提前断、连接池复用串台、错误被网关吞成 200 空响应。多个并发 run 会让上下文分叉——必须显式定义 fork / 排队 / 取消旧 run 的策略，否则两条流交织写同一 thread 状态会乱。",
        "我的 Aegra 负责 thread/run/checkpoint 生命周期，Graph 通过 MessagesState 更新，这是已落地的顺序保证。Klook IM SDK 处理过消息顺序/乱序重排/重连补偿（1000+ 客服规模），可作为跨层 correlation id + 消息状态机的真实经验；Java/Go 网关透传是我会用的标准做法，agent-server 当前是 Python 单栈，跨语言透传是设计方案。"
      ), "准备解释 Nginx proxy_buffering、HTTP chunk 和业务 event 的区别。", ["跨服务","顺序一致性"]],
    ["高并发下（QPS≥1000），大量SSE长连接如何做连接复用、心跳检测、超时释放？避免OOM的核心优化点？",
      deepAnswer(
        "SSE 长连接不能在应用层复用成一个客户端连接，但能复用下游 HTTP/DB 连接、并用事件 Broker 把生成与持连进程解耦。要先把 QPS（新建速率）和并发在线连接数两个指标分开。",
        "1. 用异步服务器（uvicorn + asyncio），每连接只持轻量对象（订阅句柄 + 有界发送队列），不在内存里挂整段上下文。\n2. 心跳：每 15–30s 发一行注释帧 : ping\\n\\n 探活；记录每连接 last_write，read 失败或写超时即判定客户端断开，立即取消订阅、释放队列、关 FD。\n3. 跨实例解耦：生成进程把事件写 Redis Streams / Kafka / NATS，持连进程订阅 run 转发；LB 配 sticky 或按 runId 订阅，避免事件投错实例。\n4. 限额：每用户最大并发连接数、每连接发送队列 maxlen（bounded queue）、事件缓存窗口上限；慢消费者直接踢出或降采样，绝不无界堆积。\n5. 大结果不进事件流：Artifact 外置到 R2/对象存储，事件只带引用。\n6. 压测看的指标：并发连接数、RSS、event loop lag、队列深度、FD 数，而不是只看 QPS。",
        "OOM 几乎都来自四个源：每连接保存完整上下文、无界队列、慢消费者拖垮内存、单个大事件。bounded queue + 慢消费者踢出是底线，但代价是弱网用户可能丢中间帧、需要靠 sequence 补发兜回。",
        "我的系统现阶段更适合讲单实例 Aegra + Redis（可选 Broker）的演进路径，以及多云部署 + CI/CD + CSR 降级的容量规划方法论。1000 QPS 实测我没做过——这是诚实边界，我只能讲压测指标设计和扩容路径，不会声称已验证过 1000 QPS。"
      ), "高并发指标必须给并发连接、事件速率和平均持续时间。", ["高并发","背压","OOM"]],
    ["流式输出场景中，如何实现内容安全实时截断（检测到敏感词立即停流、清理上下文）？",
      deepAnswer(
        "安全检测必须卡在向用户发送之前，并用小滑动窗口缓冲，否则内容已下发就无法真正撤回。这是一个先缓后发的延迟换安全问题。",
        "1. 在发送侧加一个审核 gate：token delta 先进一个滑动窗口缓冲（如保留最近 64–128 字符的尾巴），用来识别跨 chunk 被切断的敏感词（比如敏感词刚好跨两个 delta）。\n2. 分层检测：先跑低延迟规则/词典（AC 自动机 O(n) 扫窗口），命中嫌疑再异步调分类模型确认，避免每个 delta 都打模型。\n3. 命中处理：立刻停止 flush 缓冲、cancel 上游生成、丢弃未提交缓冲，发一个 blocked 的 terminal end 事件；已经 flush 出去的部分按业务决定是否前端撤回（撤回不可靠，所以缓冲窗口是关键防线）。\n4. 输入侧、检索文档、工具结果也要在进入模型前分层检测，不能只守输出。\n5. 日志只存风险标签或脱敏片段，不存原文，避免审核系统自己成为敏感数据泄漏点。",
        "缓冲窗口越大越安全但首字延迟（TTFT）越高，这是直接的体验代价；纯关键词误杀率高、模型审核延迟高，两者要分层折中。已 flush 内容客户端撤回不可靠，所以宁可牺牲一点 TTFT 也要先缓冲再发。",
        "我的 Tool Pipeline 已经是统一后处理 choke point（空结果标记、大结果 Artifact 化、OTEL span 都在这一层），证明我会用单一切口做横切处理。但文本流的实时审核在 agent-server 当前源码没有落地——这是设计方案：我会把它实现为 Aegra 事件转换前的一个 SSE 审核中间层，而不是声称已上线。"
      ), "追问：跨 chunk 敏感词怎么识别？已经发出的内容怎么办？", ["内容安全","实时截断"]],
    ["流式返回时，如何精准统计Token消耗（逐段统计、总消耗汇总），适配计费场景？",
      deepAnswer(
        "计费以供应商最终 usage 为准，本地逐段 tokenizer 只能做实时估算；两者必须分开记录，禁止把估算当财务事实。",
        "1. 请求开始就记录 model、price_version、input_tokens（用对应模型 tokenizer，如 tiktoken 计 prompt）。\n2. 流式阶段把可见 text_delta 累加，本地估算 output_tokens 给前端做实时显示。\n3. 结束时拿权威值：OpenAI-compatible 流要在请求里带 stream_options.include_usage=true（或 SDK 的 stream_usage=True），最后一帧会回 usage，用它覆盖本地估算。\n4. 子调用全记：工具、上下文摘要、视觉转述代理、fallback 模型各自记一条，最后按 runId 聚合 input / output / cache_read / cache_write 和费用——fallback 不能只记最终那个模型。\n5. 断线拿不到最终 usage 时，标 estimated，事后用供应商账单对账修正。",
        "不同模型 tokenizer 与计费单位不同，失败/被限流的请求也可能照样收费，所以不能只在成功路径记账。把估算值直接当账单会导致对账差额；价格随时间变，必须把 price_version 钉进每条记录，否则改一次配置会污染所有历史账单。",

      ), "计费系统要保存价格版本，避免历史账单随配置变化。", ["Token","计费","Langfuse"]],
    ["小程序、APP、PC端对流式输出的兼容性差异如何处理？如何解决部分端流式渲染卡顿问题？",
      deepAnswer(
        "跨端统一一套业务事件协议，但允许不同的传输适配器；不要假设所有端都支持浏览器 ReadableStream。渲染卡顿的根因是每个 token 都 setState。",
        "1. 传输适配：Web 用 fetch ReadableStream / SSE；React Native 用支持流式的网络层（如 rn-fetch 流式或 WebSocket）；小程序按平台能力用 chunked request / WebSocket，最差降级短轮询。\n2. SDK 层统一：解帧、重连退避、sequence 去重、错误语义都收口到一个跨端 SDK，上层 UI 只消费标准事件。\n3. 渲染节流：每 30–80ms 批量 flush 一次累积 token（requestAnimationFrame 或定时器 batch），而不是每个 token 一次 setState，可把 Markdown 重解析和长列表 diff 次数降一两个数量级。\n4. 富文本增量：代码块/表格在闭合标记出现前按纯文本或增量 AST 渲染，闭合后再升级成高亮组件，避免半截语法反复重排。\n5. 弱网/后台端降频，并在真实低端 Android 和小程序容器实测，不能只在 PC Chrome 验证。",
        "批处理引入 30–80ms 的轻微延迟，但换来明显更稳的帧率，这个权衡通常值。小程序/老 WebView 不支持 fetch streaming，硬上会整段卡住，必须有降级链路。把 PC 浏览器实现直接搬到小程序是最常见的坑。",
        "我有 React、React Native、Branded App（MoeGo 热更新灰度 + Feature Flag）和 Klook IM SDK 经历，跨端传输适配、消息状态机、渲染节流这块是我的真实强项，可作为个人已落地证据来答。"

    ["流式推理时，LLM模型报错（如中途断连），如何设计兜底策略，保证用户体验？",
      deepAnswer(
        "中途错误先诚实终止当前流，再按是否已产出可用内容、是否有副作用，决定重试 / fallback / 保留部分结果。绝不把两个模型的流拼成一个确定答案。",
        "1. 错误分类：超时、限流(429)、网络断连、客户端参数(4xx)、内容策略。只对瞬时类（超时/限流/网络）做指数退避重试（如 base 0.5s，factor 2，max 3 次，加 jitter）。\n2. 首 token 前失败：可无感切 fallback 模型重发，用户感知不到。fallback 链显式配置，不静默换模型。\n3. 首 token 后失败：切模型会造成语气突变和内容重复，通常保留已生成文本，提供「继续生成」或从稳定 Checkpoint 重跑，而不是硬接另一个模型。\n4. 幂等：重试携带 run attempt id，工具副作用不可重放（已执行的写操作不能再跑一遍）。\n5. 所有失败路径都必须发 error + end，释放连接和 asyncio Task，让 SSE 闭合。",

    ["如何实现流式输出的“断点续打”？用户刷新页面后，如何恢复之前未完成的流式内容？",
      deepAnswer(
        "断点续打要拆成两件事：重放已经生成的事件（可可靠实现）和继续尚未完成的推理（取决于任务是否还在服务端跑）。面试官就是在看你会不会混淆 Checkpoint 与 Event Log。",
        "1. 刷新后先 GET /threads/{id}/state，把已持久化的消息直接渲染出来（这部分始终可靠）。\n2. 判断 run 状态：若 run 仍 active，前端带 lastEventId 重新订阅，服务端从 Redis Stream 用 XRANGE 补发缺口事件再 XREAD 续订，做到无缝续打。\n3. 若 run 已 interrupted（如重启被标记），展示部分结果 + 重试入口，不假装还在生成。\n4. 持久化策略：不要逐 token 写 DB（写放大严重），改为按事件批次或消息快照落库；细粒度事件放 Redis Stream（TTL 600s），DB 只存里程碑。\n5. 私有推理可保存 scheduler 状态续算；第三方 API 一般只能重新发起。",

        "我的 Aegra 管理 run/checkpoint，前端已有重启检测与 interrupted 状态的演进记录（BackgroundTaskRunner 重启把无 Runner 的 queued/running 标 interrupted），这是已落地的。事件级续打（Redis Stream + lastEventId 补发）在 agent-server 当前版本是设计方案——我会明确：能恢复 thread 状态是事实，事件级断点续打能力以实际版本为准、目前是规划。"

    ["跨服务流式透传时，如何做日志埋点（每段输出、耗时、异常），支撑全链路追踪？",
      deepAnswer(
        "每个 chunk 都打完整日志会产生巨量 IO；应追踪关键时间点和聚合指标，对高频事件采样而非全量落盘。",
        "1. 贯穿 correlation id：traceId、threadId、runId、messageId、modelRequestId 全链路透传，所有日志靠它对齐。\n2. 埋关键时间点字段：queue_wait_ms（排队）、ttft_ms（首 token 时延，记 stream 开始到第一帧）、tpot_ms（每 token 间隔 = (last_token_ts - first_token_ts) / output_tokens）、tool_duration_ms（每工具）、e2e_ms（端到端）、total_usage、terminal_status。\n3. OpenTelemetry：span 以 run 为根，model / retrieval / tool 各为子 span；流事件本身不一条一 span，只记 sequence 范围、字节数和间隔直方图（histogram）。\n4. 脱敏：日志绝不落完整 Prompt、手机号、token；只存哈希或脱敏片段。\n5. 异步 exporter 配有界队列，观测系统挂掉不能反压拖垮生成主链路；审计日志和调试 Trace 设不同保留周期（如审计 90 天、Trace 7 天）。\n6. TTFT/TPOT 测法：客户端打点 + 服务端 span 双向对账，e2e 用合成请求定期探针测。",
        "全量逐 chunk 日志的代价是 IO 和存储爆炸，所以高频事件必须采样或只记聚合直方图，代价是丢失个别 chunk 的细节——排障时靠 sequence 范围回溯而非逐帧。exporter 队列若无界，观测故障会反噬生成链路。",
        "我的 Tool Pipeline 已统一打 OTEL span（每个 execute_tool 一个 span），Langfuse 记录模型链路和 cost，这是已落地证据。跨服务部分：要在 Java/Go 网关透传 W3C traceparent header，才能把 Python 模型服务的 span 和上游网关 span 串成一条真正的跨服务链路——这是跨语言场景的标准做法，agent-server 当前是 Python 单栈，跨服务 traceparent 透传是设计方案。"

      deepAnswer(

        "1. 用显式状态机建模：state = {phase: plan|act|observe|reflect|done|escalated, step, budget:{max_steps:25, deadline_s:120, cost_usd:0.5}, tasks, last_observation}；每个节点是纯函数 (state)->state，转移由条件边决定，不让模型自己决定循环。\n2. Plan 输出结构化目标而非自由文本：[{id, goal, dependsOn, doneCriteria}]，Plan 阶段不调工具只产计划。\n3. Act 走统一执行器 execute_tool：Pydantic 校验参数 → 业务前置校验（资源存在/组合约束）→ 权限 → 带 timeout 执行（连接 5s / 总 30s）→ 异常收敛成 ToolResult。\n4. Observe 把结果分三类落 status：ok_with_data / ok_empty（成功但空，如查无订单——是有效信息不是错误）/ failed（system_error vs business_reject），写回 last_observation 供下一轮决策。\n5. Reflect 只在 failed 或验证不通过时触发，最多 N 次：注入 {failure_class, tried_actions, remaining_budget}，让模型输出枚举决策 fix_args|change_tool|replan|escalate；每轮末尾原子更新 step+1、cost、Checkpoint。任一预算超限即转 escalated/done 并 soft landing 收尾。",
        "Act 失败不能原样无限重试（写操作重试会重复副作用）；Observe 空结果若当成系统失败会让 Agent 误判已坏；Reflect 本身会幻觉，所以决策要收敛成有限枚举 + validator 校验，而不是再来一段自由文本。每多一层反思都加延迟与成本，要靠成功率/步数 A/B 证明其净收益，否则砍掉。",
        "我的 live graph 是精简 ReAct（call_model/human_approval/tools/finalize 四节点），Plan/Reflect 没有独立节点而是下沉进 call_model 前的 Context Engineering；失败分级提醒、Stuck Detector（按 current_turn_slice 检测无进展）、soft landing（换 unbound_model 收尾）是已落地的失败语义。独立 Plan/Reflect 状态机节点是设计方案——我曾删除 PEV 影子栈因为它没承载真实流量，不会把它说成现状。"
      ), "重点讲每种失败如何改变状态。", ["Agent Loop","失败语义"]],
    ["ReAct框架在实际开发中，如何避免“思考与行动脱节”？如何优化Reason步骤的准确性？",
      deepAnswer(
        "不靠自由文本推理驱动执行，而让每个 action 绑定目标、证据和结构化参数，并在执行后验证 state 是否真正推进——脱节的根因是 Reason 与 Observe 之间没有可验证回路。",
        "1. Prompt 里给每个工具写适用场景 + 禁用场景（如「仅当已拿到 orderId 才可调 query_logistics」），降低盲目调用。\n2. 让模型输出 action 时携带 {taskId, expectedOutcome}；执行器返回 {status, evidence, actual}，下一轮在 Prompt 顶部回填上一条 Observation 摘要，强制「基于最新观测决策」。\n3. 加 validator：每轮比对 expectedOutcome 与 actual，不一致就注入 step_back_section 提醒「上一步未达预期，先核对再继续」。\n4. 优化 Reason 准确性优先级：先改上下文质量（把关键事实 pin 到尾部）和工具描述歧义，再考虑换 reasoning model；reasoning model 只在确实需要长链推导的任务开。\n5. 监控行动效率指标 step_count、redundant_call_rate，把「步数膨胀」当一等回归指标，而不是只看最终答对。",
        "更长思考不一定更准，可能放大自洽幻觉并翻倍成本；隐藏思维链不可作为审计依据（不可验证、会编造）。优先级反了就会陷入「换更贵模型」而非修上下文/工具描述的低 ROI 循环。",
        "我用失败 ToolResult、step_back_section 分级提醒、Tasks/Todo 外化和统一 Artifact 给模型可操作反馈；71 步 Fibonacci 事故（答对但走了 71 步）正是促使我把 step count 列为一等评测指标的真实案例。展示行动轨迹（stage/action summary）而非私有 CoT。"
      ), "可展示行动轨迹，不展示私有思维链。", ["ReAct","Reasoning"]],
    ["Agent工具调用的Schema设计核心是什么？如何保证LLM正确选择工具、传递正确参数（避免参数缺失、类型错误）？",
      deepAnswer(
        "好 Schema 的目标是减少歧义和无效自由度，而不是把后端所有参数暴露给模型；身份/租户等可信字段绝不进 Schema。",
        "1. 工具名用动词+对象（query_order_by_id 而非 order）；description 同时写「何时用」「何时不要用」「与哪个工具区别」。\n2. 参数尽量收窄类型：enum（status:[paid,shipped,refunded]）、范围（limit:int 1..50）、format（date: ISO8601）、required 明确；自由字符串能枚举就枚举。\n3. principal/userId/tenantId/role 由服务端从 ToolExecutionContext 注入，不放进面向模型的 Schema——模型看不到也填不了。\n4. 两级校验：Pydantic 失败返回字段级 validation_hint（如「limit 必须 1-50，你传了 200」）让模型可修复重试；通过后再做业务校验（资源存在性、组合约束如 refund 必须先有 paid 记录）。\n5. 相似工具按任务阶段动态裁剪可见集（tool_search 按名称/描述检索 + Redis 缓存），减少同时暴露的近似工具导致误选。错误最多有限重试，避免反复改版打转。",
        "Schema 太宽模型容易编造参数，太窄又频繁要改版加字段；校验失败重试要设上限否则空转。模型选对工具 ≠ 获准执行——权限与副作用必须由执行器二次把关，Schema 只管「形状对不对」不管「能不能做」。",
        "我的 BaseTool + Pydantic + validation_hint + 确定性排序的 Tool Registry 是直接证据；execute_tool Pipeline 把所有校验失败统一转成可修复的 ToolResult 而不是抛异常。tool_search 动态 bind 新 schema 的具体路径以实际 collect_tools/bind_tools 实现为准，我会诚实区分。"
      ), "追问：身份参数为何不能让模型填写？", ["Tool Schema","Pydantic"]],
    ["多步工具依赖（如“查用户→查订单→查物流”），如何设计依赖管理、避免重复调用、死循环？",
      deepAnswer(
        "依赖要外化为结构化状态或 DAG，关键输出以变量保存进 State，不能只躺在自然语言历史里被模型重新「猜」一遍。",
        "1. 每步建模为节点：{id, tool, inputs, dependsOn:[id], status, resultRef, idempotencyKey}；调度器只在 dependsOn 全部 status=done 时才放行该步。\n2. 关键产物入 State 而非靠模型复述：查到的 userId/orderId 写进 state.entities，后续工具从 resultRef 读可信值，杜绝「用错旧 ID」。\n3. 只读查询按 (tool, canonical_args) 做缓存（Redis TTL 10min），同 run 内重复查直接命中，省掉重复调用。\n4. 记录每步指纹 hash(tool_name + 规范化参数 + 结果摘要)；最近 3 步指纹重复且 state 关键变量无变化 → Loop Guard 判 stuck（注意：重试时参数相同但结果在变要看 state 是否推进，不能只看参数）。\n5. 并行仅放给无数据依赖的分支（safe 工具走 asyncio 并发 + Semaphore，非 safe 独占串行）；写操作必须带 idempotencyKey 防重试重复执行。",
        "并行只适用无依赖分支，强行并行有依赖链会拿到脏数据；模型可能跳步或用过期 ID，所以执行器还要做业务级前置条件校验（如查物流前断言 orderId 存在且已发货）。缓存只读结果不能跨租户，写操作不可缓存。",
        "我用 Tasks/Todo 外化任务、MessagesState 存执行状态、Stuck Detector 按 current_turn_slice 检测无进展——这些是已落地的。通用 DAG 调度器（dependsOn 拓扑排序自动放行）当前 graph 还是线性 ReAct + 模型自驱，没有独立 DAG 引擎，这点我会明确标为设计方案。"
      ), "用订单链路画出状态字段会很有说服力。", ["依赖管理","DAG"]],
    ["Agent的反思机制（Reflection）如何实现？如何让Agent从执行失败中学习，优化下一轮决策？",
      deepAnswer(
        "Reflection 是有限、可触发、可评测的纠错步骤；真正跨任务学习要把失败沉淀成 Eval/知识/Skill，而不是指望单次模型「记住」。要分清 in-run reflection 与 cross-run learning。",
        "1. in-run 触发条件：连续失败 ≥2 次或 validator 不通过，且未超 reflection 预算（每 run 最多 2-3 次，防每轮都反思拖延迟）。\n2. 注入反思上下文 {failure_class:[timeout|perm|bad_args|empty], tried_actions:[...], remaining_budget}，要求模型输出枚举决策 change_strategy|fix_args|replan|escalate，而非自由发挥。\n3. cross-run learning：从 Langfuse 坏 Trace 定位事故，剥离客户数据提炼成 evals/tasks/<id>.yaml（写 source_trace_id 挂回现场），修复后 uv run python -m evals.run --task <id> 验证，并把它加入 baseline.json 做回归门禁。\n4. 经验沉淀分级写入：高频可复用范式写 Skill/Knowledge（需人工审核），用户级偏好/事实经 mem0 ADUN 去重后写 Memory，绝不自动把未审经验写长期记忆污染系统。\n5. 收益验证：对开/关 reflection 跑 A/B，比 success_rate 与 step_count，净收益为负就关。",
        "每轮都反思会增加延迟且容易自洽重复（模型给自己背书）；自动写长期记忆会污染后续所有会话。高风险经验必须人工审核入库；Reflection 的价值不能假设，要用成功率和步骤数量化，否则它只是更贵的空转。",
        "我的 step_back 分级提醒（即时纠错）+ mem0 Memory（长期事实）+「从 Langfuse 坏 Trace 沉淀 Eval」SOP（cross-run 学习）正好构成两层。已沉淀案例如 context-retention-heavy-turn、tool-failure-honesty、deliverable-must-reach-user 都是真实事故转回归用例。"
      ), "区分 in-run reflection 与 cross-run learning。", ["Reflection","Eval 闭环"]],
    ["Agent的短期记忆、长期记忆如何设计存储结构？如何平衡记忆容量与查询速度？",
      deepAnswer(
        "短期记忆是 thread/checkpoint 状态，长期记忆是用户级可检索事实；要把原始记录、结构化事实、向量索引分三层，各自存储与回收策略不同。",
        "1. 短期层（thread 内）：Checkpoint 保存 messages + 执行 state；大的「可再生」工具结果（如目录列表、长检索结果）offload 到 Artifact，消息里只留引用 + 预览，交付物/知识/Memory/subagent 结论不 offload。\n2. 长期层（用户级）schema：{fact, user_id, source, version, confidence, created_at, updated_at, embedding(384维)}；写入前过门槛（confidence/去重），用 ADUN（Add/Update/Delete/No-op）解决冲突而非无脑追加。\n3. 检索：先 metadata filter（user_id + scope）再 ANN（pgvector HNSW，cosine 用 <=> 距离转 1-distance 为相似度），热记忆走缓存，冷/旧记忆按 updated_at 衰减 confidence 或归档。\n4. 容量与速度平衡：靠写入门槛 + 去重 + ADUN + TTL + scope 控量，而不是简单截断 Top-K；向量维度选 384（FastEmbed 本地）平衡精度与索引体积。\n5. 隐私：不全量向量化聊天，只写「值得长期记的事实」，按 user_id 严格作用域，匿名用户映射固定 bucket。",
        "全量向量化聊天既制造检索噪声又有隐私风险；纯摘要会丢精确数字。容量靠写入策略而非读取截断——Top-K 截断只是治标，门槛+去重才是治本。维度越高越准但索引越大越慢，要按召回拐点定。",
        "我的 Aegra PostgreSQL Checkpoint（短期）+ ephemeral compaction（只改本轮 llm_messages 不动持久 transcript）+ mem0 + pgvector（长期，复用 FastEmbed 384 维 + ADUN）是完整落地案例。要诚实说明：mem0 写入是 fire-and-forget（返回 queued 后台执行，进程退出可能丢，是 best-effort 可恢复性有限）。"
      ), "面试中画出 Thread、Artifact、Memory 三层。", ["Memory","Checkpoint"]],
    ["高并发场景下，Agent任务排队、限流、优先级调度如何实现？（结合实际业务场景，如付费用户优先）",
      deepAnswer(
        "Agent 资源消耗由模型 Token、工具并发和任务时长共同决定，不能只按 HTTP QPS 限流——一个长任务可能占住槽位几分钟。",
        "1. 入口限流：按 (user_id|tenant_id) 做令牌桶（如付费 60 req/min、免费 10 req/min），超限快速 429 而非排队堆积。\n2. 任务入队带元数据 {priority, deadline, cost_estimate, submitter_principal}；用加权公平队列（WFQ），付费 weight=3、免费 weight=1，但给免费保底最小份额 minShare=20% 防饿死。\n3. 资源池分维度独立 semaphore：每个 model endpoint、sandbox、工具各自 asyncio.Semaphore（如 sandbox 并发 4、重工具 8），互不挤占；某池过载时该类任务降级或拒绝，不拖垮全局。\n4. 长任务防霸占：设单任务总 deadline（如 300s）+ 协作式取消（任务循环里查 cancel token，finally 释放沙箱/连接）。\n5. 防滥用：priority 由服务端按计费等级计算，绝不接受请求里自报的 priority；配额与成本服务端累计。",
        "绝对优先会饿死低等级用户（所以要 minShare 保底）；长任务占槽必须能超时 + 协作取消，否则高优先用户也排不进。优先级提升要防客户端伪造，配额/计费一律服务端算。",
        "我的 BackgroundTaskRunner 已有 DB 状态机（queued/running/progress/terminal）、单任务总超时、max_concurrent semaphore，可作为单机 MVP。它不是分布式优先级队列——加权公平队列 + Redis Streams/Kafka + Worker lease + 跨进程续跑是生产扩展的设计方案（当前重启会把无 Runner 的 queued/running 标 interrupted，不跨进程续跑）。"
      ), "追问：如何防止低优先级永远排不到？", ["调度","限流"]],
    ["Agent调用工具超时，如何设计重试策略、熔断机制、降级方案？兜底回复如何设计才不生硬？",
      deepAnswer(
        "先按错误类型判断可否重试，再把局部重试纳入整个 run 的 deadline 和 cost 预算——局部退避不能把全局拖爆。",
        "1. 分类重试：连接超时/429/5xx 走指数退避 + 抖动（base 0.5s，factor 2，cap 8s，max 3 次，sleep = min(cap, base*2^n) + random(0,0.3)）；参数错/权限/业务 4xx 不重试，直接回 validation_hint。\n2. 熔断：按 (provider, endpoint) 维护滑窗失败率，failure_rate>50% 且样本≥20 则 open 熔断 30s，半开放 1 个探测请求成功才 close；粒度可细到 tenant 防单租户拖垮共享。\n3. 降级：读类失败回退缓存或备用工具（如主检索挂了走关键词检索）；写类失败返回「待确认」状态 + idempotencyKey，绝不静默重放。\n4. 全局预算：每次重试都扣 run 的 deadline/cost，耗尽即停转兜底，不让退避无限累加。\n5. 兜底回复不说「系统繁忙」：用 soft landing 换一个无工具模型，用用户语言说明「已完成 X、Y 失败原因是 Z、你可以 A 或 B」，并保留已完成的部分结果。",
        "无脑重试制造雪崩 + 重复副作用（尤其写操作）；熔断粒度太粗会误伤健康租户，太细又状态爆炸。兜底最忌丢掉已完成进度——「系统繁忙请重试」会让用户从头再来，要诚实交代部分成功。",
        "我的 LLM retry/fallback（全耗尽返回 AIMessage 让 SSE 闭合，前端不卡 thinking 而非抛异常）+ Tool Pipeline 异常收敛 + step_back + soft landing 可组合回答。完整 circuit breaker：上下文压缩有进程内连续失败 3 次的 circuit breaker（重启丢），但工具级 per-endpoint 熔断器是设计方案，未全量落地，我会明确指出。"
      ), "强调失败诚实和部分结果。", ["重试","熔断"]],
    ["Agent生成的SQL/代码需要执行，如何设计沙箱环境、权限隔离，避免越权操作、注入攻击？",
      deepAnswer(
        "模型生成内容始终不可信；代码执行与数据库查询进不同安全域，默认最小权限 + 无网络 + 短时令牌。",
        "1. 代码沙箱：临时容器/microVM，限 CPU(1 core)、内存(512MB)、PIDs(256)、磁盘(临时 tmpfs)、wall time(30s)、seccomp 限 syscalls、--network=none 或白名单出站；rootfs 只读 + 临时 overlay，运行后整盘销毁。\n2. SQL 安全：只读账户 + SET TRANSACTION READ ONLY；SQL 先 AST 解析，校验只含 SELECT、表/列在 allowlist、无子查询逃逸；强制参数化绑定（禁止字符串拼接）；加 LIMIT 上限 + statement_timeout(5s)；写操作走 HITL 审批，不自动执行。\n3. 凭证：沙箱内只给短期 token（按 principal 签发 on-behalf-of），不注入长期密钥，不把凭证写进 Prompt。\n4. 二阶注入防护：安全边界放在权限/网络层而非关键词黑名单（黑名单防不住混淆/编码绕过）；多租户高风险执行用 Firecracker 级隔离。\n5. 审计：每次执行记 {principal, sql/code_hash, tables_touched, rows, duration} 到 span。",
        "容器 ≠ 绝对隔离（共享内核有逃逸面），高风险多租户要上 microVM/Firecracker；关键词拦截被混淆和二阶注入轻易绕过，真正的边界是数据库权限 + 网络隔离 + 短期凭证。写操作再小也要审批，不能因为「看起来安全」放行。",
        "我的 Cloudflare/E2B SandboxProvider（同一接口两实现，warm exec 约 0.3s）+ 图级 HITL（静态权限 interrupt 可 accept/edit/deny）+ Tool Pipeline 权限校验是强证据。Text2SQL 的 AST 解析 + 只读账户 + 数据库代理我没上线过，必须作为设计方案表达，不包装成实战。"
      ), "准备区分 Shell 注入、Prompt Injection 和 SQL 注入。", ["沙箱","SQL 安全"]],
    ["LangChain、LangGraph在生产中如何选型？LangGraph的状态机设计，如何适配复杂业务流程（如审批、工单）？",

        "1. 变更不直接改索引：业务写事实库时同库事务写一张 outbox 表（或开 CDC/Debezium 订阅 binlog），消费者异步重算 embedding，避免双写不一致。\n2. 每条向量带 metadata：docId、version（单调递增）、status（active/tombstoned）、validFrom。更新走 upsert 新 version 再原子切 active 指针（先建新后切，绝不先删旧——会留检索空窗）。\n3. 删除分两步：先在事实库打 tombstone 并在在线检索 filter status=active 把它排除（立刻生效），物理删向量放后台批处理。\n4. 回表校验：检索拿到 candidate docId 后回事实库批量查当前 active version，丢弃版本不匹配/已 tombstone 的，再喂给 rerank/LLM——这一步兜住索引刷新的秒级延迟。\n5. 消费失败进 DLQ，带 docId+version 可重放，幂等键 = (docId, version) 防重复消费。",
        "索引刷新有秒级到分钟级延迟，所以回表校验不可省，否则切版本那一瞬可能召回旧 chunk。outbox 增加一次写放大；CDC 运维成本更高但解耦更彻底。先删后建会产生召回空窗，先写新后切 active 才稳。",
        "我的 KnowledgeStore 是 DB-backed，team KB 改完下一轮读取即生效，是小规模实时更新真实案例；Dify 等外部 source 的新鲜度由各自适配层负责。Source Registry 正适合让每个 provider 暴露自己的版本/更新策略。上面的 outbox/CDC + tombstone + 回表是通用设计，我没在百万级跑过 CDC 流水线。"
      ), "核心是版本、tombstone、回表校验和可重放事件。", ["实时更新","一致性"]],
    ["同一用户同一问题多次查询，如何做检索结果缓存？如何处理“缓存过期”与“新知识更新”的矛盾？",
      deepAnswer(
        "缓存键要把身份、规范化 query、filter、数据源、indexVersion 全编进去；用版本失效代替猜 TTL，矛盾就消解了。",
        "1. 先把 query 做 canonical：lowercase、去多余空白、做 standalone rewrite（消解指代）后再 hash，让「最近的订单」「查下最近订单」命中同一键。\n2. 缓存键 = hash(userId_or_tenant + canonical_query + topK + filter + sourceId + sourceVersion)，缓存内容是候选 docId+score，不缓存最终权限判定和拼好的 answer。\n3. 失效靠版本：知识更新时该 source 的 sourceVersion+1，旧键自然再也命中不到，不靠 TTL 赌时间。\n4. 高频精确问题（错误码、政策条款）叠 SWR：返回旧结果同时后台异步刷新，下次拿到新值，既快又最终新鲜。\n5. 防击穿：热点 key miss 时用 Redis 单飞锁（SETNX）让一个请求回源、其余等结果，避免缓存失效瞬间打爆向量库。",
        "语义相似 query 共享缓存（embedding 近邻当同一 query）容易错误命中，要加相似度阈值 + 业务校验才敢上。权限随时变、时间敏感问题（今天/本周）不能跨用户或跨时间复用。只靠 TTL 会在「刚更新但没到期」窗口持续返回旧知识。",
        "我的 kb_retrieve 已经在用 query/topK/filter/source 为键的 Redis 10min 缓存，但目前键里还没含 sourceVersion——这正是我会主动提的改进点：加 sourceVersion 后就能从「赌 TTL」升级成「版本化失效」。SWR/单飞锁是设计方案，当前实现还没接。"
      ), "不要只回答“Redis 设置 10 分钟”。", ["RAG Cache","版本"]],
    ["用户问题模糊（如“查一下最近的订单”），如何做意图识别+查询改写+多路召回，提升召回率？",
      deepAnswer(
        "模糊问题先做数据源路由（结构化系统 vs 知识库），再补槽位和时间语义，最后才谈向量召回——直接 embedding 检索是错的。",
        "1. 意图识别：用一个轻量分类（小模型或规则+few-shot）打 intent，如 order_query / policy_qa / smalltalk，并抽槽位 {time_range, order_id, customer_id}。「最近」解析为业务默认窗口（如近 30 天），写进 slot 而不是塞给向量库。\n2. 路由：intent=order_query 走受控订单 API（参数化查询，绝不让模型拼 SQL）；intent=policy_qa 才进 RAG。槽位缺关键项或用户有多个账户 → 先澄清，不猜。\n3. 知识类做多路召回：并行生成 3 路 query——原始 query、standalone rewrite（补指代/槽位）、关键词 query（抽实体走 BM25）；各取 topN，用 RRF（k=60）融合：score = Σ 1/(60+rank)，避免不同路分数尺度打架。\n4. RRF 后去重，cross-encoder rerank 取最终 top8。改写模型必须输出「改写依据」并保留原始硬约束（用户给的订单号/时间不许被改）。",
        "改写模型最爱擅自补全订单号/客户名，必须把原始约束 pin 住并让它解释改了什么，否则把用户带到错误数据上比慢更危险。澄清多一轮交互，但返回别人的订单是事故级错误，宁可问。多路召回提 Recall 但成本和延迟 ×N，要按 intent 决定要不要全开。",
        "智能工单里大量模糊描述就是这类 bad case：我靠结构化表单 + 标签 + query rewrite 把歧义前置降下来，平均处理时长降约 50%。RRF k=60、三路召回是我会落地的检索方案；意图分类+路由在工单场景我做过，纯 RAG 多路召回是设计延伸。"
      ), "先做数据源路由，再谈向量召回。", ["意图识别","Query Rewrite"]],
    ["表格、带格式PDF、图片文本的RAG，如何处理才能不丢失结构信息（如表格行列关系、PDF排版）？",
      deepAnswer(
        "解析阶段就要保住版面和逻辑结构，把表格降维成纯文本是召回上限被锁死的根因。",
        "1. PDF 用 layout-aware parser（unstructured / PyMuPDF / PaddleOCR-Structure）拿到页号、标题层级、段落、坐标 bbox；正文与页眉页脚、目录靠位置和重复度区分剔除。\n2. 表格双表示：一份结构化 JSON（保 table_name、columns、rows、合并单元格的 rowspan/colspan）用于精确查询/Text2SQL，一份行级线性化文本（如「列A=值1, 列B=值2」每行一句）用于向量召回；跨页表格按表头连续性合并再切。\n3. 扫描件 OCR 后保留每块 bbox 和置信度，低置信（<0.6）标脏不入库或降权。图片走多模态模型生成结构化描述（图里是什么表/图/截图），存描述做检索 + 原图引用做回答取证。\n4. 每个 chunk 挂 metadata：page、table_id、parent_heading 路径（如「第3章>3.2 退款表」），回答时带原始证据定位。",
        "解析质量决定一切，复杂合并表转 Markdown 会丢行列关系，关系密集的表干脆走结构化查询/Text2SQL 而不是向量召回。OCR 错字会污染 embedding，置信度过滤是必须的。双表示增加存储和维护成本，但单一纯文本表示注定召回不准。",
        "我的项目支持图片消息 + 视觉代理（tool role 不能带 image block，并发转文本 + 原始 data URL 存 metadata）+ Artifact，多模态输入这条链是真实落地的；但成体系的文档 RAG 解析（layout parser、表格双表示、Text2SQL）我没上线过，这部分我会明确讲成扩展设计。"

    ["长文档（10w字+）RAG出现“中间内容丢失”，如何用父子分块、分层检索、重排序解决？",
      deepAnswer(
        "「中间丢失」有两个不同病灶：检索阶段没召回到，和召回太多塞爆 LLM 后注意力衰减（lost-in-the-middle），要分别治。",
        "1. 父子分块：父 chunk 按章节（约 1500-2000 token），子 chunk 按段落（300-400 token，overlap 50）；子块负责检索命中（小而精，Recall 高），命中后回表取其父块或左右相邻窗口补全上下文回答——检索粒度和生成粒度分离。\n2. 分层检索：给每个章节做摘要建第二级索引；复杂问题先在章节摘要层召回相关章节，再在选中章节内做子块检索，避免在全库子块里捞针。\n3. 重排序：父块扩展后候选会变多变杂，cross-encoder rerank 后只留 5-8 条互补证据（去掉内容重复的），按相关性而非原文顺序组装——把最相关的放头尾，别埋中间。\n4. 跨章节问题用 query decomposition 拆成子问题分别检索再合并，而不是无脑把 topK 调大。",
        "父块太大会把噪声一起带进去，邻居扩展必须受 token 预算硬约束（如证据区不超过窗口的 40%）。topK 越大不一定越好——超过注意力承受就触发中间丢失。decomposition 增加调用次数和延迟。",
        "我现有的 Context Compression（Tier1 把可再生工具结果 offload 到 Artifact、Tier2 模型摘要中间历史保留最近 human 边界）解决的是对话长度，不等于长文档 RAG 的父子分块——这两个「长上下文」我面试时会主动区分。父子分块+分层检索是我会落地的 RAG 方案，目前项目里没有这块。"
      ), "父子索引是检索粒度与生成粒度分离。", ["父子分块","Long Context"]],
    ["混合检索（稀疏+稠密）在生产中如何调参？如何平衡召回率与检索速度？",
      deepAnswer(
        "先各自建 BM25 和向量召回基线，再用标注数据调融合，绝不一上来手填 0.5/0.5。",
        "1. 两路并行：BM25（Elasticsearch / Milvus sparse）取候选 topN_sparse、向量取 topN_dense，N 各 50-100。\n2. 融合优先 RRF：score = Σ 1/(k + rank_i)，k=60（业界默认稳健值），天然避免 BM25 的 TF-IDF 分数和 cosine 分数尺度不一致；只有在确实校准过分数分布时才用加权 linear fusion。\n3. 按 query 类型动态调权：含错误码/型号/精确字符串的提高稀疏权重（BM25 强项），口语化语义问法提高稠密权重——可用前面的 intent 分类驱动。\n4. 控候选数 + rerank 收口：融合去重后取 top30-50 交给 cross-encoder，最终留 top8。调参在标注的 query-doc golden set 上扫网格：k∈{40,60,80}、N∈{50,100}，看 Recall@10 / NDCG@10 / P95 延迟的拐点。",
        "扩候选提 Recall 但每路和 rerank 延迟都涨；RRF 稳健代价是丢失原始分数强度（无法区分「强相关」和「勉强相关」）。任何权重/阈值都得在标注集上验，线上 query 分布漂移时要重调。",
        "我的联邦 KB 已经明确不同 provider 的分数分组不混排（就是因为尺度不可比），这恰好自然引出「需要 RRF 或统一 cross-encoder reranker 来跨 provider 排序」——目前是分组展示，统一 reranker 是下一步演进方案，不是已落地。"
      ), "调参必须在标注 query-doc 数据集上进行。", ["Hybrid Search","RRF"]],
    ["RAG与多轮对话结合，如何实现“基于历史上下文的自动检索”？避免重复检索、无效检索？",
      deepAnswer(
        "检索 query 应由「当前问题 + 必要的对话实体」组成，把整段历史直接 embedding 是噪声灾难。",
        "1. standalone rewrite：每轮把当前问题 + 最近几轮关键实体改写成自包含 query，消解「它」「上面那个」等指代和已确认槽位，只把这条改写后的 query 拿去检索。\n2. 同一回合的工具循环对相同 (canonical_query, filter, sourceVersion) 做 memo，命中直接复用上一次结果，杜绝同回合重复检索。\n3. 跨轮缓存：用 hash(canonical_query + filter + sourceVersion) 当键命中前面说的 Redis 缓存。\n4. 决定要不要检索：让模型先判断本问是否需要外部知识（闲聊/澄清/纯推理就跳过检索）；检索结果最高分低于门槛（如 cosine 0.5）则触发澄清而不是硬答。\n5. proactive 注入 + 显式检索两级：高置信场景每轮主动注入相关知识，低频精确需求才走显式 kb_retrieve 工具。",
        "自动检索太积极会每轮烧成本并把噪声注进上下文；缓存太激进又会忽略本轮新增的约束。判重不能只比原始字符串，要比 canonical_query + 实体 + filter 是否变化——用户换了时间范围但措辞没变也得重查。",
        "我的 build_turn_reminder 有主动注入 memo（遍历 injectable source，并行 + 3s 预算 + 门槛 team 0.45/tickets 0.5），kb_retrieve 工具有 Redis 10min 缓存——proactive injection + 显式检索这两级机制是真实在跑的。standalone rewrite 的回合内 memo 是设计延伸。"
      ), "追问：什么时候不应该检索？", ["多轮 RAG","去重"]],
    ["如何避免RAG检索到大量无关片段，导致LLM回答跑偏？（落地优化手段）",
      deepAnswer(
        "目标是先把 Context Precision 拉上去，再让模型严格基于证据答；用更强模型去硬扛烂召回是缘木求鱼。",
        "1. 数据侧：入库前去重（精确 hash + SimHash 近重复）、清洗模板页/页眉、语义分块保证每块自包含。\n2. 查询侧：standalone rewrite + metadata filter（按 source.filters 声明字段交集下发，把搜索空间先砍小）。\n3. 检索侧：hybrid + cross-encoder rerank + 相关性 threshold（按 source 分别校准，不用全局一个数）+ diversity（MMR 去近似重复证据，λ≈0.5）。\n4. 组装侧：去掉内容重复片段，给每条标来源和权威等级（官方文档 > 工单沉淀 > 草稿），冲突时让模型说明分歧。\n5. Prompt 硬约束：要求逐句引用 chunk id、证据不足必须拒答（输出「现有资料无法回答」），别让它脑补。",
        "固定阈值会因 query 长短和 provider 不同而失效，必须按数据源校准。topK 调大不一定更准。拒答率上升要分层看：是召回退化（坏）还是过滤掉了噪声（好）——不能只看总分。",
        "我的 KnowledgeSource 按 provider 分组、filter 声明求交集下发、注入阈值（team 0.45/tickets 0.5）都是真实在跑的精度控制机制。MMR diversity、统一 reranker、逐句引用 prompt 约束是设计方案。我会用「没找到 / 找错 / 用错」三类 bad case 来归因到底是哪一段出问题。"
      ), "用“没找到、找错、用错”三类 bad case 归因。", ["Context Precision","Rerank"]],
    ["生产环境如何自动化评估RAG效果？（召回率、MRR、Answer Relevancy的实操方案）",
      deepAnswer(
        "评测拆检索层、生成层、端到端三层分开打分，否则总分掉了根本不知道是召回烂还是生成跑偏。",
        "1. 建数据集：每条 = {query, relevant_doc_ids（人工标）, reference_answer, is_unanswerable}，覆盖正常 + 不可回答样本（专测拒答）。\n2. 检索层（确定性指标，优先）：Recall@K、MRR、NDCG@10、RAGAS 的 Context Precision（召回片段里有用的占比）和 Context Recall（该召回的召回了多少）。\n3. 生成层：RAGAS 的 Faithfulness（答案是否都有证据支撑，反幻觉）、Answer Relevancy、引用正确率、拒答准确率；开放答案用 LLM Judge 但要人工校准一批锚点防偏。\n4. 流程化：每次改 chunk 策略 / embedding / prompt / rerank 都打 version tag，跑 paired comparison（同一数据集对比前后），把指标和版本一起记，回归门禁卡 baseline。\n5. 持续从线上 bad case 抽样补进离线集，防止数据集和真实流量漂移。",
        "离线集天然会和线上漂移，必须持续从生产坏样本回灌。LLM Judge 有位置偏差（偏好靠前）和长度偏差（偏好长答案），要固定 prompt + 人工校准。Faithfulness 高但 Answer Relevancy 低 = 答得对但答非所问，单看一个指标会误判。",
        "我的 Eval Harness（四层：unit / trajectory / contract golden / 真实 eval）+ Langfuse dataset(agent-server-evals) + baseline.json 门禁 + 从坏 trace 沉淀回归任务的 SOP，可以直接迁移到 RAG 评测——把 task 的断言从「工具选择/step 数」换成「Recall@K / Faithfulness」即可。这套闭环是真实在用的。"
      ), "Answer Relevancy 高不代表事实忠实。", ["RAG Eval","MRR"]],
    ["Embedding模型如何选型？中英文文档混合场景，如何选择合适的Embedding模型，平衡效果与速度？",
      deepAnswer(
        "用自己的真实中英 query-doc 对评测，别只看 MTEB 榜；同时算维度、最大输入长度、吞吐和部署内存四笔账。",
        "1. 圈候选（如 bge-m3、multilingual-e5、gte-multilingual）各跑你的领域数据：分中文检索、英文检索、跨语言检索（中文 query 查英文文档）三场，看 Recall@10 / MRR 和 P95 编码延迟。\n2. 选架构：若中英内容互相检索（一个 query 要跨语言命中）用统一多语模型，向量空间对齐；若中英库相对独立，按语言路由不同模型 + 独立索引，各自最优。\n3. 性能：批量离线编码（batch 32-64）建库，在线 query 走常驻服务并缓存 query embedding；维度直接乘到存储和 ANN 成本（768 vs 1024 差约 30% 内存）。\n4. 升级迁移：换 embedding 模型 = 全库重建，必须双索引并行（新旧各建一份）、灰度按 query 比例切流、对比 Recall 达标再下线旧索引，绝不能原地替换。",
        "维度越高存储和 ANN 越贵，但太低丢细粒度语义。换模型是全量重建的大动作，双读期间存储翻倍。embedding 量化（fp32→int8）省内存但可能掉细粒度 Recall，必须用任务数据验证不是想当然。",
        "我的项目用本地 FastEmbed 384 维并复用给 mem0 和 Knowledge，真实取舍是避免起多个 ONNX 实例重复占内存（一份模型两处用）。但我不会夸大多语效果——384 维小模型的跨语言能力有限，要补真实中英评测才好下结论。双索引迁移流程是我会落地的方法。"

    ["向量检索中，余弦相似度、点积、欧氏距离的实际应用差异？如何选择？",
