        "量化用更低位宽表示权重/激活/KV Cache 来省显存带宽提吞吐，误差大小取决于量化对象和校准方法，不是位数越低就越好。",
        "1. 选量化对象与方案：weight-only 用 GPTQ（逐层二阶 Hessian 重建权重，精度好）或 AWQ（按激活幅度保护重要通道，对话/工具调用更稳）；激活也量化用 SmoothQuant（把激活的离群值难度迁移到权重）；KV Cache 单独量化（FP8/INT8）省长上下文显存。\n2. 校准流程：从线上脱敏分布采 128-512 条代表性样本（含工具调用、长上下文、多语言），跑校准统计 scale/zero-point；校准集分布偏了量化必崩，这是最大的坑。\n3. 双轴评测，先精度后速度：在目标任务集测准确率、工具调用 schema 正确率、长上下文召回，对比 FP16 基线设容忍阈值（如准确率掉 < 1%）；过关再测吞吐/显存/TTFT。\n4. 选位宽：INT8 较稳健作默认；INT4 显存收益大但对数字推理/工具参数敏感，仅在显存吃紧且评测过关时上；FP8 仅在 H100 等支持硬件上用，兼顾动态范围和吞吐。\n参数怎么定：把量化模型当 ModelCatalog 的独立版本声明（如 model-name-awq-int4），过 Eval Gate（passed/工具正确率/cost 对比 baseline）才允许进 fallback 链，模型升级后重新校准 + 重新过 gate。",
        "量化加速受硬件内核支持限制——没有对应低比特 GEMM kernel 时 INT4 可能反而更慢（要反量化回算）；别把权重位宽等同于 KV Cache 位宽，两者独立。工具参数生成、数字推理、低资源语言是退化重灾区，整体 perplexity 没掉不代表这些子能力没崩，必须分项评测。",
        "诚实边界：INT4/FP8 量化实操和私有部署我没做过，这是原理 + 校准评测方法层。能落地的是验证机制——我的四层测试（trajectory/contract golden/真实 eval）和 Eval Gate 正好是量化模型上线前的把关工具：把量化版作为 catalog 独立 entry，用 eval 任务集比 passed/steps/cost 决定是否启用，而不是直接替换线上模型。"
      ), "不要把参数位宽等同于 KV Cache 位宽。", ["量化","GPU"]],
    ["模型API突然报错、限流、宕机，后端如何设计熔断机制、切换备用模型？如何保证用户无感知？",
      deepAnswer(
        "切换必须建立在错误分类、能力兼容和显式配置上；「完全无感」只适用于首 token 尚未输出、且无副作用的请求。",
        "1. 错误分类决定动作：429/503/timeout 是可重试（is_retryable_error），先对同 provider 指数退避重试（如 3 次、base 0.5s、jitter）；400/401/内容审核拒绝是不可重试，直接走 fallback 或如实报错。\n2. Per-provider circuit breaker：滑动窗口统计失败率，超阈值（如 60s 内失败率 > 50%）开断，断开期直接走 fallback 不再打死的 provider；half-open 阶段放 1 个探测请求成功才闭合，避免雪崩恢复。\n3. ModelCatalog fallback 链：每个模型显式声明 fallback 目标（能力/协议/window/cost），首 token 前可静默切备用且要求备用支持相同 Tool Schema 和 modality；已开始流式则保留已输出部分，落地为 partial 并提示「上游中断，是否继续」，绝不静默换模型骗用户。\n4. 全链耗尽兜底：retry+fallback 全失败后返回一条 graceful AIMessage（说明上游不可用）而不是抛异常，让 SSE 正常闭合，前端不会卡在 thinking。\n参数怎么定：熔断阈值和窗口按 provider SLA 调，探测频率别太密（half-open 单请求）；fallback 链按 cost 升序 + 能力降级排，确保降级方向可解释。",
        "备用模型常不支持相同 Tool Schema、上下文窗口或视觉，没做能力矩阵和契约测试就切过去会工具调用全崩；跨 provider 还有数据合规、价格、输出风格差异，要纳入路由策略。「用户无感」不能以隐藏模型降级换来——质量明显下降时宁可显式告知。",
        "真实证据：is_retryable_error 错误分类、ModelCatalog 显式 fallback chain、全耗尽后返回 AIMessage 让 SSE 闭合，这三块是我已落地的完整案例。诚实说明：目前是 per-call fallback，还没有进程级/跨进程的全局 circuit breaker（上下文压缩那条按 thread 连续失败 3 次熔断的逻辑是进程内、重启即丢），生产级全局熔断是下一步要补的。"
      ), "用户无感不能以隐藏模型降级和质量下降为代价。", ["熔断","Fallback"]],
    ["如何防止恶意用户构造超长上下文、高频请求，刷Token造成成本暴增？（落地限流、拦截方案）",
      deepAnswer(
        "成本治理必须前置到模型调用之前做预算和配额，不能等供应商账单出来再追责。",
        "1. 多维限流：按 user/tenant/API key 维护 RPM、TPM、并发 run 数、日 token 预算四个计数器（Redis 滑动窗口 + 原子 INCR），任一超限就拒绝或排队；管理员和付费用户也要有硬上限，防凭证泄漏后无限刷。\n2. admission 时估成本：请求进来先用 tokenizer 真算 prompt token + max_output，预估 cost 写进 admission decision，预测会击穿日预算就直接拒；超长附件不进 prompt，外置存储后走检索按需召回。\n3. 单请求硬上限：限 max_output_tokens、工具步数（MAX_TURNS）、子任务递归深度、单 thread 上下文上限；动态 Context Window 触发后用 carving 把可再生的大工具结果 offload 到 Artifact、只留引用，从源头压住 token 体积。\n4. 异常模式拦截：短时间高频 + 超长输入组合触发验证码 / 降速 / 临时封禁；记录 per-user token 趋势，突增告警。\n参数怎么定：RPM/TPM 阈值按正常用户 P99 用量的 2-3 倍设，给真实重度用户留头部空间；日预算按人头成本上限反推，击穿前先降级（切小模型/砍 max_output）再硬拒。",
        "只限请求次数防不住「一次发 100K token」的单次超长攻击，必须同时限 token；只做截断又会破坏业务语义（把关键上下文切没）。预算控制要区分软降级和硬拒绝——直接硬拒会误伤正常的大任务用户，最好先降级再拒。",
        "真实证据：动态 Context Window + Tool carving（DEFAULT_CARVE_TOOLS allowlist）、MAX_TURNS 步数上限、Eval 的 cost 指标、ModelCatalog 的 price 声明，组成了我应用层的成本防线。诚实说明：目前还没有完整的 per-user TPM/日预算 + admission 拒绝闭环，用户级配额是我标注的待完善能力——但前面三块的 token 压制是已落地的。"
      ), "核心指标是 Token 与并发，不只是 QPS。", ["成本安全","限流"]],
    ["生产中如何实现多模型调度？（小模型处理简单任务、大模型处理复杂推理）如何设计调度策略？",
      deepAnswer(
        "路由要由任务特征 + 离线评测驱动，而不是让一个模型自己临场判断该用哪个模型（那是把路由变成又一次不可控推理）。",
        "1. 特征提取：用规则 + 轻量分类器（甚至一个小模型或关键词/长度启发式）抽出任务类型（抽取/改写/规划/工具编排）、上下文长度、是否需工具、是否含图、风险等级。\n2. 维护能力矩阵：每个模型登记 quality（按任务类型的 eval 分）、p50/p99 延迟、cost/1K token、支持的 modality 和 tool schema；这张表是路由的事实依据。\n3. 路由策略：简单抽取/格式化走小模型省成本，复杂规划/长链工具走强模型；高风险任务设最低能力门槛（不允许降到弱模型）；小模型失败按 escalation 单向升级到强模型，禁止来回切（防抖动）。\n4. 闭环验证：路由器变更先 shadow evaluation（线上双跑、只记不发），用现有 Eval tasks 分任务类型对比 passed/cost/latency，确认路由没把该用强模型的任务误降级。\n参数怎么定：能力门槛和成本权重用 eval 数据拟合——画每个任务类型在各模型上的 quality-cost 散点，取「满足质量阈值的最便宜模型」作为该类默认路由。",
        "路由器自己会误判，错把复杂任务路给小模型 → 失败 → 升级重跑，总延迟和总成本反而更高，所以要给小模型设可快速失败的信号；prompt cache 也随模型变化失效，频繁切模型会丢缓存收益。路由规则必须可解释、可回放，黑盒分类器出问题没法定位。",
        "真实证据：ModelCatalog 已声明每模型的 inputs/reasoning/cost/fallback、前端可手动选模型，这是路由的数据底座。诚实说明：自动 policy router（按特征选模型）目前还没上，是设计方案——但我有现成的 Eval 任务集可以按任务类型横评模型质量/成本，给路由策略提供拟合数据，落地路径是清晰的。"

    ["LLM推理服务GPU资源有限，如何做资源隔离、队列优先级、超时抢占？",
      deepAnswer(
        "GPU 服务的稀缺资源是显存里的 KV Cache 和在途 token，核心是别让一个长生成任务占满整个实例饿死其他人。",
        "1. 隔离：按模型/租户建独立 deployment 或在共卡时设 memory quota（vLLM 的 gpu_memory_utilization + max_num_seqs 限住单实例并发上限）；在线交互池和离线 batch 池物理分开，避免大批任务干扰在线 TTFT。\n2. 入口估算 + 加权公平：admission 估每请求的 KV slot 占用，进 WFQ 队列按租户权重出队；KV 水位逼近上限就停止接新序列，让在途的先 decode 完释放。\n3. 优先级与抢占：低优先级长生成设 max_tokens、deadline 和可取消的 request_id；支持 preemption 的 runtime（vLLM 可 swap/recompute KV）在显存紧张时回收低优序列的 KV、之后重算；不支持的就只在请求边界调度（等自然结束再切）。\n4. 超时止损：deadline 到就 abort(request_id) 摘除序列，前端断连同样立即 abort，防止僵尸序列长期占 KV。\n参数怎么定：抢占阈值看 KV 水位，留缓冲别等到 OOM 才抢；deadline 按任务类型分（交互 30s、bulk 几分钟），抢占代价（重算 token）要小于继续排队的代价才值得抢。",
        "抢占会浪费已计算的 token（recompute KV 要重跑 prefill），频繁抢占吞吐反降；低优先级可能持续被抢而饿死，要给它兜底最大等待。多模型共卡会产生显存碎片和互相干扰，重要在线请求最好不和离线批任务共池。",
        "诚实边界：GPU runtime 级的资源隔离/抢占我没实操过，不在我项目范围，这是接口边界 + 调度方法层。能从应用层提供的是把 priority、deadline、cancel token、estimated_tokens 这些信号往下传——我的 BackgroundTaskRunner 已经有 cancel event 和状态机，可以作为给底层 scheduler 喂调度信号的上游，但 GPU 侧的 KV 抢占要由推理引擎负责，我会明确这个分层。"
      ), "区分应用队列与 GPU runtime 调度。", ["GPU","资源隔离"]],
    ["异步Agent任务（执行时间>10s）如何设计？（任务状态管理、重试机制、结果通知、落库方案）",
      deepAnswer(
        "长任务必须脱离 HTTP 请求生命周期，状态持久化到 DB（事实源），并支持查询、取消和诚实终止。",
        "1. 状态机落库：创建 taskId 后写 status=queued；Worker 领取改 running（用 lease 租约 + CAS 抢占，防多 Worker 重复领同一任务）；进度 append-only 写 progress 表；正常结束写 succeeded，错误按类型分流——可重试错误退避重试、超 deadline 或不可重试写 failed/partial。\n2. 重试与幂等：每步带 idempotency key，工具副作用（写库/发通知/调外部 API）必须幂等，因为外部队列通常至少一次投递；终态更新用 CAS（compare-and-swap status）防止并发覆盖。\n3. 结果通知：Redis Pub/Sub 或 WebSocket 推实时进度，但通道是尽力而为——DB 才是事实源，通道丢消息时前端可轮询 DB 兜底；终态结果标 undelivered，下一轮注入用户一次后标 delivered，保证交付物不丢。\n4. 重启恢复：进程重启时把没有活 Runner 的 queued/running 任务标 interrupted（不假装还在跑），让用户/系统能看到真实中断而不是永久 spinning。\n参数怎么定：lease TTL 按任务最长执行时间的 1.5 倍设（短了会被误判死亡重复领，长了死 Worker 占用久）；重试上限 + 退避 base 按错误类型分别配。",
        "进程内 asyncio Task 简单但无法跨重启续跑（重启即丢在途任务）；上外部队列 Worker 能续跑但带来至少一次投递，逼着所有工具副作用幂等。结果通知要防重复推送，终态更新不用 CAS 会被并发请求互相覆盖出脏状态。",
        "真实证据：这题和我源码高度吻合。BackgroundTaskRunner 用 asyncio Task 管生命周期 + DB 管 queued/running/progress/terminal 事实状态、Redis Pub/Sub 只做实时事件（失败可轮询 DB）、终态结果 undelivered→delivered 一次性注入、重启把无 Runner 的任务标 interrupted——全部已落地。诚实说明：当前是进程内 Task，跨进程外部租约 Worker 续跑是下一步（重启只能标 interrupted 不能续跑），这是我标注的待完善项。"
      ), "这是与你源码高度匹配的一题。", ["异步任务","Durability"]],
    ["如何实现LLM请求全链路压测？如何模拟真实对话流量、流式请求场景？",
      deepAnswer(
        "压测要模拟真实的上下文长度、生成长度、多轮间隔和工具比例分布，统一发「你好」测不出任何真实容量。",
        "1. 造真实场景：从脱敏生产分布抽样，混合短问答、长 Prompt(RAG)、多轮对话、工具循环、中途断连取消五类，按线上实际比例配权重；多轮要带思考间隔（模拟人打字），不能并发一把梭。\n2. 流式指标：客户端必须真的逐 chunk 读 SSE（不能只测连接），统计连接建立时间、TTFT（首 token）、TPOT（token 间隔）、总延迟、成功率、abort 率、每请求 token 数——TTFT 和 TPOT 是流式体验的核心，比总延迟更重要。\n3. 分层定位瓶颈：用固定 seed + 模型 stub（fake model 返回固定流）先压系统容量（API/队列/向量库/DB），把基础设施瓶颈和模型本身解耦；确认系统能扛后再小规模接真模型验证质量和真实延迟。\n4. 逐级加压找拐点：并发从低到高阶梯加，画 throughput-latency 曲线，找 TTFT/错误率开始陡升的拐点作为容量上限，留 buffer 设限流阈值。\n参数怎么定：工具可选 k6 / Locust / 自研 asyncio 客户端，但指标设计 > 工具选择；压测环境用隔离配额，别打爆生产或触发供应商封禁。",
        "真模型压测成本高、结果随机（temperature 导致 token 数浮动），不适合做容量基线，应先 stub/回放测系统再小样本真模型验证。压测不隔离配额会误伤生产或被供应商风控。只测平均延迟会掩盖 P99 长尾，必须看分位数。",
        "真实证据：我的 Trajectory 测试（fake 脚本模型跑真实 live graph、零成本测工具选择/顺序/循环膨胀）正好是「stub 解耦基础设施」的现成手段；加上真实 Eval 比 latency/token/cost、以及 Cloudflare/AWS 多云的性能经验，能组成两层压测方法。诚实边界：完整的流式负载工具 + 容量报告我还没专门做过，1000 QPS 实测是方法层不是实战。"
      ), "工具可选 k6、Locust、自研异步客户端，但指标设计更重要。", ["压测","流式"]],
    ["微服务架构下，AI模块与Java/Go后端如何实现分布式事务、最终一致性？",
      deepAnswer(
        "模型不能参加传统分布式事务（它的输出不可靠、不可回滚）；AI 决策与业务写入要通过受控命令 + Saga/Outbox 达成最终一致。",
        "1. AI 只产 proposal：Agent 不直接写业务库，只生成结构化命令（如「退款 order=X amount=Y」），交给 Java/Go 服务做业务校验后提交本地事务，模型无权直接改账。\n2. Outbox 保证消息不丢：业务服务在同一本地事务里写业务表 + 写 outbox 表，后台 relay 把 outbox 事件投到消息队列，确保「业务已提交」和「事件已发」原子一致，不会出现写了库没发事件。\n3. Saga 编排 + 补偿：跨服务多步用 Saga，每步有 idempotency key、状态机和补偿命令（如「退款失败 → 发反向冲正」）；高风险步骤插人工审批（HITL）。\n4. Agent 凭真实状态判断进度：每步后 Agent 查真实业务状态（而非相信自己上一条文本说「已退款」），用查询结果决定下一步，避免基于幻觉推进。\n参数怎么定：idempotency key 用业务唯一键（orderId+操作类型）；消费者必须幂等去重（用 DB 唯一约束兜重复投递），重试退避 + 死信队列兜最终失败。",
        "补偿 ≠ 数据库回滚——外部通知、已发短信这类副作用不可逆，只能发反向操作或人工介入；至少一次投递要求消费者幂等，绝不能用模型判断「这条是不是重复」（模型会错）。两阶段提交锁资源久、不适合跨异构服务和 AI，别用 2PC 包 LLM。",
        "真实证据：我的统一 Tool Pipeline（execute_tool）天然是「命令边界」——Pydantic 参数校验 + 业务校验 + 权限 + 异常收敛，AI 的工具调用就是受控 proposal；图级 HITL 给高风险写操作做审批；Checkpoint 记录编排状态。诚实说明：完整的 Saga/Outbox 跨服务事务编排我没在生产落地过，业务最终一致仍由下游 Java/Go 服务负责，我能保证的是 AI 侧的命令边界和审批/幂等接口。"
      ), "不要回答“用两阶段提交包住 LLM”。", ["最终一致性","Saga"]],
    ["Agent服务如何高可用部署？多实例、负载均衡、灾备设计的核心要点？",

      const query = state.query.trim().toLowerCase();
      $$(".qa").forEach(qa => {
        const matched = !query || qa.dataset.search.includes(query);
        const pending = !state.onlyPending || !state.mastered.has(qa.dataset.id);
        qa.classList.toggle("is-hidden", !(matched && pending));
        if (matched && pending) visible++;
      });
      $$(".chapter").forEach(chapter => {
        chapter.hidden = !$(".qa:not(.is-hidden)", chapter);
      });
      $("#emptyState").classList.toggle("show", visible === 0);
    }

    $("#search").addEventListener("input", event => {
      state.query = event.target.value;
      applyFilters();
    });
    $("#clearSearch").addEventListener("click", () => {
      $("#search").value = "";
      state.query = "";
      applyFilters();
      $("#search").focus();
    });
    $("#masteredFilter").addEventListener("click", event => {
      state.onlyPending = !state.onlyPending;
      event.currentTarget.setAttribute("aria-pressed", state.onlyPending);
      applyFilters();
    });
    $("#expandAll").addEventListener("click", event => {
      const visible = $$(".qa:not(.is-hidden)");
      const shouldOpen = visible.some(qa => !qa.classList.contains("open"));
      visible.forEach(qa => {
        qa.classList.toggle("open", shouldOpen);
        $(".question", qa).setAttribute("aria-expanded", shouldOpen);
      });
      event.currentTarget.textContent = shouldOpen ? "收起本页" : "展开本页";
    });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          $$(".chapter-link").forEach(link => link.classList.toggle("active", link.dataset.target === entry.target.id));
        }
      });
    }, { rootMargin: "-20% 0px -70% 0px" });

    render();
    $$(".chapter").forEach(chapter => observer.observe(chapter));
  </script>
</body>
</html>
