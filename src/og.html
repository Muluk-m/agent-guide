<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');
* { margin: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; background: #faf8f3; overflow: hidden;
  font-family: "Space Grotesk", "PingFang SC", sans-serif; color: #2a2e3a;
  padding: 86px 96px; position: relative;
}
body::after {
  content: ""; position: absolute; right: -140px; top: -160px; width: 560px; height: 560px;

.mark { width: 116px; height: 116px; position: relative; z-index: 1; }

h1 i { color: #d6492f; font-style: normal; }
.sub { margin-top: 28px; font-size: 28px; color: #5a5f6e; font-weight: 500; font-family: "PingFang SC", sans-serif; }
.meta { position: absolute; left: 96px; bottom: 78px; font-size: 25px; color: #7a7f8c; font-weight: 500; font-family: "PingFang SC", sans-serif; }
.url { position: absolute; right: 96px; bottom: 78px; font-size: 23px; color: #b5402a; font-weight: 700; }
.bar { position: absolute; left: 0; bottom: 0; height: 10px; width: 100%; background: #d6492f; }
</style></head>
<body>
  <svg class="mark" viewBox="0 0 40 40">
